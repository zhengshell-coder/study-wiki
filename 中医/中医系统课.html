    <button onclick="ddJump(this,1)">② 五味</button>
    <button onclick="ddJump(this,2)">③ 归经与升降浮沉</button>
    <button onclick="ddJump(this,3)">④ 用药安全</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 四气：寒热温凉</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>四气是药物<b>作用性质</b>的概括，由它治什么证反推：能减轻或消除热证的，属寒、凉（如石膏、黄连）；能减轻或消除寒证的，属温、热（如附子、干姜）。寒凉程度有别（凉＜寒），温热亦然（温＜热）。另有偏性不明显的"<b>平性</b>"药（如甘草、茯苓）。</p>
    <p>用药总则："<b>寒者热之、热者寒之</b>"——寒证用温热药，热证用寒凉药。用反了，是火上浇油。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 五味：辛甘酸苦咸</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>味不仅是口尝之味，更是<b>功能</b>的标志：<b>辛</b>能散能行（发散表邪、行气行血，如薄荷、川芎）；<b>甘</b>能补能和能缓（补虚、和中、缓急、调和，如人参、甘草）；<b>酸</b>能收能涩（敛汗、止泻、固精，如五味子）；<b>苦</b>能泄能燥能坚（清热泻火、燥湿、降逆，如黄连、大黄）；<b>咸</b>能软坚能泻下（消痰核、通便，如牡蛎、芒硝）。此外"<b>淡</b>"能渗利（茯苓利水）、"<b>涩</b>"似酸主收。</p>
    <p>一药常兼数味，须<b>气味合参</b>：如生姜辛温——辛主散、温祛寒，合起来即发散风寒。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 归经与升降浮沉</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>归经</b>：指药物对某些脏腑经络有<b>选择性</b>作用。如同是清热，黄连偏清心胃、黄芩偏清肺、黄柏偏清下焦肾。归经让用药能"<b>定向</b>"，是历代临床经验的总结。</p>
    <p><b>升降浮沉</b>：药势的趋向——升（上行升提，如升麻）、降（下行，如代赭石）、浮（向外发散，如麻黄）、沉（向内泻利，如大黄）。一般气温热、味辛甘者多升浮，气寒凉、味苦酸咸者多沉降。它指导我们"<b>因势利导</b>"：病位在上在表用升浮，在下在里用沉降。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>④ 用药安全：毒性与配伍禁忌</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>配伍七情</b>：单行、相须（同类相助增效）、相使（主辅配合）、相畏 / 相杀（一药制另一药之毒）、相恶（一药减另一药之效）、相反（合用产生毒害）。组方要"用其相须相使、避其相恶相反"。</p>
    <p><b>禁忌</b>：传统有"<b>十八反、十九畏</b>"（某些药不可同用，如乌头反半夏）、<b>妊娠禁忌</b>（峻下、活血破血、有毒药孕妇慎用或禁用）。<b>有毒药</b>（附子、川乌、马钱子等）须严格炮制、控量。</p>
    <div class="modern"><b>现代视角与诚实提醒：</b>"天然不等于安全"——已知含<b>马兜铃酸</b>的药材有肾毒性，中西药也可能<b>相互作用</b>。用药请遵专业指导，切勿自行长期或大剂量服用。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">启下 ·</span>药性理论是经验还是先验配属？"废医验药"与整体配伍如何取舍？中药安全与监管怎样？切「专家版」。</div>
</div>

<div class="deepdive dd-expert expert-only">
  <div class="dd-title">专家精讲 · 教授级 <small>药性建构 · 研究范式 · 安全监管</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>深入版你已掌握药性与用药安全。这一层<b>仍论中药</b>，追到学理：药性理论的建构与争议、还原论与整体观的张力、中药安全与监管。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 药性理论的建构与争议</button>
    <button onclick="ddJump(this,1)">② 还原论与整体观的张力</button>
    <button onclick="ddJump(this,2)">③ 中药安全与监管</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 药性理论：经验归纳还是先验配属？</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>四气五味、归经、升降浮沉，是药性理论的四大要素。其来源是<b>双重</b>的：一部分是<b>临床经验的归纳</b>（吃了发热的药就定为温热、能止泻的定为收涩）；另一部分则带有<b>理论的先验配属</b>（按五行、阴阳推演药性与归经）。</p>
    <p>金元时期更出现"<b>法象药理</b>"——以药物的形、色、质、所生之地推测药效（如"以皮治皮""藤类通络""色赤入血"）。这类推理<b>部分有效、部分牵强</b>：它是一种富有启发的类比，但也可能导致附会。学术上须区分哪些药性是<b>可重复的经验</b>、哪些是<b>理论的演绎</b>。</p>
    <div class="scholar"><b>批判要点：</b>张元素、李东垣是归经与法象药理的推动者；现代研究表明，归经与药效成分的组织分布、靶器官有一定相关，但"法象"式推理不可作为确定药效的依据。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② "废医验药"vs整体配伍：研究范式的张力</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>中药现代研究存在一条深刻的<b>范式张力</b>：一端是<b>还原论的"成分研究"</b>（提取单体、阐明分子机制，麻黄碱、青蒿素、黄连素是其辉煌成果，近于"废医验药"思路）；另一端是中医固有的<b>整体配伍观</b>（强调君臣佐使的协同、复方多成分多靶点，单体不能代表整方）。</p>
    <p>为弥合二者，发展出<b>血清药理学</b>（用含药血清研究真实吸收后的成分）、<b>网络药理学</b>（多成分-多靶点-多通路的系统分析）、<b>组分中药</b>（标准化的有效组分配伍）等新方法，试图在保留整体观的同时获得现代证据。</p>
    <div class="scholar"><b>前沿与诚实：</b>单体研究证据最硬但偏离整体；复方研究贴近临床但机制复杂、难以证伪。两条路各有价值，目前都不能单独完整解释中药——这是中药现代化的核心难题。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 中药安全：毒性、相互作用与监管</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>"天然≠安全"绝非空话，有沉痛教训：<b>马兜铃酸</b>（含于关木通、广防己、马兜铃等）可致<b>不可逆的肾损害与泌尿系肿瘤</b>，曾酿成"中草药肾病"事件，相关药材已被禁用或限用；<b>何首乌、雷公藤</b>等有肝毒性报道；<b>朱砂（汞）、雄黄（砷）</b>等矿物药有重金属毒性。</p>
    <p>此外还有<b>中药-西药相互作用</b>（如含麻黄者影响血压、活血药与抗凝药叠加出血风险）。古人以<b>炮制</b>减毒（附子久煎、何首乌制用）有其科学性，但现代仍需<b>剂量控制、质量标准、不良反应监测（药物警戒）</b>与合理监管。</p>
    <div class="scholar"><b>立场：</b>既不因个别毒性否定中药整体，也不以"祖传天然"掩盖风险——<b>循证地评估每味药、每个方的获益与风险</b>，才是负责任的态度。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">小结 ·</span>从会读药性，到明其理论来路、研究范式之争、安全与监管——用药就既懂理、又守得住底线。</div>
</div>

<div class="block quiz"><h3><span class="badge">测</span>小测</h3>
<div class="q"><p>1. "四气"和"五味"分别说明药物的什么？</p><button onclick="toggleA(this)">看答案</button><div class="a">四气（寒热温凉）说明药物的寒热性质与作用方向；五味（辛甘酸苦咸）说明药物的功能（散、补、收、泄、软坚等）。</div></div>
<div class="q"><p>2. 为什么说"天然不等于安全"？</p><button onclick="toggleA(this)">看答案</button><div class="a">部分中药有毒性（如含马兜铃酸者伤肾）、有配伍禁忌（十八反十九畏），还可能与西药相互作用，须辨证并遵专业指导。</div></div>
</div>
`},

18:{part:"第四部 · 怎么治（法·方·药）", title:"常用中药巡礼", sub:"分类记忆", deepCount:5, body:`
<div class="block hook"><p>中药数千种，怎么记？靠"<b>按功效分类</b>"。本课带你巡览最常用的几大类药及其代表，建立一张"<b>药物地图</b>"——不求记全，但求知道每一类在干什么。</p></div>

<div class="block story"><h3><span class="badge">事</span>小故事 · 一株青蒿与诺贝尔奖</h3>
<p>上世纪疟疾肆虐，屠呦呦团队遍查古方，在东晋葛洪《肘后备急方》里读到一句："青蒿一握，以水二升渍，<b>绞取汁</b>，尽服之。"——古人用的是<b>生汁、不加热</b>。这个细节点醒了她：高温会破坏有效成分。她改用低温提取，终于得到抗疟的<b>青蒿素</b>，挽救了全球数百万生命，并因此获诺贝尔奖。</p>
<p class="src">——事见屠呦呦团队研究与葛洪《肘后备急方》</p>
<p class="moral">这是古老中药与现代科学结合的典范：传统经验提供线索，现代方法验证提纯。学中药，既要尊重经验，也要拥抱实证。</p></div>

<div class="block"><h3><span class="badge">核心</span>核心概念</h3>
<ol class="concepts">
<li><b>解表药</b>：发散表邪，治外感表证（辛温：麻黄、桂枝；辛凉：薄荷、桑叶）。</li>
<li><b>清热药</b>：清里热（石膏、知母、黄连、金银花）。</li>
<li><b>补益药</b>：补气血阴阳（人参、黄芪、当归、熟地）。</li>
<li><b>其他大类</b>：祛湿、理气、活血、化痰、消食、安神、温里……各司其职。</li>
</ol></div>

<div class="block"><h3><span class="badge">图</span>一图看懂 · 常用药功效分类</h3>
<div class="diagram">
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;text-align:left;font-size:13px;">
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>解表</b> 麻黄·薄荷</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>清热</b> 石膏·黄连</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>补益</b> 人参·当归</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>祛湿</b> 茯苓·苍术</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>理气</b> 陈皮·香附</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>活血</b> 川芎·丹参</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>化痰止咳</b> 半夏·杏仁</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>消食</b> 山楂·麦芽</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>安神</b> 酸枣仁</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>温里</b> 附子·干姜</div>
</div>
<div class="cap">先按"功效大类"建立地图，再逐味深入</div>
</div></div>

<div class="block"><h3><span class="badge">参</span>名家说 & 现代视角</h3>
<p class="quote">"药有个性之专长，方有合群之妙用。"——徐灵胎</p>
<div class="modern"><b>现代视角：</b>不少现代药物正源于中药：<b>青蒿素</b>（抗疟，源于青蒿）、<b>黄连素/小檗碱</b>（源于黄连）、<b>麻黄碱</b>（源于麻黄）、<b>砒霜（三氧化二砷）</b>（治某型白血病）。要诚实区分：有些药的<b>有效成分明确</b>，有些仍是<b>复方经验</b>、机理待研究。</div></div>

<div class="block caution"><h3><span class="badge">辨</span>别误会</h3>
<p>① 同类药仍有差异——麻黄与薄荷都解表，一<b>温</b>一<b>凉</b>，用途不同；② 补药不能乱吃，"误补"会留邪、生热、壅滞；③ 单味药与复方作用不同，别拿单味推断整方。</p></div>

<div class="block"><h3><span class="badge">用</span>用得上</h3>
<p>认识你厨房里的"药"：生姜、葱白能<b>解表散寒</b>，山楂能<b>消食</b>，陈皮能<b>理气化痰</b>，红枣、枸杞能<b>补养气血</b>。它们性平和，是日常食养的常用之品——但仍要看体质寒热。</p></div>

<div class="next-tip">读完标准版，你已有一张"药物地图"。想分类巡览解表/清热/补益等大类的代表药？　切「深入版」↘</div>

<div class="deepdive deep-only">
  <div class="dd-title">深入精讲 · 系统展开 <small>点目录可跳转，逐节展开</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>标准版你已建立功效分类的地图。这一层回到同一地图逐类巡览：解表、清热、补益、祛邪诸药、安神温里等。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 解表药</button>
    <button onclick="ddJump(this,1)">② 清热药</button>
    <button onclick="ddJump(this,2)">③ 补益药</button>
    <button onclick="ddJump(this,3)">④ 祛邪诸药</button>
    <button onclick="ddJump(this,4)">⑤ 安神温里等</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 解表药</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>辛温解表</b>（治风寒表证）：麻黄（发汗平喘）、桂枝（解肌温通）、紫苏、生姜、荆芥、防风。<b>辛凉解表</b>（治风热表证）：薄荷、桑叶、菊花、柴胡、葛根、牛蒡子。</p>
    <p>记忆抓手："<b>有汗用桂枝、无汗用麻黄</b>"（辛温里的虚实之别）；"<b>风寒用辛温、风热用辛凉</b>"（看外感性质）。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 清热药</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>按作用细分：<b>清热泻火</b>（石膏、知母、栀子——清气分大热）；<b>清热燥湿</b>（黄连、黄芩、黄柏——清湿热，"三黄"分清上中下焦）；<b>清热解毒</b>（金银花、连翘、板蓝根——治热毒疮痈、温病）；<b>清热凉血</b>（生地、牡丹皮、赤芍——治血热出血）；<b>清虚热</b>（青蒿、地骨皮——退阴虚潮热）。</p>
    <p>清热药多<b>苦寒</b>，易伤脾胃阳气，故"<b>中病即止</b>"，不可久服过量。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 补益药</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>补气</b>：人参、黄芪、白术、甘草、山药（治气虚乏力、食少）。<b>补血</b>：当归、熟地、白芍、阿胶、何首乌（治血虚面白头晕）。<b>补阴</b>：沙参、麦冬、枸杞、女贞子（治阴虚潮热口干）。<b>补阳</b>：鹿茸、杜仲、肉苁蓉、淫羊藿（治阳虚畏寒）。</p>
    <p>补益讲究<b>对证</b>与<b>配伍</b>：补气常配健脾（防壅滞）、补血常配补气（"血不自生，须得阳气"）、补阴常配清虚热、补阳常"阴中求阳"。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>④ 祛邪诸药：祛湿·理气·活血·化痰·消食</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>祛湿</b>：利水渗湿（茯苓、泽泻、薏苡仁）、芳香化湿（藿香、苍术、厚朴）。<b>理气</b>：陈皮、枳壳、香附、木香（治气滞胀痛）。<b>活血化瘀</b>：川芎、丹参、桃仁、红花、三七（治血瘀刺痛、肿块）。<b>化痰止咳平喘</b>：半夏、陈皮、川贝、杏仁、桔梗。<b>消食</b>：山楂（化肉食）、麦芽（化米面）、神曲、鸡内金。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>⑤ 安神·温里·收涩等 & 现代视角</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>安神</b>：酸枣仁、柏子仁、远志（养心安神）、龙骨、牡蛎（重镇安神）。<b>温里</b>：附子、干姜、肉桂、吴茱萸（回阳、温中散寒——附子有毒须炮制控量）。<b>收涩</b>：五味子、山茱萸、芡实（固表止汗、涩精止泻）。<b>平肝息风</b>：天麻、钩藤、石决明。</p>
    <div class="modern"><b>现代视角与分寸：</b>部分药已有明确药理（如黄连素抗菌降糖、丹参改善微循环、酸枣仁助眠），但<b>不能把单味成分等同整味药、更不能等同复方</b>。中药的优势常在配伍整体，疗效与安全都需在辨证与专业指导下评估。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">启下 ·</span>本草学如何源流、"道地药材"有何科学？单味-药对-复方怎样分层？中药资源与质量有何挑战？切「专家版」。</div>
</div>

<div class="deepdive dd-expert expert-only">
  <div class="dd-title">专家精讲 · 教授级 <small>本草源流 · 配伍层次 · 资源质量</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>深入版你已巡览常用药大类。这一层<b>仍论中药</b>，追到学术：本草源流与道地药材、单味·药对·复方的层次、资源与质量的挑战。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 本草源流与道地药材</button>
    <button onclick="ddJump(this,1)">② 单味·药对·复方</button>
    <button onclick="ddJump(this,2)">③ 资源与质量的挑战</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 本草学的发展与"道地药材"</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>本草学是一条清晰的传承链：《神农本草经》（365种）→ 陶弘景《本草经集注》（730种、首创自然属性分类）→ 唐《新修本草》（<b>世界第一部国家药典</b>）→ 宋《证类本草》→ 明李时珍《本草纲目》（近1900种、纲目分类，被誉为"东方药学巨典"）→ 清《本草纲目拾遗》。每一部都在前人基础上增补、修订、纠误。</p>
    <p>"<b>道地药材</b>"是本草学的独特概念——特定产地的药材品质最优（如川贝、云苓、广陈皮、怀地黄）。现代研究证实：产地的<b>气候、土壤、品种</b>确实显著影响有效成分含量，"道地"有其物质基础，并非玄虚。</p>
    <div class="scholar"><b>研究方向：</b>道地药材的"<b>道地性</b>"成因（基原、生态、栽培、加工）与质量评价，是中药资源学的核心课题。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 单味药·药对·复方的多层次</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>中药的作用可分层研究：<b>单味药</b>（其有效成分与药理，如人参皂苷、黄芪多糖、丹参酮）；<b>药对</b>（两药固定配伍的最小单元，如麻黄-桂枝增强发汗、附子-甘草减毒、黄芪-当归补气生血）；<b>复方</b>（君臣佐使的完整方剂）。</p>
    <p>"<b>药对</b>"研究尤具价值——它是连接单味与复方的桥梁，便于揭示<b>配伍增效减毒</b>的物质基础与机制（如附子配甘草，甘草成分可降低乌头碱毒性）。从单体到药对到复方的<b>多层次研究</b>，是理解中药"整体大于部分之和"的路径。</p>
    <div class="scholar"><b>方法：</b>拆方研究、配伍比例优化（正交/均匀设计）、网络药理学，都是研究复方配伍科学内涵的工具。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 中药资源、质量与现代化挑战</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>中药的现代化面临多重现实挑战：<b>资源与伦理</b>——犀角、虎骨、麝香等濒危动物药已被禁用或须人工替代（如水牛角代犀角、人工麝香），涉及生态与伦理；<b>质量安全</b>——野生变栽培带来成分变异，农药残留、重金属、真菌毒素需严控；<b>标准化</b>——以<b>指纹图谱、含量测定</b>建立质量标准，是中药走向国际的前提。</p>
    <p>这些问题决定了中药能否被国际主流医药体系接受。客观说，中药质量标准化与可重复性，仍是制约其国际化的<b>主要瓶颈</b>之一。</p>
    <div class="scholar"><b>诚实评估：</b>"道地、地道"的经验智慧需与现代<b>质量控制、可追溯体系</b>结合；保护资源、保证质量、规范标准，是中药可持续发展的前提。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">小结 ·</span>从认得各类常用药，到明本草源流、配伍层次、资源质量之困——对中药就有了从"用"到"治学"的全景。</div>
</div>

<div class="block quiz"><h3><span class="badge">测</span>小测</h3>
<div class="q"><p>1. 解表药分哪两类？各治什么？</p><button onclick="toggleA(this)">看答案</button><div class="a">辛温解表（治风寒表证，如麻黄、桂枝）与辛凉解表（治风热表证，如薄荷、桑菊）。</div></div>
<div class="q"><p>2. 青蒿素的故事给学中药什么启示？</p><button onclick="toggleA(this)">看答案</button><div class="a">传统经验（古方线索）与现代科学（低温提取、提纯验证）结合，既尊重经验又重实证。</div></div>
</div>

19:{part:"第四部 · 怎么治（法·方·药）", title:"方剂原理", sub:"君臣佐使", deepCount:4, body:`
<div class="block hook"><p>单味药像独奏，<b>方剂则是合奏</b>——把几味药按规矩配在一起，效果远超简单相加。这套配伍规矩的核心，就是四个字：<b>君臣佐使</b>。读懂它，你就能看穿一张方子的"阵法"。</p></div>

<div class="block story"><h3><span class="badge">事</span>小故事 · 从厨房悟出的组方之道</h3>
<p>相传商代名相<b>伊尹</b>，本是一位精于烹饪的厨师。他从调和五味、掌握火候中悟出道理：药物配伍如同烹调——主料、配料、调料各有其位，分量火候稍变，味道（药效）就大不相同。后世遂传他著《汤液经》，开方剂配伍之先河。</p>
<p class="src">——伊尹作汤液，事属传说，承载"组方如烹调"之理</p>
<p class="moral">这个传说点出方剂的真谛：<b>配伍是一门讲究主次、分量与协同的艺术</b>。一堆好药随意堆在一起未必是好方，组得有法度，才成良方。</p></div>

<div class="block"><h3><span class="badge">核心</span>核心概念</h3>
<ol class="concepts">
<li><b>方从法出</b>：方剂是治法的落实——"法随证立、方从法出"，先有证与法，才有方。</li>
<li><b>君臣佐使</b>：<b>君</b>药针对主病主证；<b>臣</b>药辅助君药；<b>佐</b>药佐助、佐制（制君臣之偏）或反佐；<b>使</b>药引经或调和。</li>
<li><b>七情配伍</b>：用相须相使<b>增效</b>，用相畏相杀<b>减毒</b>，避相恶相反。</li>
<li><b>剂型与煎服</b>：汤、丸、散、膏等，以及煎法服法，都影响疗效。</li>
</ol></div>

<div class="block"><h3><span class="badge">图</span>一图看懂 · 君臣佐使（以麻黄汤为例）</h3>
<div class="diagram">
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;text-align:left;font-size:13px;">
<div style="background:#9e3526;color:#f5edda;border-radius:8px;padding:10px;"><b>君 · 麻黄</b><br>发汗解表、宣肺平喘（主攻）</div>
<div style="background:#b5662e;color:#f5edda;border-radius:8px;padding:10px;"><b>臣 · 桂枝</b><br>助麻黄发汗、解肌</div>
<div style="background:#586b50;color:#f5edda;border-radius:8px;padding:10px;"><b>佐 · 杏仁</b><br>降肺气、助平喘</div>
<div style="background:#a8884e;color:#f5edda;border-radius:8px;padding:10px;"><b>使 · 炙甘草</b><br>调和诸药、缓峻烈</div>
</div>
<div class="cap">四味药各居其位，分工协同，方成"发汗解表"之峻剂</div>
</div></div>

<div class="block"><h3><span class="badge">参</span>名家说 & 现代视角</h3>
<p class="quote">"主病之谓君，佐君之谓臣，应臣之谓使。"——《素问·至真要大论》</p>
<div class="modern"><b>现代视角：</b>方剂≈多成分的<b>组合用药</b>，君臣佐使≈主辅配伍＋减毒增效＋靶向引导。现代有"<b>组分中药</b>""配伍减毒增效"的研究，试图用药理与药代动力学解释经典配伍的合理性——有些已得到部分印证。</div></div>

<div class="block caution"><h3><span class="badge">辨</span>别误会</h3>
<p>① 不是"药越多越好"——经方往往<b>药少而精</b>（麻黄汤仅四味）；② <b>加减一味、方义可变</b>（桂枝汤加重桂枝即成桂枝加桂汤）；③ 中成药也要看"方"对不对证，名字相近不等于功效相同。</p></div>

<div class="block"><h3><span class="badge">用</span>用得上</h3>
<p>拿到一张方子，先找<b>君药</b>（剂量大、最对主证的那味），再看谁辅助、谁调和——一张方子的"意图"立刻清晰。也就明白了：<b>为什么不能自己随意增减药味</b>。</p></div>

<div class="next-tip">读完标准版，你已会看一张方的"君臣佐使"。想吃透方从法出、君臣佐使详解、七情与剂型？　切「深入版」↘</div>

<div class="deepdive deep-only">
  <div class="dd-title">深入精讲 · 系统展开 <small>点目录可跳转，逐节展开</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>标准版你已会认君药、看方子的结构。这一层回到同一框架讲深：方从法出、君臣佐使详解、七情配伍、剂型煎服与分类。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 方从法出</button>
    <button onclick="ddJump(this,1)">② 君臣佐使详解</button>
    <button onclick="ddJump(this,2)">③ 七情与禁忌</button>
    <button onclick="ddJump(this,3)">④ 剂型·煎服·分类</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 方剂与治法的关系</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>方剂不是药物的随意堆砌，而是<b>治法的物化</b>。完整链条是："辨证→立法→选方→遣药"——证决定法，法决定方。比如辨为"风寒表实证"，立"辛温发汗"之法，才选麻黄汤这类方。</p>
    <p>所以同一个方，能治不同病（异病同治：只要病机相同）；同一个病，也可用不同方（同病异治：病机不同）。理解了"方从法出"，就不会"对病名套方"。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 君臣佐使详解</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>君药</b>：针对主病或主证、起主要作用，药力居首（常剂量最大）。<b>臣药</b>：辅助君药增强疗效，或针对兼证。<b>佐药</b>：三种——佐助（协助君臣）、佐制（制约君臣药的烈性或毒性）、<b>反佐</b>（病重时用与君药性味相反的少量药，防格拒）。<b>使药</b>：引经（引药达病所）或调和诸药（如甘草）。</p>
    <p>一首方未必四者俱全，但<b>君药不可缺</b>。读方先抓君药，全方的"主攻方向"便了然。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 七情配伍与禁忌</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>配伍七情</b>：单行（单味）、相须（同类相助，如石膏配知母）、相使（主辅相成）、相畏 / 相杀（一药制另一药之毒，如半夏畏生姜）、相恶（一药削弱另一药，如人参恶莱菔子）、相反（合用增毒，禁用）。</p>
    <p>组方原则：<b>善用相须相使以增效，巧用相畏相杀以减毒，力避相恶相反</b>。配伍禁忌有"十八反、十九畏"，妊娠用药亦有禁忌——这些是安全底线。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>④ 剂型、煎服法与方剂分类</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>剂型</b>：汤剂（吸收快、易加减，最常用）、丸剂（缓而持久，"丸者缓也"）、散剂、膏剂、丹剂等，各有所宜。<b>煎服法</b>是"看不见的药"：先煎（矿石贝壳）、后下（薄荷等芳香药）、包煎、烊化；服法有空腹、饭后、温服热服之别——前面桂枝汤"啜热稀粥、温覆取微汗"就是范例。</p>
    <p><b>方剂分类</b>：按治法分为解表、泻下、和解、清热、温里、补益、理气、理血、祛湿、化痰、消导、安神、固涩、治风等十余类——下两课就按这个地图，精讲代表名方。</p>
    <div class="modern"><b>现代视角：</b>剂型选择关乎<b>药物释放与起效速度</b>（汤剂快、丸剂缓释），与现代药剂学的理念相通。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">启下 ·</span>方书传统与"经方-时方"之争如何？君臣佐使有无物质基础？经方剂量怎样折算与活用？切「专家版」。</div>
</div>

<div class="deepdive dd-expert expert-only">
  <div class="dd-title">专家精讲 · 教授级 <small>方书源流 · 配伍研究 · 经方剂量</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>深入版你已掌握君臣佐使与配伍。这一层<b>仍论方剂</b>，追到学术：方书传统与经方时方、配伍规律的现代研究、经方剂量考与活用。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 方书传统与经方时方</button>
    <button onclick="ddJump(this,1)">② 配伍规律的现代研究</button>
    <button onclick="ddJump(this,2)">③ 经方剂量考与活用</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 方书传统与"经方—时方"之争</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>方剂学有悠久的"方书"传统：现存最早的方书是马王堆《<b>五十二病方</b>》；《伤寒杂病论》确立辨证组方；唐《千金方》《外台秘要》集方；宋代《<b>太平惠民和剂局方</b>》是官修成药典（中成药雏形）；清《医方集解》《成方切用》按<b>治法分类</b>方剂，奠定现代方剂学体例。</p>
    <p>由此引出"<b>经方—时方</b>"之争：<b>经方</b>（《伤寒》《金匮》之方）药少而精、配伍严谨、剂量明确，崇之者奉为圭臬；<b>时方</b>（后世医家所创）则更灵活、贴合各种新病。二者并非对立——经方为根、时方为用，皆是临床所需。</p>
    <div class="scholar"><b>学派：</b>"经方派"重原方原量、方证相应；"时方派"重灵活化裁。日本汉方的"古方派"（崇经方）与"后世派"（崇时方）之争，亦是此问题的延伸。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 配伍的"所以然"：拆一遍桂枝汤</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>"君臣佐使"不是给药材排座次的虚名。拿<b>桂枝汤</b>（治表虚、营卫不和：发热、汗出、恶风、脉浮缓）亲手拆一遍，就见其精密：</p>
    <p>· <b>君 · 桂枝</b>（辛温）——解肌发表、助<b>卫阳</b>以驱外邪；<br>· <b>臣 · 芍药</b>（酸寒）——敛阴和<b>营</b>、收已外泄之汗。君臣相伍，<b>桂枝主散、芍药主收，一开一合</b>——恰对"卫强不固、营阴外泄"的营卫不和。这才是"<b>调和营卫</b>"的所以然：不是笼统地"调和"，而是<b>用一散一收把失衡的两端各拉回中线</b>；<br>· <b>佐 · 生姜</b>助桂散寒、<b>大枣</b>助芍滋营，姜枣相合又补益中焦、滋营卫生化之源；<br>· <b>使 · 炙甘草</b>——调和诸药，且与桂枝"辛甘化阳"、与芍药"酸甘化阴"，把君臣的散与收锁成一个整体；<br>· <b>连服法都是药</b>：药后啜热稀粥以助药力、温覆取<b>微汗</b>为度——汗出邪解，大汗反伤正。</p>
    <p>可见君臣佐使是"<b>针对一个具体病机、分工把它纠正过来</b>"的精密结构——<b>加减一味则方义即变</b>（加葛根治项背强、加附子治阳虚漏汗……见第20课）。这就是为什么"不能随意增减药味"。</p>
    <p>它<b>有没有物质基础</b>？现代以<b>拆方</b>（逐味撤去验君臣）、<b>配伍比例优化</b>、<b>网络药理学</b>（多成分-多靶点解释协同）、<b>药代动力学</b>（如附子配甘草降乌头碱毒——"佐制"的实证）等方法探究，为古老配伍提供了部分现代注脚。</p>
    <div class="scholar"><b>前沿与分寸：</b>"组分配伍""方剂组学"试图在分子层面重构君臣佐使，但复方的多成分非线性相互作用极复杂——目前能确证的是"<b>配伍确能增效减毒</b>"，其完整机理仍在路上。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 经方剂量考与方剂的"活"用</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>一个争议已久的实际问题：<b>经方一两＝今多少克？</b>《伤寒论》的"两"如何折算，直接关系疗效与安全。考据有分歧——李时珍主"古之一两今用一钱"（约 3g），而柯雪帆等据汉代度量衡考证"<b>一两≈15.6g</b>"（"经方本原剂量"）。前者保守、后者剂量大得多，临床由此分出"<b>轻剂派</b>"与"<b>重剂派</b>"。</p>
    <p>这提醒我们：读古方不能只抄药味，<b>剂量与煎服法</b>同样是疗效的关键变量。方剂的生命力，正在于在<b>谨守配伍法度</b>的前提下，依证<b>加减变化、调整剂量</b>——"师其法而不泥其方"。</p>
    <div class="scholar"><b>考据焦点：</b>汉代度量衡（一两、一升、一斤的今值）的考证，是经方研究的硬核问题；剂量折算的不同，足以使同一方的强弱判若两方。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">小结 ·</span>从会读方的结构，到明方书源流、配伍的现代研究、经方剂量之辨——组方就从"认方"升到了"明法度"。</div>
</div>

<div class="block quiz"><h3><span class="badge">测</span>小测</h3>
<div class="q"><p>1. "君臣佐使"中，君药与使药各起什么作用？</p><button onclick="toggleA(this)">看答案</button><div class="a">君药针对主病主证、起主要作用；使药引经（引药达病所）或调和诸药。</div></div>
<div class="q"><p>2. 为什么说"方从法出"？</p><button onclick="toggleA(this)">看答案</button><div class="a">方剂是治法的落实：先辨证、再立法、然后据法选方遣药，证与法决定方。</div></div>
</div>
`},

20:{part:"第四部 · 怎么治（法·方·药）", title:"经典名方（一）", sub:"解表·和解·补益", deepCount:5, body:`
<div class="block hook"><p>学了原理，来看实战。本课精讲几首"打底"的经典名方——解表的<b>桂枝汤、麻黄汤</b>，和解的<b>小柴胡汤</b>，补益的<b>四君、四物</b>。它们是后世千方的"母方"，认得它们，就握住了方剂的根。</p></div>

<div class="block story"><h3><span class="badge">事</span>小故事 · "小柴胡汤事件"的警示</h3>
<p>小柴胡汤是千古名方。上世纪后期，它在日本被当作"保肝良药"<b>大规模、不辨证地长期服用</b>，结果出现多例间质性肺炎、甚至致死的不良事件，引发轩然大波。</p>
<p class="src">——20 世纪 90 年代日本"小柴胡汤事件"</p>
<p class="moral">再好的名方，也必须<b>方证相应、对证而用</b>。脱离辨证、把中药当保健品长期滥服，名方也会变成风险。这是学方剂时必须牢记的一课。</p></div>

<div class="block"><h3><span class="badge">核心</span>核心概念</h3>
<ol class="concepts">
<li><b>解表剂</b>：桂枝汤（调和营卫，治表虚有汗）、麻黄汤（发汗，治表实无汗）、银翘散（辛凉，治风热）。</li>
<li><b>和解剂</b>：小柴胡汤（和解少阳，治寒热往来）。</li>
<li><b>补气补血</b>：四君子汤（补气）、四物汤（补血）、八珍汤（气血双补）、补中益气汤（升阳举陷）。</li>
<li><b>补阴补阳</b>：六味地黄丸（补肾阴）、肾气丸（补肾阳）。</li>
</ol></div>

<div class="block"><h3><span class="badge">图</span>一图看懂 · 几首母方的"定位"</h3>
<div class="diagram">
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;text-align:left;font-size:13px;">
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>桂枝汤</b> 表虚（有汗）→ 调和营卫</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>麻黄汤</b> 表实（无汗）→ 发汗解表</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>银翘散</b> 风热表证 → 辛凉解表</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>小柴胡汤</b> 少阳证 → 和解</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>四君子汤</b> 气虚 → 补气</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>四物汤</b> 血虚 → 补血</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>六味地黄丸</b> 肾阴虚 → 滋阴</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>肾气丸</b> 肾阳虚 → 温补</div>
</div>
<div class="cap">先记"方—证"对应，再深入配伍</div>
</div></div>

<div class="block"><h3><span class="badge">参</span>名家说 & 现代视角</h3>
<p class="quote">"观其脉证，知犯何逆，随证治之。"</p>
<div class="modern"><b>现代视角：</b>这些母方至今广泛使用，也有不少研究（如补中益气汤用于脏器下垂与疲劳、六味地黄丸用于某些阴虚证候）。但<b>必须辨证</b>——"小柴胡汤事件"的教训反复提醒：脱离方证、长期滥用，名方亦有害。</div></div>

<div class="block caution"><h3><span class="badge">辨</span>别误会</h3>
<p>① 名方<b>不是保健品</b>，需对证；② 同名中成药要看清适应证与体质；③ 表实证误用桂枝汤（或反之）会加重病情——方证必须对应。</p></div>

<div class="block"><h3><span class="badge">用</span>用得上</h3>
<p>认识药店常见中成药背后的"母方"：<b>六味地黄丸</b>（肾阴虚）、<b>金匮肾气丸</b>（肾阳虚）、<b>补中益气丸</b>（中气下陷）、<b>逍遥丸</b>（肝郁脾虚）——买之前先问：我的证，对得上它吗？</p></div>

<div class="next-tip">读完标准版，你已认得几首打底母方。想逐一精讲解表/和解/补益的代表方？　切「深入版」↘</div>

<div class="deepdive deep-only">
  <div class="dd-title">深入精讲 · 系统展开 <small>点目录可跳转，逐节展开</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>标准版你已知几首母方的"方-证"对应。这一层回到同一批方讲深：桂枝麻黄、辛凉解表、小柴胡、补气补血、补阴补阳。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 桂枝汤vs麻黄汤</button>
    <button onclick="ddJump(this,1)">② 辛凉解表</button>
    <button onclick="ddJump(this,2)">③ 小柴胡汤</button>
    <button onclick="ddJump(this,3)">④ 补气补血</button>
    <button onclick="ddJump(this,4)">⑤ 补阴补阳</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 桂枝汤与麻黄汤：表虚与表实</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>桂枝汤</b>（桂枝、芍药、生姜、大枣、炙甘草）：治<b>表虚证</b>——发热、<b>有汗</b>、恶风、脉浮缓。机理是调和营卫（详见第 27 课）。<b>麻黄汤</b>（麻黄、桂枝、杏仁、炙甘草）：治<b>表实证</b>——发热、<b>无汗</b>、恶寒、身痛、脉浮紧，发汗力峻。</p>
    <p>二者的分水岭是"<b>有汗 / 无汗</b>"：有汗用桂枝（不可再用麻黄发汗，否则大汗伤正），无汗用麻黄。这是经方"方证相应"最经典的一组对照。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 辛凉解表：银翘散与桑菊饮</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>风<b>热</b>表证（发热重、恶寒轻、咽痛、口微渴、舌边尖红）不能用辛温，须辛凉。<b>银翘散</b>（金银花、连翘为君）辛凉透表、清热解毒，偏治"温病初起、热重"；<b>桑菊饮</b>（桑叶、菊花为君）辛凉宣肺，偏治"风热咳嗽、热较轻"。</p>
    <p>这是温病学派的代表方，与伤寒的辛温解表正好互补——再次体现"寒温统一"。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 小柴胡汤：和解之祖</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>组成：柴胡（君，透解少阳）、黄芩（清少阳热）、半夏、生姜（和胃降逆）、人参、大枣、炙甘草（扶正）。治少阳证：<b>往来寒热、胸胁苦满、默默不欲饮食、心烦喜呕、口苦咽干目眩</b>。</p>
    <p>它是"<b>和法</b>"的代表——不汗不下，疏利枢机、扶正达邪，攻补兼施。临床应用极广（凡少阳枢机不利皆可加减）。但正如"小柴胡汤事件"所示：<b>必须对证、不可长期滥服</b>。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>④ 补气与补血</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>四君子汤</b>（人参、白术、茯苓、甘草）：补气基础方，治脾胃气虚（食少、乏力、便溏）。<b>四物汤</b>（熟地、当归、白芍、川芎）：补血基础方，治血虚（面白、头晕、月经量少）。二方相合即<b>八珍汤</b>（气血双补）。</p>
    <p><b>补中益气汤</b>（黄芪、人参、白术、当归、陈皮、升麻、柴胡、炙甘草）：李东垣名方，<b>补气＋升阳举陷</b>，治气虚下陷（脏器下垂、久泻脱肛），并能"甘温除热"治气虚发热。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>⑤ 补阴与补阳</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>六味地黄丸</b>（熟地、山萸肉、山药、泽泻、丹皮、茯苓）：滋补肾阴的代表方，"三补三泻"配伍精妙，治肾阴虚（腰膝酸软、潮热盗汗、耳鸣）。源自钱乙为小儿所制（从肾气丸减去桂附而成）。</p>
    <p><b>肾气丸（金匮肾气丸）</b>：在六味基础上加桂枝（或肉桂）、附子，温补肾阳，治肾阳虚（畏寒、夜尿多、腰膝冷）。其立意正是"<b>阴中求阳</b>"——于大队滋阴药中少加温阳药，以"<b>少火生气</b>"。</p>
    <div class="modern"><b>现代视角：</b>这两方常被现代研究用于相应证候，但其经典价值更在于<b>配伍法度</b>（三补三泻、阴中求阳），示范了补益方的章法。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">启下 ·</span>经方医学有哪些传承流派？这些名方的现代研究如何？"方证相应"有何方法论价值？切「专家版」。</div>
</div>

<div class="deepdive dd-expert expert-only">
  <div class="dd-title">专家精讲 · 教授级 <small>经方流派 · 名方研究 · 方证方法论</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>深入版你已精讲几首母方。这一层<b>仍论这些方</b>，追到学术：经方医学的传承流派、名方的现代研究、方证相应的方法论价值。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 经方医学的传承与流派</button>
    <button onclick="ddJump(this,1)">② 名方的现代研究</button>
    <button onclick="ddJump(this,2)">③ "方证相应"的方法论</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 经方医学的传承与流派</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>《伤寒论》的研究本身形成了"<b>伤寒学</b>"，内部又分流派：<b>错简重订派</b>（方有执、喻嘉言，认为今本条文错乱、主张重新编次）、<b>维护旧论派</b>（张志聪等，主张维护原貌）、<b>辨证论治派</b>（柯琴、尤怡，重在以法类证）。</p>
    <p>更具影响的是<b>日本汉方</b>的"<b>古方派</b>"——吉益东洞提出"<b>方证相应、万病一毒</b>"，主张抛开繁复理论、直接据"证"用"方"，极大影响了后世经方应用。现代中国的<b>胡希恕、刘渡舟</b>等经方大家，则各成体系（胡希恕重"六经-八纲-方证"，刘渡舟重"方证-药证"），把经方研究推向新高度。</p>
    <div class="scholar"><b>流派意义：</b>同一部《伤寒论》衍生出众多解读路径，正说明经典的<b>开放性</b>；学经方宜博采诸家、而以临床疗效为归。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 名方的现代研究举隅</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>本课几首母方都有现代研究：<b>小柴胡汤</b>在日本对慢性肝病的免疫调节研究较多，但也正因不辨证滥用酿成"小柴胡汤事件"（间质性肺炎），成为<b>药物警戒</b>的经典案例；<b>补中益气汤</b>对<b>内脏下垂、疲劳、免疫低下</b>的"升提"作用有不少研究（涉及平滑肌张力、免疫调节）；<b>六味地黄丸</b>在抗氧化、免疫调节、内分泌方面有探索。</p>
    <p>这些研究的共同启示是：名方"<b>有效</b>"的前提是<b>对证使用</b>；离开辨证的"中药保健化"，既损疗效、又增风险。</p>
    <div class="scholar"><b>药物警戒：</b>"小柴胡汤事件"被写入中药安全史——它证明再经典的方，脱离方证、长期大规模滥用，也会造成群体性不良事件。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ "方证相应"的方法论价值</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>"<b>方证相应</b>"（有是证、用是方）是经方的灵魂，也可能是中医<b>最具循证潜力</b>的内核。因为"方—证"是一个相对<b>稳定、可重复</b>的经验单元：特定的证候组合，对应特定的方，产生可预期的效果——这比笼统的理论更接近"可检验的假说"。</p>
    <p>由此形成"<b>方证—病机—药理</b>"三个层次的研究：临床上验证方证对应的可重复性，理论上阐释其病机，药理上揭示物质基础。许多学者认为，<b>以"方证"为切入点</b>，是中医走向循证、实现客观化与国际对话的可行路径之一。</p>
    <div class="scholar"><b>前沿观点：</b>"方证相应"被视为连接传统经验与现代循证的<b>关键接口</b>——它把模糊的"辨证论治"凝练为可操作、可评价的"方-证"单元。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">小结 ·</span>从会用母方对证，到明经方流派、现代研究与"方证相应"的循证潜力——母方就从"记诵"升到了"活法"。</div>
</div>

<div class="block quiz"><h3><span class="badge">测</span>小测</h3>
<div class="q"><p>1. 桂枝汤与麻黄汤的关键鉴别点是什么？</p><button onclick="toggleA(this)">看答案</button><div class="a">有汗（表虚）用桂枝汤，无汗（表实）用麻黄汤。</div></div>
<div class="q"><p>2. "小柴胡汤事件"给我们什么警示？</p><button onclick="toggleA(this)">看答案</button><div class="a">名方也必须方证相应、对证使用，脱离辨证长期滥服会造成严重不良反应。</div></div>
</div>
`},

21:{part:"第四部 · 怎么治（法·方·药）", title:"经典名方（二）", sub:"清热·祛湿·理气活血", deepCount:5, body:`
<div class="block hook"><p>续上一课，再看几类对付"<b>实邪</b>"的名方——清热的<b>白虎、承气</b>，祛湿化痰的<b>二陈、平胃</b>，理气的<b>逍遥</b>，活血的<b>血府逐瘀</b>。学完这两课，常见方剂的版图就大致清晰了。</p></div>

<div class="block story"><h3><span class="badge">事</span>小故事 · 一个重视"瘀血"的医生</h3>
<p>清代王清任（就是前面那位亲赴义冢观察脏腑的医生），格外重视"瘀血"致病。他创制了一系列"逐瘀汤"——<b>血府逐瘀汤、通窍活血汤、膈下逐瘀汤、少腹逐瘀汤</b>，按瘀血所在的部位分而治之，开"活血化瘀"一大流派。如今这些方被广泛用于<b>心脑血管</b>等疾病。</p>
<p class="src">——王清任《医林改错》</p>
<p class="moral">一个敢于"改错"、重视实证的医生，留下的方子两百年后仍在救人。中医的生命力，正在于这种<b>务实创新</b>。</p></div>

<div class="block"><h3><span class="badge">核心</span>核心概念</h3>
<ol class="concepts">
<li><b>清热剂</b>：白虎汤（清气分大热）、黄连解毒汤（泻火解毒）、龙胆泻肝汤（清肝胆湿热）。</li>
<li><b>祛湿化痰剂</b>：二陈汤（化痰湿基础方）、平胃散（燥湿运脾）、藿香正气散（祛暑湿）、五苓散（利水）。</li>
<li><b>理气剂</b>：逍遥散（疏肝健脾）、半夏厚朴汤（行气化痰，治梅核气）。</li>
<li><b>理血剂</b>：血府逐瘀汤（活血化瘀）、补阳还五汤（益气活血，治中风后遗）。</li>
</ol></div>

<div class="block"><h3><span class="badge">图</span>一图看懂 · 祛实邪的代表方</h3>
<div class="diagram">
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;text-align:left;font-size:13px;">
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>白虎汤</b> 气分大热 → 清热</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>承气汤</b> 阳明腑实 → 攻下</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>二陈汤</b> 痰湿 → 燥湿化痰</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>藿香正气</b> 暑湿/外感夹湿 → 解表化湿</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>逍遥散</b> 肝郁脾虚 → 疏肝健脾</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>血府逐瘀汤</b> 瘀血 → 活血化瘀</div>
</div>
<div class="cap">认得"方—证"，常见中成药就不再陌生</div>
</div></div>

<div class="block"><h3><span class="badge">参</span>名家说 & 现代视角</h3>
<p class="quote">"医林改错，活血化瘀。"</p>
<div class="modern"><b>现代视角：</b>活血化瘀类方（血府逐瘀、补阳还五）是现代研究<b>最多</b>的中医方剂之一，常用于冠心病、脑梗后遗症等，部分有改善微循环、抗血小板的药理依据；藿香正气、逍遥散等也广泛应用。但仍需辨证，且活血方有出血、妊娠等禁忌。</div></div>

<div class="block caution"><h3><span class="badge">辨</span>别误会</h3>
<p>① 清热药多苦寒，<b>中病即止</b>，过用伤脾胃阳气；② 活血化瘀方<b>孕妇慎用、有出血倾向者慎用</b>；③ 祛湿要分<b>寒湿与湿热</b>，用错方向会加重。</p></div>

<div class="block"><h3><span class="badge">用</span>用得上</h3>
<p>认识常见中成药：<b>逍遥丸</b>（情绪不畅、胁胀、经前不适）、<b>藿香正气</b>（夏季外感夹湿、暑湿吐泻）、<b>血府逐瘀口服液</b>（瘀血胸痛）、<b>二陈/平胃</b>类（痰湿、脘腹胀闷）——同样，用前先对证。</p></div>

<div class="next-tip">读完标准版，你已认得清热/祛湿/理气/活血的代表方。想逐类精讲这些祛实邪的名方？　切「深入版」↘</div>

<div class="deepdive deep-only">
  <div class="dd-title">深入精讲 · 系统展开 <small>点目录可跳转，逐节展开</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>标准版你已知几类祛实邪名方的对应。这一层回到同一批方讲深：清热剂、祛湿化痰剂、理气剂、理血剂、用药安全。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 清热剂</button>
    <button onclick="ddJump(this,1)">② 祛湿化痰剂</button>
    <button onclick="ddJump(this,2)">③ 理气剂</button>
    <button onclick="ddJump(this,3)">④ 理血剂</button>
    <button onclick="ddJump(this,4)">⑤ 用药安全</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 清热剂</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>白虎汤</b>（石膏、知母、粳米、甘草）：清阳明气分大热，治"四大"（大热、大汗、大渴、脉洪大）。<b>黄连解毒汤</b>（黄连、黄芩、黄柏、栀子）：苦寒直折、泻火解毒，治三焦火毒炽盛。<b>清营汤</b>：清营透热，治温病热入营分。<b>龙胆泻肝汤</b>：清泻肝胆实火与下焦湿热（胁痛、口苦、耳肿、阴部湿疹）。</p>
    <p>清热剂多苦寒，易伤中阳、化燥伤阴，故强调"<b>热去即止</b>"，并常配护胃养阴之品。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 祛湿化痰剂</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>二陈汤</b>（半夏、陈皮、茯苓、甘草）：燥湿化痰的<b>基础方</b>，治痰湿咳嗽、痰多。<b>平胃散</b>（苍术、厚朴、陈皮、甘草）：燥湿运脾，治湿困脾胃（脘腹胀满、苔厚腻）。<b>藿香正气散</b>：解表化湿、理气和中，治外感风寒兼内伤湿滞（夏季吐泻、"空调病"常用）。<b>五苓散</b>：利水渗湿、温阳化气，治水湿内停（水肿、小便不利）。</p>
    <p>祛湿须辨<b>寒湿（温化）与湿热（清利）</b>，方向不同；且湿性黏滞，治湿常需健脾以绝其源。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 理气剂</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>逍遥散</b>（柴胡、当归、白芍、白术、茯苓、薄荷、生姜、炙甘草）：<b>疏肝解郁＋健脾养血</b>，治肝郁脾虚（情志不畅、胁胀、神疲、月经不调）——是调"肝郁脾虚"的第一方，加丹皮栀子即丹栀逍遥散（兼清郁热）。</p>
    <p><b>半夏厚朴汤</b>（半夏、厚朴、茯苓、生姜、苏叶）：行气散结、降逆化痰，专治<b>梅核气</b>（咽中如有物梗、吞吐不利，即第 14 课那个故事的方）。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>④ 理血剂</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>血府逐瘀汤</b>（桃红四物＋四逆散＋桔梗牛膝）：活血化瘀、行气止痛，治胸中血瘀（胸痛、头痛日久、痛有定处、舌暗）。是王清任逐瘀系列的代表。</p>
    <p><b>补阳还五汤</b>（重用黄芪＋当归尾、川芎、桃仁、红花、地龙、赤芍）：<b>益气活血通络</b>，治中风后遗症的"气虚血瘀"（半身不遂、口眼歪斜）。重用黄芪（君）补气以推动血行，是"气为血帅"的活用。<b>温经汤</b>则温经散寒、养血祛瘀，调妇科虚寒瘀血。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>⑤ 用药安全 & 现代视角</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>这些祛邪方力量较强，安全格外重要：<b>清热苦寒</b>伤胃阳、<b>攻下</b>伤正、<b>活血破血</b>动血——孕妇、月经过多、有出血倾向者当慎用或禁用；体虚者需攻补兼施。</p>
    <div class="modern"><b>现代视角：</b>活血化瘀方是中西医结合研究的热点（冠心病、缺血性卒中、糖尿病并发症等），部分机理（改善微循环、抗凝、抗炎）已较明确。但"研究较多"不等于"人人可用"——仍须辨证、遵医嘱，警惕与抗凝/抗血小板西药的<b>相互作用</b>。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">启下 ·</span>活血化瘀为何是研究高地？清热祛湿方有何应用与药物警戒（关木通事件）？名方如何"病证结合"再定位？切「专家版」。</div>
</div>

<div class="deepdive dd-expert expert-only">
  <div class="dd-title">专家精讲 · 教授级 <small>活血研究 · 药物警戒 · 古方今用</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>深入版你已精讲祛实邪诸方。这一层<b>仍论这些方</b>，追到学术：活血化瘀的研究高地、清热祛湿与药物警戒、名方的病证结合再定位。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 活血化瘀的研究高地</button>
    <button onclick="ddJump(this,1)">② 清热祛湿方与药物警戒</button>
    <button onclick="ddJump(this,2)">③ 名方的病证结合再定位</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 活血化瘀方：中西医结合的研究高地</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>从王清任逐瘀系列，到陈可冀团队的<b>"血瘀证与活血化瘀"</b>系统研究，活血化瘀成为中西医结合<b>最深入、循证证据相对较多</b>的领域。血府逐瘀汤、补阳还五汤及丹参、三七、川芎嗪、银杏制剂等，广泛用于<b>冠心病、缺血性卒中、外周血管病、糖尿病血管并发症</b>。</p>
    <p>机制研究涉及<b>抗血小板聚集、改善微循环与血液流变、保护血管内皮、抗炎、调节血脂</b>等。这是把一个传统证候（血瘀）成功对接现代病理（血栓、微循环障碍、动脉粥样硬化）的范例。</p>
    <div class="scholar"><b>循证与边界：</b>活血化瘀的部分应用已进入中西医结合临床路径，但需警惕<b>出血风险</b>及与<b>抗凝/抗血小板西药</b>的相互作用，孕妇及出血倾向者禁慎用。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 清热祛湿方的应用与一个沉痛教训</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>清热解毒方（如黄连解毒汤、清开灵）在抗感染、抗炎、抗内毒素方面有较多研究；祛湿方（二陈、平胃、五苓、藿香正气）则与<b>胃肠功能、水液代谢、菌群</b>相关，藿香正气用于急性胃肠炎、"空调病"颇受欢迎。</p>
    <p>但必须记取一个<b>沉痛教训</b>：<b>龙胆泻肝汤</b>原方本无肾毒性，后因部分厂家以含<b>马兜铃酸</b>的"关木通"替代了传统的"木通"，导致一批<b>马兜铃酸肾病</b>。这警示：方剂安全不仅取决于配方，更取决于<b>药材基原的正确与质量控制</b>——一味药材的混用，可使良方变成毒药。</p>
    <div class="scholar"><b>药物警戒：</b>"关木通事件"推动了含马兜铃酸药材的全面清理与药材基原管理，是中药安全监管史上的标志性事件。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 名方的"病证结合"再定位</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>许多古方在"病证结合"框架下获得了<b>现代适应症的再定位</b>：<b>逍遥散</b>（肝郁脾虚）广泛用于<b>抑郁、焦虑、经前期综合征、功能性消化不良</b>等身心相关病症，相关随机对照研究渐多；<b>半夏厚朴汤</b>（梅核气）对应现代的<b>癔球症/咽异感症</b>；<b>血府逐瘀汤</b>用于胸痹、顽固性头痛、失眠（久病入络）。</p>
    <p>这种"<b>古方今用</b>"是中医生命力的体现，但须把握分寸：有的已有较好临床证据，有的仍属经验或小样本研究。<b>循证地古方今用、而非随意扩大适应症</b>，才是正道。</p>
    <div class="scholar"><b>研究范式：</b>名优中成药的二次开发（明确适应证、作用机制、循证评价），是当前中药研究与产业化的重要方向。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">小结 ·</span>从会用祛邪名方，到明活血研究、药警教训、古方今用的循证边界——祛邪诸方就用得既准、又安全。</div>
</div>

<div class="block quiz"><h3><span class="badge">测</span>小测</h3>
<div class="q"><p>1. 调治"肝郁脾虚"的代表方是哪首？它体现了什么配伍思路？</p><button onclick="toggleA(this)">看答案</button><div class="a">逍遥散——疏肝解郁与健脾养血并用，针对"木乘土"（肝郁犯脾）的病机。</div></div>
<div class="q"><p>2. 补阳还五汤为何重用黄芪？</p><button onclick="toggleA(this)">看答案</button><div class="a">体现"气为血之帅"——重用黄芪大补元气，以气推动血行、化瘀通络，治气虚血瘀之中风后遗症。</div></div>
</div>
`},

22:{part:"第五部 · 用起来（养生·实践）", title:"体质辨识", sub:"先认识你自己", deepCount:5, body:`
<div class="block hook"><p>同样的养生法，为什么有人有效、有人没用甚至反受其害？因为<b>体质不同</b>。中医把人分成几种体质，认清自己属哪一种，养生与调理才能对路——这是把前面所有理论"<b>用到自己身上</b>"的第一步。</p></div>

<div class="block story"><h3><span class="badge">事</span>小故事 · 把"体质"变成国家标准</h3>
<p>《黄帝内经》早有"因人制宜"的思想，但长期缺乏统一标准。当代中医学家<b>王琦</b>团队历经多年研究，把中国人的体质归纳为<b>九种</b>，并制定出《中医体质分类与判定》标准，配有量表可供自测——让"辨体质"第一次变得<b>标准化、可操作</b>。</p>
<p class="src">——王琦《中医体质学》及行业标准</p>
<p class="moral">从《内经》的朴素思想，到今天可量化的九种体质——这正是中医"古为今用、不断规范"的缩影。认识体质，是个性化养生的起点。</p></div>

<div class="block"><h3><span class="badge">核心</span>核心概念</h3>
<ol class="concepts">
<li><b>体质</b>＝相对稳定的个体身心特质，由<b>先天禀赋＋后天调养</b>共同形成。</li>
<li><b>九种体质</b>：平和质（健康）、气虚质、阳虚质、阴虚质、痰湿质、湿热质、血瘀质、气郁质、特禀质（过敏等）。</li>
<li>体质决定<b>易感性</b>与"<b>同病异治</b>"——同样受寒，阳虚者更易病、病更重。</li>
<li>体质<b>可调</b>：通过饮食、起居、运动、情志长期调整，能改善偏颇。</li>
</ol></div>

<div class="block"><h3><span class="badge">图</span>一图看懂 · 九种体质</h3>
<div class="diagram">
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;text-align:left;font-size:13px;">
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>平和质</b><br>健康均衡</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>气虚质</b><br>易累气短</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>阳虚质</b><br>怕冷手足凉</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>阴虚质</b><br>怕热口干</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>痰湿质</b><br>体胖苔腻</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>湿热质</b><br>面油口苦</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>血瘀质</b><br>面暗易瘀</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>气郁质</b><br>情绪敏感</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>特禀质</b><br>过敏体质</div>
</div>
<div class="cap">认清体质，养生才"对症"</div>
</div></div>

<div class="block"><h3><span class="badge">参</span>名家说 & 现代视角</h3>
<p class="quote">"圣人不治已病治未病……"——《素问·四气调神大论》</p>
<div class="modern"><b>现代视角：</b>体质近于"<b>遗传＋表观遗传＋长期生活方式</b>"形成的稳定身心倾向，与某些疾病的易感性相关，已有不少流行病学研究支持"辨体—防病"的思路。它把"治未病"落到了可操作的个体层面。</div></div>

<div class="block caution"><h3><span class="badge">辨</span>别误会</h3>
<p>① 体质<b>非一成不变</b>，可通过调养改善；② 多数人是<b>兼夹体质</b>（如气虚＋阳虚、痰湿＋湿热），别简单贴单一标签；③ 别一测出"虚"就乱进补——补错方向反受其害。</p></div>

<div class="block"><h3><span class="badge">用</span>用得上</h3>
<p>粗辨自己的体质倾向，对应调养方向：<b>阳虚</b>（怕冷）→ 温阳、忌生冷；<b>阴虚</b>（怕热口干）→ 滋阴、忌辛辣燥热；<b>痰湿</b>（体胖苔腻）→ 健脾化湿、少肥甘；<b>气郁</b>（情绪敏感）→ 疏肝解郁、多运动。</p></div>

  <div class="acc-b">
    <p>体质由<b>先天</b>（父母禀赋、出生状况）与<b>后天</b>（饮食、起居、情志、地域、年龄、疾病）共同塑造，具有相对稳定但又可调的特点。</p>
    <p>它的临床意义有三：决定<b>对某些病邪的易感性</b>（阳虚易感寒、阴虚易化热）、影响<b>发病后的证型倾向</b>（"从化"——同一邪气在不同体质从寒化或从热化）、指导<b>个性化养生与治疗</b>（同病异治的根据之一）。</p>

  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 平和质与三种"虚"质</span><span class="ico">＋</span></button>

    <p><b>平和质</b>：体形匀称、精力充沛、睡眠饮食好、舌淡红苔薄白——最理想，重在"维持"。</p>
    <p><b>气虚质</b>：易疲乏、气短、易出汗、易感冒——调养健脾益气（山药、黄芪、小米），忌过劳。<b>阳虚质</b>：怕冷、手足凉、喜热饮、夜尿多——温补阳气（生姜、羊肉、韭菜），忌生冷寒凉。<b>阴虚质</b>：怕热、口干咽燥、手足心热、易失眠——滋阴润燥（银耳、百合、梨、麦冬），忌辛辣温燥与熬夜。</p>

  <div class="acc-b">
    <p><b>痰湿质</b>：体胖、腹满、痰多、苔厚腻、易困倦——健脾化湿（薏苡仁、冬瓜、陈皮），少肥甘甜腻，多运动。<b>湿热质</b>：面垢油光、易生痤疮口疮、口苦、大便黏臭、苔黄腻——清热利湿（绿豆、苦瓜、薏苡仁），忌辛辣油腻烟酒。<b>血瘀质</b>：面色晦暗、唇暗、易现瘀斑、舌暗或有瘀点——活血通络（山楂、黑木耳、适量运动），忌久坐不动。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>④ 气郁质与特禀质</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>气郁质</b>：情绪低落或敏感、易叹气、胸胁胀闷、咽中异物感（梅核气）——疏肝解郁是关键：多运动、多社交、必要时玫瑰花/陈皮代茶，重在<b>调情志</b>。</p>
    <p><b>特禀质</b>：以过敏体质为代表（易过敏、哮喘、荨麻疹等），多与先天禀赋有关——重在<b>避开过敏原、固护卫气（益气固表）</b>，谨慎尝试新食物药物。</p>

    <p>调养通则：<b>因质制宜</b>（缺什么补什么、偏什么纠什么）、<b>缓图渐进</b>（体质调整需数月乃至数年）、<b>整体调摄</b>（饮食＋起居＋运动＋情志四管齐下）、<b>兼夹兼顾</b>（多数人非单一体质，需权衡主次）。</p>

  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 体质学说的源流</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>体质思想源远流长。《灵枢·阴阳二十五人》按五行把人分二十五型，《灵枢·通天》又有"<b>五态人</b>"（太阴、少阴、太阳、少阳、阴阳和平之人）——这是中医最早的体质分类。后世医家（张景岳论禀赋、叶天士论体质论治、章虚谷等）不断丰富"<b>因质论治</b>"。</p>
    <p>当代<b>王琦</b>团队在继承《内经》的基础上，结合流行病学调查，建立<b>九种体质</b>分类与判定量表，并形成行业标准——使古老的体质思想<b>规范化、可测量、可推广</b>，应用于"治未病"与公共卫生。</p>
    <div class="scholar"><b>学术脉络：</b>从《内经》"五态/二十五人"到王琦"九体质"，体质学说经历了从<b>哲学分型</b>到<b>标准化量表</b>的现代转型。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 体质的可调性与"治未病"实践</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>体质学说的现代价值，在于落实"<b>治未病</b>"：通过辨识偏颇体质，进行<b>个体化的饮食、起居、运动、情志乃至膏方</b>干预，以降低相关疾病的易感性（如痰湿体质与代谢综合征、阳虚体质与某些慢性病的相关性已有流行病学报道）。</p>
    <p>前沿研究正探索体质的<b>生物学基础</b>——与<b>基因多态性、表观遗传、肠道菌群、代谢组、神经内分泌</b>的关联。体质被视为连接"先天禀赋"与"后天疾病"的中间表型，是中医个体化医学与现代<b>精准/预防医学</b>对话的接口。</p>
    <div class="scholar"><b>前沿：</b>"体质-基因/菌群/代谢组"关联研究，试图为九种体质寻找客观标志，是中医体质学现代化的主攻方向。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 体质学说的局限与批评</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>也须正视争议：其一，九分法的<b>信度与效度</b>仍有讨论空间，量表多为<b>自评</b>，主观性强；其二，现实中<b>兼夹体质</b>普遍（一人多型），单一归类常显勉强；其三，体质会随年龄、季节、疾病<b>动态变化</b>，"标签化"有风险。</p>
    <p>因此成熟的态度是：把体质辨识当作<b>个体化健康管理的有益参考与起点</b>，而非精确诊断；尤其不应据一个"体质标签"就<b>盲目进补或极端忌口</b>。它的价值在方向性的指导，而非确定性的结论。</p>
    <div class="scholar"><b>立场：</b>体质学说富有现代潜力，但其量化工具与生物学基础仍在完善中——倡导而不神化，是对它负责任的运用。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">小结 ·</span>从会辨体质，到明其源流、现代研究与局限——体质就成了"个体化养生"既好用、又不被滥用的工具。</div>
</div>

<div class="block quiz"><h3><span class="badge">测</span>小测</h3>
<div class="q"><p>1. 当代常用的中医体质分为哪九种？</p><button onclick="toggleA(this)">看答案</button><div class="a">平和质，及气虚、阳虚、阴虚、痰湿、湿热、血瘀、气郁、特禀八种偏颇体质。</div></div>
<div class="q"><p>2. 为什么"同样受寒，有人没事有人病重"？</p><button onclick="toggleA(this)">看答案</button><div class="a">体质决定易感性与从化倾向——阳虚质对寒邪更易感、病更重，这正是"因人制宜"的依据。</div></div>

23:{part:"第五部 · 用起来（养生·实践）", title:"节气养生与食疗", sub:"把中医用进日常", deepCount:5, body:`
<div class="block hook"><p>中医养生的精华，<b>不在吃多贵的补品</b>，而在"顺天时、调起居、慎饮食"。本课把抽象理论落到最日常处——四季怎么养、食物怎么选、作息情志怎么调。这是中医最贴近生活的一面。</p></div>

<div class="block story"><h3><span class="badge">事</span>小故事 · 药王的"食疗为先"</h3>
<p>唐代"药王"孙思邈活了百余岁，是养生的活样板。他在《千金方》中立下一条至今受用的原则："夫为医者，当须先洞晓病源……<b>先以食治，食疗不愈，然后命药</b>。"——能用饮食调好的，先别急着吃药。</p>
<p class="src">——孙思邈《备急千金要方·食治》</p>
<p class="moral">"食疗为先"是中医养生的一大智慧：日常的一饭一蔬，调养于无形，胜过病了再补。养生，养在平时。</p></div>

<div class="block"><h3><span class="badge">核心</span>核心概念</h3>
<ol class="concepts">
<li><b>顺四时</b>：春生、夏长、秋收、冬藏——春养肝、夏养心、长夏养脾、秋养肺、冬养肾。</li>
<li><b>二十四节气</b>各有养生重点（如冬至养藏、夏至养长、长夏防湿）。</li>
<li><b>食疗原则</b>：药食同源、辨体施食、五味均衡、三因制宜。</li>
<li><b>起居情志</b>：规律作息（子午觉）、适度运动、情绪舒畅，三者与饮食同等重要。</li>
</ol></div>

<div class="block"><h3><span class="badge">图</span>一图看懂 · 四季 · 五脏 · 养生</h3>
<div class="diagram">
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;text-align:left;font-size:13px;">
<div style="background:#586b50;color:#f5edda;border-radius:8px;padding:9px;"><b>春 · 肝</b><br>养生发、舒情志</div>
<div style="background:#9e3526;color:#f5edda;border-radius:8px;padding:9px;"><b>夏 · 心</b><br>养长、防暑护心</div>
<div style="background:#a8884e;color:#f5edda;border-radius:8px;padding:9px;"><b>长夏 · 脾</b><br>防湿、健脾</div>
<div style="background:#8a8f93;color:#f5edda;border-radius:8px;padding:9px;"><b>秋 · 肺</b><br>养收、润燥</div>
<div style="background:#3b5566;color:#f5edda;border-radius:8px;padding:9px;"><b>冬 · 肾</b><br>养藏、温补</div>
</div>
<div class="cap">顺着四季的"生长收藏"调养相应的脏</div>
</div></div>

<div class="block"><h3><span class="badge">参</span>名家说 & 现代视角</h3>
<p class="quote">"春夏养阳，秋冬养阴，以从其根。"——《素问·四气调神大论》</p>
<div class="modern"><b>现代视角：</b>顺时养生≈尊重<b>生物节律</b>（昼夜节律、季节节律），现代时间生物学也证实作息紊乱有害健康；食疗≈合理的<b>膳食结构与营养</b>。这些大方向有现代依据——但"食物寒热""忌口"等具体说法需辨体质、忌走极端。</div></div>

<div class="block caution"><h3><span class="badge">辨</span>别误会</h3>
<p>① 养生≠大量进补，"补不对证"反伤身；② "发物""忌口"要<b>具体分析</b>，不必草木皆兵；③ 节气养生是<b>大方向</b>，因人因地灵活，不是教条。</p></div>

<div class="block"><h3><span class="badge">用</span>用得上</h3>
<p>把它用进这周：冬季<b>早睡晚起</b>、避寒就温、适当温补（羊肉、桂圆）；夏季<b>防暑护心脾</b>、少贪冰饮；并按自己的体质选日常食材（阳虚多温食、阴虚多润食、痰湿少肥甘）。养生，就是这些小事的日积月累。</p></div>

  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 顺四时养生</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>《四气调神大论》给出四季养生总纲：<b>春</b>"夜卧早起、广步于庭"，养生发之气、舒畅情志（养肝）；<b>夏</b>"夜卧早起、无厌于日"，养长气、勿过贪凉（养心）；<b>秋</b>"早卧早起、收敛神气"，防燥养收（养肺）；<b>冬</b>"早卧晚起、必待日光"，养藏、避寒温补（养肾）。</p>
    <p>核心是"<b>春夏养阳、秋冬养阴</b>"：顺应自然的生长收藏，而非逆之。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 二十四节气的关键节点</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>节气是更细的时间刻度。几个关键：<b>冬至</b>（一阳生，重养藏、可"冬令进补"、"三九贴"）；<b>夏至</b>（一阴生，阳气最盛，养心防暑、"冬病夏治·三伏贴"）；<b>春分秋分</b>（昼夜平分，重在调和阴阳、平稳过渡）；<b>长夏（梅雨季）</b>湿气最重，重在健脾化湿、防"湿困"。</p>
    <p>"<b>冬病夏治</b>"是顺时养生的精彩应用：冬天易发的虚寒病（哮喘、老寒腿），在夏季阳气最旺时温阳扶正，预防来年发作。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 食疗总则</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>药食同源</b>：许多食物本身就有偏性与功效（生姜温散、绿豆清热、山药健脾）。<b>辨体施食</b>：寒体宜温食、热体宜凉食。<b>五味均衡</b>：不偏嗜（过咸伤肾、过甜碍脾）。<b>三因制宜</b>：因人、因时（冬温补夏清淡）、因地（南方祛湿、北方润燥）。</p>
    <p>食疗讲究"<b>平和、持久</b>"——靠日常饮食的细水长流，而非一时猛补。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>④ 起居·运动·情志</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>起居</b>：顺昼夜节律，提倡"<b>子午觉</b>"（子时入睡养阴、午时小憩养阳）；避免熬夜（最耗元气）。<b>运动</b>：以<b>缓和、持久</b>为宜，八段锦、太极、散步既动气血又不耗气——"形劳而不倦"。<b>情志</b>：恬淡虚无、情绪舒畅是养生的最高层次（"精神内守，病安从来"），现代亦证实长期压力损害健康。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>⑤ 常见体质的食养举例 & 现代视角</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>气虚</b>：山药、小米、黄芪炖鸡。<b>阳虚</b>：羊肉、生姜、韭菜、桂圆。<b>阴虚</b>：银耳、百合、梨、麦冬、鸭肉。<b>痰湿</b>：薏苡仁、冬瓜、白扁豆，少肥甘。<b>湿热</b>：绿豆、苦瓜、赤小豆，忌辛辣油腻。<b>血瘀</b>：山楂、黑木耳、少量红酒。<b>气郁</b>：玫瑰花、陈皮、佛手代茶，配合运动。</p>
    <div class="modern"><b>现代视角与诚实提醒：</b>顺时、规律作息、均衡饮食、适度运动、情绪管理——这些都与现代健康科学高度一致，值得长期坚持。但食疗是<b>调养、不是治病</b>：有病仍需就医，"以食代药"延误病情是危险的。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">启下 ·</span>养生学如何源流（并与方士丹道剥离）？"子午流注"与现代生物节律是何关系？食疗如何循证评估？切「专家版」。</div>
</div>

<div class="deepdive dd-expert expert-only">
  <div class="dd-title">专家精讲 · 教授级 <small>养生源流 · 时间医学 · 循证评估</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>深入版你已掌握四时养生与食疗。这一层<b>仍论养生</b>，追到学术：养生学源流与流派、时间医学与生物节律、食疗养生的循证评估。</div>

  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 养生学的源流与流派</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>养生学根植于《内经》（《上古天真论》《四气调神大论》），其后与<b>道家、导引、吐纳、服食</b>相融，至孙思邈《千金方·养性》集养生之大成。后世形成多种取向：<b>静养派</b>（清静无为、调神）、<b>动养派</b>（导引、五禽戏、太极八段锦）、<b>食养派</b>（食疗调摄）。</p>
    <p>须辨明的是：养生史上曾与<b>方士的长生、丹道服石</b>纠缠（魏晋"服石"风气贻害甚烈）。现代中医养生已<b>剥离其求仙长生的迷信成分</b>，回归"顺应自然、形神共养、防病益寿"的理性内核——这一剥离本身，就是中医自我净化的过程。</p>
    <div class="scholar"><b>史鉴：</b>魏晋名士服"五石散"以求轻身长生，结果中毒致死者众——这是"上药久服"迷信的惨痛教训，提醒养生须以安全与理性为本。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 时间医学：子午流注与生物节律</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>中医有丰富的"<b>时间医学</b>"思想：<b>子午流注</b>（十二经气血按时辰盛衰，据此择时针药）、<b>五运六气</b>（年度气候与疾病流行的节律）、四季五脏对应——核心是"<b>因时制宜、顺应节律</b>"。</p>
    <p>这与现代<b>时间生物学（chronobiology）</b>形成有趣对话：人体确有昼夜节律（褪黑素、皮质醇、体温节律）与季节节律；"<b>时辰药理学</b>"也证实部分药物的疗效与毒性随给药时间而变。中医的节律养生思想，在大方向上与现代节律科学相通。</p>
    <div class="scholar"><b>分寸：</b>"顺应节律"（规律作息、顺四时）有现代依据；但子午流注、五运六气的<b>具体推演</b>（如按时辰精确取穴、逐年预测疫情）则争议大、证据弱，宜了解其思想、审慎对待其细节。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 食疗与养生的循证评估</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>"<b>药食同源</b>"有制度依据（国家公布的药食同源目录）。从现代营养学看，许多食养经验（如薏苡仁利水、山楂助消化、阿胶补血）有一定成分与功能基础；而养生的四大支柱——<b>规律作息、均衡膳食、适度运动、情绪管理</b>——更与现代健康科学<b>高度一致、证据充分</b>。</p>
    <p>但须守住底线：食疗是"<b>调养而非治病</b>"。两个常见误区要警惕——<b>"以食代药"</b>延误病情，<b>过度进补</b>（盲目膏方、滥服补品）反致壅滞或增加肝肾负担。养生贵在<b>平和、持久、个体化</b>，而非猛补与极端。</p>
    <div class="scholar"><b>循证立场：</b>养生的"生活方式部分"证据坚实、值得大力提倡；"具体食疗方/补品"的疗效则多属经验或弱证据，宜理性、适度。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">小结 ·</span>从会顺时食养，到明养生源流、时间医学的对话、循证的分寸——养生就既能长期坚持、又不走极端。</div>
</div>

24:{part:"第五部 · 用起来（养生·实践）", title:"经典与名家", sub:"以及怎么继续走下去", deepCount:5, body:`
<div class="block hook"><p>学到这里，你已经走完了中医的主线：<b>理 → 病 → 诊 → 法 → 方 → 药 → 养</b>。这一课做个收束——俯瞰中医典籍与历代名家的星空，并给你一份"<b>继续深入</b>"的路线图。</p></div>

<div class="block story"><h3><span class="badge">事</span>小故事 · 金元四大家的争鸣</h3>
<p>金元时期，医学界出现一场精彩的"百家争鸣"：刘完素主张"<b>火热致病</b>"、善用寒凉（寒凉派）；张从正力倡"<b>邪去正安</b>"、善用汗吐下（攻邪派）；李东垣强调"<b>内伤脾胃，百病由生</b>"、重在补土（补土派）；朱丹溪提出"<b>阳常有余、阴常不足</b>"、长于滋阴（滋阴派）。</p>
<p class="src">——金元四大家：刘完素、张从正、李东垣、朱丹溪</p>
<p class="moral">四家观点甚至彼此对立，却共同把中医推向了新高度。这说明：中医不是一成不变的教条，而是在<b>争鸣与实践中不断生长</b>的活体系。</p></div>

<div class="block"><h3><span class="badge">核心</span>核心概念</h3>
<ol class="concepts">
<li><b>四大经典</b>：《黄帝内经》《难经》《伤寒杂病论》《神农本草经》——理论、临床、本草的奠基（详见第六部）。</li>
<li><b>历代里程碑</b>：张仲景→华佗→王叔和→孙思邈→钱乙→金元四大家→温病学派→王清任……</li>
<li><b>主要学派</b>：伤寒、温病、易水、攻邪、滋阴、补土等，各有所长、互为补充。</li>
<li><b>怎么继续</b>：先打基础（中基·中诊·中药·方剂），再读经典，辅以名家讲座与医案。</li>
</ol></div>

<div class="block"><h3><span class="badge">图</span>一图看懂 · 中医发展时间线</h3>
<div class="diagram">
<div style="font-size:13px;text-align:left;line-height:2;">
<b>先秦~汉</b>　奠基：《内经》《难经》《神农本草经》《伤寒杂病论》<br>
<b>晋唐</b>　　王叔和《脉经》· 皇甫谧《针灸甲乙经》· 孙思邈《千金方》<br>
<b>宋金元</b>　钱乙（儿科）· 陈无择（三因）· <b>金元四大家</b>（寒凉/攻邪/补土/滋阴）<br>
<b>明清</b>　　李时珍《本草纲目》· <b>温病学派</b>（叶天士·吴鞠通）· 王清任<br>
<b>近现代</b>　中西汇通 · 院校教育 · 循证与中西医结合
</div>
<div class="cap">两千年累积、争鸣、演进的开放体系</div>
</div></div>

<div class="block"><h3><span class="badge">参</span>名家说 & 现代视角</h3>
<p class="quote">"勤求古训，博采众方。"——张仲景《伤寒论·序》</p>
<div class="modern"><b>现代视角：</b>中医是一个<b>不断累积、争鸣、自我更新</b>的开放体系。今天它有了院校教育、临床指南、循证研究与中西医结合等新形态。学习中医，既要"勤求古训"（读经典），也要"博采众方"（吸收现代成果）。</div></div>

<div class="block caution"><h3><span class="badge">辨</span>别误会</h3>
<p>① 没有哪一家、哪一方是"绝对真理"——各有适用范围；② 经典必须读，但要配合<b>现代解读</b>，不可泥古；③ 学中医没有终点，理论之外更需<b>临证</b>与<b>反思</b>。</p></div>

<div class="block"><h3><span class="badge">用</span>用得上</h3>
<p>给自己定一份继续学习的路线（见下方深入精讲），并保持两个习惯：带着这套框架<b>观察身边的健康现象</b>，以及对任何"神奇疗效"都<b>多问一句"证据如何"</b>。这正是本课程从头到尾想给你的东西。</p></div>

<div class="next-tip">读完标准版，你已俯瞰经典与名家、得到一份学习路线。想看清学术史分期、主要学派与当代处境？　切「深入版」↘</div>

<div class="deepdive deep-only">
  <div class="dd-title">深入精讲 · 系统展开 <small>点目录可跳转，逐节展开</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>标准版你已纵览经典与名家、拿到路线图。这一层回到同一脉络讲深：四大经典回顾、里程碑医家、金元四大家、明清至近现代、自学路线。</div>

    <button onclick="ddJump(this,0)">① 四大经典回顾</button>

    <button onclick="ddJump(this,3)">④ 明清至近现代</button>
    <button onclick="ddJump(this,4)">⑤ 自学路线图</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 四大经典的地位</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>《黄帝内经》</b>奠定理论（阴阳五行、藏象经络、病机诊法、治则养生）；<b>《难经》</b>补内经之未备（脉学、命门、三焦）；<b>《伤寒杂病论》</b>确立辨证论治与方剂体系（被分为《伤寒论》《金匮要略》）；<b>《神农本草经》</b>奠定本草学（三品分类、四气五味）。它们分别是中医"<b>理、法、方、药</b>"的源头，第六部将逐一深读。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 历代里程碑医家</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>张仲景</b>（医圣，辨证论治奠基）、<b>华佗</b>（外科、麻沸散、五禽戏）、<b>王叔和</b>（整理《伤寒论》、著《脉经》）、<b>皇甫谧</b>（《针灸甲乙经》）、<b>孙思邈</b>（"药王"，《千金方》、医德典范）、<b>钱乙</b>（儿科鼻祖、创六味地黄丸）。他们各自在一个领域立下里程碑。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 金元四大家与学派争鸣</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>刘完素</b>（寒凉派）：百病多因火热，善用寒凉。<b>张从正</b>（攻邪派）：病由邪生、"邪去正安"，善用汗吐下。<b>李东垣</b>（补土派）：内伤脾胃、百病由生，创补中益气汤。<b>朱丹溪</b>（滋阴派）："阳常有余、阴常不足"，善滋阴降火。</p>
    <p>四家看似对立，实则各抓住了疾病的一个侧面，合起来大大丰富了中医的病机与治法——这是中医史上最重要的一次理论飞跃。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>④ 明清温病学派至近现代</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>明清</b>：李时珍《本草纲目》集本草之大成；吴又可《温疫论》创"戾气"说；<b>温病学派</b>（叶天士创卫气营血辨证、吴鞠通著《温病条辨》立三焦辨证）应对温热疫病，与伤寒并峙；王清任《医林改错》重视解剖与瘀血，开活血化瘀一派。</p>
    <p><b>近现代</b>：张锡纯等倡"中西汇通"；中医进入院校教育体系；今天更有循证研究、中西医结合、体质标准化（如王琦九体质）、青蒿素等现代成果——中医仍在演进。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>⑤ 给现代自学者的路线图</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>第一阶（打基础）</b>：系统教材《中医基础理论》→《中医诊断学》→《中药学》《方剂学》。本课程正是这一阶的"导游图"。</p>
    <p><b>第二阶（读经典）</b>：先借助名家讲解（如郝万山讲《伤寒论》、王洪图讲《内经》）入门，再读原文选读。</p>
    <p><b>第三阶（重实证）</b>：研读医案（《名医类案》《临证指南医案》），把理论与真实病例对照；有条件者跟师临证。</p>
    <div class="modern"><b>诚实结语：</b>学中医是一场长跑。最好的态度，是<b>既深入其中、又跳出其外</b>——既能用它的整体思维看待健康，又始终保持对证据的清醒。愿这套课程，成为你这段旅程踏实的起点。</div>
  </div></div>

<div class="deepdive dd-expert expert-only">

  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 中医学术史的分期与主线</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>中医两千余年的学术史，可粗分为：<b>奠基期</b>（先秦两汉，四大经典）→<b>充实期</b>（魏晋隋唐，脉学、针灸、方书、本草系统化）→<b>争鸣期</b>（宋金元，学派蜂起、理论大发展）→<b>成熟与分化期</b>（明清，温补、温病、本草集大成）→<b>变革期</b>（近现代，中西汇通、院校化、科学化）。</p>
    <p>贯穿其中的<b>内在主线</b>，是医家不断面对<b>新的疾病谱与理论困境</b>而创新：外感寒病催生《伤寒》、内伤杂病催生脾胃/相火诸论、温热疫病催生温病学、慢病与瘟疫又推动今日的中西医结合。理解这条"<b>问题—创新</b>"的主线，比记忆人名书名更重要。</p>
    <div class="scholar"><b>史观：</b>中医不是静止的教条，而是一部<b>因应时代疾病、持续争鸣演进</b>的活的学术史。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 主要学派的学术谱系</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>主要学派及其核心命题：<b>伤寒学派</b>（研究《伤寒论》，重六经辨证与经方）；<b>河间学派</b>（刘完素，"火热论"，主寒凉）；<b>易水学派</b>（张元素—李东垣，脏腑辨证与脾胃论，主补土）；<b>丹溪学派</b>（朱丹溪，"相火论""阳有余阴不足"，主滋阴）；<b>温补学派</b>（薛己、张景岳、赵献可，重命门真阴真阳）；<b>温病学派</b>（叶天士、吴鞠通、王孟英，卫气营血/三焦辨证）；<b>汇通学派</b>（近代张锡纯等，中西医汇通）。</p>
    <p>各派往往<b>因纠偏而立</b>（如丹溪滋阴以纠局方温燥、温补以纠丹溪苦寒太过），呈现"<b>正—反—合</b>"的辩证发展——这正是学术争鸣推动进步的典范。</p>
    <div class="scholar"><b>谱系要点：</b>河间—丹溪—温病重"清/滋"，易水—温补重"补/温"，两条主线的张力与互补，构成宋以后中医内科学的基本格局。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 中医的当代处境与未来</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>当代中医面临诸多张力：<b>传承方式</b>上，院校教育（规模化、规范化）与师承/家传（个体化、经验性）各有得失；<b>发展路径</b>上，<b>循证化、标准化、国际化</b>是大势，但也带来"以西律中"是否削足适履的忧虑；<b>科学定位</b>上，"中医是不是科学""如何被现代证据检验"的争论从未停息。</p>
    <p>较为理性的展望是：中医的<b>整体观、辨证论治、治未病、个体化</b>等思想，在慢病时代与精准/系统医学的背景下，仍有独特价值；其出路或在于<b>保持自身理论主体性的同时，以现代方法获取证据、阐明机制、保障安全</b>——既不固步自封，也不全盘西化。</p>
    <div class="scholar"><b>结语性判断：</b>中医的未来，可能不在于证明自己"是不是西医意义上的科学"，而在于<b>以开放心态接受检验、以确凿疗效赢得信任</b>，在现代医学体系中找到不可替代的位置。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">小结 ·</span>从认得名家学派，到把握学术史的演进逻辑、谱系与当代命题——你对"中医作为一门活的学问"就有了通盘的眼光。</div>
</div>

<div class="block quiz"><h3><span class="badge">测</span>小测</h3>

25:{part:"第六部 · 名著解读（四大经典）", title:"《黄帝内经》", sub:"中医理论的源头活水", deepCount:6, body:`
<div class="block hook"><p>如果中医是一棵大树，《黄帝内经》就是它的<b>根</b>。两千年来几乎所有中医理论，都能在这里找到源头。但它不是一本"好读"的书——内容是<b>汇编</b>、结构松散、以问答展开。所以读它的第一步，是<b>先理出框架</b>。</p></div>

<div class="block story"><h3><span class="badge">事</span>小故事 · "岐黄之术"的由来</h3>
<p>《黄帝内经》通篇以<b>黄帝</b>发问、臣子<b>岐伯</b>等作答的形式写成。后人便用"<b>岐黄</b>"二字代指中医——"岐黄之术"即由此而来。但学界公认：它并非黄帝亲著，而是<b>战国至西汉众多医家</b>著述的汇编，托黄帝之名以重其说。</p>
<p class="src">——《黄帝内经》（《素问》《灵枢》）</p>
<p class="moral">"托名"在古代很常见——借圣人之名，让学说更有分量。认清这一点，我们就能<b>实事求是</b>地看待经典：它伟大，但不必神化。</p></div>

<div class="block"><h3><span class="badge">核心</span>核心概念</h3>
<ol class="concepts">
<li><b>结构</b>：分《素问》《灵枢》两部，各 81 篇。它是<b>论文汇编</b>，非系统专著，故需先归纳框架再读。</li>
<li><b>八大理论板块</b>（现代归纳）：阴阳五行、藏象、经络、气血精神、病因病机、诊法、治则、养生（含运气）。</li>
<li><b>两大思想</b>：整体观、恒动观（天人相应、形神一体）。</li>
<li><b>地位</b>：中医基础理论的<b>总源头</b>——你前面学的全部"理"，几乎都出自这里。</li>
</ol></div>

<div class="block"><h3><span class="badge">图</span>一图看懂 · 《内经》的八大理论板块</h3>
<div class="diagram">
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;text-align:center;font-size:13px;">
<div style="background:#9e3526;color:#f5edda;border-radius:8px;padding:9px;">阴阳五行</div>
<div style="background:#586b50;color:#f5edda;border-radius:8px;padding:9px;">藏象</div>
<div style="background:#a8884e;color:#f5edda;border-radius:8px;padding:9px;">经络</div>
<div style="background:#3b5566;color:#f5edda;border-radius:8px;padding:9px;">气血精神</div>
<div style="background:#9e3526;color:#f5edda;border-radius:8px;padding:9px;">病因病机</div>
<div style="background:#586b50;color:#f5edda;border-radius:8px;padding:9px;">诊法</div>
<div style="background:#a8884e;color:#f5edda;border-radius:8px;padding:9px;">治则</div>
<div style="background:#3b5566;color:#f5edda;border-radius:8px;padding:9px;">养生·运气</div>
</div>
<div class="cap">把汇编式的《内经》归成八块，读起来就有了骨架</div>
</div></div>

<div class="block"><h3><span class="badge">参</span>名家说 & 现代视角</h3>
<p class="quote">"法于阴阳，和于术数，食饮有节，起居有常……"——《素问·上古天真论》</p>
<div class="modern"><b>现代视角：</b>《内经》的汇编性质，决定了它最好"<b>提要钩玄</b>"地读——现代《中医基础理论》教材，正是对它的系统化重构。它确立的"整体、动态、天人相应"思维，是中医最核心、也最具现代启发的遗产。</div></div>

<div class="block caution"><h3><span class="badge">辨</span>别误会</h3>
<p>① 它<b>非黄帝亲著</b>，而是历代汇编；② 内部并非铁板一块，<b>有不一致甚至矛盾</b>之处（不同时代、不同医家）；③ 初学<b>不必逐字啃原文</b>，先用框架统领，再选读名句。</p></div>

<div class="block"><h3><span class="badge">用</span>用得上</h3>
<p>你会恍然大悟：前面学的《中基》——阴阳五行、藏象经络、病因病机——其实就是《内经》的<b>现代整理版</b>。读《内经》原文，选读那些点睛名句即可（如"治未病""阴平阳秘""正气存内"）。</p></div>

<div class="next-tip">读完标准版，你已知《内经》是汇编、有八大理论板块。想沿这副骨架深入各板块、并读懂金句？　切「深入版」↘</div>

<div class="deepdive deep-only">
  <div class="dd-title">深入精讲 · 系统展开 <small>点目录可跳转，逐节展开</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>标准版你已握住《内经》的性质与八大板块。这一层沿同一骨架讲深：全书结构与读法、阴阳五行藏象、经络气血精神、病机诊法、治则养生运气、金句价值。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 全书结构与读法</button>
    <button onclick="ddJump(this,1)">② 阴阳五行与藏象</button>
    <button onclick="ddJump(this,2)">③ 经络·气血·精神</button>
    <button onclick="ddJump(this,3)">④ 病机与诊法</button>
    <button onclick="ddJump(this,4)">⑤ 治则·养生·运气</button>
    <button onclick="ddJump(this,5)">⑥ 金句与现代价值</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 全书结构与读法</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>两部分</b>：《素问》侧重基础理论（阴阳、藏象、病机、养生），《灵枢》侧重经络、针刺与人体（又称《针经》），各 81 篇，合 162 篇。</p>
    <p><b>性质</b>：它是不同时代、不同医家文章的<b>汇编</b>，没有统一的章节逻辑，篇与篇之间甚至观点有出入。<b>读法</b>：不宜从头硬读，宜按"理论板块"分类研读、提要钩玄；初学者更适合先读现代教材或名家讲解（如王洪图《内经讲稿》），再回选读原文。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 阴阳五行与藏象学说</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>《内经》系统建立了<b>阴阳五行</b>作为说理工具（《阴阳应象大论》是纲领），并用以阐释人体与自然。<b>藏象学说</b>（《灵兰秘典论》《六节藏象论》等）以"取象"方式确立五脏六腑的功能与相互关系——这正是第 5、6 课藏象的源头。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 经络·气血·精神</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>《灵枢·经脉》详载十二经脉的循行与病候，是经络学说的根本文献。《内经》还系统论述<b>气血精津液</b>与<b>神</b>（"形与神俱""得神者昌"），奠定了形神一体、身心相关的整体观——第 7、8 课皆源于此。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>④ 病因病机与诊法</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>病因病机方面，《内经》提出"<b>正气存内，邪不可干</b>""<b>邪之所凑，其气必虚</b>"，并有著名的"<b>病机十九条</b>"（《至真要大论》），把众多病证归纳到脏腑与六气。诊法方面，确立望闻问切与"<b>四诊合参</b>""善诊者察色按脉、先别阴阳"——第 9~13 课的根基都在这里。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>⑤ 治则·养生·运气</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>治则</b>："治病必求于本""治未病""谨察阴阳所在而调之"。<b>养生</b>：《上古天真论》《四气调神大论》是养生总纲（法于阴阳、起居有常、恬淡虚无）。<b>运气学说</b>（五运六气）则探讨气候节律与疾病流行的关系，较为玄奥、争议也大，初学了解即可、不必深陷。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>⑥ 金句选读与现代价值</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p class="quote">"上工治未病，不治已病。"<br>"恬淡虚无，真气从之；精神内守，病安从来。"<br>"阴平阳秘，精神乃治。"</p>
    <p>这些名句，几乎句句是中医的精神内核：重预防、重整体、重身心、重平衡。</p>
    <div class="modern"><b>现代价值与分寸：</b>《内经》的<b>整体观、预防观、身心观、节律观</b>极具现代启发，与系统医学、预防医学、心身医学、时间生物学多有呼应。但其中也有时代局限（如运气推演、部分解剖认识），宜<b>取其思想精华、不泥其字句</b>。</p>
  </div></div>

</div>

  <div class="dd-bridge"><span class="lead">承上 ·</span>深入版你已知《内经》的板块与读法。这一层<b>不再绕著作史</b>，而是逐块讲透《内经》到底<b>说了什么</b>——以原文为骨、解其义理，把这本书的内容真正铺开。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 全书框架与三大精神</button>
    <button onclick="ddJump(this,1)">② 藏象：十二官</button>
    <button onclick="ddJump(this,2)">③ 病机十九条</button>
    <button onclick="ddJump(this,3)">④ 治则与诊法</button>
    <button onclick="ddJump(this,4)">⑤ 养生：天真与四气</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 全书框架与贯穿始终的三大精神</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>《素问》81篇论理（阴阳、藏象、病机、诊治、养生、运气），《灵枢》81篇论经络、针刺与人体。读懂《内经》，先抓<b>贯穿全书的三条精神</b>：</p>
    <p>· <b>天人相应</b>："人以天地之气生，四时之法成"（《宝命全形论》）、"人与天地相参，与日月相应"——人体的节律、生理皆<b>法象自然</b>。<br>· <b>形神一体</b>："形与神俱"（《上古天真论》）、"得神者昌，失神者亡"——身与心不可分。<br>· <b>治未病</b>："圣人不治已病治未病……病已成而后药之……不亦晚乎"（《四气调神大论》）——以预防为本。</p>
    <p>其<b>说理工具</b>是阴阳五行："<b>阴阳者，天地之道也，万物之纲纪……治病必求于本</b>"（《阴阳应象大论》）；"清阳出上窍，浊阴出下窍；清阳发腠理，浊阴走五脏"——把阴阳升降落到具体出入。下面三节，逐块讲《内经》的核心内容本身。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 藏象 · 十二官各司何职（《灵兰秘典论》）</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>《素问·灵兰秘典论》以一套"官职"讲脏腑职能，逐句即是藏象学说的源头：</p>
    <p>· <b>心者，君主之官也，神明出焉</b>（主神志、为一身主宰）<br>· <b>肺者，相傅之官，治节出焉</b>（辅心、主气而主治理调节、朝百脉）<br>· <b>肝者，将军之官，谋虑出焉</b>（主疏泄、主谋虑决断）<br>· <b>胆者，中正之官，决断出焉</b><br>· <b>膻中（心包）者，臣使之官，喜乐出焉</b><br>· <b>脾胃者，仓廪之官，五味出焉</b>（受纳运化、化生气血）<br>· <b>大肠者，传道之官，变化出焉；小肠者，受盛之官，化物出焉</b><br>· <b>肾者，作强之官，伎巧出焉</b>（主骨生髓，强力而精巧）<br>· <b>三焦者，决渎之官，水道出焉；膀胱者，州都之官，津液藏焉，气化则能出矣</b></p>
    <p>末了一句是纲领："<b>凡此十二官者，不得相失也……主明则下安……主不明则十二官危</b>"——脏腑须<b>整体协调</b>，而以心（君主）为主导。这就是"藏象＝以官职喻功能系统"的本源（第5、6课由此而来）。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 病机十九条（《至真要大论》）</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>纲领是"<b>审察病机，无失气宜</b>""<b>谨守病机，各司其属</b>"——见症先归到<b>五脏</b>或<b>六气（风寒湿火热）</b>。十九条择要：</p>
    <p>· 诸风掉眩，皆属于<b>肝</b>；诸寒收引，皆属于<b>肾</b>；诸气膹郁，皆属于<b>肺</b>；诸湿肿满，皆属于<b>脾</b>。<br>· 诸痛痒疮，皆属于<b>心（火）</b>；诸热瞀瘛、诸禁鼓栗如丧神守、诸逆冲上、诸躁狂越、诸胕肿疼酸惊骇——皆属于<b>火</b>。<br>· 诸暴强直，皆属于<b>风</b>；诸病水液澄澈清冷，皆属于<b>寒</b>；诸呕吐酸、暴注下迫，皆属于<b>热</b>。<br>· 诸厥固泄，皆属于<b>下</b>；诸痿喘呕，皆属于<b>上</b>；诸胀腹大，皆属于<b>热</b>。</p>
    <p><b>怎么用</b>：这是"<b>审证求机</b>"的范式——拿到一组症状，先问它"属哪一脏、哪一气"，定了大方向再细辨。但"皆属于"意为"<b>多属、当审</b>"，不是铁律；金·刘完素正是抓住"属火、属热"诸条，发挥出"火热论"（见第10、24课）。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>④ 治则与诊法（原文）</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>治则</b>：① "<b>治病必求于本</b>"——治根本病机；② 正治"<b>寒者热之，热者寒之，虚则补之，实则泻之</b>"；③ <b>因势利导</b>"其高者，因而越之（病位在上者用吐）；其下者，引而竭之（在下者用泻）；中满者，泻之于内（中焦壅满者消导）"；④ 总则"<b>谨察阴阳所在而调之，以平为期</b>"。</p>
    <p><b>诊法</b>："<b>善诊者，察色按脉，先别阴阳</b>"（辨证先抓阴阳总纲）；脉应四时——"春日浮……夏日在肤……秋日下肤……冬日在骨"；并贯穿"<b>上工治未病</b>"（治与防一体）。这些正是第9–13课诊法、第16课治则的原始出处。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>⑤ 养生 · 上古天真与四气调神</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>养生四纲</b>（《上古天真论》）："<b>法于阴阳，和于术数，食饮有节，起居有常，不妄作劳</b>，故能形与神俱，而尽终其天年，度百岁乃去。"最高层次在调神："<b>恬淡虚无，真气从之；精神内守，病安从来</b>。"</p>
    <p><b>生命节律</b>（肾气—天癸）："女子七岁肾气盛，齿更发长；二七而天癸至……月事以时下……七七，天癸竭"；"丈夫八岁……二八，天癸至……八八，天癸竭"——这是中医生长、发育、生殖、衰老的<b>时间表</b>（第6、22课之源）。</p>
    <p><b>四季调神</b>（《四气调神大论》）：春"夜卧早起，广步于庭"以养生发；夏"夜卧早起，无厌于日"以养长；秋"早卧早起，与鸡俱兴"以养收；冬"早卧晚起，必待日光"以养藏。总纲即"<b>春夏养阳，秋冬养阴</b>"。</p>
    <div class="scholar"><b>著作史（一句带过）：</b>《内经》非一人一时之作；《素问》经唐·王冰次注（补入争议较大的"运气七篇"）、宋·林亿校正，《灵枢》赖南宋史崧复传。"五运六气"以干支推气候疫病、最为玄奥而有争议——<b>取其"天人相应"的整体节律观，慎其逐年精确推演</b>即可。这些是背景，<b>重点始终是上面的内容本身</b>。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">小结 ·</span>这一层不谈"谁注过《内经》"，而是把它<b>讲了什么</b>铺给你：三大精神（天人相应/形神一体/治未病）、十二官、病机十九条、治则诊法、养生节律——这些就是后续各课理论的<b>原始出处</b>。</div>
</div>

<div class="block quiz"><h3><span class="badge">测</span>小测</h3>
<div class="q"><p>1. 《黄帝内经》由哪两部分组成？它是什么性质的著作？</p><button onclick="toggleA(this)">看答案</button><div class="a">《素问》与《灵枢》各81篇；它是战国至西汉众多医家著述的汇编，非黄帝亲著、非系统专著。</div></div>
<div class="q"><p>2. 为什么读《内经》要"先理结构"？</p><button onclick="toggleA(this)">看答案</button><div class="a">因为它是汇编、结构松散、篇间观点有出入，先归纳出理论板块（阴阳五行、藏象、经络等）才便于系统理解。</div></div>
</div>
`},

26:{part:"第六部 · 名著解读（四大经典）", title:"《难经》", sub:"补《内经》之未备", deepCount:5, body:`
<div class="block hook"><p>《难经》像一本"《内经》<b>疑难解答集</b>"——用八十一个问答（"难"），专门解释和发挥《内经》没讲透的难点。它篇幅不大，却在<b>脉诊</b>上立下了影响至今的规矩。</p></div>

<div class="block story"><h3><span class="badge">事</span>小故事 · 又一部"托名"的经典</h3>
<p>《难经》旧题为战国神医<b>扁鹊（秦越人）</b>所作。但据考证，它实际约成书于<b>汉代</b>，是后人以"问难"的体例，对《内经》要旨加以阐释、发挥的著作——又一部托名前贤的经典。</p>
<p class="src">——《难经》（《黄帝八十一难经》）</p>
<p class="moral">"难"不是"困难"，而是"<b>问难、质疑、解疑</b>"。这部书的可贵，正在于它不满足于复述经典，而是带着问题去<b>追问和发挥</b>——这也是做学问的好榜样。</p></div>

<div class="block"><h3><span class="badge">核心</span>核心概念</h3>
<ol class="concepts">
<li><b>结构</b>：全书以八十一个"难"（问答）组成，可归为<b>五大板块</b>：脉学、经络、藏象、腧穴、针法（疾病穿插其间）。</li>
<li><b>最大贡献</b>：确立"<b>独取寸口</b>"的脉诊法——只诊手腕寸口即可候全身。</li>
<li><b>重要发挥</b>：<b>命门</b>学说与<b>三焦</b>的阐释。</li>
<li><b>地位</b>：四大经典之一，补《内经》之未备。</li>
</ol></div>

<div class="block"><h3><span class="badge">图</span>一图看懂 · 《难经》八十一难的五大板块</h3>
<div class="diagram">
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;text-align:left;font-size:13px;">
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>脉学</b>（1–22难）<br>独取寸口、脉法</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>经络</b>（23–29难）<br>经脉奇经</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>藏象</b>（30–47难）<br>脏腑·命门·三焦</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>疾病</b>（48–61难）<br>病证·诊断</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>腧穴针法</b>（62–81难）<br>俞穴·补泻</div>
</div>
<div class="cap">先理出五大板块，八十一难就不再零散</div>
</div></div>

<div class="block"><h3><span class="badge">参</span>名家说 & 现代视角</h3>
<p class="quote">"十二经皆有动脉，独取寸口，以决五脏六腑死生吉凶之法，何谓也？"——《难经·一难》</p>
<div class="modern"><b>现代视角：</b>"独取寸口"把繁复的<b>遍身诊脉</b>简化为只诊手腕，<b>简便可行</b>，使脉诊得以普及，沿用至今。"命门"学说（关于生命原动力的所在）也深刻影响了后世（尤其明代温补学派）。</div></div>

<div class="block caution"><h3><span class="badge">辨</span>别误会</h3>
<p>① 它<b>非扁鹊亲著</b>，而是汉代托名之作；② "难"是"问难、解疑"，不是"困难"；③ 它对《内经》既有<b>继承也有发挥</b>，部分观点与《内经》不尽相同，是发展而非照搬。</p></div>

<div class="block"><h3><span class="badge">用</span>用得上</h3>
<p>你终于明白：为什么中医诊脉只摸手腕那一小段（寸关尺）？正是《难经》"<b>独取寸口</b>"立下的规矩。"命门"这个常听到的概念，其系统阐发也始于此书。</p></div>

<div class="next-tip">读完标准版，你已知《难经》以八十一问发挥《内经》、确立独取寸口。想沿五板块深入脉学、命门等？　切「深入版」↘</div>

<div class="deepdive deep-only">
  <div class="dd-title">深入精讲 · 系统展开 <small>点目录可跳转，逐节展开</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>标准版你已握住《难经》的体例与独取寸口。这一层沿同一结构讲深：全书结构与读法、独取寸口、命门与三焦、经络腧穴针法、金句价值。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 全书结构与读法</button>
    <button onclick="ddJump(this,1)">② 独取寸口</button>
    <button onclick="ddJump(this,2)">③ 命门与三焦</button>
    <button onclick="ddJump(this,3)">④ 经络·腧穴·针法</button>
    <button onclick="ddJump(this,4)">⑤ 金句与现代价值</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 全书结构与读法</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>《难经》以八十一条"问—答"组成，虽不分卷立目，但内容自然聚成五块：<b>1–22难论脉</b>、<b>23–29难论经络</b>、<b>30–47难论藏象</b>（含命门、三焦）、<b>48–61难论疾病与诊断</b>、<b>62–81难论腧穴与针法补泻</b>。</p>
    <p><b>读法</b>：抓住它的两大主线——<b>脉学</b>（独取寸口）与<b>对《内经》的发挥</b>（命门、三焦、五行生克在诊治中的运用），其余作为补充理解即可。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 独取寸口：脉诊的简化革命</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>《内经》原有"三部九候"遍身诊脉法，繁琐难行。《难经》提出：寸口为"<b>脉之大会</b>"、手太阴肺经所过，而肺朝百脉，故<b>独诊寸口</b>即可候全身五脏六腑。它还详论了寸关尺的分部、浮沉与脏腑配属。</p>
    <p>这一简化影响深远——后世脉诊基本都以寸口为主（第 12 课所学正源于此）。可以说，没有《难经》，就没有今天"摸手腕看病"的中医形象。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 命门与三焦学说</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>命门</b>：《难经》提出"左肾右命门"之说，认为命门是"诸神精之所舍、原气之所系"，是生命的原动力所在。此说虽与后世（如"两肾之间为命门""命门为肾间动气"）有不同诠释，但<b>开启了命门学说</b>，深刻影响了明代张景岳、赵献可等温补大家。</p>
    <p><b>三焦</b>：《难经》认为三焦"有名而无形"，是元气与水液运行的通道——为后世关于三焦实质的千年讨论埋下伏笔（见第 6 课）。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>④ 经络·腧穴·针法的发挥</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>《难经》对奇经八脉作了系统论述（"奇经八脉"之名与体系于此明确），论及十五络、原气与三焦的关系；在针法上，发挥了<b>五输穴</b>（井荥输经合）与<b>补母泻子</b>（依五行生克取穴）的取穴与补泻原理，对针灸临床影响很大。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>⑤ 金句与现代价值</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p class="quote">"寸口者，脉之大会，手太阴之脉动也。"</p>
    <div class="modern"><b>现代价值：</b>《难经》的最大意义，是把《内经》的一些原则<b>具体化、可操作化</b>（尤其脉诊），并以"问难"精神推动理论发展。它提醒我们：经典需要被<b>追问和发展</b>，而非仅供背诵。当然，其命门、三焦等说法仍属理论建构，宜结合现代认识理解。</p>
  </div></div>
  <div class="dd-bridge out"><span class="lead">启下 ·</span>《难经》如何成书托名、与《内经》是什么关系？命门学说怎样源流影响后世？它有哪些独创与争议？切「专家版」。</div>
</div>

<div class="deepdive dd-expert expert-only">
  <div class="dd-title">专家精讲 · 内容详解 <small>框架 · 原文 · 义理</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>深入版你已知《难经》的体例。这一层<b>不绕著作史</b>，直接讲它<b>说了什么</b>——以原文为骨，把独取寸口、命门三焦、五输穴补泻、奇经八脉这几大独创内容铺开。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 八十一难的框架</button>
    <button onclick="ddJump(this,1)">② 独取寸口与脉法</button>
    <button onclick="ddJump(this,2)">③ 命门与三焦</button>
    <button onclick="ddJump(this,3)">④ 五输穴与补母泻子</button>
    <button onclick="ddJump(this,4)">⑤ 奇经八脉</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 八十一难讲了什么：全书框架</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>《难经》以<b>八十一个问答（"难"）</b>组成，内容自然聚成五块：<b>1–22 难论脉</b>、<b>23–29 难论经络</b>（奇经八脉在此）、<b>30–47 难论藏象</b>（命门、三焦在此）、<b>48–61 难论疾病与诊断</b>、<b>62–81 难论腧穴与针法补泻</b>。</p>
    <p>它名为"发挥《内经》"，但<b>独取寸口、命门、五输穴补泻</b>等多有自家创见——下面就讲这几处真正的硬核内容。（注本以元·滑寿《难经本义》最精。）</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 独取寸口与具体脉法</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p class="quote">"十二经皆有动脉，独取寸口，以决五脏六腑死生吉凶之法，何谓也？然：寸口者，脉之大会，手太阴之脉动也。"——《一难》</p>
    <p><b>为何独取寸口能候全身</b>：寸口是手太阴肺经所过，"肺朝百脉"，营气一昼夜五十周次而<b>大会于寸口</b>，故一处可候五脏六腑。这就把《内经》繁琐的"三部九候"遍诊，简化成只诊腕后一段。</p>
    <p><b>具体脉法</b>：寸口再分<b>寸、关、尺</b>三部，分候脏腑（左寸心、关肝、尺肾；右寸肺、关脾、尺肾命），每部又以<b>浮、中、沉</b>取之；《四难》以浮沉别阴阳、《十八难》论三部所主。后世脉诊框架，根子在此。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 命门与三焦：两个原创学说</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p class="quote">"肾两者，非皆肾也，其左者为肾，右者为命门。命门者，诸神精之所舍，原气之所系也。"——《三十六难》</p>
    <p><b>命门</b>：《难经》首倡"左肾右命门"，把它定为"<b>原气（元气）之所系</b>"——即<b>生命的原动力之根</b>。这一说后经赵献可（两肾间为命门）、张景岳（命门藏真阴真阳）发展，成为温补学派的理论基石。</p>
    <p class="quote">"三焦者……有名而无形"（《二十五难》）；为"<b>原气之别使</b>，主通行三气、经历五脏六腑"（《三十一难》义）。</p>
    <p><b>三焦</b>：《难经》明言三焦"有名无形"，是元气与水谷之气运行的<b>通道</b>——这正是后世"三焦实质之争"的源头（第6课）。命门（元气之根）＋三焦（元气之路）合看，构成《难经》的"<b>元气运行</b>"理论。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>④ 五输穴与"补母泻子"针法</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>《难经》把每条经在肘膝以下的五个特定穴（<b>井、荥、输、经、合</b>）的主治，归纳成一句纲领：</p>
    <p class="quote">"井主心下满，荥主身热，输主体重节痛，经主喘咳寒热，合主逆气而泄。"——《六十八难》</p>
    <p>更立下针法补泻的总则：</p>
    <p class="quote">"虚者补其母，实者泻其子。"——《六十九难》</p>
    <p><b>怎么用</b>：依五行生克，虚证取<b>母穴/母经</b>以补（如肺虚补其母穴太渊属土、或补脾经），实证取<b>子穴</b>以泻。这把第4课"虚则补其母、实则泻其子"的五行原理，<b>落实成具体取穴法</b>——是针灸临床的核心法则之一。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>⑤ 奇经八脉：体系的奠定</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p class="quote">"脉有奇经八脉者，不拘于十二经……"——《二十七难》</p>
    <p>"<b>奇经八脉</b>"之名与体系，正是《难经》（二十七~二十九难）首次系统提出：督、任、冲、带、阴跷、阳跷、阴维、阳维，论其循行与为病（如"<b>阳维为病苦寒热，阴维为病苦心痛</b>"）。它指出奇经"不拘于十二经"、能<b>溢蓄调节</b>正经气血——为第8课奇经理论与后世"小周天"等奠基。</p>
    <div class="scholar"><b>著作史（一句带过）：</b>《难经》旧题扁鹊、实约成于东汉，是托名之作，与《内经》或释或创、间有出入（如三焦有形无形）。背景知道即可——<b>重点是上面这几项它实际讲了什么</b>。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">小结 ·</span>这一层把《难经》的硬核<b>内容</b>铺开了：独取寸口（脉之大会）、命门三焦（元气之根与路）、五输穴补母泻子（针法落地）、奇经八脉（体系奠定）——这才是它"补《内经》之未备"的真正分量。</div>
</div>

<div class="block quiz"><h3><span class="badge">测</span>小测</h3>
<div class="q"><p>1. 《难经》最重要的诊法贡献是什么？</p><button onclick="toggleA(this)">看答案</button><div class="a">确立"独取寸口"脉法——只诊手腕寸口即可候全身，使脉诊简便可行、沿用至今。</div></div>
<div class="q"><p>2. "难经"的"难"是什么意思？</p><button onclick="toggleA(this)">看答案</button><div class="a">是"问难、质疑、解疑"之意，全书以八十一个问答发挥《内经》要旨，而非"困难"。</div></div>
</div>
`},

28:{part:"第六部 · 名著解读（四大经典）", title:"《神农本草经》", sub:"本草学的奠基之作", deepCount:5, body:`
<div class="block hook"><p>如果说《伤寒论》是"方书之祖"，那《神农本草经》就是"<b>药书之祖</b>"。它第一次系统地把药物分类、定性，为后世两千年的本草学立下框架。读它，先看它的"<b>三品</b>"骨架。</p></div>

<div class="block story"><h3><span class="badge">事</span>小故事 · 神农尝百草</h3>
<p>传说上古的神农氏，为辨明草木能否食用、能否治病，<b>亲口遍尝百草</b>，"一日而遇七十毒"。这部最早的药学经典，便托他的名字而成。实际上，它约成书于<b>汉代</b>，是秦汉时期众多医药家经验的汇集。</p>
<p class="src">——《神农本草经》</p>
<p class="moral">"神农尝百草"是传说，却道出了本草学的来路——它是无数人以身试药、用经验甚至生命换来的知识。这份<b>实践积累</b>，正是中药最坚实的底色。</p></div>

<div class="block"><h3><span class="badge">核心</span>核心概念</h3>
<ol class="concepts">
<li><b>结构骨架</b>：以"<b>三品分类</b>"统领全书——上品（养命）、中品（养性）、下品（治病），共载药 <b>365 种</b>（应一年之数）。</li>
<li><b>总论（序例）</b>：提出四气五味、君臣佐使、七情和合等<b>药学总纲</b>。</li>
<li><b>经典药物</b>：人参、甘草、大黄、麻黄、附子等的<b>最早记载</b>多出于此。</li>
<li><b>地位</b>：本草学奠基，《本草纲目》等后世药典皆源于它。</li>
</ol></div>

<div class="block"><h3><span class="badge">图</span>一图看懂 · "三品"分类骨架</h3>
<div class="diagram">
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;text-align:left;font-size:13px;">
<div style="background:#586b50;color:#f5edda;border-radius:8px;padding:10px;"><b>上品 · 120种</b><br>养命、无毒、可久服（人参、甘草、大枣）</div>
<div style="background:#a8884e;color:#f5edda;border-radius:8px;padding:10px;"><b>中品 · 120种</b><br>养性、或有毒、斟酌用（当归、麻黄、芍药）</div>
<div style="background:#9e3526;color:#f5edda;border-radius:10px;padding:10px;"><b>下品 · 125种</b><br>治病、多毒、不可久服（大黄、附子、半夏）</div>
</div>
<div class="cap">按"功用与毒性"分三品，共365种——这是全书的骨架</div>
</div></div>

<div class="block"><h3><span class="badge">参</span>名家说 & 现代视角</h3>
<p class="quote">"疗寒以热药，疗热以寒药……此药之大体也。"——《神农本草经·序例》</p>
<div class="modern"><b>现代视角：</b>"三品分类"里其实蕴含了早期的<b>毒性分级与用药安全</b>思想（下品多毒、不可久服）。书中部分药效已被现代证实（麻黄平喘、大黄通便、黄连抗菌）；但也有需<b>重新评估</b>之处——如某些"上品久服轻身"的说法不可尽信（如朱砂含汞、有毒）。</div></div>

<div class="block caution"><h3><span class="badge">辨</span>别误会</h3>
<p>① 它<b>非神农亲著</b>，"神农尝百草"是传说；② "<b>上品无毒、可久服</b>"不可绝对化——古人认为无毒的部分药材，现代发现有毒（如朱砂、雄黄）；③ 古代分类是经验归纳，<b>不能照搬现代药理</b>。</p></div>

<div class="block"><h3><span class="badge">用</span>用得上</h3>
<p>理解中药"<b>分级使用、讲究配伍</b>"思想的源头：药有补养与攻治之分、有无毒与有毒之别。对"<b>久服轻身延年</b>"之类古老说法，则保持一份<b>审慎</b>——尤其矿物类药，切勿盲目久服。</p></div>

<div class="next-tip">读完标准版，你已懂"三品分类"的骨架与本经地位。想沿三品骨架深入序例总纲、代表药与现代再评估？　切「深入版」↘</div>

  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 三品分类的结构骨架</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>全书的组织框架就是"三品"：<b>上品 120 种</b>——"主养命以应天，无毒，多服久服不伤人"，重在补养延年；<b>中品 120 种</b>——"主养性以应人，无毒有毒，斟酌其宜"，补养兼治病；<b>下品 125 种</b>——"主治病以应地，多毒，不可久服"，专于攻邪治病。三者共 <b>365 种</b>，附会一年 365 日。</p>
    <p>这套分类的内核，是按<b>"功用＋毒性"</b>把药物分级——补养类无毒可常用、治病类有毒须慎用。先抓住这个骨架，再看具体药物，全书就有了纲领。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 序例：奠定药学总纲</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>书前的"序例"是全书的<b>理论总纲</b>，提出了沿用至今的核心概念：<b>四气五味</b>（寒热温凉、辛甘酸苦咸）、<b>君臣佐使</b>（组方配伍的层级）、<b>七情和合</b>（单行、相须、相使、相畏、相杀、相恶、相反）、以及采药时节、炮制、剂型、用药剂量与"<b>疗寒以热药、疗热以寒药</b>"的用药总则。</p>
    <p>可以说，第 17、19 课所学的中药与方剂基本原理，其文字源头大多在这篇序例里。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 三品中的代表药</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>上品</b>：人参（大补元气）、甘草（调和诸药）、大枣、茯苓、地黄、枸杞——多为补养常用。<b>中品</b>：当归、芍药、麻黄、葛根、黄芩——补养与治病兼具。<b>下品</b>：大黄（攻下）、附子（回阳，有毒）、半夏（化痰，有毒）、巴豆——多为峻烈攻邪之品。</p>
    <p>许多药物的<b>最早文字记载与功效描述</b>都见于此书，是后世本草不断增补的起点。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>④ 历史影响：本草的源流</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>《本经》开创的体例，被后世不断继承与扩充：南朝<b>陶弘景</b>《本草经集注》（增药、改进分类）→ 唐代<b>《新修本草》</b>（世界第一部国家药典）→ 宋代《证类本草》→ 明代<b>李时珍《本草纲目》</b>（集大成，载药近 1900 种）。一部部本草，都是站在《神农本草经》的肩膀上。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>⑤ 现代再评估 & 诚实分寸</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>用现代眼光看《本经》，要<b>一分为二</b>：一方面，许多药效经得起检验（麻黄含麻黄碱平喘、大黄含蒽醌通便、黄连含小檗碱抗菌、青蒿后来更出了青蒿素）；另一方面，部分内容需<b>修正</b>——尤其"上品无毒、久服轻身延年"之说不可尽信，<b>朱砂（含汞）、雄黄（含砷）</b>等被列为上品的矿物药，现代已知有明确毒性，绝不可久服。</p>
    <div class="modern"><b>诚实结语：</b>《神农本草经》的伟大，在于它<b>第一次为药物建立了系统</b>；而我们今天的责任，是<b>带着现代药理与毒理知识</b>去继承它——取其精华、纠其局限。这正是对待一切经典应有的态度。</p>
  </div></div>

  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 序例·药学总纲：本经的理论核心（原文）</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>《本经》正文之前的"<b>序例</b>"，是中药学的第一份"总纲"——后世四气五味、君臣佐使、七情配伍的源头都在这几句：</p>
    <p>· <b>性味</b>："<b>药有酸、咸、甘、苦、辛五味，又有寒、热、温、凉四气</b>。"——四气五味学说的最早表述。<br>· <b>三品（原文）</b>："上药一百二十种为君，<b>主养命以应天，无毒</b>，多服久服不伤人；中药一百二十种为臣，<b>主养性以应人</b>，无毒有毒，斟酌其宜；下药一百二十五种为佐使，<b>主治病以应地，多毒，不可久服</b>。三品合三百六十五种，法三百六十五度，一度应一日，以成一岁。"<br>· <b>君臣佐使</b>："药有君臣佐使，以相宣摄合和。"<b>注意</b>：本经的君臣佐使是按<b>三品</b>分（上为君、下为佐使），与后世<b>方剂学</b>"主病为君、辅君为臣"的君臣佐使<b>含义不同</b>——这是常被混淆处。<br>· <b>七情和合</b>："药有阴阳配合……有<b>单行</b>者，有<b>相须</b>者，有<b>相使</b>者，有<b>相畏</b>者，有<b>相恶</b>者，有<b>相反</b>者，有<b>相杀</b>者。凡此七情，合和视之。"——配伍七情的出处（第17、19课）。<br>· <b>用毒之法</b>："<b>若用毒药疗病，先起如黍粟，病去即止，不去倍之，不去十之，取去为度</b>。"——从小量渐加、中病即止，是极宝贵的用药安全原则。</p>
    <div class="scholar"><b>著作史（一句带过）：</b>《本经》原书早佚，赖陶弘景《本草经集注》及《证类本草》"朱墨分书"保存，清·孙星衍等辑复成今本——故文字、药数各辑本略有出入。背景知道即可，<b>重点是上面这份"总纲"讲了什么</b>。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 三品分类的思想内核与历史局限</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>三品分类（上品养命、中品养性、下品治病）的内核，是按"<b>功用＋毒性＋可服久暂</b>"对药物分级，蕴含<b>早期的用药安全分级思想</b>——下品多毒、不可久服，已是难能可贵的警觉。</p>
    <p>但它也带有鲜明的<b>历史局限与道家色彩</b>："<b>上药养命、久服轻身延年神仙</b>"的表述，明显受秦汉<b>神仙服食</b>思想影响。这一观念贻害深远——魏晋名士据"上品久服"之说服食<b>五石散（寒食散）</b>，中毒丧生者众；本经列为"上品/中品"的<b>朱砂（含汞）、雄黄（含砷）</b>，现代已知有明确毒性。可见"<b>无毒可久服</b>"之说绝不可盲从。</p>
    <div class="scholar"><b>史鉴：</b>魏晋"服石"之风与本经"上药养命"观念一脉相承——这是"<b>天然/上品即安全</b>"迷信的最早、也最惨痛的反例。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 本经药物的现代再评价</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>对《本经》药效记载，须<b>一分为二、循证审视</b>。<b>经得起检验者</b>不少：麻黄"发表出汗、止咳逆上气"（含麻黄碱，平喘）、大黄"下瘀血、荡涤肠胃"（蒽醌，泻下）、黄连"肠澼腹痛下痢"（小檗碱，抗菌）、<b>常山</b>截疟、<b>青蒿</b>（后世由此得青蒿素）——古人的观察相当精准。</p>
    <p>但也有<b>需重估或纠正者</b>：矿物药的"久服"毒性（朱砂、雄黄）、某些"轻身延年"的夸大，以及以"<b>以经解经</b>"（凡《本经》所载皆奉为定论）的研究态度之弊。正确的做法是：把《本经》视为<b>极其宝贵的经验记录与研究线索库</b>，再以现代药理、毒理逐一检验、去芜存菁。</p>
    <div class="scholar"><b>结语：</b>《本经》的伟大在于<b>首创药物的系统分类与性效记述</b>；今人之责，是带着现代科学与安全意识去<b>继承、检验与发展</b>它——这正是对待一切经典应有的理性温情。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">小结 ·</span>从读懂三品骨架，到明其辑佚来历、分类思想之局限、药效的现代取舍——对"药书之祖"就能既继承、又批判。</div>
</div>

<div class="q"><p>2. 为什么"上品可久服"的说法要审慎对待？</p><button onclick="toggleA(this)">看答案</button><div class="a">古人认为无毒的部分上品（如朱砂含汞、雄黄含砷），现代已证实有明确毒性，不可盲目久服。</div></div>
