  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 血：生成、运行与病变</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>生成</b>：水谷精微化生营气与津液，再化为血；肾精也可化血。<b>运行</b>：靠心气推动、肺气敷布、肝的疏泄、脾的统摄、脉道的约束，共同保证血"行而不溢"。</p>
    <p><b>病变四型</b>：血虚（濡养不足，面白头晕心悸）、血瘀（运行不畅，刺痛固定、舌紫暗）、血热（迫血妄行，出血、斑疹、烦热）、出血（气不摄血或血热所致）。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 津液：生成、输布、排泄</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>津液来自饮食水谷，经<b>脾</b>的运化吸收、<b>肺</b>的宣降布散、<b>肾</b>的蒸腾气化、<b>三焦</b>的通道运行、<b>膀胱</b>的排泄，完成代谢。任一环节失常，水液就出问题。</p>
    <p><b>失常两类</b>：<b>伤津</b>（不足：口干、便干、皮肤失润）；<b>水液停聚</b>（过剩：水肿、痰、饮——"积水成饮、饮凝成痰"）。所以治痰治水，常从健脾、宣肺、温肾入手。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 气、血、津液的相互关系</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>气与血</b>：气能生血、行血、摄血（气为血帅）；血能载气、养气（血为气母）。故气虚→血少或血瘀；气不摄血→出血；大失血→气随血脱。</p>
    <p><b>气与津</b>：气能生津、行津、摄津；津能载气。故气虚→水停（水肿痰饮），气不摄津→多汗多尿；大吐泻伤津→气随津脱。</p>
    <p><b>津与血</b>：津血同源、可互化。故大失血者忌再发汗（"夺血者无汗"），大伤津者忌再放血。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>④ 现代视角与调养</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>把气血津液看作"能量—血液—体液"的整体，就能理解为何中医补血常配补气、利水常配健脾、止血需兼顾气与阴。</p>
    <div class="modern"><b>调养要点：</b>血虚者，健脾养血（饮食起居规律、必要时气血双补）；津伤者，生津润燥、避免过汗过利；并牢记"过补、过攻"都会打破三者的平衡。具体方药仍需辨证，不宜自行长期进补。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">启下 ·</span>"气血"如何与"营卫"连成贯穿《伤寒》《温病》的主线？"血瘀""痰饮"两大病理在现代研究到了哪一步？切「专家版」。</div>
</div>

<div class="deepdive dd-expert expert-only">
  <div class="dd-title">专家精讲 · 教授级 <small>营卫贯通 · 血瘀研究 · 痰饮学说</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>深入版你已掌握气血津液的关系与失常。这一层<b>仍论此</b>，把它推到学术深处：营卫气血的贯通主线、血瘀证的现代研究、痰饮学说的深化。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 营卫气血的贯通</button>
    <button onclick="ddJump(this,1)">② 血瘀证的现代研究</button>
    <button onclick="ddJump(this,2)">③ 痰饮学说的深化</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 营卫气血：贯通《内经》《伤寒》《温病》的主线</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>"气血"不是孤立概念，它与<b>营卫</b>构成一个贯穿中医的层次体系：<b>营行脉中、卫行脉外</b>（《灵枢·营卫生会》），营气化血、卫气属气之剽悍者。这一层次，向上接《内经》的生理，向下成为<b>《伤寒论》调和营卫</b>（桂枝汤）与<b>温病卫气营血辨证</b>（叶天士）的理论根基。</p>
    <p>换言之，理解"气-血-营-卫-津液"这张<b>相互化生、相互为用</b>的网络（气为血帅、血为气母、津血同源、汗血同源），就握住了从基础理论到外感热病辨证的<b>一条主线</b>。"夺血者无汗、夺汗者无血"（《灵枢》）正是这一网络在治法上的禁忌表达。</p>
    <div class="scholar"><b>贯通提示：</b>把本课的"气血津液关系"与第8课经络、第15课卫气营血辨证、第27课桂枝汤合看，能体会中医理论"一以贯之"的整体性。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 血瘀证与活血化瘀：中西医结合的标杆</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>为什么"血瘀证"能被客观测量？</b>知其所以然：中医的"瘀"，本质是"<b>血行不畅、停而不行</b>"这一<b>功能态</b>，它的外现并非凭空——刺痛固定（不通则痛、痛处不移）、舌紫暗或瘀斑（血色瘀滞外见于舌）、肌肤甲错、肿块——这些都<b>对应着</b>微循环障碍、血液高黏高凝、血管内皮损伤等可测的病理。正因为"瘀"有实在的血流动力学基础，它才能被<b>血液流变学、微循环、血小板与凝血、内皮功能</b>等指标刻画。</p>
    <p>这条路由王清任《医林改错》大成，到陈可冀团队建立<b>血瘀证诊断标准</b>而系统化（获国家科技进步一等奖）。活血化瘀方（血府逐瘀汤、丹参制剂）用于冠心病、缺血性卒中、糖尿病血管并发症，机制（抗血小板、改善微循环、抗炎、保护内皮）已较明确——这是"传统证候↔现代机制"对接最成功的范例，<b>恰因为"瘀"本就指向一个有物质基础的功能态</b>。</p>
    <div class="scholar"><b>诚实边界：</b>"瘀"比现代"血栓/微循环障碍"更宽（还含离经之血、久病入络等）；活血方有出血与妊娠禁忌，并可能与抗凝/抗血小板西药叠加，须专业评估。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 痰饮学说的深化："百病多由痰作祟"</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>"痰"为何能流窜全身、致出"怪病"？</b>知其所以然：痰是<b>津液代谢失常凝聚而成的病理产物</b>，而津液本就<b>输布于周身</b>——故痰也能"随气升降、无处不到"。再加上痰是<b>有形之邪</b>，所到之处易<b>阻气机、蒙清窍、扰心神、结而成块</b>：阻于肺则咳喘、蒙清窍则眩晕昏厥、扰心神则癫狂、结于颈项则瘰疬结节。于是有"<b>百病多兼痰</b>"（朱丹溪）、"<b>怪病多痰</b>"（王隐君，创滚痰丸）之说——不是玄谈，而是"<b>可移动的病理性津液堆积</b>"这一定义的必然推论。</p>
    <p>现代视角下，"痰浊"与<b>代谢综合征、血脂异常、动脉粥样硬化、慢性炎症、增生性病变</b>多有关联，"<b>痰瘀互结</b>"对应多种慢病的复杂病理——化痰散结、痰瘀同治因此在肿瘤、代谢病中受重视。</p>
    <div class="scholar"><b>前沿与分寸：</b>"痰浊证"与脂代谢、"痰瘀互结"与动脉粥样硬化的相关研究是活跃方向，但仍多停在<b>关联</b>层面，机制尚需深究——"痰"的广义性是其解释力之源，也是其难以精确证伪之处。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">小结 ·</span>从会用三者关系辨治，到看清它们与营卫的贯通、与现代血瘀/痰饮研究的对接——气血津液就从概念变成了贯穿全书的一条主线。</div>
</div>

<div class="block quiz"><h3><span class="badge">测</span>小测</h3>
<div class="q"><p>1. "气为血之帅"包含哪三层意思？</p><button onclick="toggleA(this)">看答案</button><div class="a">气能生血、气能行血、气能摄血。</div></div>
<div class="q"><p>2. 为什么大失血的病人不宜再发汗？</p><button onclick="toggleA(this)">看答案</button><div class="a">津血同源，发汗会进一步耗伤津液与血，即"夺血者无汗"。</div></div>
</div>
`},

8:{part:"第一部 · 思维与根基（理）", title:"经络", sub:"连接全身的网络（概览）", deepCount:5, body:`
<div class="block hook"><p>如果说脏腑是各个"部门"，<b>经络就是连接它们的线路与道路</b>——气血沿着它运行，把全身连成一个整体。针灸、推拿能起效，靠的正是这套网络。</p></div>

<div class="block story"><h3><span class="badge">事</span>小故事 · "得气"与循经感传</h3>
<p>针灸时，医生讲究"<b>得气</b>"——针下出现酸、麻、胀、重的感觉，有的人还会感到一股感觉沿着特定路线<b>循行传导</b>，古称"循经感传"。这种现象被反复记录，也是判断针刺是否生效的重要标志。</p>
<p class="src">——现象见《灵枢》并被现代针灸研究反复观察</p>
<p class="moral">经络看不见、摸不着，但"得气"与循经感传是<b>实实在在可被感知和记录</b>的。它的实质仍在研究，但作为一套功能联系，它确实在起作用。</p></div>

<div class="block"><h3><span class="badge">核心</span>核心概念</h3>
<ol class="concepts">
<li><b>经络</b>＝经脉（主干）＋络脉（分支）组成的网络，运行气血、联系内外。</li>
<li><b>十二正经</b>：对应脏腑，分手足三阴三阳，气血在其中如环无端地<b>流注循环</b>。</li>
<li><b>奇经八脉</b>：以<b>任脉、督脉</b>为要，统率、调蓄十二经的气血。</li>
<li><b>腧穴</b>：经络上气血输注、可施针灸推拿的"节点"。</li>
</ol></div>

<div class="block"><h3><span class="badge">图</span>一图看懂 · 经络系统的组成</h3>
<div class="diagram">
<div style="text-align:left;font-size:14px;line-height:2;">
<div style="background:#9e3526;color:#f5edda;border-radius:8px;padding:6px 12px;display:inline-block;margin-bottom:8px;"><b>经络系统</b></div>
<div style="margin-left:14px;">├ <b>经脉</b>（主干）
<div style="margin-left:40px;color:var(--ink-soft);">├ 十二正经（手足 × 三阴三阳，络属脏腑）<br>├ 奇经八脉（任·督·冲·带·阴阳跷·阴阳维）<br>└ 十二经别（正经别行的分支）</div>
├ <b>络脉</b>（分支）
<div style="margin-left:40px;color:var(--ink-soft);">├ 十五别络 ├ 浮络 └ 孙络</div>
└ <b>连属</b>：十二经筋、十二皮部</div>
</div>
<div class="cap">经脉为纲、络脉为目，内连脏腑、外络肢节</div>
</div></div>

<div class="block"><h3><span class="badge">参</span>名家说 & 现代视角</h3>
<p class="quote">"经脉者，所以决死生、处百病、调虚实，不可不通。"——《灵枢·经脉》</p>
<p>《内经》把经络抬到极高的位置：它关乎生死、能治百病、调节虚实，关键就在一个"<b>通</b>"字。</p>
<div class="modern"><b>现代视角（诚实）：</b>经络的物质实质至今没有公认结论，曾有神经、体液、筋膜等多种假说，研究仍在进行。但作为一套<b>功能联系与体表定位系统</b>，它在针灸临床确有疗效，循经感传等现象也可被观察。我们既不神化它、也不否定它的临床价值。</div></div>

<div class="block caution"><h3><span class="badge">辨</span>别误会</h3>
<p>① 经络看不见≠不存在的功能联系；② 不要神化"打通经络""排毒"之类说法；③ 穴位不是孤立的点，而是线路上的"节点"，要在经络的整体里理解。</p></div>

<div class="block"><h3><span class="badge">用</span>用得上</h3>
<p>理解常见保健穴的道理：按揉<b>足三里</b>（胃经，健脾和胃）、<b>合谷</b>（大肠经，疏风止痛）、<b>内关</b>（心包经，宁心和胃）；也能理解症状定位，如<b>胆经</b>循行于头侧，偏头痛常与之相关。</p></div>

<div class="next-tip">读完标准版，你已懂经络是连接全身的网络、能解释保健穴与症状定位。想看清它的完整组成、十二经流注、奇经八脉与实质研究？　切「深入版」↘</div>

<div class="deepdive deep-only">
  <div class="dd-title">深入精讲 · 系统展开 <small>点目录可跳转，逐节展开</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>标准版你已握住"经络＝经脉＋络脉、运行气血、联系内外"。这一层回到同一框架讲深：系统组成、十二正经流注、奇经八脉、功能腧穴、实质研究。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 系统组成</button>
    <button onclick="ddJump(this,1)">② 十二正经与流注</button>
    <button onclick="ddJump(this,2)">③ 奇经八脉</button>
    <button onclick="ddJump(this,3)">④ 功能与腧穴</button>
    <button onclick="ddJump(this,4)">⑤ 实质的现代研究</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 经络系统的完整组成</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>经络是一个分层网络：<b>经脉</b>是纵行主干（十二正经＋奇经八脉＋十二经别）；<b>络脉</b>是横斜的分支（十五别络＋浮络＋孙络），层层细分布满全身；外连<b>十二经筋</b>（约束骨节、主司运动）与<b>十二皮部</b>（体表分区，外邪入里的门户）。</p>
    <p>这套结构"内连脏腑、外络肢节"，把孤立的部分织成一个有机整体——这正是中医"整体观"的解剖学注脚。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 十二正经的命名与流注</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>十二正经的名字由三部分拼成：<b>手/足 + 阴阳（脏腑） + 脏腑名</b>，如"手太阴肺经""足阳明胃经"。阴经属脏、行于肢体内侧；阳经属腑、行于外侧。每经都"络属"一脏一腑（互为表里）。</p>
    <p>气血在十二经中<b>如环无端地流注</b>：从手太阴肺经起，依次传到大肠、胃、脾、心、小肠……最后回到肺经，周而复始。这套循环次序，是理解"子午流注"等时间针法的基础。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 奇经八脉</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>奇经八脉（督、任、冲、带、阴跷、阳跷、阴维、阳维）不直接络属脏腑、不参与上述循环，作用是<b>统率、联络、调蓄</b>十二经的气血——像大江之外的"湖泊水库"，正经气血有余则蓄、不足则补。</p>
    <p>其中最重要的是<b>督脉</b>（行于背正中，"总督一身之阳"，为"阳脉之海"）与<b>任脉</b>（行于腹正中，"总任一身之阴"，为"阴脉之海"，主胞胎）。气功"小周天"练的就是任督二脉。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>④ 经络的功能与腧穴</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>四大功能</b>：联系内外（沟通脏腑肢节）、运行气血（濡养全身）、感应传导（针刺"得气"、循经感传）、调节平衡（"调虚实"）。</p>
    <p><b>腧穴</b>是经气输注于体表的部位，分十四经穴、经外奇穴、阿是穴。其主治有规律："<b>经脉所过，主治所及</b>"——穴位能治本经循行所过部位与所属脏腑的病。这是针灸取穴的核心逻辑。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>⑤ 经络实质的现代研究 & 诚实评估</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>关于经络"是什么"，现代有多种假说：与<b>外周神经</b>走行部分重叠、与<b>结缔组织/筋膜</b>张力网络相关、与<b>神经—体液调节</b>有关等，但都未能完全对应，<b>尚无定论</b>。</p>
    <div class="modern"><b>诚实地说：</b>针灸对某些疼痛、恶心呕吐等已有较好的循证证据（前文"证据地图"提过），但"经络"本身作为解剖实体仍未被证实。比较稳妥的理解是：它是古人对体表—脏腑功能联系的一套<b>定位与规律系统</b>，临床有用，机理待解——既不必神化，也不该轻易否定。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">启下 ·</span>经络体系究竟怎么"长"出来的（马王堆帛书的证据）？它的实质有哪些假说？针灸的循证与争议如何？切「专家版」。</div>
</div>

<div class="deepdive dd-expert expert-only">
  <div class="dd-title">专家精讲 · 教授级 <small>形成史考据 · 实质诸说 · 针灸循证</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>深入版你已掌握经络系统与腧穴规律。这一层<b>仍论经络</b>，追到学术：从帛书看其形成史、实质诸假说的证据现状、针灸的循证与争议。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 帛书与经络形成史</button>
    <button onclick="ddJump(this,1)">② 经络实质诸假说</button>
    <button onclick="ddJump(this,2)">③ 针灸的循证与争议</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 从马王堆帛书看经络体系的形成</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>1973 年马王堆汉墓出土的<b>《足臂十一脉灸经》《阴阳十一脉灸经》</b>，是早于《灵枢》的经脉文献。其中只有"<b>十一脉</b>"（缺手厥阴/心包经一脉）、各脉<b>互不相连</b>、且只言灸不言穴——这有力地证明：经络体系是<b>历史演进、逐步建构</b>而成的，从"十一脉、不相属"发展到《灵枢·经脉》的"<b>十二经、如环无端、络属脏腑</b>"的成熟系统。</p>
    <p>这一发现对理解经络至关重要：经络不是某一刻的"解剖发现"，而是古人在<b>长期针灸实践中</b>对感传、主治规律的归纳，并经理论整合（配满十二、对应脏腑阴阳、纳入气血流注）而体系化的产物。</p>
    <div class="scholar"><b>考据意义：</b>帛书"十一脉→十二经"的演变，是经络学说"<b>层累地造成</b>"的硬证据，也提示我们读经络宜重其<b>临床规律</b>、轻其"实体有无"的执念。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 经络实质：诸假说与证据现状</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>经络"是什么"，至今无定论。主要假说有：<b>神经论</b>（经络主治与神经节段、牵涉痛区有重叠）、<b>体液/血管论</b>、<b>结缔组织-筋膜论</b>（经络走行与筋膜间隙、张力传导相关，"原始经络系统/Bonghan管"等说证据薄弱）、<b>生物物理论</b>（低电阻、声光热特性，重复性存疑）。</p>
    <p>较为可靠的是<b>循经感传现象</b>的客观记录，以及<b>针刺镇痛的神经机制</b>——内源性阿片肽（内啡肽、脑啡肽）释放、脊髓"闸门控制"、下行抑制系统激活等，已有较扎实的神经生理证据。换言之：<b>针刺效应的部分机制清楚了，但"经络"作为独立解剖结构仍未被证实</b>。</p>
    <div class="scholar"><b>稳妥结论：</b>经络更可能是一套描述<b>体表-内脏功能联系与刺激反应规律</b>的"功能-定位系统"，其疗效有神经-体液机制支撑，不必等同于某条看得见的管道。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 针灸的国际化、循证与争议</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>针灸是中医走向世界最成功的部分：WHO 曾列出针灸的适应病症，美国 NIH 1997 年共识肯定其在某些疼痛、术后/化疗恶心呕吐的价值；多项 Cochrane 系统评价支持针灸用于<b>慢性疼痛（颈腰痛、骨关节炎、偏头痛预防）</b>等。</p>
    <p>但争议同样真实：许多高质量 RCT 显示<b>"真针"与"假针/安慰针"差异不大</b>（两者都优于不治疗），由此引出"针灸效应中有多少是<b>特异性穴位作用</b>、多少是<b>强安慰与神经调节的非特异效应</b>"的激烈辩论；西方还有"<b>干针（dry needling）</b>"与传统针灸的归属之争。</p>
    <div class="scholar"><b>诚实评估：</b>针灸对若干病症"有效"证据较强，但"<b>经穴特异性</b>"与作用机制仍未完全阐明。学术上应区分"<b>临床有效</b>"与"<b>机理已明</b>"——前者证据渐增，后者仍在路上。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">小结 ·</span>从会用经络理解穴位与定位，到看清它的形成史、实质之争与针灸循证——对经络就能<b>既善用、又不神化</b>。这也为针灸与后面的辨证打底。</div>
</div>

<div class="block quiz"><h3><span class="badge">测</span>小测</h3>
<div class="q"><p>1. 经络系统主要由哪两大部分组成？十二正经有何特点？</p><button onclick="toggleA(this)">看答案</button><div class="a">经脉（主干）与络脉（分支）；十二正经对应脏腑、分手足三阴三阳，气血在其中如环无端地流注循环。</div></div>
<div class="q"><p>2. 奇经八脉中最重要的两条是哪两条？各主什么？</p><button onclick="toggleA(this)">看答案</button><div class="a">督脉（总督一身之阳，阳脉之海）与任脉（总任一身之阴，阴脉之海，主胞胎）。</div></div>
</div>
`},

9:{part:"第二部 · 为什么会生病（病机）", title:"病因", sub:"六淫·七情·饮食劳逸", deepCount:4, body:`
<div class="block hook"><p>人为什么会生病？中医的回答很系统：要么<b>外面来的</b>（风寒暑湿燥火），要么<b>里面起的</b>（情绪），要么<b>吃住作息</b>出了问题。把病因理清楚，养生和治病才能有的放矢。</p></div>

<div class="block story"><h3><span class="badge">事</span>小故事 · 一场"激怒"治好的病</h3>
<p>战国名医文挚为齐闵王治病。他诊断后认定：王的病是<b>忧思郁结</b>所致，唯有用"大怒"才能冲开。于是他故意一再失礼、激怒齐王。齐王勃然大怒、起身怒斥——一怒之下，郁结竟散，病也好了。（可惜文挚因此触怒君王，付出了代价。）</p>
<p class="src">——事载《吕氏春秋·至忠》</p>
<p class="moral">这个惊险的故事说明两点：情绪（七情）能<b>致病</b>，也能<b>治病</b>；"怒胜思"正是五行情志相胜的活用。情志，是中医病因里极重的一环。</p></div>

<div class="block"><h3><span class="badge">核心</span>核心概念</h3>
<ol class="concepts">
<li><b>外因 · 六淫</b>：风、寒、暑、湿、燥、火——六种过度或反常的外界因素，从皮毛口鼻侵入人体。</li>
<li><b>内因 · 七情</b>：喜、怒、忧、思、悲、恐、惊——过激或持久，则直接伤及内脏。</li>
<li><b>不内外因 · 饮食劳逸</b>：饥饱不节、饮食不洁不当、过劳（劳力、劳神、房劳）与过逸。</li>
<li><b>病理产物再致病</b>：痰饮、瘀血——本是病的产物，又会成为新的致病因素。</li>
</ol></div>

<div class="block"><h3><span class="badge">图</span>一图看懂 · 病因三大类（陈无择"三因学说"）</h3>
<div class="diagram">
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;text-align:left;font-size:14px;">
<div style="background:rgba(158,53,38,.1);border:1px solid var(--line);border-radius:8px;padding:12px;"><b style="color:#9e3526;">外所因 · 六淫</b><br>风·寒·暑·湿·燥·火<br><span style="color:var(--ink-soft);">外界气候/邪气</span></div>
<div style="background:rgba(65,81,60,.1);border:1px solid var(--line);border-radius:8px;padding:12px;"><b style="color:#41513c;">内所因 · 七情</b><br>喜·怒·忧·思·悲·恐·惊<br><span style="color:var(--ink-soft);">情志过激</span></div>
<div style="background:rgba(168,136,78,.12);border:1px solid var(--line);border-radius:8px;padding:12px;"><b style="color:#a8884e;">不内外因</b><br>饮食·劳逸·外伤虫兽<br><span style="color:var(--ink-soft);">生活失度</span></div>
</div>
<div class="cap">宋·陈无择《三因极一病证方论》的经典分类</div>
</div></div>

<div class="block"><h3><span class="badge">参</span>名家说 & 现代视角</h3>
<p class="quote">"夫百病之生也，皆生于风寒暑湿燥火……"——《素问·至真要大论》</p>
<div class="modern"><b>现代视角：</b>六淫≈气候因素＋外感病原（细菌、病毒等）＋人体的易感性，是"外环境＋抵抗力"的综合；七情≈<b>心理社会应激</b>，今天已知长期应激会通过神经—内分泌—免疫轴影响健康。中医两千年前就把"情绪"正式列为病因，极有远见。</div></div>

<div class="block caution"><h3><span class="badge">辨</span>别误会</h3>
<p>① 六淫不等于细菌病毒——它是更宽的"致病条件＋易感体质"；② 七情人皆有之，<b>过度、持久</b>才致病；③ "虚邪贼风，避之有时"，外因重在<b>预防与避忌</b>。</p></div>

<div class="block"><h3><span class="badge">用</span>用得上</h3>
<p>认识自己的"易感邪"：动辄怕风易感冒，多是<b>表虚</b>；身体困重、舌苔厚腻，多是<b>湿</b>（常因脾虚或贪凉饮冷）。再加上有意识的<b>情绪管理</b>，就堵住了大半致病的源头。</p></div>

<div class="next-tip">读完标准版，你已会按外因/内因/不内外因给病因归类。想逐一看清六淫的"脾性"、七情如何伤脏、痰瘀如何由果变因？　切「深入版」↘</div>

<div class="deepdive deep-only">
  <div class="dd-title">深入精讲 · 系统展开 <small>点目录可跳转，逐节展开</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>标准版你已握住病因的三大类与"审证求因"。这一层回到同一框架讲深：六淫各论、七情内伤、饮食劳逸、痰饮瘀血。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 六淫各论</button>
    <button onclick="ddJump(this,1)">② 七情内伤</button>
    <button onclick="ddJump(this,2)">③ 饮食劳逸</button>
    <button onclick="ddJump(this,3)">④ 痰饮与瘀血</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 六淫各论：各有"脾气"</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>六淫各有鲜明的致病特点，记住它们就能"看症状反推病邪"：</p>
    <p><b>风</b>——"百病之长"，善行数变（游走、起病急、变化快），常带其他邪一起来（风寒、风热）。<b>寒</b>——主收引凝滞，致疼痛拘急、得温则减，易伤阳气。<b>暑</b>——纯阳之邪，炎热升散，耗气伤津、多夹湿。<b>湿</b>——重浊黏滞，致困重、分泌物秽浊、病程缠绵难愈。<b>燥</b>——干涩伤津，见口鼻干、干咳、皮肤裂。<b>火（热）</b>——炎上，耗气伤津、生风动血（出血）、易致疮痈、扰神。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 七情内伤：情绪如何伤脏</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>七情分属五脏：<b>怒伤肝、喜伤心、思伤脾、忧悲伤肺、恐惊伤肾</b>。情志过极，首先扰乱的是<b>气机</b>：</p>
    <p class="quote">"怒则气上，喜则气缓，悲则气消，恐则气下，惊则气乱，思则气结。"——《素问·举痛论》</p>
    <p>所以暴怒可致头胀、面赤甚至昏厥（气血上冲）；过思则脾气郁结、食少；惊恐过度则二便失禁（气下、气乱）。这也是为什么中医治内伤杂病，极重视<b>调情志</b>。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 饮食劳逸：最常见的"不内外因"</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>饮食</b>：饥饱不节（饿伤、撑伤脾胃）、不洁（致吐泻、寄生虫）、偏嗜（过寒伤阳、过热生火、过咸伤肾、肥甘生痰湿）。<b>劳</b>：劳力过度耗气、劳神过度伤心脾、房劳过度伤肾精。<b>逸</b>：过度安逸、久坐久卧也伤——气血不畅、脾胃呆滞、体弱多病。</p>
    <p>宋代陈无择把病因系统归为<b>外所因、内所因、不内外因</b>三类（"三因学说"），至今仍是中医病因学的框架。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>④ 痰饮与瘀血：病理产物变新病因</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>它们本是脏腑失常的<b>产物</b>，一旦形成，又会阻碍气血、成为<b>新的病因</b>，使病情复杂缠绵。</p>
    <p><b>痰饮</b>：水液代谢失常凝聚而成。稠者为痰、稀者为饮。痰不只是咳出的痰——它可随气流窜全身，故有"<b>怪病多痰</b>""百病多由痰作祟"之说（如眩晕、结节、癫狂都可能与痰相关）。<b>瘀血</b>：血行不畅或离经之血停积。特点是刺痛固定、肿块、面色晦暗、舌紫暗有瘀斑，故"<b>久病多瘀</b>"。</p>
    <div class="modern"><b>现代视角：</b>"痰""瘀"可粗略对应代谢产物堆积、微循环障碍、慢性炎症与组织增生等——这解释了为何活血化瘀、化痰散结在某些慢性病中确有价值。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">启下 ·</span>"三因学说"怎么来的、"戾气"说为何接近现代病原思想、七情的身心医学价值何在？切「专家版」。</div>
</div>

<div class="deepdive dd-expert expert-only">
  <div class="dd-title">专家精讲 · 教授级 <small>源流方法 · 病原先声 · 身心医学</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>深入版你已掌握各类病因的临床表现。这一层<b>仍论病因</b>，追到学理：三因学说与"审证求因"方法、戾气说的"病原"先声、七情学说的身心医学价值。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 三因学说与审证求因</button>
    <button onclick="ddJump(this,1)">② 戾气说与"病原"思想</button>
    <button onclick="ddJump(this,2)">③ 七情与身心医学</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 三因学说源流与"审证求因"的方法论</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>病因分类经历了演进：《内经》已分阴阳（"生于阳/生于阴"），张仲景《金匮》言"千般疢难，不越三条"（经络受邪入脏腑、四肢九窍血脉相传、房室金刃虫兽），至宋代<b>陈无择《三因极一病证方论》</b>才定型为"<b>三因</b>"（外因六淫、内因七情、不内外因）。</p>
    <p>更关键的是中医病因学独特的<b>方法论——"审证求因"（辨证求因）</b>：古代无法直接观测病原，于是<b>反过来从证候表现推断病因属性</b>（如见游走、动摇之症便推为"风"）。所以中医的"风寒湿"既是<b>致病因素</b>，更是一组<b>证候属性的命名</b>——这是理解六淫不等于具体病原的关键。</p>
    <div class="scholar"><b>方法论要点：</b>"审证求因"使中医病因带有"<b>功能-属性</b>"色彩；它指导治疗（审因论治）有效，但与现代"实证病因"（找到具体病原/致病机制）是两种不同的因果认识方式。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 从六淫到"戾气"：中医的"病原"思想</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>六淫（风寒暑湿燥火）本质是"<b>气候因素 + 外感病邪 + 体质易感</b>"的复合概念，并非单一病原。但中医并非没有"特异病原"的萌芽：明代<b>吴又可《温疫论》</b>提出"<b>戾气（杂气）</b>"——从口鼻而入、有强烈传染性、<b>一气一病</b>（特定的气引起特定的病）、且<b>有特异的脏腑定位</b>。这一思想，与两百年后确立的<b>病原微生物学说</b>惊人地接近。</p>
    <p>这说明中医病因学是<b>开放、可发展</b>的：当六淫不足以解释烈性传染病时，医家创出了更接近"病原"的"戾气"概念。这是中医面对新疾病谱时自我更新的典范。</p>
    <div class="scholar"><b>学术意义：</b>吴又可"戾气从口鼻入""一气一病"是中医传染病学（温疫学派）的奠基，比西方科赫法则早约两个世纪提出了特异性病原的猜想（虽无微观证实）。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 七情学说的身心医学价值</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>中医把情志正式列为致病内因（七情内伤），并精确描述其对气机的影响（"怒则气上、思则气结"等），这是<b>世界医学史上较早、较系统的身心医学论述</b>。它对应现代的"<b>心理应激—神经内分泌—免疫</b>"（PNI，精神神经免疫学）通路：长期应激经由 HPA 轴、自主神经影响免疫与多系统功能。</p>
    <p>更独特的是"<b>情志相胜</b>"疗法（以一种情绪矫正另一种，如"怒胜思"），张子和、朱丹溪都有以情胜情治愈顽疾的医案。这可视为<b>古代的情绪/认知干预</b>，与现代心理治疗有相通之处。</p>
    <div class="scholar"><b>现代对话：</b>七情学说为"<b>心身疾病</b>"的中医辨治（如肝郁与焦虑抑郁、应激相关消化/心血管症状）提供了理论框架，是中医颇具现代生命力的部分——但情志相胜的具体应用仍属经验，缺乏严格对照研究。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">小结 ·</span>从会辨病因，到明其方法论（审证求因）、历史先声（戾气）与现代意义（身心医学）——病因的认识就立体了。</div>
</div>

<div class="block quiz"><h3><span class="badge">测</span>小测</h3>
<div class="q"><p>1. 病因的"三因学说"把病因分为哪三类？</p><button onclick="toggleA(this)">看答案</button><div class="a">外所因（六淫）、内所因（七情）、不内外因（饮食劳逸、外伤虫兽等）。</div></div>
<div class="q"><p>2. "怒则气上、思则气结"说明了什么？</p><button onclick="toggleA(this)">看答案</button><div class="a">情志过极首先扰乱气机，不同情绪对气机有不同影响，进而伤及相应脏腑。</div></div>
</div>
`},

10:{part:"第二部 · 为什么会生病（病机）", title:"病机", sub:"邪正·虚实·痰瘀", deepCount:4, body:`
<div class="block hook"><p>同样淋一场雨，有人没事、有人病倒——差别在"<b>正气</b>"。病机，就是研究疾病"<b>为什么发生、怎样发展</b>"的内在道理。一句话抓住它：<b>正邪相争，定病之进退</b>。</p></div>

<div class="block story"><h3><span class="badge">事</span>小故事 · 吴又可与"戾气"</h3>
<p>明末大疫，尸横遍野。医家吴又可在一线观察后，大胆推翻成说：这种瘟疫不是普通的六淫，而是一种<b>"戾气"（杂气）</b>——它从<b>口鼻</b>而入、有强弱之分、且<b>一气一病</b>（特定的气引发特定的病）。他写成《温疫论》，自成一派。</p>
<p class="src">——吴又可《温疫论》（1642 年）</p>
<p class="moral">在显微镜发明之前，吴又可凭临床观察推出"特异性病原从口鼻传入"的判断，与后来的<b>病原微生物学说</b>惊人地接近。这说明：中医的病因病机认识，也在不断被实践推进、深化。</p></div>

<div class="block"><h3><span class="badge">核心</span>核心概念</h3>
<ol class="concepts">
<li><b>发病＝正邪相争</b>："正气存内，邪不可干；邪之所凑，其气必虚。"正胜则不病或病轻，邪胜则发病。</li>
<li><b>基本病机</b>三大环节：邪正盛衰（决定虚实）、阴阳失调（决定寒热）、气血津液失常。</li>
<li><b>虚实总纲</b>："邪气盛则实，精气夺则虚。"——这是判断治法（攻或补）的根本。</li>
<li><b>病势会动</b>：表里出入、寒热转化、虚实转化，疾病是一个<b>动态</b>过程。</li>
</ol></div>

<div class="block"><h3><span class="badge">图</span>一图看懂 · 正邪相争决定虚实</h3>
<div class="diagram">
<svg viewBox="0 0 360 180" xmlns="http://www.w3.org/2000/svg" font-family="STKaiti,KaiTi,serif">
<line x1="30" y1="120" x2="330" y2="120" stroke="#cbb892" stroke-width="2"/>
<circle cx="110" cy="80" r="34" fill="#41513c"/><text x="110" y="87" text-anchor="middle" fill="#f5edda" font-size="18">正气</text>
<circle cx="250" cy="80" r="34" fill="#9e3526"/><text x="250" y="87" text-anchor="middle" fill="#f5edda" font-size="18">邪气</text>
<text x="180" y="86" text-anchor="middle" fill="#5a5048" font-size="20">⚔</text>
<text x="110" y="150" text-anchor="middle" fill="#5a5048" font-size="12">正盛邪退→愈</text>
<text x="250" y="150" text-anchor="middle" fill="#5a5048" font-size="12">邪盛正衰→重</text>
<text x="180" y="168" text-anchor="middle" fill="#9e3526" font-size="12">邪盛则实 · 精夺则虚</text>
</svg>
<div class="cap">疾病的本质，是正气与邪气力量对比的动态结果</div>
</div></div>

<div class="block"><h3><span class="badge">参</span>名家说 & 现代视角</h3>
<p class="quote">"邪气盛则实，精气夺则虚。"——《素问·通评虚实论》</p>
<div class="modern"><b>现代视角：</b>"正气"可粗略理解为<b>抗病力、修复力、免疫与代偿能力</b>；"邪气"是各种致病因素。发病与否、病情轻重，取决于二者的力量对比——这与现代"<b>病原—宿主</b>"平衡、应激与代偿的思路高度一致。</div></div>

<div class="block caution"><h3><span class="badge">辨</span>别误会</h3>
<p>① 虚实说的是<b>邪正态势</b>，不是病的轻重；② "虚不受补"是真的——补法也要对证，乱补反而壅滞或助邪；③ 病机是<b>动态</b>的，实证日久可转虚，寒证可化热，不能一成不变地看。</p></div>

<div class="block"><h3><span class="badge">用</span>用得上</h3>
<p>用虚实给病情定个大方向：起病急、症状<b>拒按、有力、亢盛</b>，多属<b>实</b>（治宜祛邪）；病程久、<b>喜按、乏力、不足</b>，多属<b>虚</b>（治宜扶正）。这一步判断，决定了该"攻"还是该"补"。</p></div>

<div class="next-tip">读完标准版，你已懂"正邪相争定虚实"。想看清发病原理、虚实的变化与真假、阴阳气血失常的整合、以及病势传变？　切「深入版」↘</div>

<div class="deepdive deep-only">
  <div class="dd-title">深入精讲 · 系统展开 <small>点目录可跳转，逐节展开</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>标准版你已握住"正气存内邪不可干"与虚实总纲。这一层回到同一框架讲深：发病原理、邪正盛衰与虚实、阴阳气血失常、传变转归。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 发病原理</button>
    <button onclick="ddJump(this,1)">② 邪正盛衰与虚实</button>
    <button onclick="ddJump(this,2)">③ 阴阳气血失调</button>
    <button onclick="ddJump(this,3)">④ 传变与转归</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 发病原理：正气为主导</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>中医发病观的核心，是<b>正气主导</b>："正气存内，邪不可干"——正气充足，邪气难以入侵或入侵也能被驱除；"邪之所凑，其气必虚"——发病处往往正气先虚。</p>
    <p>但也不否定邪气的作用（如戾气、外伤，邪盛时正不虚也病）。此外，<b>体质、情志、环境、生活方式</b>都影响发病——这就是为什么同样的条件下，有人病、有人不病。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 邪正盛衰与虚实变化</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>实证</b>：邪气亢盛而正气未衰，正邪剧争——表现亢、盛、有力（高热、狂躁、便秘、剧痛拒按）。<b>虚证</b>：正气不足——表现弱、衰、不足（神疲、气短、自汗、久病体弱）。</p>
    <p><b>虚实夹杂</b>很常见（如本虚标实）；病程中还会<b>虚实转化</b>（实证耗伤正气而转虚，正虚又生痰瘀水湿等实邪）。更要警惕<b>真假</b>：真虚假实（至虚有盛候）、真实假虚（大实有羸状）——辨错则攻补颠倒，后果严重。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 阴阳失调与气血津液失常</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>这是病机的另外两大环节，前面已分别打底，这里整合成一张总图：</p>
    <p><b>阴阳失调</b>（决定寒热虚实的根，详见"阴阳"课）：阴阳偏盛（实热、实寒）、偏衰（虚热、虚寒）、互损、格拒、亡失。<b>气血津液失常</b>（详见"气""气血津液"课）：气的虚陷滞逆脱闭、血的虚瘀热与出血、津液的伤津与水停痰饮。</p>
    <p>把这三大环节（邪正、阴阳、气血津液）合起来，几乎能解释绝大多数病证的内在机理。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>④ 疾病的传变与转归</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>疾病不是静止的快照，而是会<b>演变</b>：<b>表里出入</b>（外邪由表入里＝加重，由里出表＝向愈）；<b>寒热转化</b>（寒证化热、热证转寒）；<b>虚实转化</b>（如前述）。</p>
    <p>把握病势的<b>顺逆</b>，能预判走向、提前干预——这正是后面"辨证"要训练的功夫，也呼应了《伤寒论》六经传变、《金匮》"见肝传脾"的预判智慧。</p>
    <div class="modern"><b>现代视角：</b>这是一种<b>动态、整体</b>地看待病程的思路：关注的不只是"此刻是什么病"，更是"它从哪来、要往哪去"。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">启下 ·</span>"病机十九条"是怎样的纲领？"正气"用现代话怎么说？体质如何决定病机的"从化"？切「专家版」。</div>
</div>

<div class="deepdive dd-expert expert-only">
  <div class="dd-title">专家精讲 · 教授级 <small>病机纲领 · 正气诠释 · 体质从化</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>深入版你已掌握邪正、虚实、传变的病机框架。这一层<b>仍论病机</b>，追到学理：病机十九条的方法论、正气的现代诠释（免疫稳态）、体质决定的从化学说。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 病机十九条</button>
    <button onclick="ddJump(this,1)">② 正气的现代诠释</button>
    <button onclick="ddJump(this,2)">③ 体质与从化</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① "病机十九条"的学术地位与发挥</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>《素问·至真要大论》的"<b>病机十九条</b>"（"诸风掉眩，皆属于肝；诸寒收引，皆属于肾；诸湿肿满，皆属于脾……诸痛痒疮，皆属于心/火"等）是中医病机学的<b>总纲式文献</b>——它示范了"<b>以脏腑、六气统辖众多症状</b>"的归纳方法，即"<b>审察病机、各司其属</b>"。</p>
    <p>金代<b>刘完素</b>据此撰《素问玄机原病式》，大大扩充了"火热"一类（把十九条中属火属热者发挥到极致），提出"六气皆从火化""五志过极皆为热甚"，开创了<b>寒凉派</b>——这是经典文献催生新学派的典型。</p>
    <div class="scholar"><b>方法论价值：</b>病机十九条的精神不在于死记每一条的归属，而在"<b>谨守病机、各司其属，有者求之，无者求之，盛者责之，虚者责之</b>"——这是一套<b>审证求机</b>的临床推理范式。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② "正气"的现代诠释：免疫·稳态·修复</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>"正气存内，邪不可干"是中医发病观的核心。现代多把"正气"理解为机体的<b>抗病力、自稳力与自愈/代偿力</b>的总和——涵盖<b>固有与适应性免疫、神经内分泌稳态调节、组织修复</b>等。"邪正交争"则近于<b>病原-宿主相互作用与炎症反应</b>的过程。</p>
    <p>"<b>扶正培本</b>"治法的研究因此与<b>免疫调节</b>密切相关：不少补益方药（黄芪、人参、扶正方）被报道具有调节免疫、改善化疗后骨髓抑制、增强机体反应性的作用，"扶正固本"也成为中医肿瘤辅助治疗的核心思路之一。</p>
    <div class="scholar"><b>研究方向：</b>"扶正—免疫"是中医研究的活跃领域，但须区分<b>体外/动物实验的免疫调节</b>与<b>临床获益</b>——前者证据较多，后者仍需高质量临床证据支撑。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 体质与病机的"从化"学说</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>同一种邪气，进入不同体质的人，会发生不同的病机演变，这叫"<b>从化</b>"（同气相求）：阳虚或阳盛之体易"<b>从寒化/从热化</b>"，痰湿之体易夹湿。例如同感外寒，阳虚者从寒化为少阴寒证，阳盛者可能郁而化热。</p>
    <p>这一学说把<b>体质（宿主因素）置于病机的核心</b>，解释了"同病异证、因人而异"，也是"因人制宜"的理论根据。它与现代"<b>宿主易感性、个体差异决定疾病表型</b>"的认识一致，是中医个体化医学思想的体现。</p>
    <div class="scholar"><b>贯通提示：</b>把"从化"与第22课体质、第15课六经/卫气营血的传变合看，可理解中医为何强调"<b>同样的病，治法因人而变</b>"——这正是其个体化诊疗的精髓。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">小结 ·</span>从会判虚实邪正，到明病机十九条的纲领法、正气的现代内涵、体质从化的个体化——病机就从总纲落到了可推演的层面。</div>
</div>

<div class="block quiz"><h3><span class="badge">测</span>小测</h3>
<div class="q"><p>1. 中医判断"虚证"与"实证"的总纲是哪句话？</p><button onclick="toggleA(this)">看答案</button><div class="a">"邪气盛则实，精气夺则虚"——实是邪盛、虚是正衰。</div></div>
<div class="q"><p>2. 为什么说病机是"动态"的？</p><button onclick="toggleA(this)">看答案</button><div class="a">疾病会传变与转化：表里出入、寒热转化、虚实转化，需动态地把握病势顺逆。</div></div>
</div>
`},

11:{part:"第三部 · 怎么看病（诊）", title:"四诊（一）", sub:"望与闻", deepCount:4, body:`
<div class="block hook"><p>中医没有 CT 和验血，靠什么看病？靠"<b>四诊</b>"——望、闻、问、切。本课先讲前两诊：用眼睛看、用耳鼻辨。其中"<b>望舌</b>"是中医最有特色、也最实用的一招，学会它，你就有了一面照见身体的镜子。</p></div>

<div class="block story"><h3><span class="badge">事</span>小故事 · 仲景一眼断病</h3>
<p>相传张仲景见到二十岁的才子王粲，端详片刻便说："你身上已有病根，四十岁会眉毛脱落，再半年将不治。现在服五石汤还来得及。"王粲嫌他危言耸听，没当回事。二十年后，果然眉落，又一百八十七日而亡——分毫不差。</p>
<p class="src">——事载《针灸甲乙经·序》</p>
<p class="moral">这个传说也许有夸张，但它道出望诊的精髓：高明的医生能从<b>神、色、形</b>的细微处，读出别人看不见的信息。望诊不是神通，是<b>训练有素的观察</b>。</p></div>

<div class="block"><h3><span class="badge">核心</span>核心概念</h3>
<ol class="concepts">
<li><b>四诊</b>＝望、闻、问、切，须"<b>四诊合参</b>"，不能单凭一招。</li>
<li><b>望诊</b>：望神（精神状态，判预后）、望色（面色五色主病）、望形态、重点<b>望舌</b>。</li>
<li><b>闻诊</b>：听声音（语声、呼吸、咳嗽）、嗅气味（口气、排泄物）。</li>
<li><b>望舌</b>分两看：<b>舌质</b>（淡白/红绛/紫暗）反映正气与血分，<b>舌苔</b>（薄厚、白黄、润燥、腻腐）反映邪气与胃气。</li>
</ol></div>

<div class="block"><h3><span class="badge">图</span>一图看懂 · 望舌速查</h3>
<div class="diagram">
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;text-align:left;font-size:13px;">
<div style="border:1px solid var(--line);border-radius:8px;padding:10px;"><b>舌淡白</b><br>气血不足、虚寒</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:10px;"><b>舌红/绛</b><br>有热（红轻绛重）</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:10px;"><b>舌紫暗</b><br>血瘀</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:10px;"><b>胖大齿痕</b><br>脾虚、水湿</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:10px;"><b>苔白</b><br>多属寒</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:10px;"><b>苔黄</b><br>多属热</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:10px;"><b>苔厚腻</b><br>湿、痰、食积</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:10px;"><b>苔少/无</b><br>阴津亏虚</div>
</div>
<div class="cap">舌质看正气与血，舌苔看邪气与胃气</div>
</div></div>

<div class="block"><h3><span class="badge">参</span>名家说 & 现代视角</h3>
<p class="quote">"望而知之谓之神，闻而知之谓之圣。"——《难经·六十一难》</p>
<div class="modern"><b>现代视角：</b>望诊近于现代的"<b>视诊</b>"，而舌象尤其有价值——它<b>客观、可重复、可拍照记录</b>，并与脱水、贫血、炎症、消化状态等有一定相关性，现代已有"舌象仪"做量化研究。闻气味也对应某些代谢异常（如烂苹果味与酮症）。</div></div>

<div class="block caution"><h3><span class="badge">辨</span>别误会</h3>
<p>① "一望便知"是熟能生巧，不是神通；② 必须四诊合参，单凭一诊容易误判；③ 舌象会被食物染色（蓝莓、咖啡、牛奶）和刮舌影响，看前要排除干扰。</p></div>

<div class="block"><h3><span class="badge">用</span>用得上</h3>
<p>养成每天<b>看一眼自己舌头</b>的习惯：淡白胖大有齿痕，多是脾虚有湿；红而少苔，多是阴虚有热；厚腻苔，多是湿重或积食。它是你判断当下身体状态最方便的窗口。</p></div>

<div class="next-tip">读完标准版，你已会看舌、听声。想系统掌握望神望色、望舌精讲、望排出物与闻诊？　切「深入版」↘</div>

  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 望神与望色</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>望神</b>：神是生命活力的外现，看眼神、表情、反应。<b>得神</b>（目光有神、神志清）预后好；<b>失神</b>（目暗神疲、反应迟钝）病重；<b>假神</b>（久病重病者突然"回光返照"）是危候。</p>
    <p><b>望色</b>：五色主病——<b>青</b>主肝、主寒、主痛、主瘀；<b>赤</b>主热（满面通红实热、颧红潮热为阴虚）；<b>黄</b>主脾虚、主湿（萎黄属虚、鲜黄如橘属湿热黄疸）；<b>白</b>主虚、主寒、主失血；<b>黑</b>主肾虚、主水饮、主瘀。还要分"色之常与变""善色与恶色"。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 望舌精讲：一面身体的镜子</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>看舌质</b>（舌体本身，候脏腑虚实与气血）：淡红＝正常；淡白＝气血虚或虚寒；红＝热；绛（深红）＝热入营血或阴虚火旺；紫暗或有瘀斑＝血瘀。舌形：胖大齿痕＝脾虚水湿，瘦薄＝气血/阴虚，裂纹＝阴津伤。</p>
    <p><b>看舌苔</b>（候胃气与邪气）：<b>厚薄</b>辨邪之深浅（薄苔病浅、厚苔邪盛或食积）；<b>颜色</b>白主寒、黄主热、灰黑主里证重证；<b>润燥</b>辨津液（润为津足、燥为津伤、滑为水湿）；<b>腐腻</b>辨湿、痰、食积。</p>
    <p>舌还可分区候脏腑：舌尖候心肺、舌中候脾胃、舌根候肾、两边候肝胆。舌质＋舌苔合看，信息量极大，是中医辨证的"现场证据"。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 望形态与排出物</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>望形体</b>：肥胖多痰湿、消瘦多阴虚或气血不足。<b>望姿态</b>：喜动属阳、喜静属阴；蜷卧畏寒属寒，仰卧揭被属热。<b>望局部</b>：望目（白睛黄为黄疸）、望毛发、望皮肤（斑疹、疮疡）。</p>
    <p><b>望排出物</b>：痰、涕、二便、呕吐物的色质——清稀色白多属寒，黄稠秽浊多属热。小儿还可<b>望食指络脉</b>（三关测轻重）替代脉诊。</p>

  <div class="acc-b">
    <p><b>听声音</b>：总原则——声高气粗有力属<b>实</b>、低微无力属<b>虚</b>。语言（谵语属实热扰神、郑声属虚）、呼吸（气粗为实、气微为虚、哮鸣为痰）、咳嗽（声重浊为外感、空咳少痰为阴虚）、嗳气呃逆（胃气上逆）。</p>
    <p><b>嗅气味</b>：口气酸腐为食积、臭秽为胃热；排泄物腥臭多寒、酸臭秽臭多热。某些特殊气味还提示重症（如尿臊味、烂苹果味）。</p>
    <div class="modern"><b>现代视角：</b>闻诊对应听诊与嗅诊的雏形；某些代谢病确有特征性气味，古人凭经验已有记录。</div>

  <div class="dd-bridge"><span class="lead">承上 ·</span>深入版你已掌握望闻的系统内容。这一层<b>仍论望闻</b>，追到学术：舌诊的文献发展与客观化、望神色诊精要、四诊客观化的进展与局限。</div>

  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 舌诊的文献发展与现代客观化</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>舌诊散见于《内经》《伤寒》《金匮》，但<b>系统化</b>始于元代<b>《敖氏伤寒金镜录》</b>——现存第一部舌诊专著，以图谱配验舌断证，影响深远；至清代温病学派（叶天士《温热论》"<b>辨舌验齿</b>"）把舌诊推向高峰，使之成为温病辨证的核心手段。</p>
    <p>现代舌诊是中医<b>客观化研究最成熟</b>的领域之一：通过<b>舌象数字化采集、图像处理与 AI 识别</b>，可量化舌色、苔色、苔厚、润燥等，并研究其与<b>脱水、贫血、炎症、消化功能、微循环、菌群</b>乃至某些疾病的相关性。舌苔的现代研究还涉及<b>舌苔微生物组与脱落细胞</b>。</p>
    <div class="scholar"><b>前沿：</b>"舌象仪 + 机器学习"的中医客观化已有较多成果，但标准化（光照、设备、金标准）与临床效度仍是挑战。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 望神与色诊的精要</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>望神</b>是望诊的统领——"<b>得神者昌，失神者亡</b>"。它判断的是生命活力与预后，分得神、少神、失神、<b>假神</b>（久病重病"回光返照"，是阴阳离决之兆，极具预警价值）与<b>神乱</b>。</p>
    <p><b>色诊</b>有精细法度：《内经》论面部分候（脏腑在面的分布）、五色主病，并讲究色之"<b>浮沉、清浊、微甚、散抟、泽夭</b>"十法以判病之表里、阴阳、虚实、新久、轻重。望"<b>泽夭</b>"（光泽荣润 vs 枯槁晦暗）尤能反映精气盛衰与预后——这是高水平望诊的功夫所在。</p>
    <div class="scholar"><b>现代探索：</b>面色客观化（面诊仪、色度分析）尝试量化"五色"与"泽夭"，但"神"的整体把握仍高度依赖临床经验，难以完全客观化。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 四诊客观化：进展与诚实的局限</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>把"望闻问切"变成可测量、可重复的数据，是中医现代化的重要工程：舌面诊仪、脉象仪、闻诊（气味/声音分析）、问诊量表与四诊信息融合的"<b>四诊合参智能化</b>"，是热点方向。</p>
    <p>但要诚实面对<b>三重困难</b>：一是<b>金标准缺失</b>（"证"本身缺乏独立于四诊的客观标准，难以验证仪器准确性）；二是<b>采集标准化难</b>（光照、设备、个体差异）；三是<b>医者间一致性</b>（不同医生对同一舌脉判读常有出入）。因此客观化"<b>辅助而非替代</b>"医生，是目前合理的定位。</p>
    <div class="scholar"><b>立场：</b>四诊客观化的价值在于<b>提高可重复性、积累数据、辅助教学与传承</b>，而非宣称"机器读舌即可断证"——后者尚不成立。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">小结 ·</span>从会望闻，到知舌诊如何被客观化、望神色诊的精要、客观化的边界——望闻就既能用、又看得清其科学定位。</div>
</div>

<div class="block quiz"><h3><span class="badge">测</span>小测</h3>
<div class="q"><p>1. 望舌时，舌质与舌苔各主要反映什么？</p><button onclick="toggleA(this)">看答案</button><div class="a">舌质反映正气盛衰与气血、血分情况；舌苔反映胃气与邪气（寒热、湿食痰）的深浅性质。</div></div>

12:{part:"第三部 · 怎么看病（诊）", title:"四诊（二）", sub:"问与切（脉象入门）", deepCount:4, body:`
<div class="block hook"><p>望闻之后，"<b>问</b>"是最直接的信息来源，"<b>切脉</b>"则是中医最神秘、也最被误解的一招。本课带你入门：该问什么、脉怎么搭、几种最常见的脉各代表什么。</p></div>

<div class="block story"><h3><span class="badge">事</span>小故事 · 让脉诊有章可循的人</h3>
<p>切脉这门技艺，早期全凭口传心授，难有统一标准。晋代医家<b>王叔和</b>把前人散乱的脉学整理汇编，写成中国第一部脉学专著《脉经》，确立了"<b>独取寸口</b>"的诊法、归纳出二十四种脉象——从此脉诊有了可学、可传的"教材"。</p>
<p class="src">——王叔和《脉经》</p>
<p class="moral">脉诊不是玄术，而是一门<b>可以系统学习</b>的技术。它需要大量练习，更需要与望闻问合参——绝非"一搭脉就知百病"。</p></div>

<div class="block"><h3><span class="badge">核心</span>核心概念</h3>
<ol class="concepts">
<li><b>问诊</b>：用"<b>十问歌</b>"做框架，系统地问寒热、汗、头身、二便、饮食、胸腹、睡眠、口渴、旧病等。</li>
<li><b>切诊</b>＝脉诊＋按诊（按肌肤、脘腹、腧穴）。</li>
<li><b>寸口诊法</b>：在腕后桡动脉处分<b>寸、关、尺</b>三部，分候不同脏腑（左：心肝肾；右：肺脾肾命）。</li>
<li><b>常见脉</b>：浮沉（辨表里）、迟数（辨寒热）、虚实（辨盛衰），再加滑、涩、弦、紧等。</li>
</ol></div>

<div class="block"><h3><span class="badge">图</span>一图看懂 · 寸关尺与六纲脉</h3>
<div class="diagram">
<div style="font-size:14px;text-align:left;">
<div style="display:flex;gap:6px;justify-content:center;margin-bottom:10px;">
<div style="background:#9e3526;color:#f5edda;border-radius:8px;padding:8px 16px;">寸<br><span style="font-size:11px;">左心 右肺</span></div>
<div style="background:#a8884e;color:#f5edda;border-radius:8px;padding:8px 16px;">关<br><span style="font-size:11px;">左肝 右脾</span></div>
<div style="background:#41513c;color:#f5edda;border-radius:8px;padding:8px 16px;">尺<br><span style="font-size:11px;">左肾 右肾命</span></div>
</div>
<div style="border-top:1px dashed var(--line);padding-top:10px;">
<b>浮</b>（轻取即得）→ 表证　｜　<b>沉</b>（重按方得）→ 里证<br>
<b>迟</b>（一息＜4至）→ 寒证　｜　<b>数</b>（一息＞5至）→ 热证<br>
<b>虚</b>（无力）→ 虚证　｜　<b>实</b>（有力）→ 实证
</div>
</div>
<div class="cap">三部定位、六纲定性，是脉诊入门的骨架</div>
</div></div>

<div class="block"><h3><span class="badge">参</span>名家说 & 现代视角</h3>
<p class="quote">"微妙在脉，不可不察。"——《素问·脉要精微论》</p>
<div class="modern"><b>现代视角：</b>脉象是对脉搏的<b>速率、节律、强弱、张力、流利度</b>等的综合触觉判断，部分与心率、血压、血容量、血管弹性等血流动力学指标相关。但脉诊主观性强、需长期训练，且<b>必须四诊合参</b>——现代有脉象仪试图客观化，仍在探索。</div></div>

<div class="block caution"><h3><span class="badge">辨</span>别误会</h3>
<p>① 脉诊不能"包打天下"——单凭脉象断百病并不可靠；② "悬丝诊脉"多是宫廷传说或形式；③ 脉象受运动、情绪、饮食、体位即时影响，诊脉要平静后再切。</p></div>

<div class="block"><h3><span class="badge">用</span>用得上</h3>
<p>试着给自己搭脉：三指（食中无名）轻搭腕后，感受脉的<b>快慢</b>与<b>有力无力</b>——这就是最基本的"数迟"与"虚实"。再用十问歌的框架，把自己的不适<b>系统梳理</b>一遍，看病或自我观察都更清楚。</p></div>

  <div class="acc-b">
    <p>明代张景岳的"十问歌"："一问寒热二问汗，三问头身四问便，五问饮食六胸腹，七聋八渴俱当辨，九问旧病十问因……"它是一张系统的问诊清单。</p>
    <p>每一问都有辨证意义：<b>问寒热</b>最关键——恶寒发热并见为表证，但寒不热属虚寒，但热不寒属里热，<b>寒热往来</b>属少阳；<b>问汗</b>（无汗表实、自汗气虚、盗汗阴虚）；<b>问二便</b>（便秘溏泄、尿黄清长）；<b>问饮食口味</b>（口渴喜冷属热、口淡属虚寒、口苦属肝胆热）；<b>问睡眠</b>（失眠多梦辨心肾）。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 脉诊的原理与方法</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>为何独取寸口</b>：寸口（腕后桡动脉）是手太阴肺经所过，而"<b>肺朝百脉</b>"，全身气血都汇聚于此，故一处可候全身。</p>
    <p><b>三部九候</b>：寸、关、尺三部，每部又分浮、中、沉三候，共九候。<b>诊脉要领</b>：医者平心静气（"平息"，以自己呼吸计脉至数）、三指布指（高骨定关）、用"举（轻）、按（重）、寻（不轻不重）"三种力度体察。诊脉还讲究时间（以清晨为佳）与脉的"胃、神、根"（从容和缓有力为佳脉）。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 常见脉象与主病</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>以六纲为基础，常见脉象有：<b>浮</b>（表证、虚阳外越）<b>沉</b>（里证）；<b>迟</b>（寒）<b>数</b>（热）；<b>虚</b>（虚证）<b>实</b>（实证）；<b>洪</b>（热盛）<b>细</b>（气血虚、湿）；<b>滑</b>（痰、食、孕、热）<b>涩</b>（血瘀、精伤）；<b>弦</b>（肝胆病、痛、痰饮）<b>紧</b>（寒、痛、宿食）。</p>
    <p>临床多见"相兼脉"（如浮数＝表热、沉迟＝里寒、弦细＝肝郁阴虚），需综合判读，并与症状印证。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>④ 按诊与四诊合参</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>按诊</b>：按肌肤（辨寒热、润燥、肿胀）、按脘腹（辨痛之拒按喜按、有无包块——拒按属实、喜按属虚）、按手足、按腧穴（压痛反映相关脏腑）。</p>
    <p><b>四诊合参</b>是重中之重：望闻问切各有所长、也各有局限，必须<b>互相印证、去伪存真</b>。当脉症不符时，还要judgment"舍脉从症"或"舍症从脉"。任何"只凭一招断病"的说法，都不符合中医的本意。</p>
    <div class="modern"><b>现代视角：</b>四诊合参，本质是一种<b>多源信息的交叉验证</b>，与现代临床"病史＋查体＋检查综合判断"的逻辑一致。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">启下 ·</span>脉学如何从遍诊走到二十八脉？脉诊客观化与可重复性的争议如何？问诊为何信息量最大？切「专家版」。</div>
</div>

<div class="deepdive dd-expert expert-only">
  <div class="dd-title">专家精讲 · 教授级 <small>脉学规范化 · 脉诊客观化 · 问诊价值</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>深入版你已掌握问切的系统内容。这一层<b>仍论问切</b>，追到学术：脉学源流与规范化、脉诊客观化与争议、问诊的信息论价值。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 脉学源流与规范化</button>
    <button onclick="ddJump(this,1)">② 脉诊客观化与争议</button>
    <button onclick="ddJump(this,2)">③ 问诊的信息论价值</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 脉学源流：从遍诊到二十八脉</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>脉诊经历了<b>由繁到简、由简到精</b>的规范化历程：《内经》有"<b>三部九候</b>"（遍身诊脉）与人迎寸口对比；《难经》确立"<b>独取寸口</b>"；晋·王叔和《脉经》集大成，定<b>二十四脉</b>、明确寸关尺脏腑分配，是中国第一部脉学专著；明·李时珍《<b>濒湖脉学</b>》以歌诀普及二十七脉，后增至<b>二十八脉</b>，成为后世范本。</p>
    <p>这一历程显示：脉诊不是玄虚的"天授神技"，而是<b>历代不断整理、规范、可传授</b>的临床技术——尽管其掌握仍高度依赖长期训练与体察。</p>
    <div class="scholar"><b>考据要点：</b>寸关尺的脏腑分配，历代略有出入（如右尺候命门/三焦之异），《脉经》《濒湖脉学》《诊家枢要》可互参，反映脉学内部的流派差异。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 脉诊客观化与可重复性争议</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>脉诊客观化研究已逾半世纪：用<b>压力传感器、光电容积、多普勒</b>等采集脉搏波，提取波形参数（如主波、重搏波、时域/频域特征），试图与传统脉象（浮沉迟数滑涩弦）对应，并探索与<b>血压、血管弹性、心功能</b>的关联。</p>
    <p>但脉诊面临一个尖锐问题：<b>医者间一致性（inter-rater reliability）偏低</b>——不同医生对同一患者脉象的判读常不一致，研究结论也不尽一致。这使"脉诊能独立、可靠地诊断疾病"的强主张缺乏充分证据。</p>
    <div class="scholar"><b>诚实定位：</b>脉诊作为<b>四诊之一、提供整体状态信息</b>有其价值，但"<b>凭脉断百病</b>"已被多数严肃研究证伪。脉象仪的意义在于客观记录与教学传承，而非神化脉诊。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 问诊：信息量最大的诊法</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>在四诊中，<b>问诊</b>实际提供的诊断信息量往往<b>最大</b>——这与现代临床"<b>病史采集贡献了大部分诊断信息</b>"的共识一致。"十问歌"本质是一份<b>结构化问诊清单</b>，与现代病史的"主诉、现病史、既往史"高度对应。</p>
    <p>张景岳强调"<b>问</b>"为"诊病之要领、临证之首务"。中医问诊的特色，在于围绕<b>寒热、汗、二便、饮食口味、睡眠、情志、经带</b>等系统采集，以归纳证候——这套问诊框架，至今是中医临床教学的基本功。</p>
    <div class="scholar"><b>方法论：</b>过度神化脉诊、轻视问诊，是初学常见误区；高明的辨证，恰恰是<b>问诊为主、四诊合参</b>、相互印证的结果。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">小结 ·</span>从会问会切，到知脉学的规范化历程、客观化的真实困境、问诊的信息论分量——四诊就既会用、又不迷信脉诊。</div>
</div>

<div class="block quiz"><h3><span class="badge">测</span>小测</h3>
<div class="q"><p>1. 为什么"独取寸口"就能候全身？</p><button onclick="toggleA(this)">看答案</button><div class="a">寸口为手太阴肺经所过，而"肺朝百脉"，全身气血汇聚于此，故一处可候全身。</div></div>
<div class="q"><p>2. 浮、沉、迟、数各主什么？</p><button onclick="toggleA(this)">看答案</button><div class="a">浮主表、沉主里、迟主寒、数主热。</div></div>
</div>
`},

13:{part:"第三部 · 怎么看病（诊）", title:"八纲辨证", sub:"辨证总纲", deepCount:4, body:`
<div class="block hook"><p>收集了望闻问切的一堆信息，怎么把它们拧成一个判断？第一步、也是<b>总纲</b>，就是"八纲"——把一切病证归到<b>表里、寒热、虚实、阴阳</b>八个坐标里。先定大方向，再谈细节。</p></div>

<div class="block story"><h3><span class="badge">事</span>小故事 · 八个字括尽辨证</h3>
<p>八纲的内容，早在《内经》《伤寒论》里已有雏形。明代张景岳把它提炼为"<b>二纲六变</b>"（以阴阳为两大纲，统领表里、寒热、虚实六变）；清代程钟龄在《医学心悟》里更直白地说：辨证不过"<b>寒热虚实表里阴阳</b>"八个字。近代才正式称之为"八纲"。</p>
<p class="src">——张景岳《景岳全书》、程钟龄《医学心悟》</p>
<p class="moral">把千变万化的病证，压缩成八个字——这就是中医的"<b>降维</b>"智慧。先抓住这八个坐标，再复杂的病也有了下手处。</p></div>

<div class="block"><h3><span class="badge">核心</span>核心概念</h3>
<ol class="concepts">
<li><b>表里</b>：辨<b>病位</b>的深浅（在体表经络，还是在脏腑内里）。</li>
<li><b>寒热</b>：辨<b>病性</b>（疾病的寒热属性）。</li>
<li><b>虚实</b>：辨<b>邪正</b>盛衰（正虚还是邪实）。</li>
<li><b>阴阳</b>：八纲的<b>总纲</b>——表、实、热归阳证，里、虚、寒归阴证。</li>
</ol></div>

<div class="block"><h3><span class="badge">图</span>一图看懂 · 八纲结构</h3>
<div class="diagram">
<div style="font-size:14px;text-align:center;">
<div style="background:#2b2622;color:#f5edda;border-radius:8px;padding:8px 18px;display:inline-block;margin-bottom:8px;"><b>阴阳（总纲）</b></div>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
<div style="border:1px solid var(--line);border-radius:8px;padding:10px;">病位<br><b>表 ｜ 里</b></div>
<div style="border:1px solid var(--line);border-radius:8px;padding:10px;">病性<br><b>寒 ｜ 热</b></div>
<div style="border:1px solid var(--line);border-radius:8px;padding:10px;">邪正<br><b>虚 ｜ 实</b></div>
</div>
<div style="margin-top:8px;color:var(--ink-soft);font-size:13px;">阳证＝表·热·实　　阴证＝里·寒·虚</div>
</div>
<div class="cap">阴阳统领"六变"，是辨证的总框架</div>
</div></div>

<div class="block"><h3><span class="badge">参</span>名家说 & 现代视角</h3>
<p class="quote">"善诊者，察色按脉，先别阴阳。"——《素问·阴阳应象大论》</p>
<div class="modern"><b>现代视角：</b>八纲是一套<b>降维归类法</b>——把纷繁的症状压缩到几个关键维度（病位/病性/邪正），很像临床决策中的"<b>分类树</b>"：先粗分大类，再逐层细化。它让辨证有了可操作的第一步。</div></div>

<div class="block caution"><h3><span class="badge">辨</span>别误会</h3>
<p>① 八纲之间常<b>相兼夹杂</b>（表里同病、寒热错杂、虚实夹杂）；② 有<b>真假</b>（真寒假热、真热假寒）须细辨；③ 八纲只是框架，还要结合脏腑、气血、六经等<b>具体辨证</b>才完整。</p></div>

<div class="block"><h3><span class="badge">用</span>用得上</h3>
<p>拿到一组症状，先依次问自己四个问题：病在<b>表</b>还是<b>里</b>？性属<b>寒</b>还是<b>热</b>？是<b>虚</b>还是<b>实</b>？总体偏<b>阴</b>还是偏<b>阳</b>？——这四问答完，治疗的大方向就出来了。</p></div>

<div class="next-tip">读完标准版，你已会用"四问"定大方向。想逐一吃透表里、寒热、虚实及其真假与相兼？　切「深入版」↘</div>

<div class="deepdive deep-only">
  <div class="dd-title">深入精讲 · 系统展开 <small>点目录可跳转，逐节展开</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>标准版你已握住八纲的"四问"与阴阳总纲。这一层回到同一框架讲深：表里、寒热、虚实辨证，及阴阳总纲与相兼。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 表里辨证</button>
    <button onclick="ddJump(this,1)">② 寒热辨证</button>
    <button onclick="ddJump(this,2)">③ 虚实辨证</button>
    <button onclick="ddJump(this,3)">④ 阴阳总纲与相兼</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 表里：辨病位深浅</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>表证</b>：外邪初袭体表经络，起病急、病程短，典型见恶寒发热、头身痛、苔薄、脉浮（如外感初起）。<b>里证</b>：病在脏腑、气血、骨髓，病位深、病程多较长，可由表传里、或外邪直中、或内伤而成。<b>半表半里</b>：邪在表里之间，见寒热往来（少阳证）。</p>
    <p>辨表里的意义在于<b>定治疗方向</b>：表证宜解表（汗法），里证宜清、下、温、补，半表半里宜和解——方向错了，治法全错。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 寒热：辨病性</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>寒热是疾病性质的反映，鉴别要点：<b>寒证</b>——恶寒喜暖、口不渴或喜热饮、面白肢冷、小便清长、大便稀溏、舌淡苔白、脉迟。<b>热证</b>——发热喜凉、口渴喜冷饮、面红、小便短赤、大便秘结、舌红苔黄、脉数。</p>
    <p>难点在<b>真假</b>：<b>真寒假热</b>（阴盛格阳，身热反欲盖衣、口渴喜热饮、脉大无力）、<b>真热假寒</b>（热深厥深，手足冰冷而胸腹灼热、舌红）。辨真假，要抓<b>口渴、二便、舌脉</b>等本质指标，不被表象迷惑。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 虚实：辨邪正盛衰</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>实证</b>：邪气盛而正未衰——症状亢盛有力，如壮热、狂躁、痰壅、便秘、腹痛拒按、脉实有力。<b>虚证</b>：正气不足——神疲乏力、气短、自汗盗汗、五心烦热或畏寒、腹痛喜按、脉虚无力。</p>
    <p>临床多<b>虚实夹杂</b>（本虚标实，如脾虚兼食积），并可<b>相互转化</b>；还有<b>真假</b>：真虚假实（如脾虚腹胀，胀而喜按、时作时止）、真实假虚（如热结旁流，似虚实热）。辨清虚实，是决定"<b>攻还是补</b>"的关键。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>④ 阴阳总纲与八纲相兼</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>阴阳</b>是八纲的总纲：凡表证、热证、实证，归<b>阳证</b>；凡里证、寒证、虚证，归<b>阴证</b>。临床还有"<b>亡阴、亡阳</b>"等危重证候，是阴阳极度耗损的表现。</p>
    <p>真实的病很少是单一的"纯表纯里"，多为<b>相兼</b>：表里同病、表寒里热、上热下寒、虚实夹杂……所以八纲不是贴标签，而是一套<b>多维定位</b>的坐标系。定好这套坐标，再用脏腑辨证、六经辨证去细化，辨证才算落地。</p>
    <div class="modern"><b>现代视角：</b>这相当于先做"分类诊断"（定大方向），再做"精确诊断"（定具体），层层逼近——与现代诊断思路一致。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">启下 ·</span>"八纲"之名何时才有？寒热真假怎样在脉症间取舍？八纲与现代诊断逻辑是什么关系？切「专家版」。</div>
</div>

<div class="deepdive dd-expert expert-only">
  <div class="dd-title">专家精讲 · 教授级 <small>名实考据 · 真假取舍 · 诊断逻辑</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>深入版你已掌握八纲的辨证内容。这一层<b>仍论八纲</b>，追到学理："八纲"的名实考、寒热真假与脉症取舍、八纲与现代诊断逻辑。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① "八纲"的名实考</button>
    <button onclick="ddJump(this,1)">② 寒热真假与脉症取舍</button>
    <button onclick="ddJump(this,2)">③ 八纲与诊断逻辑</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① "八纲"之名实：一个晚出的术语</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>有趣的是：八纲的<b>内容</b>很古（《内经》《伤寒论》已具表里、寒热、虚实、阴阳之辨），但"<b>八纲</b>"这个<b>名称</b>却很晚。明代张景岳明确归纳为"<b>二纲（阴阳）六变（表里寒热虚实）</b>"；"八纲辨证"作为<b>正式术语</b>，一般认为是<b>近代</b>（祝味菊《伤寒质难》等）才确立、并经现代教材规范化推广的。</p>
    <p>这是一个典型的"<b>名后于实</b>"案例：理论实质早已运用千年，术语化、教科书化却是近现代中医学科建设的产物。了解这一点，能避免把"八纲"误当成《内经》原有的固定名目。</p>
    <div class="scholar"><b>考据意义：</b>中医许多"标准术语"（八纲、脏腑辨证体系、证候要素等）是近现代<b>学科规范化</b>的成果，研究中医史须分清"实"之古与"名"之今。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 寒热虚实的真假与脉症取舍</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>八纲辨证的<b>最高难点</b>，是识别"<b>真假</b>"：真寒假热（阴盛格阳）、真热假寒（热深厥深）、真虚假实（至虚有盛候）、真实假虚（大实有羸状）。一旦辨错，<b>攻补寒热全盘颠倒</b>，后果严重。</p>
    <p>识破假象的关键，是抓<b>最可靠的本质指标</b>（口渴喜冷/喜热、二便、舌质、脉之有力无力），并在脉症矛盾时作"<b>舍脉从症</b>"或"<b>舍症从脉</b>"的判断——这是一种高级的<b>临床逻辑推理</b>：在相互矛盾的证据中，识别哪个反映本质、哪个是假象。</p>
    <div class="scholar"><b>临床箴言：</b>"<b>大实有羸状，至虚有盛候</b>"（出自明代医论）——越是危重疑难，越要透过表象抓本质，这是八纲辨证功力的试金石。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 八纲与现代诊断逻辑</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>从信息处理看，八纲是一套<b>降维分类系统</b>：把海量症状压缩到病位（表里）、病性（寒热）、邪正（虚实）、总纲（阴阳）几个正交维度，再逐层细化——这与现代临床的"<b>分类诊断→精确诊断</b>"、决策树思维高度相似。</p>
    <p>当代有学者用<b>证候要素（病位＋病性）</b>重构辨证体系（如朱文锋的"证素辨证"），试图把八纲、脏腑、六经等统一到"<b>降维（提取要素）—升阶（组合成证）</b>"的可操作框架，并探索辨证的<b>信度与效度</b>。这是辨证学走向规范化、可计算化的前沿。</p>
    <div class="scholar"><b>前沿：</b>"证素辨证""辨证量表化"试图解决传统辨证"<b>主观、难传承、难评价</b>"的问题，是中医诊断学现代化的重要尝试，但仍在发展完善中。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">小结 ·</span>从会用八纲分类，到明其名实源流、真假取舍的高级推理、与现代诊断逻辑的同构——八纲就成了真正趁手的总纲。</div>
</div>

<div class="block quiz"><h3><span class="badge">测</span>小测</h3>
<div class="q"><p>1. 八纲中，表里、寒热、虚实各辨什么？</p><button onclick="toggleA(this)">看答案</button><div class="a">表里辨病位深浅，寒热辨病性，虚实辨邪正盛衰；阴阳为总纲。</div></div>
<div class="q"><p>2. "真寒假热"该抓哪些指标识破？</p><button onclick="toggleA(this)">看答案</button><div class="a">抓本质指标：口渴喜热饮、小便清长、舌淡、脉大而无力——身热只是假象（阴盛格阳）。</div></div>
</div>
`},

14:{part:"第三部 · 怎么看病（诊）", title:"脏腑辨证", sub:"把症状串成一个故事", deepCount:5, body:`
<div class="block hook"><p>八纲定了大方向，但还不够具体——同样是"虚"，到底哪个脏虚？<b>脏腑辨证</b>就是把症状<b>落到具体的脏腑</b>，串成一个完整的病机故事。它是中医临床<b>最常用</b>的辨证方法。</p></div>

<div class="block story"><h3><span class="badge">事</span>小故事 · 咽中那块"梅核"</h3>
<p>《金匮要略》记载一种怪症："妇人咽中如有炙脔"——总觉得喉咙里堵着一块烤肉，<b>咽不下、吐不出</b>，检查却查不出东西。仲景一眼看穿：这不是咽喉的病，而是<b>肝郁气滞、痰气交阻</b>于咽，用半夏厚朴汤行气化痰，结自开。后世称此症为"梅核气"。</p>
<p class="src">——《金匮要略·妇人杂病》</p>
<p class="moral">症状在咽喉，根子却在肝与脾。脏腑辨证的精髓，就是<b>透过症状、找到失常的脏腑</b>——像侦探从线索拼出真相。</p></div>

<div class="block"><h3><span class="badge">核心</span>核心概念</h3>
<ol class="concepts">
<li><b>脏腑辨证</b>＝以脏腑为核心，确定病变的<b>部位</b>与<b>性质</b>。</li>
<li>每个脏都有几种常见<b>证型</b>（如脾：脾气虚、脾阳虚、脾不统血、寒湿困脾）。</li>
<li>脏腑常<b>相互牵连</b>，故有<b>兼证</b>（肝郁脾虚、心肾不交、肺肾两虚等）。</li>
<li>方法是把"<b>症状群 → 定位（哪个脏腑）＋定性（寒热虚实）</b>"。</li>
</ol></div>

<div class="block"><h3><span class="badge">图</span>一图看懂 · 从症状群到证（以脾气虚为例）</h3>
<div class="diagram">
<div style="font-size:14px;text-align:left;">
<div style="background:rgba(168,136,78,.12);border:1px solid var(--line);border-radius:8px;padding:10px;margin-bottom:8px;">症状群：食少腹胀 · 食后更甚 · 大便溏 · 神疲乏力 · 舌淡苔白 · 脉缓弱</div>
<div style="text-align:center;color:#9e3526;font-size:18px;">↓ 定位＋定性 ↓</div>
<div style="background:#41513c;color:#f5edda;border-radius:8px;padding:10px;margin-top:8px;text-align:center;"><b>脾气虚证</b>（病位在脾，性质属气虚）→ 治法：健脾益气（四君子汤）</div>
</div>
<div class="cap">把零散线索聚成一个"证"，治法随之而定</div>
</div></div>

<div class="block"><h3><span class="badge">参</span>名家说 & 现代视角</h3>
<p class="quote">"有诸内者，必形诸外。"——《丹溪心法》引</p>
<div class="modern"><b>现代视角：</b>脏腑辨证像把一组症状<b>聚类</b>到某个"功能系统失常模式"，再据模式施治。它是中医发展得最成熟、可操作性最强的临床辨证体系，内科杂病尤其依赖它。</div></div>

<div class="block caution"><h3><span class="badge">辨</span>别误会</h3>
<p>① 一个症状（如失眠）可见于多个脏腑，必须看<b>整组症状</b>；② 脏腑常相互影响，单一脏证少、<b>兼证多</b>；③ 脏腑辨证要与八纲、气血津液辨证结合，不可孤立。</p></div>

<div class="block"><h3><span class="badge">用</span>用得上</h3>
<p>把自己的不适按脏腑归类：长期<b>叹气＋胁胀＋情绪差</b>，多是<b>肝郁</b>；<b>食后腹胀＋乏力＋便溏</b>，多是<b>脾虚</b>；<b>心悸＋失眠＋多梦</b>，多关乎<b>心</b>。归对了类，调养与就医都更有方向。</p></div>

<div class="next-tip">读完标准版，你已会把不适按脏腑归类。想掌握"定位+定性"的辨证三步、各脏证型与兼证演练？　切「深入版」↘</div>

<div class="deepdive deep-only">
  <div class="dd-title">深入精讲 · 系统展开 <small>点目录可跳转，逐节展开</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>标准版你已会把症状粗归脏腑。这一层回到同一任务讲深：辨证思路、心肺/肝脾/肾各脏证型、兼证与综合演练。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 辨证思路</button>
    <button onclick="ddJump(this,1)">② 心与肺</button>
    <button onclick="ddJump(this,2)">③ 肝与脾</button>
    <button onclick="ddJump(this,3)">④ 肾与兼证</button>
    <button onclick="ddJump(this,4)">⑤ 综合演练</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 辨证思路：怎么"串故事"</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>三步走：① <b>定位</b>——根据症状所属脏腑的功能与"开窍、所主"来定（如心主神，失眠心悸定位心；脾主运化，纳差便溏定位脾）。② <b>定性</b>——用八纲判断寒热虚实（乏力气短为虚，胀痛拒按为实）。③ <b>合参</b>——把定位与定性合成一个完整的"证"（如"心脾两虚""肝胆湿热"）。</p>
    <p>关键是看<b>症状群</b>而非单个症状，并抓"<b>主症＋舌脉</b>"这两条最可靠的线索。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 心与肺的常见证型</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>心</b>：心气虚（心悸、气短、动则加重）、心血虚（心悸、失眠、健忘、面白）、心阴虚（心烦、潮热盗汗）、心火亢（口舌生疮、烦躁）、心脉痹阻（心胸刺痛——多含瘀、痰、寒）。</p>
    <p><b>肺</b>：肺气虚（咳喘无力、易感冒、自汗）、肺阴虚（干咳少痰、潮热）、风寒/风热/燥邪犯肺（不同性质的外感咳嗽）、痰湿阻肺（咳嗽痰多）。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 肝与脾的常见证型</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>肝</b>：肝气郁结（情志抑郁、胁胀、善太息、梅核气）、肝火上炎（头痛目赤、急躁、口苦）、肝阳上亢（眩晕、头胀、腰膝酸——上盛下虚）、肝血虚（眩晕、肢麻、视物模糊）、肝风内动（抽搐、震颤）。</p>
    <p><b>脾</b>：脾气虚、脾阳虚（虚寒，腹冷喜温）、脾气下陷（脏器下垂）、脾不统血（出血）、寒湿/湿热困脾。<b>兼证</b>典型如<b>肝郁脾虚</b>（情绪差＋腹胀便溏，肝木乘脾土）——逍遥散正为此设。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>④ 肾与脏腑兼证</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>肾</b>：肾阴虚（腰膝酸软、潮热盗汗、耳鸣）、肾阳虚（畏寒、夜尿多、性功能减退）、肾精不足（早衰、发育迟缓）、肾不纳气（动则气喘）、肾虚水泛（水肿）。</p>
    <p><b>常见兼证</b>：<b>心肾不交</b>（心火与肾水失济，见心烦失眠、腰酸）、<b>肺肾两虚</b>（久咳虚喘）、<b>肝肾阴虚</b>（眩晕耳鸣、腰膝酸、目涩）、<b>脾肾阳虚</b>（五更泄泻、畏寒水肿）。兼证最能体现脏腑之间的相生相克联系。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>⑤ 综合演练 & 现代视角</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>试解一例：患者"心悸、失眠多梦、食少、腹胀便溏、神疲、面色萎黄、舌淡、脉细弱"。<b>定位</b>：心（悸、眠差）＋脾（食少、便溏、萎黄）；<b>定性</b>：虚（乏力、舌淡脉弱）；<b>合参</b>＝<b>心脾两虚</b>，治以补益心脾（归脾汤）。这就是一个完整的脏腑辨证"故事"。</p>
    <div class="modern"><b>现代视角：</b>脏腑辨证强调"看整体模式而非单一指标"，与现代医学的"<b>综合征</b>"思维相通——都是把一组相关表现归为一个可处理的整体。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">启下 ·</span>脏腑辨证怎么形成的（中藏经、易水学派）？证候如何规范化、"证本质"研究到哪？病证结合怎么做？切「专家版」。</div>
</div>

<div class="deepdive dd-expert expert-only">
  <div class="dd-title">专家精讲 · 教授级 <small>学说源流 · 证候规范 · 病证结合</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>深入版你已能把症状群辨成脏腑证。这一层<b>仍论辨证</b>，追到学术：脏腑辨证的源流（中藏经、易水）、证候规范化与证本质、病证结合模式。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 脏腑辨证源流</button>
    <button onclick="ddJump(this,1)">② 证候规范与证本质</button>
    <button onclick="ddJump(this,2)">③ 病证结合模式</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 脏腑辨证的形成与易水学派</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>脏腑辨证的成型有清晰脉络：《内经》藏象奠基→《金匮要略》"<b>脏腑经络先后病</b>"开脏腑辨治先河→托名华佗的《<b>中藏经</b>》系统提出脏腑的<b>虚实寒热生死顺逆</b>辨证→金代<b>张元素（易水学派）</b>《脏腑标本寒热虚实用药式》把脏腑辨证与<b>脏腑用药（引经报使）</b>结合，使之臻于成熟。</p>
    <p>张元素及其弟子李东垣、王好古（易水学派）对脏腑辨证、遣药归经贡献极大——可以说，今天内科杂病以脏腑辨证为主体的格局，正是在金元时期奠定的。</p>
    <div class="scholar"><b>学派提示：</b>"易水学派"（张元素—李东垣—王好古—罗天益）重脏腑病机与脏腑用药，与"河间学派"（刘完素—张从正—朱丹溪，重火热与攻邪/滋阴）并为金元两大源流。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 证候规范化与"证本质"研究</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>为解决辨证"主观、难统一"的问题，现代开展了大规模<b>证候规范化</b>工作：制定各脏腑证型的<b>诊断标准</b>，并发展"<b>证候要素（病位＋病性）</b>"辨证（如朱文锋"证素辨证"），把复杂证型分解为可组合的基本要素。</p>
    <p>"<b>证本质（证的物质基础）</b>"研究则试图为常见证（脾气虚、肾阳虚、血瘀、肝郁等）寻找<b>客观生物学标志</b>。已有部分成果（如肾阳虚与 HPA 轴、脾虚与胃肠/能量代谢、血瘀与血液流变学），但总体上"一证对应一组确定标志物"的目标尚未实现——这正是中医基础研究的<b>核心难题</b>。</p>
    <div class="scholar"><b>困境与反思：</b>"证"是<b>动态、整体、个体化</b>的功能状态，未必能还原为固定的几个指标；证本质研究既有进展，也提示了还原论方法用于整体性概念的限度。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ "病证结合"：中西医结合的主流模式</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>当代临床最通行的，是"<b>辨病＋辨证</b>"的<b>病证结合</b>模式：先用现代医学明确<b>疾病（病）</b>诊断与分期，再用中医<b>辨证（证）</b>指导个体化用药。由此衍生"<b>同病异治</b>"（同一西医病、不同证型不同方）与"<b>异病同治</b>"（不同西医病、同一证型可同方）。</p>
    <p>支撑这一模式的，是<b>证候动物模型、证候生物标志、方证相应</b>等研究。它兼取两套医学之长——西医定病、判预后，中医辨证、调整体——成为中西医结合的主流范式，也是中医临床研究（如名中医经验的循证化）的基本框架。</p>
    <div class="scholar"><b>前沿：</b>"病-证-方-效"关联、真实世界研究、名老中医经验的数据挖掘，都是在"病证结合"框架下推进中医现代临床证据的努力方向。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">小结 ·</span>从会辨脏腑证，到明其学说源流、规范化困境与病证结合的现代范式——脏腑辨证就从"对号"升到了"明理"。</div>
</div>

<div class="block quiz"><h3><span class="badge">测</span>小测</h3>
<div class="q"><p>1. 脏腑辨证的基本方法是什么？</p><button onclick="toggleA(this)">看答案</button><div class="a">把症状群"定位（哪个脏腑）＋定性（寒热虚实）"，合成一个完整的证，再据证立法。</div></div>
<div class="q"><p>2. "肝郁脾虚"体现了五行的什么关系？</p><button onclick="toggleA(this)">看答案</button><div class="a">木乘土——肝木过亢、横克脾土，故情志不畅同时见腹胀便溏。</div></div>
</div>
`},

15:{part:"第三部 · 怎么看病（诊）", title:"其他辨证法概览", sub:"六经·卫气营血·三焦", deepCount:4, body:`
<div class="block hook"><p>除了八纲与脏腑，中医还有几套专门的辨证体系，主要用于<b>外感热病</b>（发热性、传染性疾病）。它们是为读懂《伤寒》《温病》铺路——本课做个概览，先在脑中建立一张地图。</p></div>

<div class="block story"><h3><span class="badge">事</span>小故事 · 温病学派的崛起</h3>
<p>《伤寒论》主要讲外感<b>寒</b>邪。可江南湿热、温热的疫病流行时，一味套用伤寒之法常常失效。清代医家<b>叶天士</b>另辟蹊径，提出"<b>温邪上受，首先犯肺，逆传心包</b>"，创立卫气营血辨证；吴鞠通继之著《温病条辨》、立三焦辨证——<b>温病学派</b>由此与伤寒并峙，互为补充。</p>
<p class="src">——叶天士《温热论》、吴鞠通《温病条辨》</p>
<p class="moral">医学是<b>活的</b>：面对新的疾病谱，后人不墨守经典，而是创出新的辨证体系。"<b>寒温统一</b>"，正是中医自我更新的缩影。</p></div>

<div class="block"><h3><span class="badge">核心</span>核心概念</h3>
<ol class="concepts">
<li><b>六经辨证</b>（《伤寒论》）：用于外感<b>寒</b>邪，分太阳→阳明→少阳→太阴→少阴→厥阴六个层次。</li>
<li><b>卫气营血辨证</b>（叶天士）：用于<b>温</b>热病，分卫→气→营→血，由浅入深。</li>
<li><b>三焦辨证</b>（吴鞠通）：用于温热病，分上焦→中焦→下焦，由上而下。</li>
<li>三套都在描述外感热病的<b>层次与传变</b>，各有侧重、可以互参。</li>
</ol></div>

<div class="block"><h3><span class="badge">图</span>一图看懂 · 三套辨证的"由浅入深"</h3>
<div class="diagram">
<div style="font-size:13px;text-align:left;">
<div style="margin:6px 0;"><b style="color:#9e3526;">六经</b>（伤寒）：太阳 → 阳明/少阳 → 太阴 → 少阴 → 厥阴</div>
<div style="margin:6px 0;"><b style="color:#41513c;">卫气营血</b>（温病）：卫分 → 气分 → 营分 → 血分</div>
<div style="margin:6px 0;"><b style="color:#a8884e;">三焦</b>（温病）：上焦(肺·心包) → 中焦(脾胃) → 下焦(肝肾)</div>
<div style="border-top:1px dashed var(--line);margin-top:8px;padding-top:8px;color:var(--ink-soft);">共同点：都是给外感热病"分期分层"，越往后＝病越深、越重</div>
</div>
<div class="cap">三套坐标，描述的都是"邪正交争、由表入里"的过程</div>
</div></div>

<div class="block"><h3><span class="badge">参</span>名家说 & 现代视角</h3>
<p class="quote">"温邪上受，首先犯肺，逆传心包。"——叶天士《温热论》</p>
<div class="modern"><b>现代视角：</b>这三套体系，都可看作给"<b>急性外感/感染性发热</b>"做的分期分层框架。尤其卫气营血，与感染由轻到重的过程颇可类比：卫分≈表证早期，气分≈全身炎症反应高峰，营血分≈重症（高热神昏、出血、弥散性凝血样表现）。这是帮助理解的类比，非严格等同。</div></div>

<div class="block caution"><h3><span class="badge">辨</span>别误会</h3>
<p>① 伤寒与温病<b>不是对立</b>，而是互补（"寒温统一"）；② 这几套辨证主要针对<b>外感热病</b>，不是包打一切；③ 初学先建立"由浅入深"的框架即可，不必强记条文。</p></div>

<div class="block"><h3><span class="badge">用</span>用得上</h3>
<p>理解一次发热性疾病的"<b>分期</b>"：初起怕冷发热（表/卫）→ 高热口渴（里/气）→ 若进一步神昏、出血则是病入营血、十分危重，须及时就医。也帮你知道：什么病该翻《伤寒》，什么病该读《温病》。</p></div>

<div class="next-tip">读完标准版，你已建立六经/卫气营血/三焦三套外感辨证的地图。想看清各自层次、传变与适用？　切「深入版」↘</div>

<div class="deepdive deep-only">
  <div class="dd-title">深入精讲 · 系统展开 <small>点目录可跳转，逐节展开</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>标准版你已知三套外感辨证的"由浅入深"。这一层回到同一地图讲深：六经回顾、卫气营血、三焦、寒温统一。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 六经辨证回顾</button>
    <button onclick="ddJump(this,1)">② 卫气营血辨证</button>
    <button onclick="ddJump(this,2)">③ 三焦辨证</button>
    <button onclick="ddJump(this,3)">④ 寒温统一</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 六经辨证回顾与定位</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>六经辨证（详见第 27 课《伤寒论》）主要针对外感寒邪，按三阳（太阳、阳明、少阳）三阴（太阴、少阴、厥阴）描述病位深浅与正邪盛衰。它与八纲相通：三阳多属表、热、实，三阴多属里、寒、虚。</p>
    <p>它的长处是<b>把整个病程串成可预判的阶段</b>，每经有提纲证、有主方，便于"按图索骥"地随证治之。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 卫气营血辨证（叶天士）</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>专为温热病而设，由浅入深四个层次：<b>卫分</b>（表热证：发热微恶寒、咽痛——病最浅）；<b>气分</b>（里热炽盛：壮热、大渴、汗多、苔黄）；<b>营分</b>（热入心营：身热夜甚、心烦不寐、斑疹隐隐、舌绛）；<b>血分</b>（热盛动血、耗血：出血、斑疹显露、舌深绛——病最深最危）。</p>
    <p>治疗有名训："<b>在卫汗之，到气清气，入营透热转气，入血凉血散血</b>"——不同层次，治法迥异。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 三焦辨证（吴鞠通）</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>从部位与传变着眼，把温病分为：<b>上焦</b>（手太阴肺、手厥阴心包——温病初起及逆传心包）；<b>中焦</b>（足阳明胃、足太阴脾——里热极盛或湿热困中）；<b>下焦</b>（足少阴肾、足厥阴肝——温病后期，热伤真阴、虚风内动）。</p>
    <p>它揭示温病"始上焦、终下焦"的大趋势，尤其点明<b>温病后期重在养阴</b>（"留得一分津液，便有一分生机"），与伤寒重阳气形成鲜明对照与互补。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>④ 寒温统一与各辨证法的关系</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>六经、卫气营血、三焦，加上八纲、脏腑、气血津液——它们不是互相排斥的"门派"，而是<b>从不同角度切入同一个病人</b>的工具箱：八纲定总纲，脏腑辨内伤杂病，三套热病辨证则各擅外感的不同类型与阶段。</p>
    <p>现代中医多主张"<b>寒温统一</b>"：临证时融会贯通、择优而用。学习的顺序，是先用八纲与脏腑打底，再以六经、卫气营血、三焦深化对外感热病的理解。</p>
    <div class="modern"><b>现代视角：</b>多套辨证体系并存，本质是面对复杂疾病时的<b>多模型互补</b>——没有哪一套能独自覆盖全部，合参才周全。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">启下 ·</span>"寒温之争"的历史公案如何？三套辨证彼此什么关系、能否统一？切「专家版」。</div>
</div>

<div class="deepdive dd-expert expert-only">
  <div class="dd-title">专家精讲 · 教授级 <small>寒温之争 · 体系关系 · 统一探索</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>深入版你已掌握三套外感辨证及其关系。这一层<b>仍论此</b>，追到学术：寒温之争的历史、三套体系的异同关系、辨证体系的统一探索。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 寒温之争的历史</button>
    <button onclick="ddJump(this,1)">② 三套辨证的关系</button>
    <button onclick="ddJump(this,2)">③ 辨证体系的统一探索</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① "寒温之争"的历史公案</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>温病学派的兴起，引发了中医史上著名的"<b>寒温之争</b>"：<b>伤寒派</b>认为温病不出《伤寒论》范围（如陆九芝"温病即伤寒之类"），主张以六经统温病；<b>温病派</b>（叶天士、吴鞠通、王孟英等）则认为温热病性质、传变、治法均不同于伤寒（伤寒重在祛寒护阳、温病重在清热护阴），必须另立卫气营血与三焦辨证。</p>
    <p>这场争论持续数百年，实质是<b>如何认识外感热病的本质与分类</b>。近现代多倾向"<b>寒温统一</b>"（万友生等）——承认二者各有所长、应融会贯通，针对不同性质的外感热病择优而用，而非门户对立。</p>
    <div class="scholar"><b>史学视角：</b>寒温之争推动了外感热病学的大发展；它也提示：经典（伤寒）与创新（温病）的张力，往往是学科进步的动力。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 六经·卫气营血·三焦的关系辨析</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>三套外感辨证体系既有<b>共性</b>（都描述邪正交争、由表入里/由浅入深的层次传变），也有<b>分工</b>：六经主外感<b>寒</b>邪、兼及杂病，纵贯表里阴阳；卫气营血主温热病的<b>由表入里、由功能到血分</b>；三焦主温病的<b>由上而下、定位脏腑与判断阶段</b>（尤重后期护阴）。</p>
    <p>三者可<b>交叉互参</b>：如卫分≈太阳表证，气分≈阳明里热，营血分则是伤寒所略而温病所详的"热入心营、动血耗血"阶段。临证常综合运用，而非拘守一套。能辨明三者的<b>适用边界与对应关系</b>，是温病学进阶的标志。</p>
    <div class="scholar"><b>难点：</b>三焦辨证与卫气营血辨证在温病中常<b>纵横交织</b>（卫气营血定深浅、三焦定部位），二者结合方能完整把握温病的时空演变。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 辨证体系的多元与统一探索</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>中医现存多套辨证方法（八纲、脏腑、气血津液、六经、卫气营血、三焦、经络、病因辨证），各有源流与适用，初学易感"<b>方法林立、无所适从</b>"。这引出一个根本问题：能否建立<b>统一的辨证体系</b>？</p>
    <p>当代有重要尝试：以"<b>证候要素</b>"为基本单元（病位类＋病性类），通过"<b>降维（提取要素）—升阶（组合成证）</b>"把各套辨证<b>整合为一个可操作、可计算</b>的框架（朱文锋"证素辨证"为代表）；也有主张以八纲为总纲统领诸法。统一化尚未完成，但代表了辨证学走向<b>规范化、智能化</b>的方向。</p>
    <div class="scholar"><b>反思：</b>辨证方法的多元，根源在于中医面对不同疾病谱时<b>不断创造适配工具</b>；统一化追求严谨与可传承，但也须警惕削足适履、丢失各体系的临床智慧。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">小结 ·</span>从会用三套辨证，到明寒温之争、体系关系与统一化探索——外感辨证的全局就清楚了，也为读《伤寒》《温病》铺好路。</div>
</div>

<div class="block quiz"><h3><span class="badge">测</span>小测</h3>
<div class="q"><p>1. 卫气营血辨证的四个层次由浅入深是什么？</p><button onclick="toggleA(this)">看答案</button><div class="a">卫分 → 气分 → 营分 → 血分，越往后病越深越重。</div></div>
<div class="q"><p>2. "寒温统一"是什么意思？</p><button onclick="toggleA(this)">看答案</button><div class="a">伤寒与温病的辨证体系不对立、而互补，临证应融会贯通、择优而用。</div></div>
</div>
`},

16:{part:"第四部 · 怎么治（法·方·药）", title:"治则治法·八法", sub:"汗吐下和温清消补", deepCount:4, body:`
<div class="block hook"><p>辨证辨清了，接下来就是"<b>怎么治</b>"。中医的治疗，有总原则（<b>治则</b>）也有具体方法（<b>治法</b>）。最经典的治法，是清代程钟龄归纳的"<b>八法</b>"——汗、吐、下、和、温、清、消、补，八个字几乎囊括了一切治疗手段。</p></div>

<div class="block story"><h3><span class="badge">事</span>小故事 · 八个字尽治百病</h3>
<p>清代医家程钟龄在《医学心悟》中，把繁复的中医学问浓缩成一段口诀："论病之原，以<b>内伤外感</b>四字括之；论病之情，则以<b>寒热虚实表里阴阳</b>八字统之；而治病之方，则又以<b>汗、和、下、消、吐、清、温、补</b>八法尽之。"</p>
<p class="src">——程钟龄《医学心悟》</p>
<p class="moral">病因四字、辨证八字、治法八法——中医的临床骨架，竟能被提炼得如此简洁。记住这三组字，你就握住了从"看病"到"开方"的主线。</p></div>

<div class="block"><h3><span class="badge">核心</span>核心概念</h3>
<ol class="concepts">
<li><b>治则</b>（总原则）：治病求本、标本缓急、扶正祛邪、调整阴阳、<b>因人因地因时</b>制宜。</li>
<li><b>正治与反治</b>：多数情况"寒者热之、热者寒之"（正治）；少数假象时"热因热用、寒因寒用"（反治，治其真本质）。</li>
<li><b>八法</b>：汗（解表）、吐（涌吐）、下（泻下）、和（和解）、温（温里）、清（清热）、消（消导）、补（补益）。</li>
<li>治法服从治则——<b>法随证立、方从法出</b>。</li>
</ol></div>

<div class="block"><h3><span class="badge">图</span>一图看懂 · 八法一览</h3>
<div class="diagram">
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;text-align:left;font-size:13px;">
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>汗法</b><br>发汗解表（表证）</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>吐法</b><br>涌吐（痰食在上）</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>下法</b><br>泻下通便（里实）</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>和法</b><br>和解（半表半里、调和）</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>温法</b><br>温里散寒（里寒）</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>清法</b><br>清热（里热）</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>消法</b><br>消食化积、消癥（积滞）</div>
<div style="border:1px solid var(--line);border-radius:8px;padding:9px;"><b>补法</b><br>补益（虚证）</div>
</div>
<div class="cap">八法对应八类病情，可单用、可合用</div>
</div></div>

<div class="block"><h3><span class="badge">参</span>名家说 & 现代视角</h3>
<p class="quote">"治病必求于本。"——《素问·阴阳应象大论》</p>
<div class="modern"><b>现代视角：</b>治则像治疗的<b>策略</b>（对因 / 对症 / 扶助机体），八法像治疗的<b>手段分类</b>。"治病求本"强调找根源，"标本缓急"则承认急症先治标——这与现代"既要病因治疗、也要对症支持"的临床思路完全一致。</div></div>

<div class="block caution"><h3><span class="badge">辨</span>别误会</h3>
<p>① "治本"不排斥"急则治标"——大出血、剧痛等先治标救急；② 八法常<b>合用</b>（如表里同病用汗下并行）；③ 补法并非人人适宜，"虚不受补""误补益疾"都是教训。</p></div>

<div class="block"><h3><span class="badge">用</span>用得上</h3>
<p>看懂常见治法名词：发汗解表＝<b>汗法</b>，通便泻热＝<b>下法</b>，和解少阳/调和肝脾＝<b>和法</b>，温阳散寒＝<b>温法</b>，清热泻火＝<b>清法</b>，消食化积＝<b>消法</b>，补气养血＝<b>补法</b>。下次看方子，先认它用的是哪一法。</p></div>

<div class="next-tip">读完标准版，你已认识治则与八法的名目。想吃透反治法的逻辑、八法的进阶与配合、治未病三层次？　切「深入版」↘</div>

  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 治则总纲</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>治病求本</b>：抓主要矛盾、治根本病机。<b>标本缓急</b>："急则治其标、缓则治其本、标本兼治"——大出血先止血（标），血止后再补虚（本）。<b>正治反治</b>：正治即逆病性而治（寒者热之）；反治即顺假象而治其真（如真热假寒用寒药，"寒因寒用"）。</p>
    <p><b>治未病</b>：未病先防、既病防变（"见肝实脾"）。<b>三因制宜</b>：因人（体质、年龄、性别）、因时（季节气候）、因地（地域水土）灵活调整——同病未必同治。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 扶正与祛邪</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>一切治疗，不外"扶助正气"与"祛除邪气"两条路。<b>扶正</b>（补法为主）用于虚证；<b>祛邪</b>（汗吐下清消等）用于实证。</p>
    <p>二者如何用，看邪正态势：纯虚则补、纯实则攻；<b>虚实夹杂</b>则需权衡——可<b>攻补兼施</b>，或<b>先攻后补、先补后攻</b>。原则是"祛邪不伤正、扶正不留邪"。这正是为什么辨清虚实（上一部）如此重要。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 八法详解</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>汗法</b>：开泄腠理、发汗祛表邪，治表证（麻黄汤、桂枝汤）。<b>吐法</b>：涌吐停积在上的痰、食、毒（今少用）。<b>下法</b>：泻下通便、荡涤里实（承气汤）。<b>和法</b>：和解少阳、调和肝脾肠胃（小柴胡汤、逍遥散）。</p>
    <p><b>温法</b>：温里散寒、回阳（理中汤、四逆汤）。<b>清法</b>：清热泻火、凉血解毒（白虎汤、黄连解毒汤）。<b>消法</b>：消食导滞、化痰消癥（保和丸）。<b>补法</b>：补益气血阴阳（四君、四物、六味地黄）。每法都有<b>适应与禁忌</b>，如汗法忌于表虚自汗、津亏者，下法忌于虚证、孕妇。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>④ 八法的配合运用</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>临床很少单用一法。常见配合：<b>汗下并用</b>（表里同病）、<b>温清并用</b>（寒热错杂）、<b>攻补兼施</b>（虚实夹杂，如增液承气汤滋阴＋通下）、<b>消补兼施</b>（脾虚食积，如健脾丸）。</p>
    <p>程钟龄说"一法之中、八法备焉，八法之中、百法备焉"——八法是骨架，临证灵活组合，才生出千变万化的治法。</p>
    <div class="modern"><b>现代视角：</b>这相当于把治疗手段<b>模块化</b>，再按病情组合——既有标准化的"法"，又保留个体化的"变"，是中医临床的弹性所在。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">启下 ·</span>反治法（热因热用等）的逻辑何在？八法如何源流与进阶？"治未病"怎样现代转化？切「专家版」。</div>

  <div class="dd-bridge"><span class="lead">承上 ·</span>深入版你已掌握治则与八法。这一层<b>仍论治法</b>，追到精微：正治反治的辨证逻辑、八法的源流与进阶、治未病的现代转化。</div>

    <button onclick="ddJump(this,2)">③ 治未病的现代转化</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 正治与反治：治法中的辩证逻辑</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>"治病求本"在治法上的精微体现，是<b>正治与反治</b>。正治（逆治）顺常理——寒者热之、热者寒之。<b>反治（从治）</b>则顺假象而治其真，有四：<b>热因热用</b>（真寒假热，以热药治"热"象）、<b>寒因寒用</b>（真热假寒）、<b>塞因塞用</b>（以补开塞，如气虚便秘用补气而通）、<b>通因通用</b>（以通治通，如食积腹泻用消导攻下）。</p>
    <p>反治的本质，仍是<b>针对疾病本质（本）而非表象（标）</b>——它要求医者透过假象、直取病机，是治法层面"治病求本"的高级运用，也最能体现中医的辩证思维。</p>
    <div class="scholar"><b>逻辑要点：</b>"塞因塞用""通因通用"看似矛盾，实则提醒：相同的症状（便秘/腹泻）可由相反的病机（虚/实）导致，治法须随病机而非症状定——这是辨证论治区别于"对症下药"的关键。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 八法的源流与每法的进阶</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>八法之"实"散见于《内经》《伤寒》，但<b>系统提炼为"八法"</b>归功于清代程钟龄《医学心悟》。每一法内部都有<b>精细的进阶</b>：如<b>下法</b>分寒下（大承气）、温下（大黄附子汤）、润下（麻子仁丸）、逐水（十枣汤）、攻补兼施（增液承气）；<b>汗法</b>分辛温、辛凉、扶正解表；<b>补法</b>分补气血阴阳、峻补缓补、平补清补。</p>
    <p>程氏更指出八法常<b>相兼并用</b>："一法之中、八法备焉，八法之中、百法备焉"——临证是八法的灵活组合（汗下并用、温清并用、消补兼施），由此生出万千治法。</p>
    <div class="scholar"><b>研习提示：</b>掌握八法，不在背名目，而在理解每法的<b>适应病机、代表方、禁忌与配合</b>——这是从"识方"到"组方"的桥梁。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ "治未病"的三层次与现代转化</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>"治未病"是中医治则的最高境界，含<b>三个层次</b>：<b>未病先防</b>（养生防病，对应现代一级预防）、<b>既病防变</b>（早期干预、防止传变，如"见肝实脾"，对应早诊早治）、<b>瘥后防复</b>（病后调理、防止复发，对应康复与二级预防）。</p>
    <p>这套思想与现代<b>预防医学、健康管理、慢病管理</b>高度契合，也是中医"<b>治未病</b>"科室、体质辨识与干预的理论依据。它把医学重心从"治已病"前移到"防未病"，在慢病时代尤显价值。</p>
    <div class="scholar"><b>现代定位：</b>"治未病"是中医最具<b>公共卫生与预防医学</b>意义的理念之一，但其具体干预（如膏方进补、节气调养）的预防效果仍需更多循证支持，宜倡导而不夸大。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">小结 ·</span>从会用八法，到明反治的辩证逻辑、八法的源流进阶、治未病的现代意义——治法就从"招式"升到了"心法"。</div>
</div>

<div class="block quiz"><h3><span class="badge">测</span>小测</h3>
<div class="q"><p>1. "八法"具体指哪八法？</p><button onclick="toggleA(this)">看答案</button><div class="a">汗、吐、下、和、温、清、消、补。</div></div>
<div class="q"><p>2. "急则治标，缓则治本"说明了什么治则？</p><button onclick="toggleA(this)">看答案</button><div class="a">标本缓急——危急的标症先处理（如止血、止痛），缓解后再图治根本。</div></div>
</div>
`},

17:{part:"第四部 · 怎么治（法·方·药）", title:"中药入门", sub:"四气五味与归经", deepCount:4, body:`
<div class="block hook"><p>中药为什么能治病？不是靠"以形补形"的玄想，而是靠每味药的"<b>性格</b>"——寒热温凉、辛甘酸苦咸、走哪条经。掌握这套"<b>药性语言</b>"，才能真正看懂一张方子。</p></div>

<div class="block story"><h3><span class="badge">事</span>小故事 · 李时珍亲尝曼陀罗</h3>
<p>为了辨明药物真伪与功效，明代李时珍不满足于抄录旧书，常常<b>亲赴山野、亲口尝验</b>。他听闻"曼陀罗花"能令人麻醉发笑，便亲自试服，验证它"<b>笑采酿酒饮，令人笑；舞采酿酒饮，令人舞</b>"的麻醉之性，并记入《本草纲目》。</p>
<p class="src">——李时珍《本草纲目》</p>
<p class="moral">一部《本草纲目》收药近两千种，背后是这种<b>亲历亲验</b>的求实精神。学中药，正该有这份"不轻信、重验证"的态度。</p></div>

<div class="block"><h3><span class="badge">核心</span>核心概念</h3>
<ol class="concepts">
<li><b>四气</b>（四性）：寒、热、温、凉——反映药物对寒热证的作用方向（外加不温不凉的"平"）。</li>
<li><b>五味</b>：辛（散、行）、甘（补、和、缓）、酸（收、涩）、苦（泄、燥）、咸（软坚、下）——各有功能。</li>
<li><b>归经</b>：药物作用的脏腑经络<b>定位</b>（如桔梗归肺经）。</li>
<li><b>升降浮沉</b>：药势的趋向（升提、下降、发散、收敛）。</li>
</ol></div>

<div class="block"><h3><span class="badge">图</span>一图看懂 · 四气五味</h3>
<div class="diagram">
<div style="font-size:14px;text-align:left;">
<div style="margin-bottom:8px;"><b style="color:#9e3526;">四气</b>　寒↔凉（治热证）｜温↔热（治寒证）｜平（偏性不显）</div>
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:6px;">
<div style="border:1px solid var(--line);border-radius:8px;padding:8px;"><b>辛</b> 发散行气血<br><span style="color:var(--ink-soft);">麻黄·生姜</span></div>
<div style="border:1px solid var(--line);border-radius:8px;padding:8px;"><b>甘</b> 补益和中<br><span style="color:var(--ink-soft);">甘草·大枣</span></div>
<div style="border:1px solid var(--line);border-radius:8px;padding:8px;"><b>酸</b> 收敛固涩<br><span style="color:var(--ink-soft);">五味子·乌梅</span></div>
<div style="border:1px solid var(--line);border-radius:8px;padding:8px;"><b>苦</b> 泄热燥湿<br><span style="color:var(--ink-soft);">黄连·大黄</span></div>
<div style="border:1px solid var(--line);border-radius:8px;padding:8px;"><b>咸</b> 软坚泻下<br><span style="color:var(--ink-soft);">芒硝·牡蛎</span></div>
</div>
</div>
<div class="cap">气定寒热、味定功能，再加归经定位</div>
</div></div>

<div class="block"><h3><span class="badge">参</span>名家说 & 现代视角</h3>
<p class="quote">"疗寒以热药，疗热以寒药。"——《神农本草经》</p>
<div class="modern"><b>现代视角：</b>四气大体对应药物的作用方向（不少寒凉药有抗炎、镇静、降温作用）；五味部分与化学成分相关（辛味多含挥发油、酸味多含有机酸、苦味多含生物碱或苷）；归经则是历代积累的<b>作用靶向经验</b>。这套体系是经验的高度归纳，部分已被现代药理印证，部分仍待研究。</div></div>

<div class="block caution"><h3><span class="badge">辨</span>别误会</h3>
<p>① "以形补形"（吃啥补啥）多不可靠；② "是药三分毒"，中药需<b>辨证使用</b>；③ <b>天然 ≠ 安全</b>——部分中药有毒性（如附子、马兜铃酸类），有配伍与剂量禁忌，切勿自行乱用。</p></div>

<div class="block"><h3><span class="badge">用</span>用得上</h3>
<p>学会读"药性标签"：生姜<b>辛温</b>（散寒）、菊花<b>甘苦微寒</b>（清肝）、黄芪<b>甘温</b>（补气）。再用这套眼光看食物的寒热：西瓜、绿豆偏<b>寒</b>，羊肉、桂圆偏<b>温</b>——体质偏寒者就该少贪寒凉。</p></div>

<div class="next-tip">读完标准版，你已会读"药性标签"。想吃透四气、五味、归经升降浮沉，以及用药安全？　切「深入版」↘</div>

  <div class="dd-bridge"><span class="lead">承上 ·</span>标准版你已认识四气五味与归经。这一层回到同一框架讲深：四气、五味、归经与升降浮沉、用药安全。</div>
