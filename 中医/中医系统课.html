<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>岐黄入门 · 中医系统课</title>
<style>
  :root{
    --paper:#efe5d0;        /* 宣纸底 */
    --paper-2:#e7d9bd;      /* 略深宣纸 */
    --paper-card:#f5edda;   /* 卡片纸 */
    --ink:#2b2622;          /* 墨黑 */
    --ink-soft:#5a5048;     /* 淡墨 */
    --cinnabar:#9e3526;     /* 朱砂红 */
    --cinnabar-2:#b5442e;
    --seal:#a8362a;         /* 印章红 */
    --pine:#41513c;         /* 松烟墨绿 */
    --pine-2:#586b50;
    --gold:#a8884e;         /* 旧金 */
    --line:#cbb892;
    --shadow:rgba(60,45,25,.18);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:"Songti SC","SimSun","Noto Serif CJK SC","Source Han Serif SC",serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 20% 10%, rgba(255,255,255,.25), transparent 40%),
      repeating-linear-gradient(0deg, rgba(160,130,80,.03) 0 2px, transparent 2px 28px),
      var(--paper);
    line-height:1.85;
    -webkit-font-smoothing:antialiased;
  }
  /* ===== 布局 ===== */
  .wrap{display:flex;min-height:100vh;}
  /* ===== 侧栏：卷轴目录 ===== */
  #sidebar{
    width:300px;flex:0 0 300px;
    background:
      linear-gradient(180deg, var(--paper-2), #ddcaa6);
    border-right:2px solid var(--line);
    box-shadow:inset -6px 0 14px -10px var(--shadow);
    height:100vh;position:sticky;top:0;overflow-y:auto;
    padding:0 0 40px;
  }
  .brand{
    text-align:center;padding:26px 16px 18px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#e9d9b6,#e3d0aa);
  }
  .brand .seal{
    display:inline-block;font-family:"STKaiti","KaiTi","Kaiti SC",serif;
    background:var(--seal);color:#f5edda;border-radius:8px;
    font-size:13px;letter-spacing:3px;padding:4px 9px;margin-bottom:10px;
    box-shadow:0 1px 0 rgba(0,0,0,.15);
  }
  .brand h1{
    font-family:"STKaiti","KaiTi","Kaiti SC",serif;
    font-size:30px;margin:2px 0 4px;letter-spacing:6px;color:var(--ink);
  }
  .brand .sub{font-size:12px;color:var(--ink-soft);letter-spacing:2px;}
  /* 版本切换 */
  .ver-box{padding:14px 18px 4px;}
  .ver-box .lab{font-size:11px;color:var(--ink-soft);letter-spacing:2px;margin-bottom:6px;font-family:"STKaiti","KaiTi",serif;}
  .ver-switch{display:flex;border:1px solid var(--cinnabar);border-radius:8px;overflow:hidden;}
  .ver-switch button{
    flex:1;font-family:"STKaiti","KaiTi",serif;font-size:14px;letter-spacing:2px;
    border:none;background:transparent;color:var(--cinnabar);padding:7px 0;cursor:pointer;transition:.15s;
  }
  .ver-switch button.on{background:var(--cinnabar);color:#f5edda;}
  .ver-box .hint{font-size:11px;color:var(--ink-soft);margin-top:6px;line-height:1.5;}
  /* 分档显隐：深入(deep)与专家(expert)逐层叠加 */
  .deep-only{display:none;}
  body.deep .deep-only, body.expert .deep-only{display:block;}
  .expert-only{display:none;}
  body.expert .expert-only{display:block;}
  .block.deep-block{
    position:relative;border:1px solid var(--pine-2);border-left:5px solid var(--pine);
    background:rgba(65,81,60,.06);border-radius:0 10px 10px 0;padding:18px 22px 14px;
  }
  .block.deep-block::after{
    content:"深入";position:absolute;top:14px;right:16px;font-size:11px;letter-spacing:2px;
    color:#f5edda;background:var(--pine);border-radius:5px;padding:2px 8px;font-family:"STKaiti","KaiTi",serif;
  }
  .block.deep-block > h3{color:var(--pine);}
  .block.deep-block .badge{background:var(--pine);}
  /* 标题下版本标签 */
  .ver-tag-line{margin:-2px 0 4px;}
  .vt{display:inline-block;font-family:"STKaiti","KaiTi",serif;font-size:13px;letter-spacing:1px;border-radius:6px;padding:3px 12px;}
  .vt-std{background:rgba(158,53,38,.12);color:var(--cinnabar);border:1px solid var(--line);}
  .vt-deep,.vt-expert{display:none;}
  .vt-deep{background:var(--pine);color:var(--paper-card);}
  .vt-expert{background:#2b2622;color:var(--gold);}
  body.deep .vt-std{display:none;} body.deep .vt-deep{display:inline-block;}
  body.expert .vt-std{display:none;} body.expert .vt-expert{display:inline-block;}
  /* 深入精讲（折叠式 + 课内小目录） */
  .deepdive{margin:34px 0 12px;border:1px solid var(--pine);border-radius:10px;background:rgba(65,81,60,.05);overflow:hidden;}
  .dd-title{background:var(--pine);color:var(--paper-card);font-family:"STKaiti","KaiTi",serif;letter-spacing:3px;font-size:16px;padding:11px 18px;display:flex;align-items:center;gap:10px;}
  .dd-title small{font-family:"Songti SC",serif;letter-spacing:1px;font-size:12px;opacity:.85;}
  .dd-toc{display:flex;flex-wrap:wrap;gap:8px;padding:14px 16px;border-bottom:1px dashed var(--line);}
  .dd-toc button{font-family:"STKaiti","KaiTi",serif;font-size:13px;letter-spacing:1px;background:var(--paper-card);border:1px solid var(--line);color:var(--pine);border-radius:6px;padding:5px 11px;cursor:pointer;transition:.15s;}
  .dd-toc button:hover{background:rgba(65,81,60,.14);}
  .acc{border-bottom:1px solid var(--line);margin:0 14px;}
  .acc:last-child{border-bottom:none;}
  .acc-h{width:100%;text-align:left;background:transparent;border:none;cursor:pointer;font-family:"STKaiti","KaiTi",serif;font-size:16px;letter-spacing:1px;color:var(--ink);padding:14px 4px;display:flex;justify-content:space-between;align-items:center;gap:12px;}
  .acc-h:hover{color:var(--pine);}
  .acc-h .ico{font-family:"Songti SC",serif;color:var(--pine);font-size:20px;line-height:1;flex:0 0 auto;transition:transform .2s;}
  .acc.open .acc-h .ico{transform:rotate(45deg);}
  .acc-b{display:none;padding:0 6px 18px;}
  .acc.open .acc-b{display:block;}
  .acc-b p{margin:10px 0;}
  .acc-b .rx{display:inline-block;background:rgba(158,53,38,.1);border:1px solid var(--line);color:var(--cinnabar);border-radius:6px;padding:1px 8px;font-family:"STKaiti","KaiTi",serif;font-size:14px;}
  /* 专家精讲：墨黑+鎏金，区别于深入精讲 */
  .dd-expert{border-color:#2b2622;background:rgba(43,38,34,.05);}
  .dd-expert .dd-title{background:#2b2622;color:var(--gold);}
  .dd-expert .dd-title small{color:#e7d9bd;}
  .dd-expert .dd-toc button{color:#7a5c1e;border-color:var(--line);}
  .dd-expert .dd-toc button:hover{background:rgba(168,136,78,.16);}
  .dd-expert .acc-h:hover{color:var(--gold);}
  .dd-expert .acc-h .ico{color:var(--gold);}
  .acc-b .scholar{background:rgba(43,38,34,.06);border:1px dashed #8a7a55;border-radius:8px;padding:10px 14px;margin-top:10px;font-size:14px;}
  .acc-b .scholar b{color:#7a5c1e;}
  /* 三档之间的"桥接"：承上启下 */
  .dd-bridge{font-size:13.5px;line-height:1.75;color:var(--ink-soft);padding:12px 18px;background:rgba(255,255,255,.32);border-bottom:1px dashed var(--line);}
  .dd-bridge.out{border-bottom:none;border-top:1px dashed var(--line);}
  .dd-bridge b{color:var(--pine);}
  .dd-expert .dd-bridge b{color:#7a5c1e;}
  .dd-bridge .lead{font-family:"STKaiti","KaiTi",serif;letter-spacing:1px;margin-right:4px;}
  /* 标准档末尾的"启下"提示，仅标准档可见 */
  .next-tip{display:flex;gap:8px;align-items:center;font-size:13px;color:var(--cinnabar);background:rgba(158,53,38,.07);border:1px dashed var(--cinnabar);border-radius:8px;padding:10px 14px;margin:18px 0 0;font-family:"STKaiti","KaiTi",serif;letter-spacing:1px;}
  body.deep .next-tip, body.expert .next-tip{display:none;}
  .progress-box{padding:14px 18px 8px;}
  .progress-box .pct{font-size:12px;color:var(--ink-soft);display:flex;justify-content:space-between;margin-bottom:5px;letter-spacing:1px;}
  .bar{height:7px;background:#d6c19a;border-radius:6px;overflow:hidden;border:1px solid var(--line);}
  .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--pine),var(--pine-2));transition:width .4s;}
  nav{padding:8px 10px;}
  .part-title{
    font-family:"STKaiti","KaiTi",serif;font-size:14px;color:var(--cinnabar);
    letter-spacing:2px;margin:16px 8px 6px;padding-bottom:4px;
    border-bottom:1px dashed var(--line);display:flex;align-items:center;gap:6px;
  }
  .part-title::before{content:"卷";font-size:11px;background:var(--cinnabar);color:#f5edda;border-radius:4px;padding:1px 4px;}
  .lesson-link{
    display:flex;align-items:flex-start;gap:8px;cursor:pointer;
    padding:7px 10px;border-radius:7px;font-size:14px;color:var(--ink);
    transition:background .15s;
  }
  .lesson-link:hover{background:rgba(168,136,78,.18);}
  .lesson-link.active{background:rgba(158,53,38,.13);box-shadow:inset 3px 0 0 var(--cinnabar);}
  .lesson-link .num{font-size:11px;color:var(--ink-soft);min-width:20px;text-align:right;padding-top:2px;}
  .lesson-link .chk{font-size:12px;color:var(--pine);min-width:14px;}
  .lesson-link.locked{color:#a99c84;cursor:default;}
  .lesson-link.locked:hover{background:none;}
  .lesson-link .pin{font-size:10px;color:var(--gold);}
  /* ===== 主区 ===== */
  main{flex:1;min-width:0;display:flex;justify-content:center;padding:42px 28px 90px;}
  .scroll{
    width:min(760px,100%);
    background:var(--paper-card);
    border:1px solid var(--line);
    border-radius:4px;
    box-shadow:0 10px 40px -22px var(--shadow), 0 2px 0 #d9c8a4;
    padding:48px 54px 60px;position:relative;
  }
  .scroll::before,.scroll::after{
    content:"";position:absolute;left:0;right:0;height:10px;
    background:repeating-linear-gradient(90deg,var(--cinnabar) 0 16px,#8d2f22 16px 18px);
    opacity:.0;
  }
  .l-part{font-family:"STKaiti","KaiTi",serif;color:var(--cinnabar);letter-spacing:3px;font-size:14px;}
  .l-title{
    font-family:"STKaiti","KaiTi",serif;font-size:34px;letter-spacing:4px;
    margin:6px 0 2px;color:var(--ink);
  }
  .l-sub{color:var(--ink-soft);font-size:15px;letter-spacing:1px;margin-bottom:8px;}
  .rule{height:2px;background:linear-gradient(90deg,var(--gold),transparent);margin:14px 0 26px;border:none;}
  /* 七块 */
  .block{margin:30px 0;}
  .block > h3{
    font-family:"STKaiti","KaiTi",serif;font-size:19px;letter-spacing:2px;
    color:var(--pine);margin:0 0 12px;display:flex;align-items:center;gap:9px;
  }
  .block > h3 .badge{
    font-size:12px;background:var(--pine);color:var(--paper-card);
    border-radius:5px;padding:2px 8px;letter-spacing:2px;font-family:inherit;
  }
  .block.hook{background:rgba(168,136,78,.1);border-left:4px solid var(--gold);padding:16px 20px;border-radius:0 8px 8px 0;font-style:normal;}
  .block.hook p{margin:0;color:var(--ink-soft);}
  /* 小故事 · 典故 */
  .block.story{
    background:
      radial-gradient(circle at 12% 0%, rgba(255,255,255,.3), transparent 45%),
      linear-gradient(180deg,#f3e9d2,#ecdfc2);
    border:1px solid var(--line);border-left:5px solid var(--gold);
    border-radius:0 10px 10px 0;padding:18px 24px 16px;position:relative;
    box-shadow:inset 0 0 0 1px rgba(168,136,78,.15);
  }
  .block.story > h3{color:var(--gold);}
  .block.story .badge{background:var(--gold);}
  .block.story p{font-family:"STKaiti","KaiTi","Kaiti SC",serif;font-size:16px;letter-spacing:.5px;color:var(--ink);margin:8px 0;}
  .block.story .src{font-size:12px;color:var(--ink-soft);font-family:"Songti SC",serif;letter-spacing:1px;}
  .block.story .moral{border-top:1px dashed var(--line);padding-top:10px;margin-top:12px;color:var(--cinnabar);}
  .block.story .moral::before{content:"点睛　";color:var(--cinnabar);font-weight:bold;}
  .block.caution > h3{color:var(--cinnabar);}
  .block.caution .badge{background:var(--cinnabar);}
  p{margin:12px 0;}
  .concepts{counter-reset:c;padding-left:0;list-style:none;margin:0;}
  .concepts > li{
    position:relative;padding:12px 16px 12px 52px;margin:10px 0;
    background:var(--paper);border:1px solid var(--line);border-radius:8px;
  }
  .concepts > li::before{
    counter-increment:c;content:counter(c);
    position:absolute;left:14px;top:12px;
    width:26px;height:26px;border-radius:50%;
    background:var(--cinnabar);color:#f5edda;font-size:14px;
    display:flex;align-items:center;justify-content:center;
    font-family:"STKaiti","KaiTi",serif;
  }
  .concepts b{color:var(--cinnabar);}
  .term{
    border-bottom:1.5px dotted var(--cinnabar);cursor:help;position:relative;color:var(--ink);
  }
  .term:hover::after{
    content:attr(data-tip);position:absolute;left:50%;transform:translateX(-50%);
    bottom:140%;width:240px;background:var(--ink);color:var(--paper-card);
    font-size:13px;line-height:1.6;font-style:normal;letter-spacing:.5px;
    padding:10px 12px;border-radius:8px;z-index:30;box-shadow:0 6px 20px -6px rgba(0,0,0,.5);
    font-family:"Songti SC",serif;
  }
  .term:hover::before{
    content:"";position:absolute;left:50%;transform:translateX(-50%);bottom:130%;
    border:6px solid transparent;border-top-color:var(--ink);z-index:30;
  }
  .diagram{text-align:center;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:22px 16px 14px;}
  .diagram svg{max-width:100%;height:auto;}
  .diagram .cap{font-size:13px;color:var(--ink-soft);margin-top:10px;letter-spacing:1px;}
  .quote{font-family:"STKaiti","KaiTi",serif;color:var(--cinnabar);font-size:17px;letter-spacing:1px;
    border-left:3px solid var(--cinnabar);padding:2px 0 2px 14px;margin:14px 0;}
  .modern{background:rgba(65,81,60,.09);border:1px dashed var(--pine-2);border-radius:8px;padding:12px 16px;margin-top:12px;}
  .modern b{color:var(--pine);}
  /* 小测 */
  .quiz .q{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:12px 16px;margin:10px 0;}
  .quiz .q p{margin:0 0 8px;font-weight:bold;}
  .quiz .a{display:none;color:var(--pine);border-top:1px dashed var(--line);padding-top:8px;margin-top:8px;}
  .quiz .a.show{display:block;}
  .quiz button{
    font-family:inherit;font-size:13px;background:var(--pine);color:var(--paper-card);
    border:none;border-radius:6px;padding:5px 12px;cursor:pointer;letter-spacing:1px;
  }
  .quiz button:hover{background:var(--pine-2);}
  /* 课末操作 */
  .lesson-foot{margin-top:40px;padding-top:22px;border-top:2px solid var(--line);
    display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between;}
  .btn{font-family:"STKaiti","KaiTi",serif;letter-spacing:2px;font-size:15px;cursor:pointer;
    border:1px solid var(--cinnabar);background:var(--cinnabar);color:#f5edda;
    padding:8px 20px;border-radius:8px;transition:.15s;}
  .btn:hover{background:#8d2f22;}
  .btn.ghost{background:transparent;color:var(--cinnabar);}
  .btn.ghost:hover{background:rgba(158,53,38,.1);}
  .btn.nav{border-color:var(--pine);background:transparent;color:var(--pine);}
  .btn.nav:hover{background:rgba(65,81,60,.1);}
  .btn[disabled]{opacity:.35;cursor:default;}
  .note-area{width:100%;margin-top:16px;}
  .note-area textarea{width:100%;min-height:80px;font-family:"Songti SC",serif;font-size:14px;
    background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:10px 12px;color:var(--ink);resize:vertical;}
  .note-area label{font-family:"STKaiti","KaiTi",serif;color:var(--pine);font-size:14px;letter-spacing:1px;}
  .placeholder{text-align:center;color:var(--ink-soft);padding:40px 10px;}
  .placeholder .big{font-family:"STKaiti","KaiTi",serif;font-size:22px;color:var(--cinnabar);letter-spacing:2px;}
  .outline{display:inline-block;text-align:left;margin-top:16px;background:var(--paper);border:1px solid var(--line);
    border-radius:8px;padding:14px 22px;color:var(--ink);font-size:14px;}
  .toc-toggle{display:none;}
  /* 响应式 */
  @media(max-width:820px){
    .wrap{flex-direction:column;}
    #sidebar{position:relative;width:100%;height:auto;flex:none;max-height:0;overflow:hidden;transition:max-height .3s;padding-bottom:0;}
    #sidebar.open{max-height:1200px;overflow-y:auto;padding-bottom:30px;}
    .toc-toggle{display:flex;align-items:center;justify-content:space-between;
      position:sticky;top:0;z-index:40;background:var(--cinnabar);color:#f5edda;
      font-family:"STKaiti","KaiTi",serif;letter-spacing:3px;padding:12px 18px;cursor:pointer;}
    .scroll{padding:30px 22px 50px;}
    main{padding:18px 12px 70px;}
    .l-title{font-size:27px;}
  }
</style>
</head>
<body>
<div class="toc-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
  <span>☰ 目录</span><span style="font-family:'STKaiti',serif">岐黄入门</span>
</div>
<div class="wrap">
  <aside id="sidebar">
    <div class="brand">
      <div class="seal">岐黄之術</div>
      <h1>岐黄入门</h1>
      <div class="sub">中 医 系 统 课 · 标 准 版</div>
    </div>
    <div class="ver-box">
      <div class="lab">学习版本</div>
      <div class="ver-switch">
        <button id="verStd" onclick="setVersion('std')">标准</button>
        <button id="verDeep" onclick="setVersion('deep')">深入</button>
        <button id="verExpert" onclick="setVersion('expert')">专家</button>
      </div>
      <div class="hint" id="verHint"></div>
    </div>
    <div class="progress-box">
      <div class="pct"><span>已学进度</span><span id="pctText">0 / 24</span></div>
      <div class="bar"><i id="barFill"></i></div>
    </div>
    <nav id="nav"></nav>
  </aside>
  <main>
    <article class="scroll" id="content"></article>
  </main>
</div>

<script>
/* =====================================================================
   课程数据：序章、气、阴阳 = 完整内容；其余 21 课为大纲占位
   ===================================================================== */
const PARTS = [
  {name:"序章", lessons:[1]},
  {name:"第一部 · 思维与根基（理）", lessons:[2,3,4,5,6,7,8]},
  {name:"第二部 · 为什么会生病（病机）", lessons:[9,10]},
  {name:"第三部 · 怎么看病（诊）", lessons:[11,12,13,14,15]},
  {name:"第四部 · 怎么治（法·方·药）", lessons:[16,17,18,19,20,21]},
  {name:"第五部 · 用起来（养生·实践）", lessons:[22,23,24]},
  {name:"第六部 · 名著解读（四大经典）", lessons:[25,26,27,28]},
];

/* ---------- SVG 图表 ---------- */
const SVG = {};

// 全景六环
SVG.roadmap = `
<svg viewBox="0 0 680 150" xmlns="http://www.w3.org/2000/svg" font-family="STKaiti,KaiTi,serif">
  ${['理','病','诊','法','方药','养生'].map((t,i)=>{
    const x=20+i*110; const c=i%2?'#41513c':'#9e3526';
    return `<g>
      <circle cx="${x+38}" cy="62" r="34" fill="${c}"/>
      <text x="${x+38}" y="70" text-anchor="middle" fill="#f5edda" font-size="22" letter-spacing="1">${t}</text>
      ${i<5?`<path d="M${x+76} 62 L${x+108} 62" stroke="#a8884e" stroke-width="3" marker-end="url(#ar)"/>`:''}
      <text x="${x+38}" y="118" text-anchor="middle" fill="#5a5048" font-size="12">${['世界观','病因病机','望闻问切','治则治法','方剂中药','调养实践'][i]}</text>
    </g>`;}).join('')}
  <defs><marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto">
    <path d="M0 0 L9 4.5 L0 9 z" fill="#a8884e"/></marker></defs>
</svg>`;

// 气的五大功能 + 升降出入
SVG.qi = `
<svg viewBox="0 0 460 300" xmlns="http://www.w3.org/2000/svg" font-family="STKaiti,KaiTi,serif">

<div class="block hook"><p>很多人面对中医，常陷入两种极端：要么当成玄学一笑置之，要么奉为包治百病的神术。这两种态度，都学不进去。本课给你第三条路——把中医当成一套<b>自洽的"身体运行模型"</b>来理解：先弄懂古人<em>为什么会这样想</em>，再决定哪些拿来用。</p></div>

<div class="block story"><h3><span class="badge">事</span>小故事 · 扁鹊见蔡桓公</h3>
<p>名医扁鹊去见蔡桓公，看了一眼就说："您的病在皮肤纹理，不治会加重。"桓公不以为然："我没病。"过了十天，扁鹊说病已到肌肉；又十天，说到了肠胃——桓公始终不信，还嫌他多事。再过十天，扁鹊远远望见桓公，转身就走。桓公派人追问，扁鹊答："病在皮肤、肌肉、肠胃，针药尚可及；如今已深入骨髓，无能为力了。"不久桓公果然病发，再请扁鹊，人已不知去向。</p>
<p class="src">——《韩非子·喻老》</p>
<p class="moral">最高明的医生，在病还浅时就看出端倪；可惜病人讳疾忌医。这正是中医"治未病"的精神，也是学中医该有的态度——别等问题深了才正视，先理解、早调护。</p></div>

<div class="block"><h3><span class="badge">核心</span>核心概念</h3>
<ol class="concepts">
<li>中医是<b>"关系思维"</b>，不是"解剖实体"。它关心的是身体各部分之间的<span class="term" data-tip="中医不追问'肝长什么样'，而问'肝和其他系统如何互相影响、是否平衡'。">关系与动态平衡</span>，而非器官的物理结构。这是它和西医最根本的视角差异。</li>
<li>整门学问是<b>一条主线</b>串起来的：<span class="term" data-tip="理→病→诊→法→方→药→养，环环相扣，后面每一课都挂在这条线上。">理（世界观）→ 病（为何生病）→ 诊（怎么看）→ 法（怎么治）→ 方药（用什么）→ 养（日常调护）</span>。记住这条线，就不会学散。</li>
<li>学习心法：<b>先理解模型，再记结论</b>。中医的结论（如"肝主疏泄"）单背很枯燥，但理解了背后的模型，细节自然挂得上、记得住。</li>
<li>保持<b>诚实的分辨力</b>：哪些有现代研究支持、哪些是千百年的经验沉淀、哪些被过度夸大——三者分清，才能既会用又不盲信。这正是本课程贯穿始终的态度。</li>
</ol></div>

<p>中医的最高追求不是病了再救，而是<b>在失衡的苗头就调回来</b>。这部奠基之作并非一人一时写成：学界共识是它<span class="term" data-tip="《黄帝内经》分《素问》《灵枢》两部分，内容由不同时代医家积累而成。">形成于春秋战国、成书于西汉中晚期</span>，是历代经验的汇编。</p>

  <div class="dd-title">专家精讲 · 教授级 <small>认识论 · 现代化之争 · 治学门径</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>前两档解决了"怎么学、怎么用"。这一层站到<b>元层面</b>：中医在认识论上是什么、为何与近代科学的检验方式扞格、一个研究者该如何治学——这是序章特有的"专家视野"。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 象思维与认识论</button>
    <button onclick="ddJump(this,1)">② 中医现代化之争</button>
    <button onclick="ddJump(this,2)">③ 治学门径与文献学</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① "象思维"与中医的认识论定位</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>从科学哲学看，中医的根本方法是"<b>象思维</b>"（意象-类比-整体把握），与近代科学的<b>还原-实验-还证</b>路径分属不同认识论传统。中医建构知识，靠的是<b>取象运数、司外揣内</b>——以可观察之"象"推测不可见之"藏"，并以阴阳五行为"<b>说理工具</b>"将经验系统化。</p>
    <p>因此评价中医，不宜简单套用"是不是科学"的二分。更精确的表述是：它是一套<b>以功能、关系、动态平衡为核心的经验-理论体系</b>，在"道（整体规律）—法（治则）—术（治法方药）—器（具体技术）"四个层次上展开。理解这一层，才不致在"玄学"与"伪科学"的口水中迷失。</p>
    <div class="scholar"><b>学术参照：</b>李约瑟之问（中国为何未自发产生近代科学）背后，正涉及这种思维范式的差异；当代学者（如刘长林论"象科学"）主张：中医代表了一种与西方还原论<b>互补的认知路径</b>，而非低级阶段。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 中医现代化的三种思潮与方法学之争</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>近百年来，中医的去向有三股思潮反复交锋：<b>科学化/废医验药</b>（只取有效成分、否定理论体系，如民国"废止中医案"之余绪）、<b>经典回归/原教旨</b>（强调回到《内经》《伤寒》本义）、<b>中西医结合/现代化</b>（以现代手段研究并改造中医，为今日主流）。三者各有得失，至今未有定论。</p>
    <p>核心难点在<b>方法学</b>：随机对照试验（RCT）为单一干预、单一指标而设计，而中医是<b>辨证论治的个体化复杂干预</b>，"一人一方、动态调整"，与 RCT 的标准化前提天然冲突。故学界探索<b>真实世界研究、复杂干预评价、证候-效应关联</b>等更适配的方法。</p>
    <div class="scholar"><b>前沿：</b>循证中医、网络药理学、"组分中药"、证候生物学标志物等，是当前试图为中医提供现代证据的主要方向——成果与争议并存，须客观看待。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 治学门径：从文献学读经典</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>专业地读中医经典，离不开<b>文献学</b>三件事：<b>版本</b>（同一书有不同传本，如《伤寒论》宋本、成无己注本、桂林古本，优劣真伪须辨）、<b>校勘</b>（比对异文、订正讹误）、<b>训诂</b>（用汉代语言习惯解古字古义，避免以今度古）。读不通一句经文，往往不是医理问题，而是文字问题。</p>
    <p>更要分清<b>三个层次的文本</b>：原典（如《素问》本文）、历代<b>注家</b>（王冰、张志聪、张景岳等的注解，已掺入注者的发挥）、<b>今人</b>讲解（再经一重现代诠释）。治学的功夫，正在于回到一手、辨明层累，不把注家或今人之见误当原典本义。</p>
    <div class="scholar"><b>门径建议：</b>研习路线宜为"善本择读 → 参校注家 → 训诂疏证 → 临证印证"；工具书如《说文》《尔雅》、历代医经校释，以及现代的《中华医典》数据库，都是必备凭借。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">小结 ·</span>从"怎么学、怎么用"到"中医是什么、如何被检验、如何治学"——这是序章三档的递进。带着这副认识论与治学的眼光去读后面每一课，你会读得既深入、又清醒。</div>
</div>

<div class="block quiz"><h3><span class="badge">测</span>小测</h3>
<div class="q"><p>1. 中医的主线"六环"是哪六个？</p><button onclick="toggleA(this)">看答案</button><div class="a">理 → 病 → 诊 → 法 → 方药 → 养（世界观→病因病机→诊法→治法→方剂中药→养生）。</div></div>
<div class="q"><p>2. "治未病"是什么意思？</p><button onclick="toggleA(this)">看答案</button><div class="a">在疾病尚未发生或刚有苗头时就介入调节，重在预防与维持平衡，而非病重才救治。</div></div>
</div>
`},

2:{part:"第一部 · 思维与根基（理）", title:"气", sub:"中医的世界观基石", deepCount:6, body:`
<div class="block hook"><p>你夸人"气色好"、说自己"中气十足"、抱怨"最近气不顺"——这些日常话，其实全来自中医。<b>气</b>，是打开整个中医大门的第一把钥匙。不懂气，后面的经络、脏腑、方药都会悬空。</p></div>

<div class="block story"><h3><span class="badge">事</span>小故事 · 华佗与五禽戏</h3>
<p>名医华佗对弟子吴普说："人的身体需要活动，但不要累到极点。一动起来，吃进的水谷之气才消化得开，血脉就流通，病就生不出来——好比门的转轴常转就不会被虫蛀。"他模仿虎、鹿、熊、猿、鸟五种动物的姿态，创了一套"五禽戏"。吴普照着练，到九十多岁仍耳聪目明、牙齿坚固。</p>
<p class="src">——《三国志·华佗传》</p>
<p class="moral">"流水不腐，户枢不蠹。"气最怕的是停滞。适度而规律的运动，是养气最朴素、也最有效的办法——这一点，现代运动医学完全认同。</p></div>

<div class="block"><h3><span class="badge">核心</span>核心概念</h3>
<ol class="concepts">
<li>气是<b>"功能性的能量流"</b>——你看不见它，却能通过它的<em>作用</em>看见它。就像看不见电，但看得见灯亮。</li>
<li>气有<b>五大功能</b>：<span class="term" data-tip="推动血与津液运行、推动生长发育。">推动</span>、<span class="term" data-tip="维持体温，让身体暖和。">温煦</span>、<span class="term" data-tip="抵御外邪，相当于免疫防线。">防御</span>、<span class="term" data-tip="固摄血、汗、尿、精，不让它们无故流失。">固摄</span>、<span class="term" data-tip="物质与能量的相互转化，如食物化为气血。">气化</span>。</li>
<li>气有<b>两个来源</b>：<span class="term" data-tip="禀受于父母，藏于肾，是生命的'本钱'。">先天之气</span>（藏于肾）+ <span class="term" data-tip="脾胃运化的水谷之气 + 肺吸入的清气。">后天之气</span>（靠脾胃饮食与肺呼吸不断补充）。本钱有限，后天可养。</li>
<li>气在动，叫<b>"气机"</b>：<span class="term" data-tip="升、降、出、入四种基本运动，协调有序则健康。">升、降、出、入</span>。顺畅则安，郁滞则"气郁"，逆乱则"气逆"（如打嗝、咳逆）。</li>
</ol></div>

<div class="block"><h3><span class="badge">图</span>一图看懂 · 气的五大功能</h3>
<div class="diagram">${SVG.qi}<div class="cap">一团"气"向外发挥五种作用，缺哪一项，就对应一类常见毛病</div></div></div>

<div class="block"><h3><span class="badge">图</span>一图看懂 · 气机升降出入</h3>
<div class="diagram">${SVG.qiji}<div class="cap">气的运动有方向；中医说的很多"病"，本质是这套运动出了岔子</div></div></div>

<div class="block"><h3><span class="badge">参</span>名家说 & 现代视角</h3>
<p class="quote">"人之有生，全赖此气。"</p>
<p>历代医家把"气"理解为人体的<b>整体功能状态</b>——不是某一个零件，而是全身协同运转的那股"劲儿"。</p>
<div class="modern"><b>现代视角：</b>"气"并不对应某一种单一物质，它更像是对<b>代谢、循环、免疫、神经-内分泌调节</b>等多种功能总和的古代描述。所以不必硬给它找一个器官或一种分子——它是<b>模型语言</b>，用来描述"身体运转得好不好"。理解这一点，就不会被"气是不是特异功能"之类的问题困住。</p></div>

<div class="block caution"><h3><span class="badge">辨</span>别误会</h3>
<p>① 气不是武侠或气功表演里的"能量波"，更不是特异功能；② "补气"不等于打鸡血或大补特补——气虚要慢慢养，猛补反而壅滞；③ 看不见摸不着，不代表它玄虚，它描述的是实实在在的功能强弱。</p></div>

<div class="block"><h3><span class="badge">用</span>用得上</h3>
<p><b>气虚的常见信号</b>：容易累、稍动就气短、说话声音弱、容易出虚汗、反复感冒。<b>最简单的养气法</b>：别熬夜（熬夜最耗气）、按时吃早饭以养"后天之气"、适度而不过量的运动。气是后面学"气血津液""脏腑""体质"的共同地基。</p></div>

<div class="next-tip">读完标准版，你已认识气的五大功能、来源与"气机"。想知道气分几种、失常有哪些型、又如何牵动血与水？　切「深入版」↘</div>

<div class="deepdive deep-only">
  <div class="dd-title">深入精讲 · 系统展开 <small>点目录可跳转，逐节展开</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>标准版你已握住气的<b>五大功能、两个来源、气机升降出入</b>。这一层回到<b>同样的节点</b>讲深：气从何生、元宗营卫如何分工、气机怎样落到脏腑、失常分几型、又如何牵连血与津液。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 气从哪里来</button>
    <button onclick="ddJump(this,1)">② 四种气：元宗营卫</button>
    <button onclick="ddJump(this,2)">③ 气机升降出入</button>
    <button onclick="ddJump(this,3)">④ 气失常的六种证型</button>
    <button onclick="ddJump(this,4)">⑤ 气与血、津液</button>
    <button onclick="ddJump(this,5)">⑥ 现代视角与养气</button>
  </div>

  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 气从哪里来：生成与三脏</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>气不是凭空来的，它由<b>三个源头</b>合成：<b>先天之精</b>（父母所授，藏于肾）化生元气，是老本钱；<b>水谷之精</b>（脾胃运化饮食而来）化生谷气；<b>自然清气</b>（肺吸入）。后两者在胸中相合为宗气，再与元气一起充养全身。</p>
    <p>所以气的盛衰，落在三个脏上：<b>肾为气之根，脾胃为生化之源，肺为气之主</b>。任何一脏弱，气都会不足——这也是为什么中医"补气"最常从<b>健脾</b>入手。</p>
    <p class="quote">"真气者，所受于天，与谷气并而充身者也。"——《灵枢·刺节真邪》</p>
    <div class="modern"><b>浅出比喻：</b>把气想成一个家的"现金流"——肾是祖上留的本金（先天，动一点少一点），脾胃是每天的工资（后天饮食），肺把空气这份"外快"纳进来。会过日子，就是用后天养住先天。</div>
  </div></div>

  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 四种气：元 · 宗 · 营 · 卫</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>"气"是总称，按生成与职能可分四类，分清它们，后面读《伤寒》《温病》会顺很多：</p>
    <p><b>元气（原气）</b>：根于肾，借<span class="term" data-tip="上中下三焦，是元气与水液通行全身的通道。">三焦</span>输布全身，是脏腑功能的总原动力。元气伤则根本动摇。</p>
    <p><b>宗气</b>：积于胸中"<span class="term" data-tip="胸中宗气汇聚处，又称气海，约当膻中。">气海</span>"，走息道而<b>司呼吸</b>、贯心脉而<b>行气血</b>。古人甚至在左乳下"<span class="term" data-tip="心尖搏动处，可候宗气盛衰。">虚里</span>"处候宗气的强弱。宗气虚：气短、声低、心悸、动则气喘。</p>
    <p><b>营气</b>：行于<em>脉中</em>，化生血液、营养周身（"营"即营养）。</p>
    <p><b>卫气</b>：行于<em>脉外</em>，温分肉、充皮肤、司汗孔开合、御外邪；且<b>"昼行于阳、夜行于阴"</b>——白天卫气行于体表，人清醒；夜入于里，人入睡。卫气失常，可见怕冷易感，或失眠。</p>
    <p class="quote">"营在脉中，卫在脉外。"——《灵枢·营卫生会》</p>
    <div class="modern"><b>现代视角：</b>卫气≈体表屏障＋体温调节＋固有免疫＋部分昼夜节律；营气化血≈血液的营养运输。古人没有显微镜，却用"功能分类"抓住了要点。</div>
  </div></div>

  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 气机：升降出入</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p class="quote">"升降出入，无器不有。"——《素问·六微旨大论》</p>
    <p>每个脏腑都在做这套运动，且各有分工：<b>肺</b>主宣发（出）与肃降（降）；<b>脾升胃降</b>是中焦的枢纽（脾把精微往上送、胃把糟粕往下降）；<b>肝主升发、肺主肃降</b>，一左一右；<b>心火下降、肾水上升</b>，水火既济、心肾相交。</p>
    <p>气机一乱就生病：脾不升则泄泻、胃不降则呕逆、肺失宣降则咳喘、肝升太过则头胀眩晕、急躁易怒。中医说的很多病，本质就是这套"升降出入"出了岔子。</p>
    <div class="modern"><b>浅出比喻：</b>身体像一座有上下水、有进排气的房子——只要"通"且方向对就安稳；堵了（气滞）、逆流了（气逆），就出问题。</div>
  </div></div>

  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>④ 气失常的六种证型</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>这是把"气"用到临床的关键。气出问题，无非"不足"与"运行失常"两大类，细分六型：</p>
    <ol class="concepts">
      <li><b>气虚</b>——气量不足：神疲乏力、气短懒言、自汗、易感冒、舌淡脉弱。代表方 <span class="rx">四君子汤</span>。</li>
      <li><b>气陷</b>——气虚到"托不住"：脏器下垂（胃下垂、子宫脱垂）、久泻脱肛、小腹坠胀。代表方 <span class="rx">补中益气汤</span>（李东垣"甘温除热"之法）。</li>
      <li><b>气滞</b>——气堵了：胀、闷、胀痛且部位走窜、随情绪起伏（以肝郁气滞最常见）。代表方 <span class="rx">柴胡疏肝散</span>。</li>
      <li><b>气逆</b>——该降反升：肺气逆则咳喘、胃气逆则呃逆呕吐、肝气逆则头胀痛眩晕，甚则呕血。</li>
      <li><b>气脱</b>——气随大汗、大出血、大吐泻而暴脱：大汗淋漓、面白、脉微欲绝。<b>急症</b>，<span class="rx">独参汤</span>等益气固脱。</li>
      <li><b>气闭</b>——气机骤然闭塞：突然昏厥、牙关紧闭、二便不通。<b>急症</b>，需开窍急救。</li>
    </ol>
    <div class="modern"><b>浅出比喻（用水管想）：</b>水太少＝气虚；水压撑不住往下漏＝气陷；管子堵了＝气滞；水往反方向冲＝气逆；水突然漏光＝气脱；阀门彻底卡死＝气闭。</div>
  </div></div>

  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>⑤ 气与血、津液的关系</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>气为血之帅</b>：气能<b>生血</b>（化生）、<b>行血</b>（推动）、<b>摄血</b>（固摄不外溢）。所以气虚→血少；气虚或气滞→血瘀；气不摄血→出血（如月经过多、皮下瘀斑）。</p>
    <p><b>血为气之母</b>：血能载气、养气。大失血时气失去依附，可"<b>气随血脱</b>"。</p>
    <p><b>气与津液</b>：气能生津、行津、摄津——气虚则水停（水肿、痰饮），气不摄津则多汗多尿；津也能载气，剧烈吐泻丢津太多可"<b>气随津脱</b>"。</p>
    <p>这就解释了临床上的许多配伍智慧：补血方常重用补气药（如<span class="rx">当归补血汤</span>，黄芪五倍于当归）；止血要兼顾益气；利水消肿要兼健脾益气。</p>
    <div class="modern"><b>现代视角：</b>恰好呼应"循环—体液—代谢"是一个相互依存的整体——任何一环失衡，都会牵动其余。</div>
  </div></div>

  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>⑥ 现代视角与养气实操</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>把"气"理解为<b>代谢、循环、免疫、自主神经调节</b>等功能的综合态——它会盛会衰、会通会堵，但不必对应单一器官或分子。</p>
    <p><b>养气的五个抓手</b>：① 睡眠养元气（熬夜最伤根本）；② 规律饮食、护脾胃以养中气（后天之本）；③ 缓而深的呼吸、八段锦、太极养宗气；④ 不过劳、也不久坐久卧（"久卧伤气、久坐耗气"）；⑤ 情志舒畅以防气滞（肝喜条达）。</p>
    <div class="modern"><b>诚实地说：</b>这些养气措施，多与现代健康常识（睡眠、营养、运动、压力管理）一致，有合理依据；但"补气类中药"的具体疗效需辨证、因人而异，不宜自行长期大补。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">启下 ·</span>深入版已能把气分型对方。但——气虚、气陷、气脱其实是<b>同一谱系</b>的轻重，用药如何层层递进？气病又如何"<b>累及血与水</b>"形成夹杂证？宗气"大气下陷"在临床怎么抓？切「专家版」。</div>
</div>

<div class="deepdive dd-expert expert-only">
  <div class="dd-title">专家精讲 · 教授级 <small>同一节点 · 更精微的辨治</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>深入版你已掌握气的<b>生成、分类、六型失常、与血津液的关系</b>。这一层<b>不换题目</b>，只把同样几处推到临床的精微：气虚谱系的用药分寸、气病及血及水的夹杂证治、宗气大气下陷的辨治。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 气虚·气陷·气脱的用药递进</button>
    <button onclick="ddJump(this,1)">② 气病及血及水：夹杂证治</button>

  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 气虚·气陷·气脱：同一谱系的用药递进</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>深入版列了气失常六型；这里把其中最易混的"<b>虚—陷—脱</b>"看作<b>同一"气不足"谱系的三级轻重</b>，看用药如何层层递进。</p>
    <p><b>气虚</b>（量减）——平补健脾益气，<span class="rx">四君子汤</span>为基。<b>气陷</b>（虚极而不升、下坠脱垂）——关键<b>不在补而在"升"</b>：在补气基础上加<b>风药升提</b>（升麻、柴胡），<span class="rx">补中益气汤</span>的精义正在"<b>甘温＋升阳举陷</b>"。<b>气脱</b>（暴脱欲绝，大汗、脉微）——非平补可救，需<b>大剂峻补固脱、回阳益气</b>（<span class="rx">独参汤</span>、<span class="rx">参附汤</span>、<span class="rx">生脉散</span>），争分夺秒。</p>
    <p><b>配伍分寸</b>：补气易壅滞，常佐陈皮、木香<b>行气</b>以"补而不滞"；气虚夹湿配苍术、茯苓；夹阴虚则忌纯温燥。辨清病在"虚—陷—脱"谱系何处，才不致<b>补不及或补太过</b>。</p>
    <div class="scholar"><b>要点：</b>补中益气汤之所以能"<b>甘温除热</b>"治气虚发热，靠的不是清热，而是升补中气、使浮越之虚阳归位——这是"气陷"层级特有的治法，与单纯气虚的四君判然有别。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 气病及血及水：夹杂证的标本治法</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>深入版讲了"气为血帅、气能行津"；这里把它推到<b>夹杂证</b>的具体治法——临床的气病，多已牵连血与水。</p>
    <p>· <b>气虚血瘀</b>（气不行血而瘀）：<span class="rx">补阳还五汤</span>重用黄芪——"气行则血行"，治中风后遗半身不遂。<br>· <b>气不摄血</b>（气虚不固而出血，崩漏、便血、紫斑）：<span class="rx">归脾汤</span>、<span class="rx">黄土汤</span>益气摄血以治本，而非见血止血。<br>· <b>气随血脱</b>（大出血气无所附而暴脱）：急用<span class="rx">独参汤/参附汤</span>——"<b>有形之血不能速生，无形之气所当急固</b>"。<br>· <b>气虚水停</b>（气不化水而水肿痰饮）：<span class="rx">防己黄芪汤</span>（表虚水肿）、<span class="rx">苓桂术甘汤</span>（痰饮）——治水必兼益气、健脾、温阳。</p>
    <div class="scholar"><b>临床心法：</b>见血、见水之证，切勿只治血、只治水——先察其"<b>气</b>"之虚或滞，标本兼顾。这正是"气血津液一体"在处方上的兑现。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 宗气与"大气下陷"：从《内经》到张锡纯</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>深入版提过宗气"贯心脉、司呼吸"；这里看它的临床发挥。近代张锡纯《医学衷中参西录》创"<b>大气下陷</b>"说：胸中宗气（他称"大气"）虚陷，致<b>气短不足以息、努力呼吸似喘而非喘、脉沉迟微弱</b>，创<span class="rx">升陷汤</span>（黄芪为君，配知母、柴胡、桔梗、升麻）举陷。这是把《内经》宗气理论落到临床的典范。</p>
    <p>《灵枢》另有"<b>气街</b>"（头、胸、腹、胫四处气血横向通行的捷径）与"<b>四海</b>"（髓海、血海、气海、水谷之海）理论，揭示气血除经脉纵行外还有横向汇聚——为针灸"远近配穴、上病下取"提供依据。</p>
    <div class="scholar"><b>临床深义：</b>"大气下陷"说启发了现代对<b>慢性疲劳、心肺功能不足、内脏下垂</b>等"宗气虚"证候的辨治——它与"气陷"（中气下陷）同源而部位有别（宗气在胸、中气在脾），不可混同。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">小结 ·</span>从"虚—陷—脱"的用药分寸，到气病及血及水的夹杂证治，到宗气大气下陷——专家层<b>始终在讲"气"本身</b>，只是推到了处方决断的精微。带着这副眼光读后面方剂（第19–21课），处处可见"调气"二字在运转。</div>
</div>

3:{part:"第一部 · 思维与根基（理）", title:"阴阳", sub:"最简单也最深的工具", deepCount:6, body:`
<div class="block hook"><p>白天黑夜、男女、动静、寒热——古人观察万物，发现一切都能分成<b>相对的两面</b>，于是提炼出"阴阳"。它不是迷信符号，而是一套<b>描述关系的坐标系</b>。学会用它，你就拿到了中医看待身体与疾病的总框架。</p></div>

<div class="block story"><h3><span class="badge">事</span>小故事 · 一根杆子量出的阴阳</h3>
<p>几千年前，古人想知道一年的节律，办法朴素得惊人：在地上立一根杆子（叫"圭表"），每天正午量一次影子的长短。他们发现，冬至那天影子最长，此后一天天变短，到夏至最短，再慢慢变长——影子长，是阴盛；影子短，是阳盛。把一整年的日影长短连成一条曲线，竟与太极图里那条S形的阴阳分界线几乎一模一样。</p>
<p class="src">——据天文史学者对太极图与圭表测影关系的研究</p>
<p class="moral">这是一个很有说服力的解释：太极图很可能不是凭空玄想，而是古人长年观测日影、记录"阴阳消长"得来的。阴阳，源自实打实的观察。</p></div>

<div class="block"><h3><span class="badge">核心</span>核心概念</h3>
<ol class="concepts">
<li>阴阳是<b>相对的、可再分的</b>：任何事物都能分阴阳，且<span class="term" data-tip="太极图里黑中的白点、白中的黑点，就是这个意思。">阴中有阳、阳中有阴</span>。白天是阳，但上午比下午更阳。</li>
<li>阴阳之间有<b>四种关系</b>：<span class="term" data-tip="寒与热、动与静相互制约，谁也别压倒谁。">对立制约</span>、<span class="term" data-tip="阴依赖阳、阳依赖阴，孤阴不生、独阳不长。">互根互用</span>、<span class="term" data-tip="此长彼消，如昼夜更替、四季流转。">消长平衡</span>、<span class="term" data-tip="物极必反，如高热到极点出现寒象。">相互转化</span>。</li>
<li>用到<b>身体</b>：上为阳/下为阴、表为阳/里为阴、动为阳/静为阴、功能活动为阳/物质基础为阴。</li>
<li>用到<b>看病</b>：阴阳是"八纲"的总纲。发热、口渴、面红、烦躁＝<b>阳证</b>；怕冷、蜷卧、面白、安静＝<b>阴证</b>。健康的本质，就是<span class="term" data-tip="阴气平和、阳气固密，二者动态平衡。">"阴平阳秘"</span>。</li>
</ol></div>

<div class="block"><h3><span class="badge">图</span>一图看懂 · 太极阴阳鱼</h3>
<div class="diagram">${SVG.taiji}<div class="cap">两条鱼首尾相抱：对立又互含，黑中有白、白中有黑</div></div></div>

<div class="block"><h3><span class="badge">图</span>一图看懂 · 阴阳消长</h3>
<div class="diagram">${SVG.xiaozhang}<div class="cap">一天之内阴阳此消彼长，正午阳最盛、子夜阴最盛——平衡是动态的，不是静止的</div></div></div>

<div class="block"><h3><span class="badge">参</span>名家说 & 现代视角</h3>
<p class="quote">"阴平阳秘，精神乃治；阴阳离决，精气乃绝。"——《黄帝内经·素问》</p>
<p>这句话点出了中医对健康与疾病的根本判断：<b>平衡则安，失衡则病，彻底崩解则危</b>。</p>
<div class="modern"><b>现代视角：</b>阴阳的本质，是古人对<b>"动态平衡 / 负反馈调节"</b>的精彩表达，与现代生理学的<b>稳态（homeostasis）</b>高度相通——身体正是靠一对对相反的力量（如交感与副交感、产热与散热）此消彼长，维持在一个健康区间。把"阴阳"翻译成"动态平衡"，它立刻就不神秘了。</p></div>

<div class="block caution"><h3><span class="badge">辨</span>别误会</h3>
<p>① 阴阳不是"好与坏"——两者都必需，没有高下；② 它和算命、占卜的"阴阳"不是一回事，中医的阴阳是描述身体状态的工具；③ "阴虚火旺"里的"火"不是真有一团火，而是"阴不足、相对显得阳偏亢"的一种失衡状态。</p></div>

<div class="block"><h3><span class="badge">用</span>用得上</h3>
<p><b>快速自测偏性</b>：你平时更怕冷还是更怕热？爱喝热水还是冷饮？手脚常凉还是常热？精神偏亢奋还是偏疲倦？——偏寒、喜热、怕冷多偏<b>阳虚（阴偏盛）</b>；偏热、喜凉、烦躁多偏<b>阴虚（阳偏亢）</b>。这只是粗判，却是后面"体质辨识"和"辨证"的起点。</p></div>

<div class="next-tip">读完标准版，你已握住阴阳的框架。想知道这些关系"为什么成立、怎样指导开方"？　切「深入版」继续 ↘</div>

<div class="deepdive deep-only">
  <div class="dd-title">深入精讲 · 系统展开 <small>点目录可跳转，逐节展开</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>标准版你已认识阴阳的<b>四种关系</b>与<b>阴证阳证</b>。这一层，我们回到<b>同样这几个节点</b>，把它们讲深一层——看它们<b>为什么成立、怎样运作、如何落到开方</b>。每一节的标题，都对应你在标准版见过的概念。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 四种关系（再深一层）</button>
    <button onclick="ddJump(this,1)">② 阴阳的六大应用</button>
    <button onclick="ddJump(this,2)">③ 病机：寒热虚实之根</button>
    <button onclick="ddJump(this,3)">④ 三阴三阳与六经</button>
    <button onclick="ddJump(this,4)">⑤ 如何指导治疗</button>
    <button onclick="ddJump(this,5)">⑥ 现代视角</button>
  </div>

  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 四种关系，讲深一层</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>对立制约</b>：阴阳相反、互相牵制以维持平衡。"<span class="term" data-tip="一方偏盛，必致另一方受损。">阴胜则阳病，阳胜则阴病</span>"。</p>
    <p><b>互根互用</b>：互为根基、互相化生。"孤阴不生，独阳不长"；<span class="term" data-tip="《素问·阴阳应象大论》：阴在内守护，阳在外为之役使，二者不可分。">"阴在内，阳之守也；阳在外，阴之使也"</span>。功能（阳）靠物质（阴）供养，物质（阴）靠功能（阳）化生。</p>
    <p><b>消长平衡</b>：此长彼消，是<b>量</b>的渐变。如一昼夜：子夜到正午阳长阴消，正午到子夜阳消阴长。</p>
    <p><b>相互转化</b>：发展到极点向反面突变，是<b>质</b>的飞跃。"重阴必阳，重阳必阴""寒极生热，热极生寒"。如高热（阳极）突然转为四肢厥冷、脉微（阴）——这是病情骤变的危险信号。</p>
    <div class="modern"><b>关键区分：</b>消长是量变（渐进），转化是质变（突变）。看懂这一点，你才能<b>预判病势</b>——什么时候是缓慢加重，什么时候是即将翻盘。</div>
  </div></div>

  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 阴阳学说的六大应用</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>阴阳不是空谈，它一路贯穿到诊断与用药。中医用它做六件事：</p>
    <ol class="concepts">
      <li><b>说明组织结构</b>：上为阳/下为阴、表为阳/里为阴、背为阳/腹为阴、六腑为阳/五脏为阴、气为阳/血为阴。</li>
      <li><b>说明生理</b>：物质（阴）与功能（阳）互根互用，健康即"<b>阴平阳秘</b>"。</li>
      <li><b>说明病理</b>：一切疾病不外阴阳失调——这是总纲。</li>
      <li><b>用于诊断</b>：色泽鲜明属阳、晦暗属阴；声高气粗属阳、低微属阴；脉浮数大属阳、沉迟细属阴。八纲辨证即以阴阳统领表里、寒热、虚实。</li>
      <li><b>用于治疗</b>：总则是"调整阴阳，<b>损其有余、补其不足</b>，以平为期"。</li>
      <li><b>归纳药性</b>：四气温热属阳、寒凉属阴；五味辛甘淡属阳、酸苦咸属阴；升浮属阳、沉降属阴。</li>
    </ol>
  </div></div>

  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 病机：寒热虚实的总根</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>几乎所有"上火""怕冷"的背后，都是阴阳的偏盛或偏衰。分清这四种，是辨证的根本功夫：</p>
    <table style="width:100%;border-collapse:collapse;margin:12px 0;font-size:14px;">
      <tr><th style="border:1px solid var(--line);padding:8px;background:rgba(65,81,60,.1);"></th><th style="border:1px solid var(--line);padding:8px;background:rgba(65,81,60,.1);color:var(--cinnabar);">偏盛 · 实证</th><th style="border:1px solid var(--line);padding:8px;background:rgba(65,81,60,.1);color:var(--pine);">偏衰 · 虚证</th></tr>
      <tr><td style="border:1px solid var(--line);padding:8px;"><b>热</b></td><td style="border:1px solid var(--line);padding:8px;">实热（阳盛）：壮热、面赤、口渴、便秘 → <b>清热</b></td><td style="border:1px solid var(--line);padding:8px;">虚热（阴虚）：潮热盗汗、五心烦热、舌红少苔 → <b>滋阴</b></td></tr>
      <tr><td style="border:1px solid var(--line);padding:8px;"><b>寒</b></td><td style="border:1px solid var(--line);padding:8px;">实寒（阴盛）：畏寒、脘腹冷痛、舌淡 → <b>温散</b></td><td style="border:1px solid var(--line);padding:8px;">虚寒（阳虚）：畏寒神疲、自汗、夜尿多 → <b>温补</b></td></tr>
    </table>
    <p>这正是阴阳分型的临床价值：<b>同是发热，治法可截然相反</b>——实热要清，虚热要滋阴；硬清虚热，反伤其本。</p>
    <p>更复杂的几种：<b>阴阳互损</b>（阴虚日久累及阳、阳虚日久累及阴 → 阴阳两虚）；<b>阴阳格拒</b>（盛极相互排斥，出现真寒假热、真热假寒，是辨证的陷阱）；<b>阴阳亡失</b>——亡阴（大汗黏热、烦躁、脉数疾无力）、亡阳（冷汗淋漓、四肢厥冷、脉微欲绝），皆为危候，须急救救阴或回阳。</p>
  </div></div>

  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>④ 从两分到六分：三阴三阳</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>阴阳可以再分。把阴、阳各分三层，就得到<b>三阳</b>（太阳、阳明、少阳）与<b>三阴</b>（太阴、少阴、厥阴），合称"六经"。</p>
    <p>这不是文字游戏——它是《伤寒论》<span class="term" data-tip="把外感病的发展分为六个阶段/层次来辨证论治。">六经辨证</span>的骨架，描述外邪由表入里、由阳入阴的层层深入（第 15 课与第 27 课会专门展开）。这里先建立印象：<b>阴阳不只是非黑即白，它还能刻画"程度与层次"</b>。</p>
  </div></div>

  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>⑤ 阴阳如何指导治疗</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>把"调阴阳"落到开方上，有几条历代奉为圭臬的思路：</p>
    <ol class="concepts">
      <li><b>阳病治阴，阴病治阳</b>：治的是失衡的根源，而非只压症状。</li>
      <li><b>阴中求阳，阳中求阴</b>：<span class="term" data-tip="张景岳《景岳全书》名论。">"善补阳者，必于阴中求阳，则阳得阴助而生化无穷"</span>——补阳别忘滋阴打底，反之亦然。</li>
      <li><b>壮水制火、益火消阴</b>：<span class="term" data-tip="王冰注《素问》语。">"壮水之主，以制阳光"</span>治阴虚火旺（滋阴以制虚火）；"益火之源，以消阴翳"治阳虚阴盛。</li>
    </ol>
    <p class="quote">"谨察阴阳所在而调之，以平为期。"——《素问·至真要大论》</p>
    <div class="modern"><b>一句话收束：</b>中医为何常"不见火而治火、不见寒而治寒"？因为它治的是阴阳的失衡点，不是冒出来的那个症状。</div>
  </div></div>

  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>⑥ 现代视角：阴阳≈稳态与负反馈</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>阴阳平衡，约等于现代生理学的<b>稳态（homeostasis）</b>；"调阴阳"，约等于把偏离的<b>设定点</b>拉回来——靠的是一对相反力量（如交感与副交感、产热与散热）的此消彼长。</p>
    <p>病机分型也能找到现代类比：<b>实热</b>近于急性炎症、机能亢进；<b>虚热</b>近于慢性消耗、阴液不足。这就解释了为何"同是发热，治法可以截然相反"。</p>
    <div class="modern"><b>诚实地说：</b>这是帮现代人理解的类比，不是说"阴阳"能被某一个生理指标完全替代。它的价值在于提供一套<b>整体调节</b>的思考框架。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">启下 ·</span>到这里，你已能用阴阳"<b>分型辨证、立法开方</b>"。但——"消长/转化"在<b>经文</b>里究竟如何措辞？阴阳的"六分"（三阴三阳）<b>凭什么</b>那样分配寒热？真假寒热又如何在<b>方剂设计</b>上决断？想把这些追到底、做到能与同行论辩，切「专家版」。</div>
</div>

<div class="deepdive dd-expert expert-only">
  <div class="dd-title">专家精讲 · 教授级 <small>原文精读 · 气化推演 · 临床决断 · 学术思辨</small></div>
  <div class="dd-bridge"><span class="lead">承上 ·</span>深入版你已能用阴阳<b>分型辨证、依阴阳立法</b>。这一层，我们就着<b>同样的几个节点</b>再推一程：逐句<b>精读经文</b>、把"<b>标本中气</b>"的气化机理<b>推演到底</b>、在真假之间做<b>方剂级的临床决断</b>、并直面"阴阳可证伪吗"的<b>方法论拷问</b>——目标是从"会用"走到"能辩"。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 原文精读（承"四种关系"）</button>
    <button onclick="ddJump(this,1)">② 标本中气从化（承"三阴三阳"）</button>
    <button onclick="ddJump(this,2)">③ 真假寒热与反佐（承"病机/治疗"）</button>
    <button onclick="ddJump(this,3)">④ 阴阳可证伪吗（承"阴阳是什么"）</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 原文精读：互根与转化的经典依据</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>深入版讲了"互根、转化"，这里回到<b>经文本身</b>逐句抠。</p>
    <p class="quote">"阴在内，阳之守也；阳在外，阴之使也。"——《素问·阴阳应象大论》</p>
    <p>训诂二字是关键：<b>守</b>＝镇守、根基（阴居于内，是阳的根据地）；<b>使</b>＝役使、外用（阳行于外，受阴所驱遣、为阴所用）。一句话把"互根互用"说尽——阳之所以能卫外为用，是因为内有阴精为其根；阴之所以能内守化生，是因为外有阳气为其使。<b>故善治者，于阴中求阳、阳中求阴</b>，理据正在此。</p>
    <p class="quote">"重阴必阳，重阳必阴；寒极生热，热极生寒。"</p>
    <p>"<b>极/重</b>"是<b>转化的临界点</b>——这正是"消长（量变，未至极）"与"转化（质变，至极而反）"的分野。临床实例：阳热亢极而见四肢厥冷（"<b>热深厥深</b>"，真热假寒）；阴寒至极而格阳于外见身热面赤（真寒假热）。把握"极"之所在，方能预判病势的骤转。</p>
    <div class="scholar"><b>注家分歧与临床后果：</b>同一部阴阳论，张介宾《类经附翼》力主"<b>阳非有余、真阴不足</b>"，导出<b>温补</b>倾向；朱丹溪则主"<b>阳常有余、阴常不足</b>"，导出<b>滋阴</b>倾向。可见经文留有诠释空间，而不同诠释会指向<b>相反的治疗路线</b>——读经典须知"理在何处分叉、又如何落到方药"。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 标本中气从化：阴阳"六分"的气化机理</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>深入版交代了"三阴三阳"是阴阳的六分；这里讲它<b>凭什么</b>那样分配寒热——这是气化学派读《伤寒》《内经》的钥匙，也是公认的难点。</p>
    <p>《素问·六微旨大论》给每一经定了<b>本气、标气、中见之气</b>：<b>太阳</b>本寒、标阳、中见少阴热；<b>阳明</b>本燥、标阳、中见太阴湿；<b>少阳</b>本火、标阳、中见厥阴风；<b>太阴</b>本湿、标阴、中见阳明燥；<b>少阴</b>本热、标阴、中见太阳寒；<b>厥阴</b>本风、标阴、中见少阳火。</p>
    <p>从化规律可一句口诀记牢："<b>少阳太阴从本，少阴太阳从本从标，阳明厥阴从乎中</b>。"其所以然在于<b>标本之气是否同性</b>：少阳（本火标阳，同属阳）、太阴（本湿标阴，同属阴）<b>标本同气，故从本</b>；少阴（本热标阴）、太阳（本寒标阳）<b>标本异气，故兼从标本</b>；阳明、厥阴标本之气不足以自定，<b>故从中见之气</b>（阳明从太阴之湿、厥阴从少阳之火）。</p>
    <p>它能解释临床实象：太阳"从本从标"，故太阳病<b>既恶寒（本寒）又发热（标阳）</b>；厥阴"从中"少阳之火，故厥阴病多<b>寒热错杂、易从火化</b>（消渴、心中疼热）——乌梅丸寒温并用，正应此机。</p>
    <div class="scholar"><b>学术定位：</b>标本中气从化是<b>气化学派</b>（张志聪、陈修园、唐容川一系）的理论内核，与"经络说""八纲说""阶段说"并为六经诠释的主要进路（详见第27课）。它把"阴阳六分"从名相落为<b>可推演的气化模型</b>，是研究生层级的硬功夫。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 真假寒热与"反佐"：把转化论落到方剂</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>深入版列了真寒假热、真热假寒；这里把它推到<b>决断规则</b>与<b>方剂设计</b>。</p>
    <p><b>阴盛格阳（真寒假热／戴阳）</b>：阴寒内盛，逼残阳浮越于外上——见身热、面赤如妆、躁扰、口渴，<b>但</b>下利清谷、四肢厥冷、脉微欲绝、渴喜热饮而不多。本质<b>真寒</b>。<b>阳盛格阴（真热假寒／热厥）</b>：里热深伏、格阴于外——见手足厥冷，<b>但</b>胸腹灼热、口渴喜冷、便秘溲赤、脉沉而有力。本质<b>真热</b>。</p>
    <p><b>决断规则</b>：假象多浮于"外、上、面色"，真机多藏于"<b>口渴喜冷喜热、二便、舌质、脉之有力无力、胸腹扪诊之冷热</b>"——以这些本质指标破表象，即"<b>必伏其所主，而先其所因</b>"。</p>
    <p><b>反佐——设计的精妙</b>：治真寒假热用通脉四逆汤回阳，若阴寒太盛、服热药被格拒（药入即吐），则加<b>猪胆汁、人尿</b>（苦寒咸寒）为<b>反佐</b>，"<b>热因寒用</b>"——以少量寒药为向导，引阳药入阴而不被格拒。这正是《素问·至真要大论》"<b>奇之不去则偶之……热因寒用，寒因热用，必伏其所主</b>"的方剂落地，也是"阴阳转化/格拒"理论最漂亮的临床兑现。</p>
    <div class="scholar"><b>要点：</b>"反佐"（药味反佐／热药冷服／寒药热服）是处理"格拒"的专门技术——它证明：阴阳的"对立转化"不是玄谈，而是能<b>精确指导一味佐药、一个服法</b>的实操原理。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>④ 思辨：阴阳"可证伪"吗？</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>回到最根本的一问（也回应标准版"阴阳是什么"）：批评者说，阴阳<b>太过普适、近乎不可证伪</b>——任何现象都能事后归为"阴阳失调"，却难以被反驳，故"不科学"。</p>
    <p>较严谨的回应是<b>区分两个层面</b>：把阴阳当作"<b>世界本体的断言</b>"（阴阳是否真实存在），确实不可检验、也无须如此主张；但把它当作"<b>临床推理的操作框架</b>"，其有效性<b>可以、也应当</b>在更小的可检验单元上评估——如"<b>方证相应</b>"（特定证用特定方、产生可预期之效）就是可重复、可证伪的（详见第20、27课）。换言之：该被检验的不是"阴阳存不存在"，而是"<b>由阴阳推出的具体辨证与治法是否有效</b>"。</p>
    <p>它与<b>稳态、负反馈、系统论</b>是<b>同构而非等同</b>：后者可数学刻画，阴阳是定性的整体框架；同构给了我们理解的桥，但若把阴阳"还原"为某条具体机制，便是<b>过度比附</b>。</p>
    <div class="scholar"><b>治学立场（双轨）：</b>以阴阳<b>驭整体、导临床</b>，以现代科学<b>究机理、验疗效</b>——两轨并行、各司其职，既不以"不可证伪"否定其临床价值，也不以"古已有之"回避现代检验。这是对待阴阳，乃至整个中医理论，最成熟的态度。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">小结 ·</span>从一个朴素的二分，到经文训诂、气化推演、方剂级决断与方法论思辨——这段距离，正是"<b>会用</b>"与"<b>能辩</b>"之别。带着这副眼光去读后面的六经（第27课）、方剂（第19–21课），你会发现阴阳<b>无处不在地运转</b>着。</div>
</div>

<div class="q"><p>1. 阴阳之间的四种关系是什么？</p><button onclick="toggleA(this)">看答案</button><div class="a">对立制约、互根互用、消长平衡、相互转化。</div></div>
<div class="q"><p>2. "阴平阳秘"是什么意思？为什么重要？</p><button onclick="toggleA(this)">看答案</button><div class="a">阴气平和、阳气固密，二者动态平衡，是中医对"健康"的根本定义；失衡即病。</div></div>

4:{part:"第一部 · 思维与根基（理）", title:"五行", sub:"一张关系网，不是五种东西", deepCount:5, body:`
<div class="block hook"><p>一听"金木水火土"，很多人就皱眉：这不是算命吗？其实<b>五行不是五种物质</b>，而是古人给万物之间的关系编的一张"网"——重点从来不是那五个字，而是它们怎样<b>互相滋生、互相制约</b>。学中医，五行是把脏腑串成系统的那根线。</p></div>

<div class="block story"><h3><span class="badge">事</span>小故事 · 见肝之病，先去固脾</h3>
<p>医圣张仲景在《金匮要略》开篇就讲了一句让后世受用千年的话："见肝之病，知肝传脾，当先实脾。"意思是：看到一个人肝有病，高明的医生会预判它<b>很可能殃及脾胃</b>，于是提前把脾胃固护好。</p>
<p class="src">——《金匮要略·脏腑经络先后病脉证》</p>
<p class="moral">他凭什么预判？正是五行里的<b>"木克土"</b>（肝属木、脾属土）。五行在这里不是玄学，而是一套<b>预判疾病传变</b>的推理工具——这正是"治未病"的实战。</p></div>

<div class="block"><h3><span class="badge">核心</span>核心概念</h3>
<ol class="concepts">
<li>五行是<b>五类属性</b>的归类系统：木（生发条达）、火（温热向上）、土（生化承载）、金（清肃收敛）、水（滋润下行）。万物按性质归入五类。</li>
<li><b>相生</b>：木→火→土→金→水→木，循环相生，像母亲哺育孩子（"生我者为母"）。</li>
<li><b>相克</b>：木克土、土克水、水克火、火克金、金克木，相互制约，防止任一方过亢。</li>
<li>配<b>五脏</b>：肝木、心火、脾土、肺金、肾水——再连上五季、五官、五志、五味，织成一张对应网。</li>
</ol></div>

<div class="cap"><span style="color:#41513c">实线＝相生</span>　<span style="color:#9e3526">虚线＝相克</span></div>
</div></div>

<div class="block"><h3><span class="badge">参</span>名家说 & 现代视角</h3>
<p class="quote">"亢则害，承乃制，制则生化。"——《素问·六微旨大论》</p>
<p>这句话点破了五行的精髓：一方过亢就有害，有制约才能正常生化——平衡比单纯的"强"更重要。</p>
<div class="modern"><b>现代视角：</b>五行更像是描述系统内"<b>促进（相生）与抑制（相克）</b>"反馈关系的模型，思路近于生态系统、控制论里的负反馈网络。它的价值在于把分散的脏腑、情志、季节联成一张可推理的网，而<b>不必</b>把"金木水火土"当成真实物质去对号入座。</div></div>

<div class="block caution"><h3><span class="badge">辨</span>别误会</h3>
<p>① 中医的五行和算命、风水的五行不是一回事；② 相生相克并非"好与坏"——制约过度（相乘）或反向欺侮（相侮）都会致病；③ 五行配属是一种<b>模型化归类</b>，重在把握关系，不必死抠每一个对应。</p></div>

<div class="block"><h3><span class="badge">用</span>用得上</h3>
<p>用相生理解调养思路："<b>虚则补其母</b>"——肺（金）虚，可健脾（土）以"培土生金"；肾（水）虚累及肝（木），可"滋水涵木"。情志上还有"<b>悲胜怒、怒胜思</b>"等相胜之法，是中医独特的情绪调节智慧。</p></div>

<div class="next-tip">读完标准版，你已会用五行的生克串脏腑、解"见肝传脾"。想知道五行怎么归类、相乘相侮如何预判传变、"制化"为何像控制论？　切「深入版」↘</div>

  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 五行属性与取象归类</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>五行的根，是<b>取象比类</b>：先提炼出五种基本性质，再把万物归进去。木＝生发、舒展（如春天草木）；火＝温热、升腾；土＝生化、承载（如大地长养万物）；金＝清肃、收敛；水＝滋润、向下、闭藏。</p>
    <p>归到人体与自然，就成了一张大表：<b>五脏</b>肝心脾肺肾、<b>五腑</b>胆小肠胃大肠膀胱、<b>五官</b>目舌口鼻耳、<b>五体</b>筋脉肉皮骨、<b>五志</b>怒喜思悲恐、<b>五季</b>春夏长夏秋冬、<b>五味</b>酸苦甘辛咸、<b>五色</b>青赤黄白黑。这张表是后面诊断"司外揣内"的底图。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 相生与"母子"关系</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>相生次序：木生火、火生土、土生金、金生水、水生木。在任一行，"<b>生我者为母，我生者为子</b>"——如对火来说，木是母、土是子。</p>
    <p>由此衍生两条治法：<b>虚则补其母</b>（如肺金虚，补脾土以"培土生金"；肝木虚，滋肾水以"滋水涵木"）；<b>实则泻其子</b>（如肝火旺，可泻心火）。这把"五行"从概念变成了实用的处方思路。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 相克与制化</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>相克次序：木克土、土克水、水克火、火克金、金克木。"<b>克我者</b>"约束我、"<b>我克者</b>"受我约束。相克的意义是<b>制约</b>——让任何一行都不过亢。</p>
    <p>生与克要合起来看，叫"<b>制化</b>"：生中有克、克中有生，系统才稳。比如木生火，但水克火、又水生木——环环相扣，维持动态平衡。这正是《内经》"亢则害，承乃制"的意思。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>④ 相乘与相侮：失常的传变</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>平衡一旦被打破，相克就变成病理：<b>相乘</b>＝克得太过（如肝木过亢、过度克脾土，"木乘土"，临床见肝郁导致的腹胀腹泻）；<b>相侮</b>＝反向欺侮，被克的一方反过来欺负克它的（如肝木过亢反侮肺金，"木火刑金"，见咳嗽咯血）。</p>
    <p>开篇"见肝之病，知肝传脾"，说的正是<b>木乘土</b>这条传变路径。懂了相乘相侮，就能预判疾病往哪传、提前堵截。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>⑤ 五行在诊治的应用 & 现代视角</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>诊断</b>：面色、声音、口味的五行归属可提示病在何脏（如面青多属肝、口苦多属心火）。<b>治疗</b>：五味入五脏（酸入肝、苦入心、甘入脾、辛入肺、咸入肾），用药归经有所依据。<b>情志疗法</b>：以情胜情（悲胜怒、恐胜喜、怒胜思、喜胜悲、思胜恐），是中医独有的心理调节法。</p>
    <div class="modern"><b>现代视角与分寸：</b>五行的真正价值是一套"关系与反馈"的系统模型，帮助整体地看待身体；但它是<b>归纳推演</b>的框架，不宜机械地一一对应、过度演绎。把它当思维工具，而非铁律。</div>
  </div></div>

  <div class="dd-bridge"><span class="lead">承上 ·</span>深入版你已会用五行的生克制化辨治。这一层<b>不离五行</b>，只站到学理：它如何"入医"、"亢害承制"的系统科学内涵、以及这门学说本身的争议与临床实际权重。</div>
  <div class="dd-toc">
    <button onclick="ddJump(this,0)">① 配属的"所以然"</button>
    <button onclick="ddJump(this,1)">② 制化自稳的机理</button>
    <button onclick="ddJump(this,2)">③ 传变推演与学说限度</button>
  </div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 配属的"所以然"：五行为何那样配五脏</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>许多人把"肝木心火脾土肺金肾水"当口诀硬背——其实它<b>不是贴标签，而是据脏的功能特性"取象"推来的</b>。知其所以然，就再不会记错：</p>
    <p>· <b>肝属木</b>：木性"生发、条达、曲直"，肝主疏泄、喜条达而恶抑郁、主升发——同其象，故属木。<br>· <b>心属火</b>：火性"温热、炎上、光明"，心主血脉而温煦周身、藏神而主明——故属火。<br>· <b>脾属土</b>：土性"生化、承载、长养"，脾主运化、为气血生化之源、居中央而灌四旁——故属土。<br>· <b>肺属金</b>：金性"清肃、收敛、沉降"，肺主肃降、其气清肃下行——故属金。<br>· <b>肾属水</b>：水性"滋润、下行、闭藏"，肾主水、藏精而主闭藏、位居下焦——故属水。</p>
    <p>所以然在于：配属同构的是"<b>功能之象</b>"，不是物质。明白这一层，<b>五官五体五志</b>的配属（目-肝、舌-心、口-脾……）也能顺着功能推出来，不必死记。</p>
    <div class="scholar"><b>但要诚实：</b>并非每一条配属都同样有据——部分五味、五色的归类，更多是为凑足"五"的系统完整性而设，牵强处不必强解（详见③）。考据上，《管子·五行》《礼记·月令》与《内经》互参，可见配属体系是<b>历史层累、逐步规整</b>的建构，而非自然给定。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 制化自稳的机理：为什么"亢则害，承乃制"</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p class="quote">"亢则害，承乃制，制则生化。"——《素问·六微旨大论》</p>
    <p>这句话的"所以然"，要把生克<b>合起来</b>看：单看相生会无限放大、单看相克会此消彼长，唯有"<b>制化</b>"（生中有克、克中有生）能自稳。机理走一遍——</p>
    <p>设<b>木气偏亢</b>：木亢则<b>乘土</b>（克太过），脾土受损。系统靠什么把它拉回？靠"<b>承制</b>"：木之所不胜是<b>金</b>（金克木），当木亢到为害，金气"承"于其下而起制约（运气学称"<b>胜复</b>"——有胜必有复），<b>金来制木</b>，木平则土得复生化。这就是"亢（木盛）→害（乘土）→承（金承其下）→制（金克木）→复归生化"的<b>负反馈闭环</b>。</p>
    <p><b>临床即由此推出</b>：① "<b>见肝之病，知肝传脾，当先实脾</b>"——预见木亢必乘土，<b>提前实土以备承制、截断传变</b>，所以然正在于此；② "<b>培土生金</b>"（虚则补母）——肺金虚，补脾土，因土生金，从母脏接续其生化之源。</p>
    <div class="scholar"><b>现代同构与分寸：</b>五节点 × 生（促进）+克（抑制）的耦合，构成一个带<b>负反馈的自调节网络</b>，与控制论的稳态、生态种群平衡<b>结构同构</b>。但"同构"只是关系相似，<b>不等于</b>五脏就是这五个节点——把临床机理直接代入图论模型须谨慎，这是"知其所以然"与"过度比附"的分界。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 传变推演与学说的限度</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>相乘相侮为何能"预判病势"</b>：因为五行给了一张"谁约束谁"的<b>关系图</b>，失衡会沿图传导。规律是"<b>亢者乘其所胜、侮其所不胜</b>"——<b>相乘</b>＝沿克向太过（木乘土：肝旺克脾，见肝郁腹胀、泄泻）；<b>相侮</b>＝逆克向反欺（木侮金"木火刑金"：肝火犯肺，见咳逆、咯血）。抓住这条规则，就能顺图<b>预判邪往哪传</b>，提前堵截。</p>
    <p><b>它的限度，也要知其所以然</b>：五行附会之所以会失败，在于它是一个<b>封闭的"五分类比"系统</b>——任何事物都被强行纳入五类、按固定生克推演，于是容易<b>循环论证</b>（合者引为证、不合者另立解释），<b>难以被证伪</b>。所以历代成熟医家"<b>重脏腑气血的实质病机，五行生克为辅</b>"，绝不处处套用。</p>
    <div class="scholar"><b>结论：</b>用五行，贵在"<b>得意忘象</b>"——取其"关系-制化-反馈"的思维之神（这是真知），弃其机械比附之执（这是伪知）。<b>知其所以然者，自能取舍。</b></div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">小结 ·</span>从会用生克，到明其源流、机理与限度——这一层让你对五行<b>既能用、又拿捏得住分寸</b>。带这副眼光看后面藏象、辨证，五行只是底层的"关系语言"。</div>
</div>

</div>

5:{part:"第一部 · 思维与根基（理）", title:"藏象（上）", sub:"五脏不是五个器官", deepCount:5, body:`
<div class="block hook"><p>中医说的"心肝脾肺肾"，和西医解剖台上的同名器官，常常<b>不是一回事</b>。中医讲的是<b>功能系统</b>——这是初学最大的一个坎，迈过去，后面豁然开朗。</p></div>

<div class="block story"><h3><span class="badge">事</span>小故事 · 一个清代医生的"改错"</h3>
<p>清代医家王清任，不满前人对人体内部的描述含糊，竟亲赴义冢、刑场观察尸体脏腑，写成《医林改错》。他大胆提出："灵机记性，<b>在脑不在心</b>"——直接质疑了"心主神明"的千年定论。</p>
<p class="src">——王清任《医林改错》</p>
<p class="moral">这个故事告诉我们两件事：其一，中医的"脏"是<b>功能集合</b>，与解剖器官并不重合；其二，中医学术<b>本身也在演进</b>、容得下质疑——这正是我们该有的学习态度。</p></div>

<div class="block"><h3><span class="badge">核心</span>核心概念</h3>
<ol class="concepts">
<li><b>藏象</b>＝"藏"于内、"象"现于外，靠外在表现推测内在功能。五脏的共性是"<b>藏精气而不泻</b>"（像仓库，宜满不宜空）。</li>
<li><b>心</b>主血脉、藏神（主宰精神意识）。</li>
<li><b>肝</b>主疏泄（调畅气机情志）、藏血。</li>
<li><b>脾</b>主运化（消化吸收）、统血、升清——"后天之本"。<b>肺</b>主气司呼吸、宣发肃降、通调水道。<b>肾</b>藏精、主水、纳气、主骨生髓——"先天之本"。</li>
</ol></div>

<div class="block"><h3><span class="badge">图</span>一图看懂 · 五脏的核心职能</h3>
<div class="diagram">
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;text-align:left;">
<div style="background:#9e3526;color:#f5edda;border-radius:8px;padding:10px 12px;"><b style="font-size:17px;">心 · 火</b><br><span style="font-size:13px;">主血脉 · 藏神</span></div>
<div style="background:#586b50;color:#f5edda;border-radius:8px;padding:10px 12px;"><b style="font-size:17px;">肝 · 木</b><br><span style="font-size:13px;">主疏泄 · 藏血</span></div>
<div style="background:#a8884e;color:#f5edda;border-radius:8px;padding:10px 12px;"><b style="font-size:17px;">脾 · 土</b><br><span style="font-size:13px;">主运化 · 统血 · 升清</span></div>
<div style="background:#8a8f93;color:#f5edda;border-radius:8px;padding:10px 12px;"><b style="font-size:17px;">肺 · 金</b><br><span style="font-size:13px;">主气 · 宣降 · 通调水道</span></div>
<div style="background:#3b5566;color:#f5edda;border-radius:8px;padding:10px 12px;"><b style="font-size:17px;">肾 · 水</b><br><span style="font-size:13px;">藏精 · 主水 · 纳气 · 主骨</span></div>
</div>
<div class="cap">五脏＝五大功能系统，各司其职又彼此协同</div>
</div></div>

<div class="block"><h3><span class="badge">参</span>名家说 & 现代视角</h3>
<p class="quote">"心者，君主之官，神明出焉。"——《素问·灵兰秘典论》</p>
<p>《内经》用一套"官职"来比喻脏腑分工：心是君主、肝是将军、肺是宰相……这本身就是"取象比类"。</p>
<div class="modern"><b>现代视角：</b>中医的脏，是跨越多个现代系统的<b>功能集合</b>。例如"脾"≈消化吸收＋部分免疫与代谢，并非解剖的脾脏；"肾"≈生殖、内分泌、泌尿、生长发育的总和，远大于解剖肾。<b>记住：功能系统 ≠ 解剖器官</b>，是读懂藏象的钥匙。</div></div>

<div class="block caution"><h3><span class="badge">辨</span>别误会</h3>
<p>① 中医的"脏"与西医同名器官别硬套（尤其脾、肾）；② "上火""肾虚"说的是<b>功能状态</b>，不是器官坏了；③ 五脏理论是模型，临床要结合具体辨证，而非套帽子。</p></div>

<div class="block"><h3><span class="badge">用</span>用得上</h3>
<p>用五脏功能给自己做个粗略体检：睡眠差、心悸——多关乎<b>心</b>；情绪郁结、两胁胀——多关乎<b>肝</b>；食欲差、易累、便溏——多关乎<b>脾</b>；易感冒、皮肤干、咳——多关乎<b>肺</b>；腰膝酸、精力差、夜尿多——多关乎<b>肾</b>。</p></div>

<div class="next-tip">读完标准版，你已能用五脏功能给自己粗判。想逐脏看清它的职能、常见失常与现代对应？　切「深入版」↘</div>

    <p><b>主血脉</b>：推动血液在脉中运行，其华在面、其充在血脉，故面色与脉象可候心。<b>藏神</b>：主宰精神、意识、思维与睡眠（"心藏神"）。开窍于舌。</p>
    <p>失常：心血不足则心悸、失眠、健忘、面色无华；心火亢则口舌生疮、烦躁。</p>

  </div></div>

  <div class="acc-b">
    <p><b>主疏泄</b>：保持全身气机的通畅，进而调畅情志、助脾胃消化、疏通气血津液。<b>藏血</b>：贮藏血液、调节血量。在体为筋、其华在爪、开窍于目。</p>
    <p>失常有三型：<b>肝气郁结</b>（情绪低落、胁胀、叹气）、<b>肝阳上亢/肝火</b>（头胀痛、目赤、易怒）、<b>肝风内动</b>（眩晕、抽搐、震颤）。</p>
    <div class="modern"><b>现代视角：</b>"肝主疏泄"与情绪—自主神经—消化的联动高度相关（情绪一差就胃口差、胁肋胀），是中医对<b>身心相关</b>最精彩的论述之一。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 脾 · 后天之本</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>主运化</b>：把饮食化为水谷精微并输布全身——是气血生化之源。<b>主升清</b>：将精微上输心肺、维持内脏位置。<b>统血</b>：固摄血液不外溢。在体为肌肉、其华在唇、开窍于口。</p>
    <p>失常：脾气虚（乏力、食少、便溏）、脾不统血（出血、瘀斑）、脾气下陷（脏器下垂）、脾虚生湿（困重、痰多）。</p>
    <div class="modern"><b>现代视角：</b>中医"脾"≈消化吸收系统＋部分免疫代谢功能，与解剖脾脏不同。"脾为后天之本"提示<b>顾护脾胃</b>是养生与治病的根本抓手。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>④ 肺 · 相傅之官</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>主气、司呼吸</b>：主管呼吸与一身之气。<b>宣发肃降</b>：把气与津液向上向外布散、又向下向内通降。<b>通调水道</b>：参与水液代谢（"肺为水之上源"）。<b>朝百脉</b>。在体为皮、其华在毛、开窍于鼻。肺为"娇脏"，最易受外邪。</p>
    <p>失常：肺气虚（气短、易感冒、自汗）、肺失宣降（咳喘、鼻塞）、肺燥（干咳少痰）。</p>
    <div class="modern"><b>现代视角：</b>除呼吸功能外，"肺主皮毛、司腠理开合"把<b>呼吸系统与体表屏障、免疫</b>联系起来，解释了为何"肺卫不固"易反复感冒。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>⑤ 肾 · 先天之本</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>藏精</b>：贮藏先天之精与后天之精，主<b>生长发育与生殖</b>。<b>主水</b>：主持水液代谢。<b>主纳气</b>：协助肺完成深吸气。<b>主骨生髓、通于脑</b>，其华在发，开窍于耳及二阴。命门之火寓于肾。</p>
    <p>失常：肾阴虚（潮热盗汗、腰膝酸、耳鸣）、肾阳虚（畏寒、夜尿多、性功能减退）、肾精亏（发育迟缓、早衰、不孕）、肾不纳气（动则气喘）。</p>
    <div class="modern"><b>现代视角：</b>中医"肾"远大于解剖肾，≈生殖—内分泌—泌尿＋生长发育＋部分骨与脑的功能。"肾为先天之本"对应着<b>体质禀赋与衰老</b>的根本。</div>
  </div></div>

  <div class="dd-bridge"><span class="lead">承上 ·</span>深入版你已掌握五脏的职能与证型。这一层<b>仍论五脏</b>，只追到学理与实证：藏象如何由解剖走向功能、心主神明之辨、脾胃与肾命学说及其现代研究。</div>

  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 为什么"脏"会变成功能系统</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>先破误解：中医<b>并非没有解剖</b>——《灵枢·肠胃》已有肠胃长度容量的度量。它<b>选择</b>走功能化，有两个所以然：① 古代无从研究器官的微观机制；② "<b>司外揣内</b>"（从外显征象反推内在）既可行、又能直接指导诊疗。</p>
    <p>关键的"所以然"是：<b>为什么这条路会产出"脏＝功能系统"？</b>因为在临床上，<b>症状是按功能成簇出现的</b>——食少、便溏、乏力、面萎黄、肌肉瘦总是<b>一起</b>来。古人把"反复同现的一簇功能"打包成一个"脏"，于是"脾"就成了<b>运化＋生血＋统摄＋主肌肉</b>的功能集合，而不是解剖那一片脾脏。这是一种"<b>按功能聚类</b>"的建模：它牺牲了解剖的精确，换来了整体、联系、可直接处方的临床模型。</p>
    <div class="scholar"><b>由此可解一困惑：</b>"中西医脏腑对不上"不是谁错了，而是<b>分类原则不同</b>——西医按解剖部位分，中医按功能成簇分。理解"藏象＝以功能统解剖"，这个千古困惑就化解了。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 古人为什么把"神"归于心</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>"心主神明"常被当笑话，但它<b>有其所以然</b>，是对真实相关性的朴素把握：① <b>心主血脉，而"血者，神气也"</b>——血是神志的物质基础，故心血充则神明、心血虚则神乱（失眠、健忘、心悸往往同见）；② <b>情志剧烈时心跳应之</b>（惊则心悸、喜则心动），古人由此直观地把"情志—心动—意识"联系起来，遂以心为"君主之官、神明出焉"。</p>
    <p>当然《内经》也说"<b>头者精明之府</b>""脑为髓海"，心脑并见；李时珍"脑为元神之府"、王清任"灵机记性在脑"进而明确归脑；现代神经科学确证<b>神在脑</b>。</p>
    <p><b>调和的所以然</b>：中医说的"心神"，实际打包的是"<b>心血供养＋情志＋睡眠</b>"这一整体功能态——它与现代"<b>心脑血管—自主神经—情志</b>"的双向调节确有相关（心率变异性与情绪认知互相影响）。所以"心主神明"是古人在"心为君主"框架下、对"血—神"相关性的<b>功能表述</b>，与"脑主神明"<b>不在同一坐标系</b>，不必强分高下，而要理解各自语境。</p>
    <div class="scholar"><b>方法论启示：</b>读到一个"看似错误"的古代论断，先别急着否定——追问古人<b>凭什么观察这样说</b>，往往能看到一条被功能语言包裹的真实相关性。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 为什么中医的"肾"≈一个神经内分泌网络</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>脾胃学说</b>（李东垣《脾胃论》"内伤脾胃，百病由生"）的所以然：脾胃是"<b>后天之本、气血生化之源</b>"——一身脏腑皆赖其化生的气血濡养，故脾胃一败、诸脏失养，"百病由生"是顺理的推论。现代"脾"跨消化吸收、能量代谢、菌群、黏膜免疫，"脾虚证"与胃肠动力、消化酶、免疫指标相关，正对应这一"供养全身"的枢纽地位。</p>
    <p><b>为什么"肾"对应一个神经内分泌网络？</b>知其所以然就不奇怪了——中医"肾"主的是"<b>生长、发育、生殖、衰老</b>"（《素问》女子七七、男子八八之数，天癸"至"而能育、"竭"而衰），而这一组功能，在现代恰由<b>下丘脑—垂体—性腺/肾上腺/甲状腺轴</b>所主司。沈自尹等的"<b>肾阳虚证</b>"研究发现它与这几条轴的功能低下相关——这<b>不是巧合</b>，而是因为中医"肾"打包的，正是"主导生长生殖与应激"的那组功能，这组功能现代由这几条轴承担。"<b>命门</b>"（真阴真阳/元阳元阴）即对这套"生命原动力"的中医命名。</p>
    <div class="scholar"><b>研究里程碑：</b>"肾阳虚证—下丘脑-垂体-靶腺轴"是中医证候客观化的经典范例。它给的更深启示是：<b>中医的脏 = 一组功能的命名</b>，要找它的"现代对应"，就去找<b>承担这组功能的系统</b>，而非同名的解剖器官。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">小结 ·</span>从会用五脏辨身体，到明白它"为何是功能系统"、与现代生理如何对话——五脏的认识就立体了。这正是后面<b>脏腑辨证</b>（第14课）的根基。</div>
</div>

</div>

6:{part:"第一部 · 思维与根基（理）", title:"藏象（下）", sub:"六腑与脏腑关系", deepCount:5, body:`
<div class="block hook"><p>五脏管"藏"，六腑管"通"。如果说五脏是仓库，<b>六腑就是一条流水线</b>——饮食从进到出，全靠这条线顺不顺。六腑的健康法则只有一个字：<b>通</b>。</p></div>

<div class="block story"><h3><span class="badge">事</span>小故事 · 一通则神昏自醒</h3>
<p>《伤寒论》中，阳明腑实证的病人高热、腹满硬痛、甚至神昏谵语。仲景用<b>大承气汤</b>峻下，待积滞一通、腑气一降，高热与神昏竟随之而解——这就是"<b>釜底抽薪、急下存阴</b>"。</p>
<p class="src">——《伤寒论》阳明病篇</p>
<p class="moral">六腑"以通为用"——堵住了，全身都遭殃；通开了，连神志都能转危为安。这是理解六腑最生动的一课。</p></div>

<div class="block"><h3><span class="badge">核心</span>核心概念</h3>
<ol class="concepts">
<li><b>六腑</b>：胆、胃、小肠、大肠、膀胱、三焦。共性是"<b>传化物而不藏</b>"——像流水线，宜<b>通、降</b>，不宜积滞。</li>
<li><b>奇恒之腑</b>：脑、髓、骨、脉、胆、女子胞——形态像腑、功能似脏（藏精气）。</li>
<li><b>脏腑表里相合</b>：心-小肠、肺-大肠、脾-胃、肝-胆、肾-膀胱、心包-三焦，一脏一腑互为表里。</li>
<li>脏与腑分工："藏"与"通"配合，一收一放，身体才能运转。</li>
</ol></div>

<div class="block"><h3><span class="badge">图</span>一图看懂 · 脏腑表里相合</h3>
<div class="diagram">
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;text-align:center;font-size:14px;">
<div style="border:1px solid var(--line);border-radius:8px;padding:8px;"><span style="color:#9e3526">心</span> ⇄ <span style="color:#41513c">小肠</span></div>
<div style="border:1px solid var(--line);border-radius:8px;padding:8px;"><span style="color:#9e3526">肺</span> ⇄ <span style="color:#41513c">大肠</span></div>
<div style="border:1px solid var(--line);border-radius:8px;padding:8px;"><span style="color:#9e3526">脾</span> ⇄ <span style="color:#41513c">胃</span></div>
<div style="border:1px solid var(--line);border-radius:8px;padding:8px;"><span style="color:#9e3526">肝</span> ⇄ <span style="color:#41513c">胆</span></div>
<div style="border:1px solid var(--line);border-radius:8px;padding:8px;"><span style="color:#9e3526">肾</span> ⇄ <span style="color:#41513c">膀胱</span></div>
<div style="border:1px solid var(--line);border-radius:8px;padding:8px;"><span style="color:#9e3526">心包</span> ⇄ <span style="color:#41513c">三焦</span></div>
</div>
<div class="cap">一脏一腑互为表里，生理相通、病理相及、治疗可互用</div>
</div></div>

<div class="block"><h3><span class="badge">参</span>名家说 & 现代视角</h3>
<p class="quote">"六腑者，传化物而不藏，故实而不能满也。"——《素问·五脏别论》</p>
<p>一句话点出腑的本性：它是"过路"的，东西要不停地往下传，<b>满了就得排，绝不能久留</b>。</p>
<div class="modern"><b>现代视角：</b>六腑大体对应消化道的传导、胆汁分泌、水液代谢等功能。其中<b>三焦</b>实质争议最大，多被理解为水液与元气运行的"通道"或功能区划，而非某个具体器官——这点要诚实承认。</div></div>

<div class="block caution"><h3><span class="badge">辨</span>别误会</h3>
<p>① "三焦"是什么至今无定论，别强求一个实体；② "以通为用"不等于滥用泻药通便，通也要辨虚实；③ 奇恒之腑"形似腑而功能似脏"，别与六腑混为一谈。</p></div>

<div class="block"><h3><span class="badge">用</span>用得上</h3>
<p>把"腹胀、便秘"理解为<b>腑气不通</b>，调理重在恢复通降；利用表里关系，如<b>肺与大肠相表里</b>——肺热可致便秘，通腑泄热反过来又能助肺气宣降。</p></div>

  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 六腑各论</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>胆</b>：贮藏、排泄胆汁助消化，又"主决断"（与情志、胆量相关，故归奇恒之腑之一）。<b>胃</b>：受纳、腐熟水谷，"水谷之海"，以降为顺。<b>小肠</b>：受盛化物、泌别清浊（分清浊、吸收精微）。<b>大肠</b>：传导糟粕、主津（重吸收水分）。<b>膀胱</b>：贮尿、排尿，赖肾的气化。<b>三焦</b>：通行元气、运行水液的总通道。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② "以通为用、以降为顺"</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>六腑是动态的传化系统，最忌停滞。胃气要降（不降则呕、胀）、大肠要通（不通则便秘、腹满）、胆汁要泄（郁则口苦、黄疸）。所以六腑病多见"不通、不降"，治法常用<b>通、降、消、导</b>。</p>
    <p>但"通"要辨虚实：实证（积滞、热结）可攻下；虚证（如气虚便秘、阳虚便秘）则需益气温阳以助通，硬泻反伤正气。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 脏腑表里关系的妙用</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>六对脏腑互为表里，经络相互络属，生理上相互配合、病理上相互影响、治疗上可<b>互治</b>。</p>
    <p>典型如<b>肺与大肠</b>：肺气肃降有助大肠传导，故肺热可致便秘；反之通腑泄热（泻大肠）能让肺气得降、喘咳得平——这是临床"脏病治腑、腑病治脏"的常用思路。又如<b>心与小肠</b>：心火可下移小肠致小便短赤，清心即可利尿。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>④ 奇恒之腑</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>脑、髓、骨、脉、胆、女子胞，合称奇恒之腑——形态中空像腑，功能却像脏（贮藏精气而不泻）。</p>
    <p>其中<b>脑</b>为"髓之海"，由肾精化髓充养，主管精神与感觉运动（王清任更明确提出"灵机记性在脑"）；<b>女子胞</b>（子宫）主月经与孕育，与肾、冲任二脉关系密切。</p>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>⑤ 三焦学说之争 & 现代视角</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>三焦是六腑中最特殊的一个，历代争论不休：有"有名无形"说、有以胸腹腔分上中下三部的"部位三焦"说（上焦心肺、中焦脾胃、下焦肝肾肠膀胱），也有把它看作水液与元气通道的"功能三焦"说。</p>
    <div class="modern"><b>诚实地说：</b>三焦至今没有公认的解剖实体。现代多取其<b>功能与部位</b>含义——作为元气和水液运行的通道、以及对脏腑的三段式分区。学习时把握"通行元气、运行水液"这个功能内核即可，不必强求一个器官。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">启下 ·</span>三焦到底有没有实体？脏腑表里有没有现代证据？脑与女子胞的理论如何发展至今？切「专家版」。</div>
</div>

<div class="deepdive dd-expert expert-only">

  <div class="dd-bridge"><span class="lead">承上 ·</span>深入版你已掌握六腑、表里与奇恒之腑。这一层<b>仍论此</b>，只追到学理与实证：三焦实质之争、脏腑相合的现代证据（肠-肺轴）、脑髓与女子胞理论。</div>

  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>① 三焦为什么"有名而无形"</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>三焦聚讼两千年，根子在<b>经典自身的"矛盾"</b>：《难经·二十五难》明说"<b>有名而无形</b>"，《灵枢》等处又把它当有部位、有通道的实体来用。这不是古人糊涂——<b>知其所以然</b>：三焦本就是为<b>命名一个功能</b>（通行元气、运行水液的总通道）而设的概念，它"<b>有名</b>"（功能确凿）而"<b>无形</b>"（不对应单一器官）。后人非要给它找实体，自然各执一端、永无定论。</p>
    <p><b>部位三焦</b>（上焦如雾、中焦如沤、下焦如渎）是后世为温病辨证作的<b>实用再造</b>——把躯干分三段以定位病势。它之所以"好用"，正因为它不纠缠实体、只取"功能＋部位"之义。</p>
    <div class="scholar"><b>对现代比附的立场：</b>把三焦比附淋巴、网膜、"间质（interstitium）"，多是<b>启发性联想</b>，远未证实。明白三焦"有名无形"的设计初衷，就不会执着于"它到底是哪个器官"——把握"通行元气、运行水液"的功能内核即可。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>② 表里相合为什么能"互治"</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p>"脏病治腑、腑病治脏"不是玄学，机理在<b>经脉络属</b>。以肺与大肠为例：手太阴肺经"<b>下络大肠</b>"，使二者在<b>气化上同条经气的两端</b>——肺主肃降，其降<b>有助</b>大肠传导；故肺热壅盛则大肠失润而<b>便秘</b>，反之<b>通腑泄热</b>（泻大肠）能让<b>肺气得降、喘咳得平</b>。这就是互治的所以然。心与小肠同理：心火下移小肠则<b>小便短赤</b>，清心即可利尿。</p>
    <p><b>现代呼应的所以然</b>："肺与大肠相表里"为何与"<b>肠-肺轴（gut-lung axis）</b>"暗合？因为肠道菌群与黏膜免疫确实通过<b>全身黏膜免疫的联动</b>影响呼吸道——古人从临床联系归纳出的"表里"，现代从免疫-菌群找到了部分机制对应。</p>
    <div class="scholar"><b>分寸：</b>"呼应"不是"等同"。"肠-肺轴"为重读中医表里提供了实证对话的可能，但要防"古已有之"式的牵强比附——古人讲的是功能联系，现代讲的是分子机制，二者可对话、不可划等号。</div>
  </div></div>
  <div class="acc"><button class="acc-h" onclick="accToggle(this)"><span>③ 脑与女子胞为什么都系于"肾"</span><span class="ico">＋</span></button>
  <div class="acc-b">
    <p><b>脑（髓海）为何系于肾？</b>有一条清晰的链：<b>肾藏精 → 精生髓</b>（"肾主骨生髓"）<b> → 髓上充于脑</b>（"脑为髓之海"）。所以肾精充则脑髓足、耳聪目明记性好；肾精亏则髓海不足、<b>眩晕耳鸣健忘</b>。这正是"<b>补肾填精</b>"治认知衰退、小儿发育迟缓的所以然——<b>从源头补髓之化生</b>，而非直接治脑。</p>
    <p><b>女子胞为何系于肾？</b>《素问·上古天真论》给了一条链："女子……二七而<b>天癸至</b>，任脉通、太冲脉盛，月事以时下；……七七，<b>天癸竭</b>，地道不通"。这条"<b>肾气 → 天癸 → 冲任 → 胞宫</b>"的链，正是现代<b>下丘脑—垂体—卵巢轴</b>的中医版本。所以"<b>补肾调周法</b>"治月经病、不孕，所以然就在于：它调的正是这条生殖内分泌轴的中医对应。</p>
    <div class="scholar"><b>贯通：</b>两条链都落到"肾"，再次印证第①课藏象上的判断——中医的"肾"是"<b>主导生长发育、生殖、髓脑</b>"这一组功能的命名；找现代对应，就去找承担这组功能的轴系。</div>
  </div></div>
  <div class="dd-bridge out"><span class="lead">小结 ·</span>从会用"通降"与表里互治，到看清三焦之争、相合的现代线索、脑与胞宫的理论——六腑与奇恒之腑的认识就完整了。</div>
</div>

7:{part:"第一部 · 思维与根基（理）", title:"气血津液", sub:"身体里流动的资源", deepCount:4, body:`
<div class="block hook"><p>前面讲了"气"。气、血、津液，是身体里三种会<b>流动的资源</b>：气是动力，血是滋养，津液是身体的"水利系统"。它们一荣俱荣、一损俱损——读懂它们的关系，就读懂了大半个中医病理。</p></div>

<div class="block story"><h3><span class="badge">事</span>小故事 · 补血先补气</h3>
<p>金元名医李东垣创"当归补血汤"，治血虚发热。奇的是：全方只两味药，<b>黄芪却用了当归的五倍</b>——补血方里，补气药反成主角。其理据是："<b>有形之血不能自生，生于无形之气</b>。"</p>
<p class="src">——李东垣《内外伤辨惑论》</p>
<p class="moral">血少了，光补血还不够，得先把生血的"动力"（气）补足。这正是"气为血之帅、血为气之母"的活用。</p></div>

<div class="block"><h3><span class="badge">核心</span>核心概念</h3>
<ol class="concepts">
<li><b>血</b>：循行于脉中、营养滋润全身，由营气、津液与精化生；心主血、肝藏血、脾统血。</li>
<li><b>津液</b>：体内一切正常水液的总称，滋润濡养；由脾、肺、肾、三焦共同代谢。</li>
<li><b>气血关系</b>："<b>气为血之帅</b>"（气能生血、行血、摄血）、"<b>血为气之母</b>"（血能载气、养气）。</li>
<li><b>津血同源</b>：津液与血同源互化，故"大汗、大吐泻伤津"也会伤血、耗气。</li>
</ol></div>

<div class="block"><h3><span class="badge">图</span>一图看懂 · 气血津液的相互关系</h3>
<div class="diagram">
<svg viewBox="0 0 360 220" xmlns="http://www.w3.org/2000/svg" font-family="STKaiti,KaiTi,serif">
<circle cx="180" cy="55" r="42" fill="#9e3526"/><text x="180" y="50" text-anchor="middle" fill="#f5edda" font-size="20">气</text><text x="180" y="70" text-anchor="middle" fill="#f3dcd0" font-size="11">动力</text>
<circle cx="90" cy="165" r="42" fill="#7a2d2d"/><text x="90" y="160" text-anchor="middle" fill="#f5edda" font-size="20">血</text><text x="90" y="180" text-anchor="middle" fill="#f3dcd0" font-size="11">滋养</text>
<circle cx="270" cy="165" r="42" fill="#3b5566"/><text x="270" y="160" text-anchor="middle" fill="#f5edda" font-size="20">津液</text><text x="270" y="180" text-anchor="middle" fill="#dfe6da" font-size="11">濡润</text>
<line x1="150" y1="88" x2="118" y2="132" stroke="#a8884e" stroke-width="2"/><text x="120" y="118" fill="#5a5048" font-size="11">气帅血</text>
<line x1="210" y1="88" x2="242" y2="132" stroke="#a8884e" stroke-width="2"/><text x="225" y="118" fill="#5a5048" font-size="11">气行津</text>
<line x1="132" y1="165" x2="228" y2="165" stroke="#a8884e" stroke-width="2" stroke-dasharray="5 4"/><text x="180" y="160" text-anchor="middle" fill="#5a5048" font-size="11">津血同源</text>
</svg>
<div class="cap">三者互相依存：气推动血与津，血与津承载并滋养气</div>
</div></div>

<div class="block"><h3><span class="badge">参</span>名家说 & 现代视角</h3>
<p class="quote">"血之与气，异名同类。"——《灵枢·营卫生会》</p>
<div class="modern"><b>现代视角：</b>血≈血液；津液≈体液、组织液、各种分泌液；合看，气血津液近于"<b>能量代谢—血液循环—体液平衡</b>"这个相互依存的大系统。中医很早就强调它们是<b>一个整体</b>，牵一发而动全身。</div></div>

<div class="block caution"><h3><span class="badge">辨</span>别误会</h3>
<p>① 中医"血虚"≠西医贫血，范围更宽（含营养、循环、神经功能的多种表现）；② 补不是越多越好，要分清气虚、血虚、阴虚；③ 痰饮、瘀血是"病理产物"，留到下一部专讲。</p></div>

<div class="block"><h3><span class="badge">用</span>用得上</h3>
<p><b>血虚</b>常见：面色萎黄或苍白、头晕眼花、心悸失眠、手足麻、女性经量少色淡——调养重在健脾养血、气血双补。<b>津伤</b>常见：口干咽燥、皮肤干、便干、尿少——重在生津润燥、别再过度发汗利尿。</p></div>
