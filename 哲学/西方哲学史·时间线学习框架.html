<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>西方哲学史 · 时间线学习框架</title>
<style>
  :root{
    --bg:#f4f1ea; --paper:#fbf9f4; --ink:#2b2722; --ink-soft:#5c554b;
    --line:#ddd5c7; --accent:#8a5a2b; --accent-soft:#b98a52;
    --gold:#b08328; --rule:#c9bda6;
    --t1:#9b4722; --t2:#2f6b6b; --t3:#5a4a86;
    --shadow:0 1px 3px rgba(60,50,30,.08),0 8px 24px rgba(60,50,30,.06);
    --serif:"Songti SC","STSong","Noto Serif SC",Georgia,serif;
    --sans:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.75;}
  a{cursor:pointer}
  .app{display:flex;align-items:flex-start;}
  .side{width:300px;flex:none;position:sticky;top:0;height:100vh;overflow-y:auto;
    background:var(--paper);border-right:1px solid var(--line);padding:24px 16px 50px;}
  .brand{font-family:var(--serif);font-size:20px;font-weight:600;color:var(--accent);letter-spacing:.03em;}
  .brand small{display:block;font-family:var(--sans);font-size:11px;color:var(--accent-soft);letter-spacing:.32em;margin-top:4px;font-weight:400;}
  .threads-mini{margin:14px 0;padding:11px 0;border-top:1px dashed var(--rule);border-bottom:1px dashed var(--rule);}
  .threads-mini .tt{font-size:11px;letter-spacing:.2em;color:var(--accent);margin-bottom:8px;}
  .threads-mini .tr{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ink-soft);margin:4px 0;}
  .dot{width:11px;height:11px;border-radius:50%;flex:none}
  .d1{background:var(--t1)} .d2{background:var(--t2)} .d3{background:var(--t3)}
  .nav{margin-top:4px}
  .navov{display:block;font-family:var(--serif);color:var(--accent);font-size:14px;padding:7px 8px;border-radius:7px;text-decoration:none;margin-bottom:6px}
  .navov:hover,.navov.on{background:#f3ead7}
  .navgrp{margin:1px 0}
  .grphead{display:flex;gap:7px;align-items:flex-start;padding:7px 8px;border-radius:7px;color:var(--ink);font-size:13.5px;text-decoration:none;position:relative}
  .grphead .gi{color:var(--accent-soft);font-size:11px;flex:none;width:14px;text-align:center;margin-top:3px;transition:.15s}
  .grphead:hover{background:#f3ecdd}
  .grphead .gt{font-weight:600}
  .grphead .gy{display:block;font-size:10px;color:var(--accent-soft);font-weight:400;margin-top:1px}
  .navgrp.on>.grphead{color:var(--accent);background:#f3ead7}
  .navgrp.open>.grphead .gi{transform:rotate(90deg);color:var(--accent)}
  .subnav{display:none;margin:2px 0 6px 20px;border-left:1px solid var(--line);padding-left:8px}
  .navgrp.open .subnav{display:block}
  .subi{display:block;font-size:12.5px;color:var(--ink-soft);padding:5px 7px;border-radius:6px;text-decoration:none}
  .subi:hover{background:#f3ecdd;color:var(--ink)}
  .subi.on{color:var(--accent);font-weight:700;background:#f3ead7}
  .subi .si{color:var(--accent-soft);font-size:11px;margin-right:5px}
  .main{flex:1;min-width:0;}
  #page{max-width:940px;margin:0 auto;padding:38px 38px 100px;}
  .crumb{font-size:13px;color:var(--accent-soft);margin-bottom:12px}
  .crumb a{color:var(--accent);text-decoration:none}
  .crumb a:hover{text-decoration:underline}
  .chead .chnum{font-family:var(--serif);font-size:13px;color:var(--accent-soft);letter-spacing:.2em;}
  .chead .chperiod{float:right;font-size:13px;color:#fff;background:var(--accent);padding:3px 12px;border-radius:14px;}
  .chead h2{font-family:var(--serif);font-size:30px;font-weight:600;margin:6px 0 4px;letter-spacing:.02em;}
  .tags{margin:12px 0 4px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .tag{font-size:11px;padding:2px 9px;border-radius:10px;color:#fff;}
  .tag1{background:var(--t1)} .tag2{background:var(--t2)} .tag3{background:var(--t3)}
  .geotag{font-size:12px;color:#fff;background:var(--t2);padding:2px 11px;border-radius:11px;}
  .geotag::before{content:"📍";font-size:11px;margin-right:3px}
  .cq{font-family:var(--serif);font-size:19px;color:var(--accent);border-left:3px solid var(--gold);padding:8px 0 8px 18px;margin:18px 0;font-style:italic;line-height:1.7}
  .block{margin:22px 0;}
  .blabel{display:inline-block;font-size:12px;font-weight:700;letter-spacing:.12em;color:var(--accent);margin-bottom:8px;}
  .blabel::before{content:"❖ ";color:var(--accent-soft);}
  .block p{font-size:15.5px}
  .flow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;border:1px dashed var(--rule);border-radius:12px;overflow:hidden;background:#fff;}
  .flow .step{padding:14px 16px;position:relative;}
  .flow .step:not(:last-child){border-right:1px dashed var(--rule);}
  .flow .step h4{font-family:var(--serif);font-size:14px;margin-bottom:5px;}
  .flow .s1 h4{color:var(--t1)} .flow .s2 h4{color:var(--gold)} .flow .s3 h4{color:var(--t2)}
  .flow .step p{font-size:13.5px;color:var(--ink-soft);}
  .flow .step::after{content:"→";position:absolute;right:-9px;top:50%;transform:translateY(-50%);color:var(--accent-soft);font-size:18px;background:#fff;z-index:2;}
  .flow .step:last-child::after{display:none}
  .lineage{background:#f7f2e8;border-radius:8px;padding:13px 16px;font-size:14.5px;color:var(--ink-soft);}
  .lineage b{color:var(--accent);font-family:var(--serif);}
  .test{border-top:1px solid var(--line);margin-top:22px;padding-top:14px;}
  .test summary{cursor:pointer;font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.1em;list-style:none;}
  .test summary::-webkit-details-marker{display:none}
  .test summary::before{content:"▸ ";}
  .test[open] summary::before{content:"▾ ";}
  .test ol{margin:12px 0 4px 20px;color:var(--ink-soft);font-size:14px;}
  .test li{margin:6px 0;}
  /* deep / debate / impact / concepts */
  .deep{margin:16px 0}
  .deep h4{font-family:var(--serif);font-size:17px;color:var(--accent);margin-bottom:5px}
  .deep p{font-size:15px;color:var(--ink);line-height:1.85}
  .deep.deb h4{color:var(--t1)} .deep.imp h4{color:var(--t2)}
  .concepts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .concept{background:#fff;border:1px solid var(--line);border-left:3px solid var(--t3);border-radius:8px;padding:10px 13px}
  .concept b{font-family:var(--serif);color:var(--t3);display:block;margin-bottom:3px;font-size:14.5px}
  .concept span{font-size:13.5px;color:var(--ink-soft)}
  .quote{background:#fff;border:1px solid var(--line);border-left:4px solid var(--gold);border-radius:8px;padding:14px 18px;margin:14px 0;}
  .quote .q{font-family:var(--serif);font-size:16px;}
  .quote .who{font-size:12.5px;color:var(--accent);margin-top:4px;}
  .quote .plain{font-size:13.5px;color:var(--ink-soft);margin-top:8px;border-top:1px dotted var(--rule);padding-top:8px;}
  .quote .plain b{color:var(--accent);}
  /* sub-chapter cards */
  .subcards{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .subcard{background:#fff;border:1px solid var(--line);border-left:3px solid var(--accent-soft);border-radius:10px;padding:13px 16px;cursor:pointer;transition:.15s}
  .subcard:hover{border-left-color:var(--accent);box-shadow:var(--shadow);transform:translateY(-1px)}
  .subcard .sid{font-size:11px;color:var(--accent-soft);letter-spacing:.12em}
  .subcard h4{font-family:var(--serif);font-size:16px;color:var(--ink);margin:3px 0 5px}
  .subcard p{font-size:13px;color:var(--ink-soft);line-height:1.6}
  /* sub page locator */
  .locmap{width:320px;max-width:42%;float:right;margin:2px 0 14px 20px;border-radius:10px;background:#d4e3ea;border:1px solid var(--line)}
  .land{fill:#e7dcc4}
  .rmini{fill:none;stroke:#cdbb98;stroke-width:2;stroke-dasharray:5 5;opacity:.5}
  .rdone{fill:none;stroke:#b78a45;stroke-width:2.4;opacity:.7}
  .rstep{fill:none;stroke:var(--accent);stroke-width:3.4;stroke-linecap:round;}
  .cdot{fill:#fff;stroke:var(--accent-soft);stroke-width:2;cursor:pointer;transition:.2s}
  .cdot.cur{fill:var(--accent);stroke:#fff;animation:pulse 1.5s ease-in-out infinite}
  @keyframes pulse{0%,100%{r:7}50%{r:10.5}}
  .clab{font-size:13px;fill:#5c544a;font-family:var(--sans);pointer-events:none;transition:.2s}
  .clab.cur{fill:var(--accent);font-weight:700;font-size:14px}
  /* explore (chapter overview): sticky map + vertical timeline */
  .explore{display:grid;grid-template-columns:minmax(260px,0.88fr) 1.12fr;gap:20px;background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow);}
  .mapwrap{position:sticky;top:16px;align-self:start;}
  .cmap{width:100%;height:auto;display:block;border-radius:10px;background:#d4e3ea;border:1px solid var(--line);}
  .maphint{font-size:12px;color:var(--accent-soft);margin-top:8px;text-align:center}
  .vtlhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .vtlhead .h{font-size:12px;color:var(--accent);letter-spacing:.06em;font-weight:700}
  .vplay{font-family:var(--sans);font-size:12px;color:var(--accent);background:#fff;border:1px solid var(--line);border-radius:7px;padding:5px 11px;cursor:pointer;transition:.15s}
  .vplay:hover,.vplay.playing{background:var(--accent);color:#fff}
  .vtl{position:relative;}
  .vstop{display:grid;grid-template-columns:60px 26px 1fr;cursor:pointer;}
  .vyear{font-size:12.5px;color:var(--accent-soft);text-align:right;padding:2px 8px 0 0;font-weight:700;white-space:nowrap}
  .vrail{position:relative}
  .vrail::before{content:"";position:absolute;left:50%;top:0;bottom:0;width:2px;background:var(--rule);transform:translateX(-50%)}
  .vstop:first-child .vrail::before{top:9px}
  .vstop:last-child .vrail::before{bottom:auto;height:9px}
  .vdot{position:absolute;left:50%;top:5px;width:13px;height:13px;border-radius:50%;background:var(--paper);border:2px solid var(--accent-soft);transform:translateX(-50%);transition:.18s;z-index:1}
  .vstop:hover .vdot{border-color:var(--accent)}
  .vstop.active .vdot{background:var(--accent);border-color:var(--accent);box-shadow:0 0 0 4px rgba(138,90,43,.18)}
  .vbody{padding:0 0 18px 12px}
  .vschool{display:inline-block;font-size:11px;color:var(--t3);background:#ece8f3;border:1px solid #ddd5ea;padding:1px 9px;border-radius:9px;margin-bottom:3px}
  .vbody h4{font-family:var(--serif);font-size:16px;color:var(--ink);font-weight:600;margin:2px 0 4px}
  .vstop.active .vbody h4{color:var(--accent)}
  .vcity{font-size:11px;color:#fff;background:var(--t2);padding:1px 8px;border-radius:8px;font-family:var(--sans);font-weight:400;margin-left:4px}
  .vbody p{font-size:13.5px;color:var(--ink-soft);line-height:1.65}
  .navbtns{display:flex;justify-content:space-between;gap:10px;margin-top:30px;padding-top:18px;border-top:1px solid var(--line);}
  .navbtns button{font-family:var(--sans);font-size:14px;color:var(--accent);background:#f3ead7;border:1px solid var(--line);border-radius:8px;padding:9px 15px;cursor:pointer;transition:.15s;max-width:48%;text-align:left}
  .navbtns button:hover{background:var(--accent);color:#fff}
  .navbtns button:disabled{opacity:.35;cursor:default}
  .navbtns button .nbk{display:block;font-size:11px;opacity:.7}
  /* overview time machine */
  .ov-kicker{letter-spacing:.45em;font-size:12px;color:var(--accent);text-transform:uppercase;}
  .ov-h1{font-family:var(--serif);font-size:38px;font-weight:600;margin:12px 0 10px;}
  .ov-sub{color:var(--ink-soft);font-size:16px;max-width:700px;margin-bottom:18px}
  .ovmap{width:100%;height:auto;display:block;border-radius:14px;background:#d4e3ea;border:1px solid var(--line);box-shadow:var(--shadow);}
  .ovlab{font-size:12.5px;fill:#6b6354;font-family:var(--sans)}
  .ovdot{fill:#fff;stroke:var(--accent-soft);stroke-width:1.8;cursor:pointer;transition:.25s}
  .ovdot.visited{fill:var(--accent-soft)}
  .ovdot.cur{fill:var(--accent);stroke:#fff;stroke-width:2}
  .ovmarker{fill:var(--accent);stroke:#fff;stroke-width:2.5;filter:drop-shadow(0 1px 3px rgba(138,90,43,.5))}
  .ovcap{margin:14px 0 6px;background:#f7f2e8;border-radius:10px;padding:14px 18px;min-height:74px;border-left:4px solid var(--gold)}
  .ovcap .oc-top{font-size:12.5px;color:var(--accent-soft);letter-spacing:.08em}
  .ovcap .oc-t{font-family:var(--serif);font-size:21px;color:var(--ink);margin:3px 0 5px}
  .ovcap .oc-t b{color:var(--accent)}
  .ovcap .oc-d{font-size:14px;color:var(--ink-soft)}
  .ov-axis{display:flex;gap:2px;position:relative;margin:18px 2px 6px;overflow-x:auto;padding-top:4px}
  .ov-axis::before{content:"";position:absolute;left:8px;right:8px;top:10px;height:2px;background:var(--rule)}
  .tick{flex:1;min-width:46px;display:flex;flex-direction:column;align-items:center;background:none;border:none;cursor:pointer;padding:0}
  .tkdot{width:12px;height:12px;border-radius:50%;background:var(--paper);border:2px solid var(--accent-soft);z-index:1;transition:.15s}
  .tick:hover .tkdot{border-color:var(--accent)}
  .tick.active .tkdot{background:var(--accent);border-color:var(--accent);box-shadow:0 0 0 3px rgba(138,90,43,.18)}
  .tick.visited .tkdot{background:var(--accent-soft)}
  .tky{font-size:10px;color:var(--accent-soft);margin-top:5px;text-align:center;line-height:1.2}
  .tick.active .tky{color:var(--accent);font-weight:700}
  .ov-ctrl{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
  .ov-ctrl button{font-family:var(--sans);font-size:13.5px;color:var(--accent);background:#f3ead7;border:1px solid var(--line);border-radius:8px;padding:9px 18px;cursor:pointer;transition:.15s}
  .ov-ctrl button:hover{background:var(--accent);color:#fff}
  .ov-ctrl #ovplay.playing{background:var(--accent);color:#fff}
  .ov-hint{font-size:13px;color:var(--accent-soft);margin-top:14px}
  #bar{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--t1),var(--gold),var(--t3));width:0;z-index:99;transition:width .15s;}
  @media(max-width:880px){
    .app{flex-direction:column}
    .side{position:static;width:100%;height:auto;border-right:none;border-bottom:1px solid var(--line)}
    #page{padding:24px 18px 80px}
    .explore{grid-template-columns:1fr}
    .mapwrap{position:static}
    .flow{grid-template-columns:1fr}
    .flow .step:not(:last-child){border-right:none;border-bottom:1px dashed var(--rule)}
    .flow .step::after{content:"↓";right:50%;top:auto;bottom:-10px;transform:translateX(50%)}
    .ov-h1{font-size:30px}
    .subcards,.concepts{grid-template-columns:1fr}
    .locmap{float:none;max-width:100%;width:100%;margin:0 0 14px}
  }
</style>
</head>

 [ {y:"1794",s:"德国观念论",t:"费希特《知识学》",city:"jena",d:"取消康德不可知的物自体,以能动的『自我』设定自身与非我,把世界理解为精神自我实现的产物。"},
   {y:"1800",s:"同一哲学",t:"谢林《先验观念论》",city:"tubingen",d:"主张自然与精神是同一『绝对』的两面,在自然哲学与艺术中寻求二者的统一。"},
   {y:"1807",s:"绝对观念论",t:"黑格尔《精神现象学》",city:"jena",d:"意识经辩证运动(正—反—合)与主奴、苦恼意识诸环节,逐步走向绝对知识;『真理是全体』。"},
   {y:"1821",s:"历史哲学",t:"黑格尔《法哲学》",city:"berlin",d:"『凡合理的都是现实的』;世界历史是绝对精神实现自由意识的进程,个人激情被『理性的狡计』所利用。"} ],
 [ {y:"1818",s:"唯意志论",t:"叔本华《意志与表象的世界》",city:"frankfurt",d:"世界的内核是盲目、无尽的生命意志,理智只是其仆人;人生在欲求之苦与满足之无聊间摆荡,解脱靠审美静观与否定意志。"},
   {y:"1843",s:"存在主义先声",t:"克尔凯郭尔《非此即彼》",city:"copenhagen",d:"真理是主体性;面对无法被体系担保的人生抉择,个体须以恐惧战栗中的『信仰之跃』亲自承担。"},
   {y:"1867",s:"历史唯物主义",t:"马克思《资本论》",city:"london",d:"把黑格尔辩证法『倒过来』:社会存在决定意识,经济基础决定上层建筑;哲学要改变世界,而非仅仅解释世界。"},
   {y:"1883",s:"生命哲学·权力意志",t:"尼采《查拉图斯特拉》",city:"basel",d:"『上帝已死』,最高价值崩塌而面临虚无;追溯道德谱系,呼吁重估一切价值,以权力意志与『超人』姿态肯定生命。"} ],
 [ {y:"1900",s:"现象学",t:"胡塞尔《逻辑研究》",city:"freiburg",d:"创立现象学,主张『回到事物本身』,以悬置与意向性描述意识如何构成意义,反对把意识化约为心理或物理过程。"},
   {y:"1927",s:"存在论",t:"海德格尔《存在与时间》",city:"freiburg",d:"从能追问存在的『此在』入手;人被抛于世、沉沦于『常人』,唯有『向死而生』方能本真地承担自己的存在。"},
   {y:"1942",s:"荒诞哲学",t:"加缪《西西弗神话》",city:"paris",d:"面对世界的荒诞(无意义却渴望意义),拒绝自杀与盲信,主张以清醒的反抗活着——『必须想象西西弗是幸福的』。"},
   {y:"1943",s:"存在主义",t:"萨特《存在与虚无》",city:"paris",d:"『存在先于本质』,人被判定为自由、凭选择定义自身;否认这份自由、假装被处境决定,即是『自欺』。"} ],
 [ {y:"1879",s:"现代逻辑",t:"弗雷格《概念文字》",city:"jena",d:"创立现代谓词逻辑,区分涵义与指称,为以逻辑分析语言、进而分析思想提供了精确工具与基础。"},
   {y:"1921",s:"逻辑原子论",t:"维特根斯坦《逻辑哲学论》",city:"cambridge",d:"『图像论』——命题是事实的逻辑图像;语言的界限即世界的界限,伦理与意义在界限之外,『不可说者应保持沉默』。"},
   {y:"1929",s:"逻辑实证主义",t:"维也纳学派宣言",city:"vienna",d:"提出『可证实原则』——有意义须可经验证实或为逻辑真理,据此宣判大量形而上学命题无意义;而该原则自身却难以自证。"},
   {y:"1953",s:"日常语言哲学",t:"《哲学研究》",city:"cambridge",d:"后期维特根斯坦推翻自己:意义即用法,语言是嵌入生活的多样『语言游戏』,哲学不是建理论而是消解困惑的治疗。"} ],
 [ {y:"1966",s:"后结构主义",t:"福柯《词与物》",city:"paris",d:"各时代有其『知识型』规定何为真理;知识与权力相互生产,监狱、学校等『规训』技术塑造现代主体,瓦解中立真理的表象。"},
   {y:"1967",s:"解构主义",t:"德里达《论文字学》",city:"paris",d:"解构西方文本所依赖的等级二元对立;意义经『延异』而生、从不完全在场,质疑一切终极中心与根据。"},
   {y:"1971",s:"政治自由主义·正义论",t:"罗尔斯《正义论》",city:"usa",d:"在『无知之幕』后选择正义原则:平等的基本自由优先,且社会不平等须最有利于最不利者(差别原则),为公平奠基。"} ]
];

const deep=[
 [ {h:"从神话到『自然』的飞跃",p:"前苏格拉底哲人最革命之处不在答案,而在提问方式。在他们之前,世界由诸神的意志解释:打雷因为宙斯发怒。米利都学派第一次假定——自然有其内在的、可被理性把握的秩序(physis),不必诉诸神的任性。『现象背后有统一而稳定的本原(archē)』这个念头本身,正是科学与哲学共同的起点。泰勒斯说本原是水未必正确,但用一种自然要素去统一万物的雄心,从此改变了人类追问世界的方式。"},
   {h:"变与不变:两种世界观的对决",p:"赫拉克利特与巴门尼德把一个形而上学的根本张力推到极致。赫拉克利特说稳定是假象,实在的本质是永恒流变与对立的统一,逻各斯使万物在张力中保持秩序。巴门尼德则用纯粹推理反驳:『非存在』无法被思考也无法被言说,所以存在唯一、不变、不可分,我们看到的生灭只是感官的欺骗。一个押注于感官经验,一个押注于理性推理——这条裂缝(变动的可感世界 vs 不变的可思实在)将一路贯穿柏拉图、近代乃至现代物理学。"},
   {h:"调和的尝试:多元论与原子论",p:"面对巴门尼德『存在不能生灭』的逻辑铁律,后来者寻求调和。恩培多克勒的四根、阿那克萨戈拉的种子,都主张基本元素本身不生不灭(满足巴门尼德),变化只是它们的重新组合(挽救赫拉克利特的经验)。德谟克利特的原子论最为彻底:不可分的原子(满足不变)在虚空中运动聚散(解释变化),连灵魂与感觉都由原子构成。这套唯物—机械的世界观沉睡两千年后,在近代科学中复活。"} ],
 [ {h:"苏格拉底的『无知』与诘问法",p:"苏格拉底自称唯一知道的就是自己无知,这不是谦虚而是方法。他在街头拦住自认懂『正义』『勇敢』的人,层层追问其定义,直到对方陷入自相矛盾(aporia)。这套反诘法(elenchus)的要害是:行动若没有清晰、普遍、经得起追问的定义为基础,就只是意见而非知识。他把哲学从『世界由什么构成』转向『我们该如何生活、能否真正知道善』,并以生命为代价——拒绝逃亡、从容饮鸩——证明:未经省察的人生不值得过。"},
   {h:"柏拉图的理念论:为知识寻找不变的对象",p:"柏拉图继承巴门尼德的洞见:真正的知识必须关于不变者。可感事物生灭无常,无法成为确定知识的对象,因此真知指向超越的『理念』——美本身、正义本身、善本身;具体的美的事物只是分有美的理念的不完美摹本。洞穴比喻把人比作背对火光、只见墙上影子的囚徒,哲学家的使命是转身走出洞穴、直面理念之光(尤其是善的理念),再回到洞中启蒙他人。"},
   {h:"亚里士多德的转向:把理念拉回大地",p:"亚里士多德反对老师把理念悬置彼岸:形式不在另一个世界,而内在于具体事物之中(形式与质料结合)。他创立形式逻辑(三段论)、奠定生物学与物理学的观察传统,并以『四因说』解释事物的生成。在伦理学上,他主张幸福(eudaimonia)是合乎德性、贯穿一生的理性活动,而德性是介于过与不及之间、由理性把握的『中道』,须经习惯养成。柏拉图重数学与超越,亚里士多德重经验与目的,二人为后世理性派与经验派埋下了分流。"} ],
 [ {h:"哲学重心:从城邦转向个人",p:"城邦消亡后,『如何做好公民』的古典问题失去依托,哲学转而回答更私人的问题:在无法掌控的命运面前,如何获得不被扰动的内心安宁。这一转向使哲学从理论体系变成『生活的技艺』与『灵魂的治疗』。斯多葛、伊壁鸠鲁与怀疑论提供的都是可日常操练的方案,这也是它们至今仍被现代人(乃至认知疗法)借用的原因。"},
   {h:"斯多葛 vs 伊壁鸠鲁:两条通往宁静的路",p:"斯多葛派认为宇宙由神圣理性贯通、一切依必然发生;幸福在于按理性生活,并清醒区分『在我们能力之内的(判断、意愿)』与『不在的(财富、名声、生死)』,只对前者负责。伊壁鸠鲁派则是原子论者与经验主义者:快乐(身体无痛、心灵无扰)是唯一的善,但真正的快乐靠节制欲望、祛除对神与死亡的非理性恐惧而得——『死亡与我们无关』。一个教人顺从必然,一个教人审慎计算,殊途同归于不动心。"},
   {h:"通往中世纪的桥:新柏拉图主义",p:"普罗提诺综合柏拉图,提出万物从超越一切规定的『太一』层层流溢而出:太一→努斯(理智)→灵魂→物质世界;哲学的任务是灵魂沿此阶梯逆向回归、与太一神秘合一。这套等级森严、以『超越的一』为顶点的体系,极易被基督教神学吸收——奥古斯丁正是借它来理解上帝。古代哲学就此把接力棒交给了信仰的时代。"} ],
 [ {h:"信仰寻求理解:奥古斯丁的内转",p:"奥古斯丁把哲学的目光第一次如此深地转向内心。在《忏悔录》里他剖析记忆、时间、意志与欲望,提出著名的时间之问:过去已不在、未来尚未来、当下无延展,时间究竟『在』哪里?他的答案是,时间存在于心灵的『延展』之中。在认识论上他主张『信仰以求理解』:先信,理性再去阐明所信。这种以第一人称内省通达真理的路径,深刻影响了从笛卡尔到现象学的整个西方传统。"},
   {h:"共相之争:中世纪的『认识论预演』",p:"看似烦琐的『共相』问题其实关乎根本:像『人』『红』这样的普遍概念,是独立于个别事物而真实存在(唯实论),还是仅仅是名称或心智的抽象(唯名论)?唯实论上承柏拉图理念,把普遍当作更真实的存在;唯名论强调只有个别事物真实存在,普遍只是我们用来归类的语词。这场争论训练出极其精密的逻辑分析,并预演了近代理性派(重普遍、天赋观念)与经验派(重个别、经验抽象)的对立。"},
   {h:"阿奎那的大综合:理性与信仰的分工",p:"十三世纪亚里士多德全集经阿拉伯哲学(阿威罗伊、阿维森纳)回传,既是思想资源也是异端威胁。阿奎那的工作是把亚里士多德的理性哲学与基督教信仰整合:有些真理(上帝存在、灵魂)理性可证,有些(三位一体、道成肉身)只能靠启示;二者同源于上帝,不会真正冲突。他的『五路』从运动、因果、偶然性、完善等级与目的论证一个第一因的存在。这标志着理性在信仰框架内获得了空前的尊严与自主。"} ],
 [ {h:"世界图景的重置:从封闭宇宙到无限空间",p:"哥白尼把太阳置于中心,伽利略用望远镜发现木星的卫星与月面的环形山,一起击碎了亚里士多德—托勒密『地球居中、天界完美不变』的封闭宇宙。世界不再是为人类量身定做的有限剧场,而成为遵循同一套数学规律、向无限延展的均质空间。这不仅是天文学事件,更是哲学事件:人类失去了宇宙中心的地位,却获得了用数学统一描述天与地的雄心。"},
   {h:"新方法的诞生:培根的归纳与实验",p:"培根批判经院哲学只会从权威前提演绎、不产生新知。他主张知识应从系统的观察与实验中归纳出普遍规律,并警惕扭曲认识的『四假象』——种族、洞穴、市场、剧场,即人类天性、个人偏见、语言含混与盲从学说带来的错误。『知识就是力量』宣告:知识的目的不再是静观,而是改造自然、增进人类福祉。这把哲学的价值标准从沉思转向了实用与控制。"},
   {h:"自然之书以数学写成",p:"伽利略提出一个影响深远的区分:物体的『第一性质』(形状、大小、运动)是客观、可数学化的,而『第二性质』(颜色、气味、声音)只存在于感知者心中,真正的科学只研究可测量的第一性质。『自然之书用数学语言写成』——要读懂它必先懂几何。这一信念为笛卡尔『清晰明确的观念』、为整个近代以数学为真理范型的认识论铺平了道路,也留下了『被抽空了颜色与意义的世界』这一现代难题。"} ],
 [ {h:"笛卡尔的怀疑与阿基米德点",p:"笛卡尔要为知识找一个不可动摇的地基。他系统地怀疑一切:感官会骗人、梦境难辨真假、甚至可能有一个『恶魔』持续欺骗他。但有一点怀疑不掉——正在怀疑(思考)的『我』必定存在:我思故我在。由这一确定起点出发,他重建知识:凡被『清晰而明确地』知觉到的就为真。然而他留下了身心二元论的难题:不可分的心灵与有广延的身体,如何彼此作用?这成了近代哲学挥之不去的『心身问题』。"},
   {h:"斯宾诺莎:一个实体,即神即自然",p:"斯宾诺莎把『实体』的逻辑推到底:实体是自因、无限、不依赖他物者,因此只能有一个,他称之为『神即自然』。万物只是这唯一实体的『样态』,思想与广延是同一实体的两种属性。一切依必然而发生,没有偶然与自由意志;真正的自由是通过理性理解这种必然,从被动的情感转为主动的认识。他以几何学的公理—定理方式写《伦理学》,追求在『永恒的形式下』观看世界的澄明与平静。"},
   {h:"莱布尼茨:单子、预定和谐与可能世界",p:"莱布尼茨认为终极实在是无数无广延、无窗户的精神性『单子』:每个单子按内在程序展开、彼此不直接作用,却因上帝的『预定和谐』而协调一致,如同无数同步的钟。依据『充足理由律』(任何事都有其所以然)与『无差别者同一』,他论证上帝在无限可能世界中选择了最好的一个。这套乐观主义体系既是理性主义的巅峰建构,也招来了伏尔泰《老实人》的辛辣嘲讽。"} ],
 [ {h:"洛克:推倒天赋观念,心灵是白板",p:"洛克针锋相对地反对理性派的『天赋观念』:若有人人生而具有的观念,为何儿童与未受教育者对之一无所知?他主张心灵原是白板(tabula rasa),一切观念都来自经验——外部的『感觉』与内省的『反省』,复杂观念由简单观念组合而成。他继承伽利略,区分第一性质(真在物中)与第二性质(只是物在我们心中引起的感觉)。这套经验论也支撑了他的政治哲学:权利与同意,而非天赋等级。"},
   {h:"贝克莱:存在就是被感知",p:"贝克莱顺着经验论追问:我们经验到的只是观念(颜色、形状、软硬),从未经验到观念之外那个『物质实体』。既然如此,假定一个不可知的物质既多余,又会通向怀疑论与无神论。他于是断言:可感事物的存在就在于被感知(esse est percipi);当无人感知时万物仍存在,因为它们永恒地被上帝所感知。这并非否认世界真实,而是否认『独立于一切心灵的物质』,把经验论推向彻底的观念论。"},
   {h:"休谟:经验论的悬崖",p:"休谟把经验论贯彻到底,结果令人震撼:我们说 A『导致』B,经验中其实只看到 A 与 B 恒常相继,从未观察到『必然联系』本身——因果不过是心理习惯造成的期待。同理,反观内心只见一束流动的知觉,找不到一个恒常不变的『自我』;他还指出『是』推不出『应当』。这意味着归纳与科学的根基缺乏理性证明。休谟并非要人停止生活,而是说支撑我们的是习惯与人性,而非纯粹理性——正是这一结论,把康德从『独断的迷梦』中惊醒。"} ],
 [ {h:"哥白尼式革命:不是心灵符合对象,而是对象符合心灵",p:"康德要在理性派(知识来自理性)与经验派(知识来自经验、却被休谟引向怀疑)之间另辟新路。他的逆转是:与其问知识如何符合外物,不如设想外物如何符合我们认识的形式。时间、空间是我们直观的先天形式,因果、实体等『范畴』是知性整理经验的先天框架。于是『先天综合判断』成为可能:数学与物理的普遍必然性,来自主体加诸经验的结构,而非来自经验归纳。这既挽救了科学的确定性,也为知识划定了界限。"},
   {h:"现象与物自体:知识的边界",p:"代价是:我们只能认识『现象』(事物对我们显现的样子),而非『物自体』(事物自身)。当理性试图越过经验去把握无条件的整体——灵魂、世界整体、上帝——就陷入无法判定的『二律背反』。康德因此说:『我必须悬置知识,以便为信仰留出地盘。』上帝、自由、不朽不是知识的对象,却是实践理性的必要预设。这条现象/物自体的界线,既是康德的解法,也是他留给后人的最大难题:物自体既不可知,又何以言其存在?"},
   {h:"绝对命令:理性为自己立法",p:"在伦理学上,康德主张道德不能建立在后果、情感或上帝命令之上,而须源于理性自身。真正的道德法则是『绝对命令』:只按你能同时愿其成为普遍法则的准则去行动;并要永远把人当作目的,而非仅仅当作手段。道德的核心是『自律』——理性存在者服从自己理性所立的法,这正是人的尊严与自由所在。这与休谟『理性是激情的奴隶』针锋相对,确立了义务论伦理学的典范。"} ],
 [ {h:"取消物自体:观念论的激进化",p:"康德那个『不可知的物自体』令后继者难以忍受:一个既不可认识、又被说成在刺激我们感官的东西,自相矛盾。费希特干脆取消它,把一切奠基于能动的『自我』:自我设定自身,又设定『非我』(外部世界)作为自身活动的界限与对象,世界因此被理解为精神自我实现的产物。德国观念论由此从『认识的批判』转向『绝对者的建构』,体系规模越来越宏大。"},
   {h:"辩证法:矛盾是发展的引擎",p:"黑格尔的核心创见,是把『矛盾』从逻辑错误变成前进的动力。任何概念或现实(正题)内部都含有否定自身的因素(反题),冲突推动它『扬弃』(Aufhebung)到更高的统一(合题),如此螺旋上升。在《精神现象学》里,意识从最朴素的『感性确定性』,经主奴辩证、苦恼意识等环节,逐步走向『绝对知识』。真理不是某个静止的命题,而是这整个自我展开、自我认识的过程——『真理是全体』。"},
   {h:"历史有理性:绝对精神的自我实现",p:"黑格尔把这一逻辑投射到历史:世界历史是『绝对精神』通过各民族、各时代逐步实现自由意识的进程,『凡合理的都是现实的,凡现实的都是合理的』。个人的激情(哪怕是拿破仑的野心)被『理性的狡计』所利用,服务于更高的历史目的。这套把一切纳入理性总体的乐观体系达到了理性主义的顶峰;但它把个体、苦难与偶然都『扬弃』进必然——也正是这一点,激起了下一代人的全面反叛。"} ],
 [ {h:"揭穿理性的面具:意志、欲望与无意识",p:"叔本华第一个系统地反转黑格尔:世界的内核不是理性,而是盲目、无目的、永不满足的『生命意志』,理智不过是意志的仆人。欲望得不到满足是痛苦,满足之后是无聊,人生在二者间摇摆;解脱之道在于审美静观与否定意志(近于佛教)。这一『理性背后是非理性力量』的洞见,经尼采的『权力意志』直通弗洛伊德的无意识,瓦解了『人是理性动物』的古老自画像。"},
   {h:"颠倒黑格尔:存在决定意识",p:"马克思保留了黑格尔的辩证法,却把它倒过来:推动历史的不是精神的自我展开,而是物质生产方式与阶级斗争。不是意识决定存在,而是社会存在决定意识;宗教、法律、哲学都是建立在经济基础之上的『上层建筑』。哲学的任务也随之改变——『哲学家们只是用不同方式解释世界,问题在于改变世界』。他把『个体↔整体』这条暗线推入现实政治,深刻影响了之后一个世纪的历史进程。"},
   {h:"上帝已死与价值重估",p:"尼采宣告『上帝已死』——这不是简单的无神论,而是一个诊断:支撑西方两千年的最高价值(基督教—柏拉图主义的彼岸真理与道德)已失去可信性,留下虚无主义的深渊。他追溯道德的『谱系』,指出善恶并非天经地义,而有其权力与心理的起源(主人道德 vs 出于怨恨的奴隶道德)。出路是『重估一切价值』,以肯定生命的权力意志和敢于承担命运的『超人』姿态去创造新的意义。克尔凯郭尔则从另一端反叛:真理是主体性,个体须在恐惧战栗中以无法被体系担保的『信仰之跃』作出抉择。"} ],
 [ {h:"回到事物本身:现象学的方法",p:"面对十九世纪的心理主义与实证主义化约,胡塞尔主张哲学应成为严格的科学,方法是『回到事物本身』——悬置(epoché)一切关于『外部世界是否真实』的自然假定,直接描述意识经验如何呈现。意识的根本特征是『意向性』:意识总是『关于某物』的意识。通过这种描述,现象学试图揭示意义如何在第一人称经验中被构成,把哲学从对象化的科学态度,拉回到活生生的体验。"},
   {h:"此在与向死而生",p:"海德格尔转而追问被整个传统遗忘的问题:『存在』本身究竟是什么意思?他从那个能追问存在的特殊存在者——人(此在/Dasein)入手。此在总是已经『被抛』进一个世界、『在世界之中存在』,以操劳的方式与他人和器物打交道,并常常沉沦于『常人(das Man)』的平均状态而遗忘本己。唯有直面『向死而生』——领会死亡是自己最本己、不可替代、不可逾越的可能性——此在才可能从沉沦中觉醒,本真地承担自己的存在。"},
   {h:"存在先于本质:自由的重负",p:"萨特把这一思路推向伦理与政治:对人而言『存在先于本质』——人不像裁纸刀那样先有被设计好的用途,人先存在,然后通过选择定义自己。因此人是『被判定为自由的』,连不选择也是一种选择;逃避这份自由、假装自己被角色或处境所决定,就是『自欺(bad faith)』。加缪则面对『世界无意义而人渴望意义』的荒诞,主张既不自杀也不盲信,而以清醒的反抗活着。自由不再是恩赐,而是无可推卸、令人眩晕的责任。"} ],
 [ {h:"语言转向:把哲学问题翻译成语言问题",p:"弗雷格、罗素创立现代谓词逻辑,提供了精确分析命题结构的工具。罗素的『摹状词理论』示范:像『当今法国国王是秃头』这种看似指称却无对象的句子,可经逻辑分析化解其困惑,而不必假定一个虚幻的实体。由此产生一个信念:许多传统形而上学难题其实源于被日常语言误导,澄清语言的逻辑结构就能消解(而非解决)它们。这一『语言转向』重新界定了英美哲学的任务。"},
   {h:"早期维特根斯坦与维也纳学派:可说与不可说",p:"早期维特根斯坦在《逻辑哲学论》中提出『图像论』:有意义的命题是事实的逻辑图像,语言的界限就是世界(可被描述者)的界限;伦理、人生意义、形而上学超出此界,『对于不可说的,必须保持沉默』。维也纳学派据此发展出逻辑实证主义的『可证实原则』:一个陈述有认知意义,当且仅当它可被经验证实或为逻辑真理——并据此宣布大量形而上学命题为『无意义』。但这条原则自身既不可经验证实、也非逻辑真理,埋下了自我瓦解的种子。"},
   {h:"后期维特根斯坦:意义即用法",p:"维特根斯坦后来推翻了自己:语言不是单一的逻辑图像系统,而是嵌入生活的多样『语言游戏』;一个词的意义不在于它指称什么,而在于它在具体实践中如何被使用。寻找词背后统一的本质是误入歧途——不同用法之间只有『家族相似』。他还以『私人语言论证』质疑笛卡尔式纯内在的自我。哲学因此不是建立理论,而是一种治疗:解开语言制造的思想痉挛,『让苍蝇飞出捕蝇瓶』。"} ],
 [ {h:"知识/权力:被建构的『真理』",p:"福柯不问『什么是真理』,而问『真理如何被生产、由谁、通过什么实践』。他考察疯癫、医学、监狱与性等领域,揭示每个时代都有其『知识型(épistémè)』与话语规则,决定什么能被说、被当作真;知识与权力相互生产——监狱、学校、医院的『规训』技术,塑造出现代意义上的『主体』。这并非否认一切真理,而是把看似中立客观的知识重新置于历史与权力的语境中考察,瓦解其表面的纯洁性。"},
   {h:"解构:意义的延异",p:"德里达承袭并激进化结构主义:意义来自符号之间的差异,而所指从不『在场』地完全到位,总被无限地『延异(différance)』——既是差异又是延迟。他细读西方哲学文本,揭示它们依赖一系列等级二元对立(言语/文字、在场/缺席、理性/感性),而这些对立往往能被文本自身的逻辑所颠覆。解构不是摧毁,而是显示:任何意义的稳定与中心都是被建构、可被松动的——对一切『终极根据』保持警惕。"},
   {h:"重建公共理性:罗尔斯的正义论",p:"与欧陆的怀疑相对,英美政治哲学试图为多元社会重建公平的规范基础。罗尔斯设想一个『原初状态』:各方在『无知之幕』后——不知自己将是富是穷、何种天赋与信仰——选择社会的基本规则。他论证理性者会选择两条正义原则:平等的基本自由优先,以及社会经济的不平等须最有利于处境最差者(差别原则)。这用一个理性程序为『正义即公平』奠基,回应现代社会『如何在价值分歧中公正共处』的核心难题,与福柯式的权力批判构成当代哲学的两极张力。"} ]
];

const debate=[
 [ {h:"本原能是单一的吗?",p:"米利都学派假定万物出自一种本原,但水如何变成火与土?『一变多』的机制始终说不清。这一困难推动了多元论(四根、种子)与原子论:与其追问唯一本原,不如承认多种不生不灭的要素及其组合。"},
   {h:"理性与感官,谁更可信?",p:"巴门尼德为逻辑一致性不惜否定整个可感世界,这在常识看来荒谬;赫拉克利特则似乎让知识失去稳定对象。两端都太极端,真正的难题——如何既承认变化又保住确定知识——要等柏拉图区分两个世界、康德区分现象与物自体才有系统回应。"} ],
 [ {h:"理念论的『第三人』难题",p:"柏拉图晚年在《巴门尼德篇》中自我反省:若具体的美的事物因『分有』美的理念而美,那么这事物与理念之间的相似,是否又需要第三个理念来说明?如此无穷后退。亚里士多德正是抓住这一点,反对把普遍当作独立存在的实体。"},
   {h:"德性可教吗?知识就是美德吗?",p:"苏格拉底主张『无人有意作恶』,作恶只因无知,故美德即知识、可教。但人明知故犯(意志薄弱)的现象似乎反驳了他;亚里士多德因此强调德性不只是知识,更需通过习惯与实践养成。这场关于『知与行』的争论延续至今。"} ],
 [ {h:"宿命之下还有自由吗?",p:"斯多葛说一切依必然发生,又要人为自己的判断负责——若万事注定,这种『负责』如何可能?斯多葛以『软决定论』回应:外部事件注定,但我们对它的态度仍属于我们。这一张力是后世自由意志辩论的早期版本。"},
   {h:"快乐主义会导向纵欲吗?",p:"伊壁鸠鲁常被误解为享乐纵欲,实则他主张最大的快乐来自最简朴的生活与友谊。但批评者(尤其斯多葛与基督教)仍指责其把善等同于快乐、贬低了德性追求。快乐到底该不该作伦理的基础,至今仍是功利主义争论的核心。"} ],
 [ {h:"理性能证明信仰吗?",p:"阿奎那相信理性可证明上帝存在,但其后的奥卡姆等唯名论者认为,神的全能与自由超出理性范围,试图用逻辑捆绑上帝既僭越又徒劳。信仰与理性该如何划界这一中世纪核心争论,实际松动了经院综合,为近代『信仰归信仰、知识归知识』埋下伏笔。"},
   {h:"共相究竟存不存在?",p:"唯实论若成立,普遍(如『人性』)比个人更真实,易滑向把抽象当实体;唯名论若彻底,则共同本质只是名称,知识的普遍性又成问题。奥卡姆的剃刀(如无必要勿增实体)倾向唯名论,深刻影响了近代经验主义的简约精神。"} ],
 [ {h:"被抽空的世界:第二性质去哪了?",p:"若颜色、气味、声音只是心中的第二性质,那么科学描述的『真实世界』就成了无色无味的数学骨架,而我们鲜活的经验世界反倒不真实。这一『科学图景与生活世界的分裂』,被怀特海称为『自然的两岔』,至今困扰着心灵哲学。"},
   {h:"归纳法可靠吗?",p:"培根寄望以归纳从经验上升到普遍规律,但休谟随后指出归纳本身缺乏理性保证(过去如此,不蕴含未来必如此)。归纳的合理性问题(波普尔后来以『证伪』作出回应)成为科学哲学的长期难题。"} ],
 [ {h:"心身如何互动?(笛卡尔难题)",p:"若心灵是无广延的思维实体、身体是有广延的物质,二者本质迥异,它们如何在松果腺『相互作用』?这个连笛卡尔自己也答不好的问题,催生了偶因论、平行论乃至当代心灵哲学的种种立场,至今悬而未决。"},
   {h:"天赋观念真的存在吗?",p:"理性派主张某些观念(上帝、无限、几何公理)是天赋的、非经验所能给予;经验派(洛克)则反问:若是天赋,为何并非人人自明、连儿童也懂?这场理性 vs 经验的正面交锋,正是康德试图调和的起点。"} ],
 [ {h:"贝克莱真的否认了外部世界吗?",p:"『存在即被感知』常被讥为荒谬(约翰逊踢石头以示反驳)。但贝克莱并不否认桌椅真实,只否认『独立于一切心灵的物质』;难点在于无人观察时事物何以持存——他诉诸上帝的永恒感知,这又把经验论引回神学。"},
   {h:"休谟问题:科学还有根基吗?",p:"若因果只是习惯、归纳无法被理性证明,那么整个自然科学岂非建立在心理惯性之上?这一『休谟问题』是科学哲学的根本挑战,康德的先天范畴、波普尔的证伪主义,都是对它的不同回应。"} ],
 [ {h:"物自体悖论",p:"康德说物自体不可知,却又用它来解释感官经验的来源——可既然『因果』只是适用于现象的范畴,说物自体『导致』现象就自相矛盾。这一漏洞被费希特、黑格尔抓住,直接推动了取消物自体的德国观念论。"},
   {h:"绝对命令太空洞、太僵硬?",p:"批评者指出:形式化的『可普遍化』标准本身推不出具体义务,且在『为救人是否可以撒谎』这类情境中显得僵硬、不近人情(贡斯当与康德有过著名争论)。义务论与后果论的张力由此长期存在。"} ],
 [ {h:"辩证法是真逻辑还是文字游戏?",p:"黑格尔声称矛盾推动现实发展,但批评者(如罗素、波普尔)指责辩证法模糊、可被任意套用,且容忍逻辑矛盾、为既存秩序(乃至专制)辩护(『凡现实的都是合理的』)。辩证法是深刻的历史方法还是思辨的烟雾,至今争论不休。"},
   {h:"历史真有方向与终点吗?",p:"黑格尔式的『历史有理性目的、走向自由的实现』,在二十世纪两次大战与极权灾难之后备受质疑;但它又以福山『历史的终结』等形式反复回归。历史是否有内在逻辑,仍是历史哲学的核心争点。"} ],
 [ {h:"上帝死后,虚无主义能被克服吗?",p:"尼采诊断了虚无主义,却未必给出公认的解药:『超人』『权力意志』『永恒回归』究竟是有力的肯定,还是另一种神话?如何在没有绝对价值的情况下重建意义,成了二十世纪存在主义与后现代的共同课题。"},
   {h:"历史唯物主义是科学还是信仰?",p:"马克思宣称揭示了历史的客观规律,但波普尔批评其『不可证伪』因而不算科学;其经济决定论是否低估了观念、文化与个人的作用,也是马克思主义内部(如葛兰西)持续反思的问题。"} ],
 [ {h:"绝对自由是否过度?",p:"萨特说人完全自由、要对一切负责,但批评者指出这忽视了社会结构、身体与历史对选择的真实限制(后来萨特本人也转向马克思主义以补足)。自由与处境(facticity)的张力,是存在主义内部的核心争论。"},
   {h:"海德格尔的哲学与政治污点",p:"海德格尔在1933年公开支持纳粹,其《黑色笔记》更暴露反犹倾向。其深刻的存在之思与其政治选择之间是否相关,成为持续至今、难以回避的争论,也提醒人们:伟大的思想不等于道德上的可靠。"} ],
 [ {h:"可证实原则的自我反驳",p:"逻辑实证主义宣称『不可证实的命题无意义』,但这条原则本身既不能被经验证实、也不是逻辑真理——按它自己的标准,岂非也无意义?这一致命的自指难题,加上奎因对『分析/综合』二分的瓦解,使逻辑实证主义在二十世纪中叶走向衰落。"},
   {h:"语言分析是解决还是回避了哲学问题?",p:"批评者(尤其欧陆传统)质疑:把伦理、人生意义等划为『不可说』,究竟是澄清了问题,还是逃避了它?分析哲学的精确,是否以牺牲哲学的重大关切为代价?这一英美—欧陆的分裂至今未弭。"} ],
 [ {h:"若真理由权力建构,批判还能站在哪里?",p:"福柯式分析揭示真理与权力的纠缠,却引来自指诘问:你的批判本身不也是一种权力话语吗?它凭什么更真?哈贝马斯就批评后结构主义陷入『施为性矛盾』,无法为自身的规范立场辩护。这是后现代与批判理论的著名交锋。"},
   {h:"无知之幕能推出唯一的正义吗?",p:"罗尔斯假定无知之幕后的人会选择他那两条原则,但诺齐克(自由至上主义)、社群主义者(桑德尔)与女性主义者都质疑:这一『中立』程序其实暗藏了特定的人性假设与个人主义偏见。何为正义,远未达成共识。"} ]

const impact=[
 [ {h:"自然科学的胚胎",p:"『自然有可被理性与数学把握的统一规律』这一前苏格拉底假定,是整个自然科学的前提。德谟克利特的原子论更在两千年后被道尔顿、玻尔兹曼的近代原子理论部分印证,被誉为古代最具预见性的猜想。"},
   {h:"贯穿哲学史的母题",p:"变与不变、一与多、表象与实在——这些在此首次提出的对立,成为柏拉图理念论、亚里士多德实体学说乃至现代形而上学反复处理的母题。可以说,后世哲学很大程度上是在回答前苏格拉底人提出的问题。"} ],
 [ {h:"为西方思想立下框架",p:"怀特海有名言:整部西方哲学不过是『对柏拉图的一系列脚注』。理念论开启了理性主义、本质主义与基督教神学;亚里士多德的逻辑学统治逻辑领域两千年,他的物理学、伦理学、政治学是中世纪大学的核心教材。"},
   {h:"教育与方法的遗产",p:"苏格拉底的诘问法成为现代『启发式教学』与法学院『苏格拉底教学法』的原型;柏拉图学园被视为西方大学的雏形;亚里士多德的德性伦理学在二十世纪经麦金太尔等人复兴,至今是规范伦理学的三大传统之一。"} ],
 [ {h:"两千年后的心理自助",p:"斯多葛的『区分可控与不可控』『困扰你的不是事情,而是你对事情的看法』,直接启发了现代认知行为疗法(CBT)与当代盛行的斯多葛主义自助潮流;《沉思录》至今仍是畅销书。"},
   {h:"原子论与世俗世界观的火种",p:"伊壁鸠鲁的原子论与『神不干预世界』经罗马诗人卢克莱修《物性论》保存,在文艺复兴时重被发现,影响了伽桑狄、霍布斯,乃至近代世俗、无神论与科学世界观的兴起。"} ],
 [ {h:"逻辑与大学的锻造",p:"经院哲学把论证、区分、反驳的技艺磨到极致,锻造出严密的逻辑与术语体系,并催生了博洛尼亚、巴黎、牛津等中世纪大学——现代学术建制的直接祖先。"},
   {h:"奥古斯丁式内省的回响",p:"奥古斯丁对内在自我、时间意识与意志的剖析,经笛卡尔的『我思』、卢梭的《忏悔录》直到胡塞尔的现象学不断回响;他的时间之问至今仍是时间哲学的经典起点。"} ],
 [ {h:"现代科学的方法论根基",p:"培根的实验—归纳精神与伽利略的数学化自然观,共同奠定了近代科学方法,直接促成英国皇家学会的成立与科学共同体的兴起;『知识就是力量』成为技术文明的座右铭。"},
   {h:"人的自我理解的转折",p:"哥白尼革命把人逐出宇宙中心,被弗洛伊德列为人类自恋遭受的『第一次重创』(后两次是达尔文与精神分析);而人文主义对人之尊严与自由的肯定,则成为现代个人主义与人权观念的源头之一。"} ],
 [ {h:"现代『主体』的确立",p:"笛卡尔以『我思』把自我意识立为知识的第一基础,确立了近代哲学的『主体转向』,影响了从康德到现象学的整个传统;『主客二分』也成为现代思维(及其批评者)的基本框架。"},
   {h:"理性与宽容的政治回声",p:"斯宾诺莎对自由思想与政教分离的辩护,是近代自由主义与世俗国家的先声;莱布尼茨的二进制与『普遍符号语言』构想,则被视为现代计算与逻辑学的远祖之一。"} ],
 [ {h:"启蒙、自由主义与美国建国",p:"洛克的经验论、自然权利与『政府基于被治者同意』的学说,直接写进了美国《独立宣言》,塑造了现代自由民主的制度想象;其宽容思想是政教分离的理论支柱。"},
   {h:"唤醒康德,奠基实证科学",p:"休谟的怀疑论『惊醒』了康德,直接催生《纯粹理性批判》;其经验主义与对形而上学的不信任,又经孔德、维也纳学派一脉,成为实证主义与现代分析哲学的精神源头。"} ],
 [ {h:"现代哲学的分水岭",p:"康德几乎是后世一切哲学绕不开的枢纽:德国观念论、新康德主义、现象学,乃至当代的罗尔斯(其正义论明显带康德色彩)都从他出发;『人是目的』成为现代人权与生命伦理的基石。"},
   {h:"科学与自由的双重遗产",p:"他对科学知识之普遍必然性的辩护影响了科学哲学;而把道德、自由、信仰从科学认识中划出、交给实践理性的做法,既为宗教与人文价值保留了空间,也定义了现代『事实与价值二分』的格局。"} ],
 [ {h:"左右两脉的共同源头",p:"黑格尔的遗产一分为二:青年黑格尔派经费尔巴哈通向马克思与整个左翼革命传统;其国家与历史学说又被保守主义与民族主义吸收。二十世纪两大意识形态,都能在他那里找到根。"},
   {h:"辩证思维的广泛渗透",p:"『正—反—合』的思维模式深入社会理论、心理学(发展阶段论)、历史叙事乃至日常话语;法兰克福学派的批判理论、存在主义与解释学,也都在与黑格尔的对话中成形。"} ],
 [ {h:"重塑二十世纪的思想与政治",p:"马克思直接塑造了二十世纪的革命、国家与社会运动,影响波及全球数十亿人;尼采则深刻影响了存在主义、精神分析、后现代主义与现代文艺——二人是理解现代性的两把钥匙。"},
   {h:"『怀疑的解释学』",p:"利科把马克思、尼采、弗洛伊德并称『怀疑的大师』:他们教会现代人对一切表面意义保持警觉,去追问其背后的经济利益、权力意志或无意识动机。这种『揭穿式』的批判姿态,已成为现代人文社科的底色。"} ],
 [ {h:"渗入大众文化的哲学",p:"存在主义是少数真正『走出学院』的哲学:『存在先于本质』『他人即地狱』『荒诞』成为战后一代理解自我、自由与意义的语言,深刻影响了文学、戏剧、电影与心理治疗(如存在主义心理学)。"},
   {h:"现象学的长尾",p:"胡塞尔—海德格尔的现象学经梅洛-庞蒂(身体)、列维纳斯(他者伦理)、伽达默尔(解释学)开枝散叶,至今仍是欧陆哲学、认知科学(具身认知)与质性研究方法论的活水源头。"} ],
 [ {h:"塑造英美学术与计算时代",p:"现代逻辑(弗雷格、罗素)不仅重塑了英美哲学,更直接催生了图灵、哥德尔的工作与计算机科学的理论基础;分析哲学的清晰与论证标准,至今主导着英语世界的哲学训练。"},
   {h:"语言转向的外溢",p:"『意义即用法』『语言游戏』经后期维特根斯坦影响了语言学、人类学、社会学(如温奇)乃至法律解释;对『语言如何塑造思想与实践』的关注,成为整个二十世纪人文学科的共同主题。"} ],
 [ {h:"重塑当代人文与社会批判",p:"福柯、德里达深刻影响了文学理论、性别研究、后殖民研究、史学与艺术批评,『话语』『权力/知识』『解构』成为人文学科的通用词汇;无论赞成与否,当代批判思维很大程度上是在他们设定的议程上展开的。"},
   {h:"正义论复兴政治哲学",p:"罗尔斯《正义论》被公认让一度沉寂的规范政治哲学起死回生,激起关于平等、自由与分配正义的持续大讨论,深刻影响了当代自由主义、福利国家辩论与公共政策思考。这场对话至今仍未结束——而你正站在它的最前沿。"} ]

    body:[
      {h:"泰勒斯:为什么是水?",p:"亚里士多德把泰勒斯尊为「第一位哲学家」,关键不在他说出「万物的本原是水」这个答案,而在他提出问题的方式。他追问的是:在千变万化的现象背后,是否有一种始终如一的「本原」(arché)?他之所以选水,是因为生命离不开水分、种子在湿润中萌发、热的东西也靠湿气维持。这一步看似朴素,却完成了一次思维革命:用一种可观察的自然物去解释万物,而不再诉诸宙斯发怒或河神显灵。哲学的起点,是用「自然解释自然」。"},
      {h:"阿那克西曼德:从具体物到「无定」",p:"泰勒斯的学生阿那克西曼德发现一个难题:如果本原是水这种具体的东西,那它怎么能变成与自己对立的火?于是他提出本原是「无定」(apeiron)——一种无限、无规定、不可穷尽的东西。万物从「无定」中分离出来,又终将复归于它,如同欠下债又偿还。这是哲学史上第一个真正抽象的概念:本原不必是任何一种已知元素,反而要超越一切具体性才能生出一切。他还画出了第一张世界地图,并猜想人由鱼演化而来。"},
      {h:"阿那克西美尼:气与凝聚稀薄",p:"第三代的阿那克西美尼似乎「退回」到具体物——他说本原是气。但他真正的贡献是提出了一个量变机制:气稀薄时变成火,凝聚时依次变成风、云、水、土、石。这第一次用「程度的差异」来解释「种类的差异」,把质的变化还原为量的变化。比起前两人,他更关心的是「如何变」而非「是什么」,这种对转化机制的追问,成了后来一切自然科学的雏形。"}

      {h:"向内转的方法:在记忆与自我中寻找上帝",p:"奥古斯丁的《忏悔录》开创了一种全新的哲学姿态:不再像希腊人那样凝视星空与自然,而是回到自己的内心。他著名地说,真理就居住在内在的人之中。这种内省不是心理学式的自我观察,而是一条上升之路:通过审视自己的记忆、判断与渴望,人发现自己的心灵中竟有一些超出自身、永恒不变的真理,比如数学与道德标准。这些真理不可能由有限多变的我创造,于是它们指向一个永恒的源头。内省因此成了通往上帝的阶梯,而「认识你自己」被改写成「在自己之内认识神」。"},
      {h:"原罪与意志的扭曲:偷梨的故事",p:"奥古斯丁追问的核心是:恶从何而来?如果上帝全善,世界为何有恶?他给出的答案是:恶不是一种实体,而是善的缺失与意志的偏斜。在《忏悔录》里他反复咀嚼少年时偷梨的小事——梨子并不好吃,他偷只是因为偷本身的快感、为了作恶而作恶。这个看似微小的例子被他放大为人性的隐喻:人的意志已经被原罪扭曲,会无缘无故地背离善。这就解释了为何「我赞同更好的,却追随更坏的」——人不是无知而作恶,而是明知故犯,意志本身病了。"},
      {h:"时间之问:它存在于何处?",p:"奥古斯丁在《忏悔录》第十一卷提出了哲学史上最迷人的难题之一:时间是什么?他坦白:没人问我时我清楚,一旦要解释就茫然了。过去已不存在,未来尚未存在,现在又是无延展的一瞬——那么时间究竟在哪里?他的革命性回答是:时间存在于心灵之中。过去是当下的记忆,未来是当下的期待,现在是当下的注视。时间不是外在世界的客观刻度,而是心灵的一种延展或张力。这一思路深刻影响了后来的康德、胡塞尔乃至海德格尔对时间的探讨。"},
      {h:"恩典与自由意志的张力",p:"奥古斯丁一生都在两端拉扯:一方面强调人有自由意志,因而要为罪负责;另一方面又坚持人被原罪败坏,无法仅凭自力得救,必须依靠上帝白白赐下的恩典。这一张力在他与佩拉纠派的论战中达到顶点:如果得救全靠恩典,自由还有意义吗?如果靠自由,恩典岂非多余?奥古斯丁没有提供圆满的逻辑解,而是把它留作信仰的奥秘。这个难题此后贯穿整个西方思想,从宗教改革的「因信称义」一直回响到现代关于决定论与自由的争论。"}

  {

    t:"早期经院与共相之争(波爱修、安瑟伦本体论证明)",
    lead:"「红色」「人」「正义」这些普遍词,究竟是真实存在的东西,还是只是名字?这场看似抽象的争吵,实则关乎实在的根本结构。",
    city:"paris",
    body:[
      {h:"波爱修:从希腊到中世纪的桥梁",p:"在西罗马崩溃的废墟上,波爱修立志把柏拉图与亚里士多德的全部著作译成拉丁文。他没能完成,却翻译并注解了亚里士多德的逻辑学与波菲利的《导论》,几乎以一己之力为后世几百年的学术保存了逻辑工具。正是在注解波菲利时,他转述了那个引爆千年争论的问题:种和属(如「人」「动物」)是真实存在的事物,还是仅仅是心灵中的概念?它们若存在,是有形的还是无形的?这就是共相问题的起点。他还在狱中写下《哲学的慰藉》,以哲学女神之口探讨命运、自由与至善,成为中世纪最受欢迎的书之一。"},
      {h:"共相之争:实在论与唯名论的对垒",p:"问题的实质是:像「人性」这样的普遍者(共相)有没有独立的实在性?极端实在论者(承袭柏拉图)认为共相先于个体而真实存在,个别的人之所以是人,是因为分有了「人性」这个实在;唯名论者则认为只有个别事物真实存在,共相不过是我们用来归类的名称或声音。这场争论远不只是文字游戏:它牵涉到上帝创世时心中是否先有「理念」、三位一体如何可能、个体与种类孰先孰后等神学与形而上学的根本问题。后世的温和方案(如阿奎那)主张共相既不先于也不脱离个体,而是存在于个体之中并由理智抽象出来。"},
      {h:"安瑟伦的本体论证明:从概念跃向存在",p:"坎特伯雷的安瑟伦提出了哲学史上最著名也最具争议的论证。他把上帝定义为「无法设想有比之更伟大者」。接着他推论:即便是不信神的「愚人」,心中也理解这个概念,所以上帝至少存在于理解之中。但若上帝仅存在于理解中而不存在于现实中,那我们就能设想一个更伟大的——一个真实存在的它——这就自相矛盾了。因此,上帝必然也存在于现实之中。这个论证的惊人之处在于:它声称仅凭对「上帝」概念的分析,就能推出它必然存在,完全不诉诸经验。"},
      {h:"高尼罗的反驳与论证的余响",p:"同时代的修士高尼罗立刻反击:照此逻辑,我也能设想一座「最完美的岛屿」,难道它就因此必然存在吗?显然不能,所以从概念推不出存在。这触及了论证的要害——「存在」是否像一个属性那样能被加进概念里。康德后来给出了经典批判:存在不是一个真正的谓词,说一物存在并没有给它的概念增添任何内容。然而本体论证明并未因此消亡:笛卡尔、莱布尼茨重新激活它,现代逻辑学家(如哥德尔、普兰丁格)还用模态逻辑加以重构,它至今仍是检验「概念与实在关系」的试金石。"}

      {t:"实在论与唯名论",d:"前者认为共相真实存在,后者认为只有个别事物存在、共相只是名字。"},
      {t:"本体论证明",d:"仅凭对「上帝即无法设想更伟大者」这一概念的分析推出其必然存在。"}

  {
    id:"4.3",
    t:"阿奎那:理性与信仰的大综合与「五路」",
    lead:"当亚里士多德的全部著作经阿拉伯世界重返欧洲,基督教世界面临抉择:把这位异教哲人当作威胁烧掉,还是把他纳入信仰?阿奎那选择了第三条路——综合。",
    city:"paris",
    body:[
      {h:"信仰与理性各有其域,又彼此印证",p:"阿奎那的根本立场是:真理只有一个,所以正确运用的理性绝不会与真信仰冲突。他区分出两类真理:一类是理性单凭自身就能证明的(如上帝存在),另一类是超出理性、只能靠启示得知的(如三位一体、道成肉身)。理性和信仰因此不是敌人,而是通向同一真理的两条路径;哲学是神学的婢女,但是一个被尊重、被善用的婢女。这种分工既给了理性独立的空间,又为信仰保留了不可化约的领域,化解了「亚里士多德威胁论」,成就了中世纪最宏大的思想综合。"},
      {h:"五路:从经验世界回溯第一因",p:"在《神学大全》中,阿奎那提出五条证明上帝存在的路径,全都从可经验的世界出发(这正与安瑟伦的纯概念论证相反)。前三路是核心:其一,凡运动者皆被他物推动,不能无穷后退,故必有一不动的推动者;其二,因果链不能无穷上溯,故必有第一因;其三,万物皆可能存在也可能不存在,但若一切都偶然,曾经必有「全无」之时,那现在就不该有任何东西,故必有一个自身必然的存在者。后两路则从等级与目的性出发,推向至善与终极设计者。这五路最终都把那个终点称为「上帝」。"},
      {h:"为何不能无穷后退:论证的关键支点",p:"五路的说服力全押在一个前提上:本质性的因果序列不能无限后退。阿奎那的区分很精妙:他不否认时间上的无穷链条(如父生子、子生孙可以无限),而是针对「当下同时起作用」的从属性序列——比如手推棍、棍推石,若没有第一个施力者,整条链当下就动不起来。把这个例子放大到存在本身:万物此刻的存在都依赖于他者维系,若没有一个自身就存在、不依赖任何他者的根基,整个存在的「链条」当下就会坍塌。批评者(如休谟)则质疑:凭什么整个序列也需要一个外在原因?"},
      {h:"类比之路:我们如何谈论上帝",p:"一个深刻难题是:既然上帝无限超越,我们用「善」「智慧」这些来自有限世界的词去说它,岂非全然不当?阿奎那的解决是「类比谓述」:这些词用于上帝和用于受造物,既非完全同义(否则把上帝降为受造物),也非完全异义(否则我们对上帝一无所知、连说都不能说),而是类比地使用。说上帝是善的,意味着它以一种超越而完满的方式是其善之源。这一语言哲学上的洞见,为有限的人类如何有意义地谈论无限者提供了精巧的中间道路。"}

    concepts:[

      {t:"类比谓述",d:"对上帝的语词既非同义也非异义,而以类比方式指向其超越的完满。"}

  {
    id:"4.4",
    t:"唯名论与经院的黄昏(司各脱、奥卡姆剃刀)",
    lead:"当阿奎那的大综合刚刚建成,一批锋利的头脑就开始拆解它:也许实在并不像那座精密的理性大厦,而是更偶然、更个别、也更不可被纯逻辑捕捉。",
    city:"paris",
    body:[
      {h:"司各脱:此性与意志的优先",p:"邓斯·司各脱被称为「精微博士」,他的思想以细密著称。两个核心贡献值得记住。其一是「此性」:他追问,是什么使苏格拉底成为这个独一无二的苏格拉底,而不只是「一个人」?共相解释不了个体性,于是他提出每个个体都有一种使其成为「这一个」的形式规定性。这把哲学的目光从普遍者拉向了不可重复的个别。其二是意志对理智的优先:上帝之所以命令某事为善,不是因为它本身先天为善,而是因为上帝意志如此。这种「意志主义」削弱了世界的理性必然性,埋下了后世强调自由与偶然的种子。"},
      {h:"奥卡姆剃刀:如无必要,勿增实体",p:"奥卡姆的威廉提出了那条著名的方法论原则:不应在没有必要时增加存在物的数目;能用更少的东西解释的,就不要用更多。这把「剃刀」并非说简单的就一定是真的,而是一条节俭原则:在解释力相同的两个理论中,选假设更少的那个。奥卡姆用它大刀阔斧地削去经院哲学里堆积的抽象实体——比如那些被实在论者当作真实存在的共相。在他看来,普遍者根本不在世界之中,世界里只有一个个具体的个别事物;共相只是心灵中的概念、用来指代许多个体的符号。"},
      {h:"唯名论的冲击:知识与信仰的分离",p:"奥卡姆的唯名论带来连锁后果。既然只有个别事物真实存在,而上帝又是绝对自由、全能的,它本可以创造任何样子的世界,那么我们就无法仅凭理性必然地推断出世界为何如此、上帝意欲如何。于是阿奎那式「理性能证明信仰内容」的乐观被瓦解:许多原本以为可被论证的神学命题,如今只能靠信仰接受。理性与信仰被推开,各归各家。这看似削弱了哲学,实则解放了它——既然神学结论无法理性证明,人就更有理由转向对个别事物的经验观察。"},
      {h:"黄昏还是黎明:通向近代的伏笔",p:"称为「经院的黄昏」既对也不对。一方面,那座融贯一切的理性神学大厦确实开始解体,确定性的疆域收缩。另一方面,唯名论留下的遗产恰恰滋养了近代:对个别经验事物的重视预示了经验主义,意志主义对偶然与自由的强调通向了近代的自由观,而「世界本可不同、唯有观察才知其实然」的态度,正是实验科学的精神前提。从培根到霍布斯,近代思想的不少根须都扎在这片看似衰败的土壤里。"}

      {t:"意志主义",d:"主张上帝(或人)的意志先于并决定何为善,而非善先天给定。"}

      {h:"皮科:人的尊严在于无固定本性",p:"皮科·德拉·米兰多拉的《论人的尊严》被誉为文艺复兴的宣言。他设想上帝在造完万物后对亚当说:别的造物都有固定的本性与位置,唯独你没有——我把你放在世界的中央,你可以自由地把自己塑造成你愿意成为的样子。你既能堕落为禽兽,也能上升为神明,全凭你的选择。这是一个石破天惊的观念:人的尊严恰恰不在于他占据了某个崇高的等级,而在于他没有被固定的本性,是自由的自我塑造者。这一思想越过几百年,直接呼应了存在主义「存在先于本质」的命题。"},
      {h:"伊拉斯谟:基督教人文主义与温和的讽刺",p:"伊拉斯谟代表人文主义与基督教信仰的结合。他校勘希腊文《新约》,主张回到福音的朴素精神,反对僵化的仪式与神学繁琐。在《愚人颂》中,他借「愚神」之口,以反讽的笔调嘲弄了从神学家到教士的种种自负与虚伪——这种以幽默与博学并行的批判,本身就是人文主义自信而宽容的气质体现。但当宗教改革爆发,伊拉斯谟与路德就「自由意志」激烈交锋:他坚持人尚有选择善的余地,反对路德把一切归于上帝的绝对预定,体现了人文主义对人之能动性的珍视。"}

      {h:"旧宇宙:封闭、分层、以人为中心",p:"在哥白尼之前,主流是托勒密的地心模型与亚里士多德的宇宙观:地球静居中心,日月星辰镶嵌在层层旋转的水晶天球上,最外层是恒星天,整个宇宙是有限而封闭的。更重要的是,这是一个有等级、有意义的宇宙:月上世界由完美的以太构成、永恒不变,月下世界则生灭无常。人居中心,既被理解为最卑下的位置(离天最远),也象征着造物关注的焦点。这套体系与神学、日常经验和肉眼观感都吻合,因而稳固了上千年。"},
      {h:"哥白尼的转动:为了更简洁的和谐",p:"哥白尼在《天体运行论》中提出日心说,让地球既绕轴自转又绕太阳公转。值得注意的是,他的动机并不全是新观测,而很大程度上是对数学和谐与简洁的追求——托勒密体系为吻合观测堆砌了大量本轮,显得笨拙,而日心安排能更优雅地解释行星的逆行等现象。这里藏着科学革命的一个深层信念:自然的真相应当是简洁而和谐的,数学上的优美是真理的线索。哥白尼本人仍保留了完美圆周轨道,革命尚未彻底,但中心已被悄然挪移。"},
      {h:"打破天球:布鲁诺与无限宇宙",p:"哥白尼之后,旧的封闭结构开始崩裂。布鲁诺大胆推演:既然地球只是一颗普通行星,太阳只是一颗普通恒星,那么宇宙没有理由有边界或中心,它应是无限的,布满无数个像太阳系一样的世界。这个想象既令人振奋又令人眩晕:从一个温暖、有限、为人而设的家园,人类突然被抛入一个没有边界、没有中心、对人漠不关心的无限空间。帕斯卡尔后来那句「这些无限空间的永恒沉默使我恐惧」,正是对这场宇宙观巨变的深刻心理回响。"},
      {h:"革命的意义:人的去中心化",p:"哥白尼革命的真正分量是哲学性的。康德把自己在认识论上的颠倒称为「哥白尼式革命」,可见其象征地位。一方面,它确立了一种新的认知态度:不能轻信感官直观(我们明明看见太阳在动),而要服从理性与数学论证,哪怕结论违反常识与传统。另一方面,它启动了一连串「去中心化」:人不再处于宇宙中心,后来达尔文又把人从生物的中心拉下,弗洛伊德再把意识从心灵的中心拉下。人类不断被迫学习一件事:世界并非围绕我们而设。"}

  {
    id:"5.3",
    t:"培根:四假象、归纳法与「知识就是力量」",
    lead:"如果说哥白尼改变了我们看天的方式,培根则要改变我们求知的方式:扔掉古人的权威与空洞的演绎,让心灵谦卑地走向自然本身。",
    city:"london",
    body:[
      {h:"知识就是力量:科学的实用转向",p:"培根那句名言「知识就是力量」标志着对知识目的的重新定义。在古希腊,知识(尤其是沉思真理)被视为自足的、为求知而求知的高贵活动;培根却宣告,真正的知识应当能改善人类的物质生活、增进人对自然的支配。求知不是为了静观,而是为了行动与造福。这一转向把科学与技术、理论与应用紧紧绑在一起,奠定了近代科学的实践品格。他设想的「新大西岛」中有一座「所罗门宫」,那几乎就是现代科研机构的雏形——集体的、有组织的、面向实用的探索。"},
      {h:"四假象:清除心灵的偏见",p:"培根认为,人在认识自然前,必须先清扫心灵中扭曲真相的成见,他称之为四种「假象」。「种族假象」根植于人性本身,如总倾向于看到秩序、被情感左右判断;「洞穴假象」源于个人的性情、教育与经历,使每人都像困在自己的小洞穴里看世界;「市场假象」来自语言——含混的词语会绑架思维,让人争论根本不存在的东西;「剧场假象」则是盲从既有的哲学体系与权威教条,如同接受了舞台上虚构的剧本。先识破这四重幻象,心灵才能如其所是地接近自然。"},
      {h:"新工具:归纳法的革命",p:"培根的《新工具》直接挑战亚里士多德以演绎三段论为核心的旧逻辑。他认为演绎只能整理已有的知识,无法发现新真理;真正的方法应是从大量经验观察出发,谨慎地、逐步地上升到普遍原理,这就是归纳法。他强调不能急于跳到最高的概括,而要先系统地收集事例,尤其重视「反面事例」——能推翻假设的例子往往最有价值。他还提出可以设计实验主动「拷问自然」,而非被动等待观察。这套强调经验、实验与渐进归纳的方法,成为近代科学方法论的奠基性纲领。"}

  {
    id:"5.4",
    t:"伽利略:数学化的自然与第一/第二性质之分",
    lead:"伽利略不仅用望远镜看见了新的天空,更提出一个更激进的主张:自然这本大书是用数学写成的——而这意味着,世界的真相也许与我们感官所见大不相同。",
    city:"florence",
    body:[
      {h:"自然这本书用数学写成",p:"伽利略最具革命性的信念是:宇宙是一本用数学语言写就的书,字母是三角形、圆和其他几何图形;不懂这语言的人,只能在黑暗中徘徊。这与亚里士多德式的自然哲学截然不同——后者关心事物的「目的」「本性」与质的描述,伽利略则要把自然现象还原为可测量、可用数学关系表达的量。他研究落体不再问「重物为何趋向其自然位置」,而是测量距离与时间的精确关系,发现落体距离正比于时间的平方。自然科学由此从定性的解释转向定量的、可用公式表达的规律。"},
      {h:"第一性质与第二性质之分",p:"为了让世界可数学化,伽利略作了一个影响深远的区分。他认为,物体真正客观拥有的,只是那些可测量的属性:形状、大小、数目、运动、位置——这是「第一性质」,它们独立于观察者而存在于物体本身。而颜色、气味、声音、冷热、味道等「第二性质」,并不真正在物体之中,而是物体的微粒作用于我们感官时,在心灵里产生的感受。他有句尖锐的话:若把有感觉的生物移走,这些气味、滋味与声音就只剩空名了。世界本身只是运动着的、无色无味的几何粒子。"},
      {h:"感官的降格与近代认识论的开端",p:"这个区分的后果极为深远。它意味着我们日常经验中那个充满色彩、声音和气味的丰富世界,在某种意义上是「主观的幻象」;真实的物理世界是冷峻、无声、纯由可测量属性构成的。感官不再是通往真相的可靠窗口,真理要靠数学和理性来把握。这一立场被洛克明确继承并系统化,又招致贝克莱的猛烈反驳:贝克莱质问,既然第二性质的论证(它们随知觉而变)同样适用于第一性质,那凭什么说形状大小就更客观?这场争论直接催生了近代认识论的核心难题:我们所知的,究竟是世界本身,还是世界在我们心中的表象?"}

      {t:"第一性质",d:"形状、大小、运动等客观存在于物体本身的可测量属性。"},

subs[5]=[
  {
    id:"6.1",
    t:"笛卡尔:方法论怀疑、我思故我在与心身问题",
    lead:"如果你想为知识找一块绝对牢靠的地基,就得先把一切可疑的东西统统推倒——笛卡尔正是用最彻底的怀疑,去寻找最不可怀疑的起点。",
    city:"amsterdam",
    body:[
      {h:"方法论怀疑:为知识寻找阿基米德点",p:"笛卡尔面对的是一个信念崩塌的时代:经院权威动摇,新科学方兴未艾,什么才是确定的?他的策略是「普遍怀疑」——凡是有一丝可疑的,都暂且当作假的,看看是否还剩下绝对确定之物。感官会骗人(远处的塔看似圆其实方),所以感官知识可疑;梦中的经验栩栩如生却是假的,所以我或许此刻正在做梦;最极端地,他假设有一个全能的「恶魔」,处心积虑地在我每一次判断时都欺骗我,连「二加三等于五」都可能是它植入的错觉。这不是为怀疑而怀疑,而是一种以退为进的方法,目的是逼出那个连恶魔也无法撼动的基点。"},
      {h:"我思故我在:不可动摇的第一原理",p:"在怀疑的废墟中,笛卡尔发现了一件无法被怀疑的事:我正在怀疑。即便恶魔在全力欺骗我,要被欺骗,也总得有一个「我」在被骗、在思考。我可以怀疑一切,唯独不能怀疑「我正在怀疑」这件事本身;因为怀疑「我在思考」本身就是一种思考。于是他得出那个著名命题:我思,故我在。只要我在思考,我就必定存在。注意它的精妙:这不是一个三段论推理,而是一种当下的自明——每当我说出或想到它时,它就必然为真。这块基石的特别之处在于:它把确定性的根基,牢牢安放在了思维主体的自我意识之上。"},
      {h:"心身二元论:两种全然不同的实体",p:"从「我思」出发,笛卡尔界定了「我」的本质:我是一个「思维的东西」,其本质属性是思想,完全不依赖于身体或任何物质。由此他提出二元论:世界由两种根本不同的实体构成——心灵(其本质是思想,不占空间)和物质(其本质是广延,即占据空间)。心灵无形而自由,物质则像机器一样遵循机械规律。这一区分一举把广阔的物质世界交给了数学物理学去研究,又为人的自由意志和灵魂保留了独立的领地,可谓近代「科学与人文」分工的哲学源头。"},
      {h:"心身问题:松果腺解决不了的难题",p:"二元论却带来一个棘手的遗留问题,至今仍是心灵哲学的核心:如果心灵不占空间、物质纯属机械,二者本质如此不同,它们如何相互作用?我的意志(心灵)如何能让手臂(物质)抬起?针刺(物质)又如何引起疼痛(心灵)?笛卡尔含糊地诉诸大脑中的「松果腺」作为交汇点,但这等于把问题往后推了一步——一个非物质的东西怎么可能推动物质?这个「心身互动难题」直接催生了斯宾诺莎、莱布尼茨等人各异的回应,并一路延伸到今天关于意识与大脑关系的争论。"}

    concepts:[

      {t:"我思故我在",d:"只要我在思考,我就必然存在;此乃不可怀疑的第一原理。"},
      {t:"心身二元论",d:"心灵(思想、不占空间)与物质(广延、机械)是两种根本不同的实体。"}

  {
    id:"6.2",
    t:"斯宾诺莎:唯一实体、神即自然与自由即理解必然",
    lead:"笛卡尔留下心物如何互动的难题;斯宾诺莎索性釜底抽薪——若万物本就是同一个实体的不同面相,互动的鸿沟也就根本不存在了。",
    city:"amsterdam",
    body:[
      {h:"唯一实体:神即自然",p:"斯宾诺莎在《伦理学》中以几何学的方式层层推演,得出一个惊人结论:整个宇宙只有一个实体,它无限、自因、永恒,既可称为「神」,也可称为「自然」。笛卡尔有心灵、物质、上帝多个实体,斯宾诺莎则认为真正自足、不依赖他物而存在的实体只能有一个——若有两个无限实体,它们就会彼此限制,从而都不再是无限的。这唯一实体有无穷多种「属性」,我们人类只能认识其中两种:思想与广延。心灵与物质不是两样东西,而是同一个实体从两个不同角度被理解。心身问题就此消解:它们本就是一回事的两面。"},
      {h:"泛神论与「在神之内」",p:"斯宾诺莎的神不是一位居于世界之外、按意志创世的人格神,而就是自然本身的无限整体。万物都不是被神「从外部」创造,而是作为神之本性的必然结果而「内在于」神。他区分「能产的自然」(作为创生力量的神)与「所产的自然」(由此必然流出的万物)。这意味着没有任何东西能在神之外存在,一切都遵循神即自然的必然法则展开,没有偶然,也没有超自然的目的或奇迹。正因这种泛神论把神等同于自然、剥去了人格与意志,他在当时被斥为「无神论者」,遭犹太社群逐出教门。"},
      {h:"必然性与自由的重新定义",p:"在斯宾诺莎的体系里,一切皆由神之本性必然决定,因此严格说来没有自由意志——人以为自己自由,只是因为意识到自己的欲望,却不知道决定这欲望的原因,就像一块被抛出的石头若有意识,也会以为是自己愿意飞行。但他并不因此陷入消极:他重新定义自由。自由不是「能够任意妄为」,而是「依照自己本性的必然性而行动」,以及在更深处——理解你被决定的方式。当你看清情绪与处境背后的因果必然,你便不再被它们盲目奴役,这就是真正的自由与解脱。"},
      {h:"在永恒的相下:理智对至福的救赎",p:"斯宾诺莎的《伦理学》归根结底是一部关于如何获得心灵安宁与幸福的书。被动的情感(如恐惧、嫉妒、希望)源于我们对事物的混乱、片面的认识,使我们成为外部因素的奴隶。出路在于知识:当我们以理性「在永恒的相下」去理解万物的必然联系,被动的激情就转化为主动的理解,痛苦的束缚就松开了。最高境界是「对神的理智之爱」——以理性认识并热爱那作为整体的自然秩序。这是一种没有人格神、却充满宗教情怀的智慧,把哲学认识本身当作通往至福与自由的救赎之路。"}

    concepts:[

      {t:"泛神论",d:"神不在世界之外,而就是自然整体本身,万物内在于神。"},
      {t:"自由即理解必然",d:"自由不是任意而为,而是依本性必然行动并理解决定自己的原因。"}

    quote:{q:"自由的人最少想到死,他的智慧不是对死的默念,而是对生的沉思。",who:"斯宾诺莎·《伦理学》",plain:"真正自由的人不被对死亡的恐惧支配,而把心思放在如何充分地理解与生活。"}

  {
    id:"6.3",
    t:"莱布尼茨:单子、预定和谐与「最好的可能世界」",
    lead:"如果实体不能彼此推动,世界又何以如此井然有序?莱布尼茨给出一个奇异而精巧的答案:无数封闭的灵魂,却奏出一曲早已谱好的交响乐。",
    city:"hannover",
    body:[
      {h:"单子:没有窗户的精神原子",p:"莱布尼茨认为,组成世界的终极实体既不是物质微粒(它可无限分割,故非真正的单一),而必须是没有部分、不可分割的精神性单位——他称之为「单子」。每个单子都是一个独立的、有知觉的小宇宙,从自身内部展开其全部状态。最著名的比喻是:单子「没有窗户」,任何东西都不能从外部进出。这意味着没有一个单子能真正作用于另一个单子,它们彼此完全隔绝。这是对笛卡尔互动难题的极端回应:既然实体间的因果作用难以理解,那就干脆否认它,假设每个单子都只是自身内在程序的展开。"},
      {h:"预定和谐:两座完美同步的钟",p:"但若单子彼此隔绝,我们经验到的协调一致(我决定抬手,手就抬起)从何而来?莱布尼茨提出「预定和谐」:上帝在创世之初,就把每一个单子都设定好,使它们各自独立展开的状态恰好彼此完美对应,如同钟表匠造出无数座钟,各走各的却分秒不差。我的心灵单子「决定抬手」与我的身体单子「手臂抬起」并无因果作用,只是上帝预先调校得严丝合缝。这是一个大胆而精巧的形而上学构想:整个宇宙是一部上帝预先编排好的、所有声部完美和声的巨型乐谱。"},

    body:[
      {h:"辩证法:矛盾是发展的动力",p:"黑格尔反对把概念看作彼此孤立、固定不变的。他的「辩证法」主张:每一个概念在被彻底思考时,都会暴露出自身的片面与矛盾,从而向对立面转化,再在更高层次上被「扬弃」(Aufhebung——同时含否定、保留、提升三义)而综合。这不是「正—反—合」的机械套路,而是概念因自身内在张力而自我推进的运动。矛盾在这里不是要消灭的逻辑错误,而是一切发展的内在动力。真理因此是一个过程,而非静止的结论。"},
      {h:"意识形态的辩证攀登",p:"《精神现象学》是这一方法的壮丽演示:它追踪「意识」从最幼稚的「感性确定性」一路上升到「绝对知识」的全程。意识先以为最确定的是「这一个、这里、现在」的直接感觉,可一分析就发现「这里」「现在」都是空洞普遍的,于是被迫前进;每一形态都因自身矛盾而崩塌,催生下一更丰富的形态。这部书写的是精神的「成长史」与「受难史」——它必须经历每一种片面立场并体验其破产,才能抵达真理。"},
      {h:"实体即主体,真理是全体",p:"黑格尔提出两个纲领性命题。其一,「实体即主体」:终极实在(绝对)不是一个静止的基底,而是一个能动地自我展开、自我认识的过程,像一颗种子必须长成全树才实现自身。其二,「真理是全体」:任何孤立的环节都只是抽象的片面,唯有把整个发展历程作为一个有机整体来把握,真理才显现。意义在于:黑格尔把康德割裂的主客、有限与无限,统摄进一个自我运动、自我和解的精神总体——哲学的任务,就是在思想中重演并把握这一全过程。"}
    ],
    concepts:[
      {t:"辩证法",d:"概念因自身内在矛盾而向对立面转化、再在更高层次综合的运动。"},
      {t:"扬弃(Aufhebung)",d:"既否定又保留并提升,旧环节被克服却以更高形态保存。"},
      {t:"实体即主体",d:"绝对不是静止基底,而是能动地自我展开、自我认识的过程。"}
    ],
    quote:{q:"真理是全体。",who:"黑格尔·《精神现象学》序言",plain:"片面的环节都不是真理,唯有把握整个发展过程的总体才是。"}
  },
  {
    id:"9.3",
    t:"黑格尔(下):逻辑学、客观精神与历史哲学",
    lead:"如果世界的根底是理性,那么逻辑、国家与历史就该是同一个理性的层层展开。黑格尔要建一座包罗一切的体系。",
    city:"berlin",
    body:[
      {h:"逻辑学:绝对理念的自我运动",p:"在《逻辑学》中,黑格尔展示纯粹概念(范畴)如何自我演化:从最贫乏、最抽象的「存在」开始——纯存在因毫无规定性而等同于「无」,二者的矛盾运动产生「变易」,如此层层推进,概念不断丰富,最终抵达「绝对理念」。这套「逻辑」不是形式推理的工具,而被黑格尔视为「上帝在创世之前的思想」——即实在本身的理性骨架。著名口号「凡合乎理性的就是现实的,凡现实的就是合乎理性的」,正表达了理性与实在在他眼中的根本同一。"},
      {h:"客观精神:从抽象法到伦理国家",p:"精神不止于个人内心(主观精神),还要外化为制度,这就是「客观精神」。在《法哲学原理》中,黑格尔让自由概念逐级展开:先是「抽象法」(财产、契约中的个人权利),再是「道德」(个人内心的良知与意图),二者各有片面,最终被「伦理」(Sittlichkeit)所扬弃——自由落实于家庭、市民社会、国家这些活生生的伦理共同体之中。其中「市民社会」是各自逐利的需要体系,而「国家」则被他视为伦理理念的现实化、个体自由与普遍意志的统一。这把自由从康德的内心准则,推向了制度性的客观实现。"},
      {h:"历史哲学:自由意识的进展",p:"历史在黑格尔眼中不是偶然事件的堆积,而是「世界精神」自我实现的舞台,其主线是「自由意识的进展」:东方专制只有一人(君主)自由,希腊罗马是部分人自由,日耳曼—基督教世界才认识到人本身皆自由。推动历史的是「理性的狡计」——拿破仑这样的「世界历史人物」自以为在追逐个人野心,实则被理性当作实现普遍目的的工具,激情成了精神前进的燃料。这一宏大叙事既有把握历史整体意义的雄心,也因其目的论与「为现存辩护」的倾向,招致后世(尤其马克思与存在主义)的猛烈批判。"}
    ],
    concepts:[
      {t:"绝对理念",d:"逻辑学的终点,概念自我运动所达成的、实在的完整理性结构。"},
      {t:"伦理(Sittlichkeit)",d:"自由在家庭、市民社会、国家等伦理共同体中的客观实现。"},
      {t:"理性的狡计",d:"理性借个体的激情与野心,暗中实现历史的普遍目的。"}
    ],
    quote:{q:"世界历史无非是自由意识的进展。",who:"黑格尔·《历史哲学》",plain:"整部人类史的主线,就是人类对自身自由的认识不断扩展的过程。"}
  },
  {
    id:"9.4",
    t:"主奴辩证法、异化与黑格尔的政治回响",
    lead:"自我意识为何非要在他人那里才能成立?黑格尔关于承认与劳动的一段分析,日后点燃了马克思与整个左派传统。",
    city:"berlin",
    body:[
      {h:"承认与生死斗争",p:"《精神现象学》中「主人与奴隶」一节论证:自我意识不能孤立成立,它必须被另一个自我意识「承认」,才能确证自身。两个自我相遇,各要对方承认自己,于是爆发「生死斗争」。不惧死亡、宁可冒生命之险的一方成为「主人」,贪生而屈服、选择活命的一方成为「奴隶」。这段分析的革命性在于:它把「自我」奠基于人与人之间的相互承认关系,而非孤立的笛卡尔式我思——主体性从一开始就是社会性的。"},
      {h:"主奴关系的辩证翻转",p:"故事的精彩在于结局的反转。主人让奴隶替自己劳动、享用其成果,看似胜利,却陷入两个困境:他获得的承认来自一个他瞧不起的奴隶,因而是空洞的;他脱离劳动、只知消费,反而丧失了与世界打交道的能力,变得依赖。奴隶则相反:他在恐惧中体验了否定性,又在「劳动」中改造对象、把自己的意图对象化于产品,从而陶冶自身、获得独立的自我意识。于是真正发展出自由意识的,竟是奴隶而非主人。劳动在此被赋予了塑造人、解放人的哲学分量。"},
      {h:"异化与左派的回响",p:"黑格尔的「异化」(Entfremdung)指精神把自身外化为对立的客体、再认出那其实是自己、从而回归自身的过程——异化是精神自我实现的必经环节。青年马克思接过这把钥匙却把它「翻转」:在《1844年经济学哲学手稿》中,劳动者本应在产品中实现自己,可在资本主义下,产品、劳动过程、人的类本质乃至人与人的关系全都变成与他敌对的异己力量——这是不该有、必须被革命扬弃的「异化劳动」。从主奴辩证法到劳动异化,黑格尔为马克思提供了思想母体;存在主义(科耶夫的讲座尤为关键)也从「承认斗争」中读出了人之自由与他者的根本纠缠。黑格尔由此成为现代政治与社会批判的源头之一。"}
    ],
    concepts:[
      {t:"承认(Anerkennung)",d:"自我意识必须被另一自我意识承认才能确证自身;主体性本质上是社会性的。"},
      {t:"主奴辩证法",d:"主奴关系的翻转:在劳动中陶冶自身的奴隶反而发展出独立的自我意识。"},
      {t:"异化(Entfremdung)",d:"主体把自身外化为对立客体;黑格尔视为必经环节,马克思视为须被扬弃之恶。"}
    ],
    quote:{q:"正是通过劳动,奴隶的意识才回到了它自身。",who:"黑格尔·《精神现象学》",plain:"奴隶在改造世界的劳动中塑造并发现了真正自由的自我。"}
  }
];

{ id:"10.1", t:"叔本华:作为意志与表象的世界、苦难与解脱", lead:"如果世界的内核不是理性,而是一股盲目、永不满足的冲动,人生还能指望什么?", city:"frankfurt",
  body:[
    {h:"两副面孔的世界", p:"叔本华接过康德的「现象与物自体」之分,却给出大胆的回答:世界作为「表象」,是被我们的认识形式(时空与因果)所组织的、被主体所看见的样子——没有眼睛就没有太阳。但这只是世界的外壳。当我向内反观自己的身体,我不只是从外部观察它,我还从内部直接体验到它的活动,这就是「意志」。叔本华由此推断:那个在我身上显现为意志的东西,就是整个世界的物自体。石头的下落、植物的生长、动物的本能、人的欲求,本质上都是同一股力量的不同等级的客体化。"},
    {h:"意志即苦难的根源", p:"这股意志是盲目的、无目的的、永不停歇的冲动——它不为什么而欲求,它只是欲求本身。问题在于:欲求意味着匮乏,匮乏即痛苦;而一旦欲求被满足,随之而来的不是持久的幸福,而是无聊。于是人生像钟摆,在痛苦与无聊之间摆动。这不是某个人的不幸,而是意志本性的结构性后果。叔本华的悲观主义因此不是情绪,而是一个从形而上学前提推出的结论。"},
    {h:"两条解脱之路", p:"既然苦难源于意志的奴役,解脱就在于挣脱意志。第一条是审美的暂停:当我们沉浸于一件艺术品、一段音乐,我们暂时成为「无意志的纯粹认识主体」,欲求的针扎暂时停歇——尤其音乐,在叔本华看来直接摹写了意志本身。第二条是更彻底的道德与禁欲之路:通过同情,我穿透「个体化原理」的幻象,认出他人的苦就是我的苦;最终在圣徒式的「意志否定」中,意志转身否定自己。这里叔本华引入了他对印度哲学的吸收。"},
    {h:"难点与回响", p:"一个尖锐的疑问是:如果意志是唯一的实在,那个能「否定意志」的力量从何而来?叔本华的体系在此似乎自相矛盾。但他的影响极为深远:尼采从他出发又反叛他,弗洛伊德的无意识、瓦格纳的歌剧、乃至现代对「欲望—满足—空虚」循环的洞察,都能听见叔本华的回声。他第一个严肃地把「人生是否值得过」当作哲学的核心问题。"}
  ],
  concepts:[
    {t:"个体化原理", d:"时空使万物显现为彼此分离的个体,但这只是表象层面的划分,在意志层面万物本是一体。"},
    {t:"意志的客体化", d:"同一股盲目意志在不同等级上显现为自然力、植物、动物与人,等级越高,自我撕裂的苦难越深。"},
    {t:"意志的否定", d:"通过看穿个体化幻象与禁欲,意志转向否定自身,达致一种近乎涅槃的寂静。"}
  ],
  quote:{q:"人生在痛苦与无聊之间像钟摆一样来回摆动,这两者实际上也就是人生的两种最后成分。", who:"叔本华·《作为意志与表象的世界》", plain:"欲望得不到满足时是痛苦,得到满足后又陷入无聊——人很难真正停在幸福里。"}
},
{ id:"10.2", t:"克尔凯郭尔:三种人生境界、焦虑与信仰之跃", lead:"当哲学体系试图把一切纳入理性时,那个必须独自做出选择、独自面对上帝的「单个的人」去了哪里?", city:"copenhagen",
  body:[
    {h:"对黑格尔体系的反叛", p:"克尔凯郭尔的全部思想,起点是对黑格尔那种无所不包的「绝对体系」的愤怒。他讥讽道:黑格尔建造了一座宏伟的思想宫殿,自己却住在旁边的茅屋里——体系解释了世界历史,却唯独安顿不了「我该如何生活、我该如何成为我自己」这个最切身的问题。真理不是客观体系里的一个命题,而是「主观性」:是我用整个生命去委身、去活出来的东西。"},
    {h:"三种人生境界", p:"克尔凯郭尔描绘了存在的三个阶段。审美境界中的人追求当下的享受、新奇与可能性,像唐璜一样不断追逐,却终因没有持续的自我而陷入绝望。伦理境界中的人选择承担责任、做出承诺(如婚姻),用普遍的道德法则塑造自己,获得了连续的自我。但伦理仍可能不够——当亚伯拉罕被命献子,普遍的伦理无法解释这道命令。于是有了宗教境界:个体在与上帝的绝对关系中,可能要「目的论地悬置伦理」。"},
    {h:"焦虑:自由的眩晕", p:"克尔凯郭尔对焦虑的分析极为深刻。焦虑不同于恐惧——恐惧有确定的对象,焦虑却面对「无」。它是当人意识到自己拥有自由、面对无数可能性时的那种眩晕:站在悬崖边,既怕坠落,又被「我可以纵身一跃」的可能性所吸引。焦虑因此是自由的标志,是精神觉醒的代价。它既令人不安,又是人成为自己的必经之路。"},
    {h:"信仰之跃", p:"理性在最高处会撞上「悖论」:永恒的上帝竟成为时间中的个人(道成肉身),这无法被理性消化。信仰不是理性论证的结论,而是在客观不确定性面前的纵身一跃——它要求人「凭借荒谬」去相信。亚伯拉罕之所以是「信仰之父」,正因为他在伦理上看来如同杀人犯,却凭信仰相信他将以荒谬的方式重得以撒。这种孤注一掷的个人决断,是任何体系都无法代替的。克尔凯郭尔由此被尊为存在主义的先驱。"}
  ],
  concepts:[
    {t:"主观性即真理", d:"对于人生最要紧的真理,关键不在命题客观为真,而在主体以何种激情与委身去把握并活出它。"},
    {t:"目的论地悬置伦理", d:"在与上帝的绝对关系中,个体可能被要求暂时搁置普遍的伦理义务,如亚伯拉罕献以撒。"},
    {t:"信仰之跃", d:"面对理性无法消化的悖论,凭着激情纵身一跃地相信,而非等待证明。"}
  ],
  quote:{q:"焦虑是自由的眩晕。", who:"克尔凯郭尔·《焦虑的概念》", plain:"当你真切意识到自己有无限可能、必须自己选择时,那种头晕目眩的不安就是焦虑。"}
},
{ id:"10.3", t:"马克思:历史唯物主义、异化与意识形态", lead:"哲学家们只是用不同方式解释世界,而问题在于改变世界——但要改变,先要看清是什么真正推动了历史。", city:"london",
  body:[
    {h:"把黑格尔倒过来", p:"马克思承认黑格尔的辩证法抓住了历史是一个充满矛盾、不断运动的过程,但他认为黑格尔「头足倒置」:不是观念(绝对精神)推动物质世界,而是物质生产方式决定了人们的观念。这就是历史唯物主义的核心。人首先得吃饭、穿衣、有住处,才能从事政治、艺术与哲学。因此,社会的「经济基础」(生产力与生产关系)决定了它的「上层建筑」(法律、政治、宗教、哲学)。历史的真正引擎不是思想,而是生产方式的演变及其内部矛盾。"},
    {h:"异化劳动", p:"在《1844年经济学哲学手稿》中,青年马克思分析了资本主义下的异化。劳动本应是人确证自己本质的活动,但在雇佣劳动中:工人与劳动产品相异化(产品成了压迫他的资本)、与劳动过程相异化(劳动成了被迫的、痛苦的)、与自己的「类本质」相异化(自由的创造沦为谋生手段)、人与人相异化。这个例子很直观:工厂工人造出无数商品,自己却一无所有,且越生产,资本越强大、自己越被支配。异化揭示的不是个别的不公,而是这套制度的内在逻辑。"},
    {h:"意识形态与虚假意识", p:"如果经济基础决定上层建筑,那么一个社会的主流观念,往往是「统治阶级的观念」。意识形态不是简单的谎言,而是一套让现存秩序显得自然、永恒、合理的观念系统——它让被剥削者把不平等当作天经地义。马克思的批判力量在于:他要求我们追问每一种「普世真理」背后的物质利益与阶级位置。难点也在此:若一切意识都被阶级位置决定,马克思自己的理论又如何能宣称为真?"},
    {h:"历史的方向与争议", p:"马克思预言:资本主义内部矛盾(生产社会化与占有私人化)将激化,最终被无产阶级革命所扬弃,走向无阶级的共产主义。这套「历史规律」赋予了马克思主义巨大的动员力,也带来最大的争议——它究竟是科学预测,还是一种世俗化的救赎叙事?二十世纪的历史既部分印证了他对资本主义危机的洞察,也对其历史必然论提出了严峻质疑。无论如何,马克思永久改变了我们看待社会、权力与历史的方式。"}
  ],
  concepts:[
    {t:"历史唯物主义", d:"物质生产方式是历史的基础,经济基础决定法律、政治、宗教等上层建筑。"},
    {t:"异化", d:"在资本主义下,劳动者与其产品、劳动过程、人的类本质以及他人相疏离对立。"},
    {t:"意识形态", d:"使现存统治秩序显得自然合理的观念系统,常是统治阶级利益的表达。"}
  ],
  quote:{q:"哲学家们只是用不同的方式解释世界,而问题在于改变世界。", who:"马克思·《关于费尔巴哈的提纲》", plain:"光是在书斋里给世界下定义还不够,真正要紧的是动手去改造它。"}
},
{ id:"10.4", t:"尼采(上):上帝已死、虚无主义与视角主义", lead:"如果支撑西方两千年价值的那个最高根基已经崩塌,而大多数人还没听见崩塌的回响,接下来会发生什么?", city:"basel",
  body:[
    {h:"一桩谋杀案的宣告", p:"「上帝已死」常被误读为无神论的口号,但尼采笔下那个提着灯笼在大白天闯进市场的疯子,带来的不是欢呼而是惊恐:「我们把他杀了——你们和我!」尼采宣告的不是上帝不存在,而是一个文化事件:在科学、启蒙与现代性的冲击下,基督教上帝作为价值与意义的最终担保人,已经不再被真正信仰。问题在于,人们仍依赖着由这个根基支撑起来的道德、真理与目的——绳子断了,而走钢丝的人还没察觉。「我们是否听见了掘墓人埋葬上帝的声音?」"},
    {h:"虚无主义的来临", p:"上帝之死的直接后果是虚无主义:最高价值自行贬黜,「为什么」找不到答案。尼采的深刻之处在于,他认为虚无主义不是外来的灾难,而是基督教—柏拉图主义道德的内在结果。这套传统教人鄙视此世、追求一个「真正的彼岸世界」,并把「求真」奉为至高义务;而正是这种诚实的求真意志,最终戳破了上帝与彼岸世界本身的虚构。于是西方文化如同吞下了自己的解药。虚无主义因此是必须穿越、而非绕过的关口。"},
    {h:"消极与积极的虚无主义", p:"尼采区分了两种应对。消极的虚无主义是疲惫的退缩:既然无意义,便随波逐流,或扑向各种廉价的替代信仰(民族主义、对舒适的崇拜——他称之为「末人」的安逸)。积极的虚无主义则把价值崩塌当作机会:既然没有现成的意义,那就由我们自己来创造价值。这里埋下了「重估一切价值」与「超人」的种子。关键不是哀悼旧神,而是问:我们能否成为配得上这片自由空地的创造者?"},
    {h:"视角主义:没有事实,只有解释", p:"尼采对「客观真理」发起釜底抽薪式的质疑:不存在脱离一切视角的「上帝之眼」。一切认识都是从某个生命位置、某种利益与权力关系出发的解释——「没有事实,只有解释,而这本身也是一种解释」。这并非廉价的相对主义(怎么说都行),而是说:视角越多元,我们对一个对象的认识就越丰富、越客观。难点在于:这个论断本身是否也只是尼采的一个视角?尼采坦然接受这种自反性,把哲学从对终极真理的独断,转向对生命与价值的诚实拷问。"}
  ],
  concepts:[
    {t:"上帝已死", d:"指基督教上帝作为价值与意义最终根基的可信性已经瓦解,这是一桩深远的文化事件。"},
    {t:"虚无主义", d:"最高价值自行贬黜、目的与意义失落的状态,尼采视之为西方道德传统的内在结局。"},
    {t:"视角主义", d:"一切认识皆出自某一视角与利益,不存在无视角的绝对真理;视角越多,认识越完整。"}
  ],
  quote:{q:"上帝死了!上帝真的死了!是我们把他杀死的!", who:"尼采·《快乐的科学》第125节", plain:"不是说从来没有上帝,而是说现代人已经不再真心信他了——可我们还没准备好面对这个空缺。"}
},
{ id:"10.5", t:"尼采(下):道德谱系、权力意志、永恒回归与超人", lead:"我们引以为荣的「善」与「恶」,会不会本是弱者对强者的一次成功复仇?而如果你必须无数次重活这一生,你敢吗?", city:"basel",
  body:[
    {h:"道德的谱系学:主人道德与奴隶道德", p:"尼采不问「什么是善」,而问「善这个观念是怎么来的、为谁的利益服务」。他给出一段惊人的考古:最初,强健、高贵、有创造力的人自我肯定地称自己为「好」(主人道德,好—坏之分),把平庸软弱称为「坏」。但被压迫的弱者(他追溯到祭司与早期基督教)无力反抗,便发动了一场「奴隶起义」:他们出于怨恨,把强者的力量、骄傲、自我肯定重新命名为「恶」,再把自己的无能美化为谦卑、忍耐、温顺的「善」(奴隶道德,善—恶之分)。我们今日的道德,在尼采看来,正是这场怨恨之战的胜利成果。"},
    {h:"怨恨、内疚与禁欲理想", p:"这场颠覆的心理动力是「怨恨」:无力在行动中报复的人,在想象中报复,并把这种想象包装成道德优越感。当攻击性无法向外释放,它便转向内部,成为「良心谴责」与内疚——人开始折磨自己,把本能视为罪。禁欲理想(僧侣式的自我否定)则给了痛苦一个意义:「你受苦,是因为你有罪」。尼采承认这套机制深化了人的内在性,却警告它以摧残生命力为代价。理解这一点的意义在于:它逼我们追问,自己珍视的德性究竟滋养生命,还是暗中敌视生命。"},
    {h:"权力意志:生命的根本驱力", p:"尼采用「权力意志」取代叔本华那盲目的「生存意志」。生命的根本冲动不只是求生存,而是求扩张、求克服、求成长、求支配——首先是支配和超越自己。这不该被简化为政治暴力;艺术家创作、思想家求知、运动员突破极限,都是权力意志的升华形态。一切价值,归根结底都是某种权力意志的表达。由此尼采提出「重估一切价值」:用「是否提升生命、是否使人更强健丰盈」作为新的评判尺度,取代彼岸的、否定生命的旧标准。"},
    {h:"永恒回归与超人", p:"尼采抛出他最严酷的思想实验:假设一个魔鬼告诉你,这一生连同每一个痛苦、每一个细节都将无数次重演,丝毫不差——你会诅咒它,还是说「这是我所渴望的」?永恒回归是一块试金石:唯有真正热爱自己生命、能对存在说出「是」的人,才承受得起。能担起这重负的,便是「超人」——不是金发野兽,而是自我立法、自我创造、在无神的世界里为自己生成意义的人。与之相对的是「末人」:只求安逸、不再有渴望与冒险的可怜虫。超人是大地的意义,是人对自身的克服。其难点与危险也正在此:谁来界定何为「提升生命」?这一开放性,既是它的魅力,也是它被滥用的入口。"}
  ],
  concepts:[
    {t:"奴隶道德", d:"出自弱者怨恨的价值评价:把强者之力贬为恶,把自身无能美化为善,与主人道德的好—坏之分相对。"},
    {t:"权力意志", d:"生命求扩张、克服、成长与自我超越的根本驱力,可升华为创造、求知等高级形态。"},
    {t:"永恒回归", d:"设想此生将无数次原样重演的思想实验,用以检验人是否能全心肯定自己的存在。"},
    {t:"超人", d:"克服了虚无与旧道德、为自己立法并创造意义的人,是「大地的意义」。"}
  ],
  quote:{q:"那不能杀死我的,使我更强大。", who:"尼采·《偶像的黄昏》", plain:"经历过而没把你击垮的苦难,会成为让你更坚韧、更丰盈的养分。"}
}
];
subs[10]=[
{ id:"11.1", t:"胡塞尔:现象学方法、意向性与悬置", lead:"哲学若想成为真正严格的科学,该从哪里重新开始?胡塞尔的答案是:回到事物本身,回到意识如何呈现世界。", city:"freiburg",
  body:[
    {h:"回到事物本身", p:"胡塞尔面对的处境是:心理主义把逻辑还原为心理规律,自然主义把意识还原为物理过程,而这都丢失了意义与有效性本身。他的口号「回到事物本身」意味着:悬置一切现成的理论与偏见,去如其所是地描述现象如何在意识中被给予。现象学不研究心理学事实,也不研究外部世界的存在与否,而是研究「显现」这件事的结构——一杯咖啡是如何作为一杯咖啡向我呈现的。这是一门关于意识经验本质结构的严格描述科学。"},
    {h:"意向性:意识总是关于某物的意识", p:"胡塞尔从老师布伦塔诺那里继承并改造了「意向性」这一核心概念:意识从来不是一个封闭的容器,它本质上是指向性的——看总是看某物,想总是想某事,恐惧总是恐惧某个东西。每一个意识行为(noesis)都内在地关联着一个被意指的对象(noema)。这破除了一个根深蒂固的二元论图景:不是先有一个孤立的内在心灵,再去碰运气地接触外部世界;意识与世界从一开始就是相关的。这个洞见后来成为整个现象学—存在主义传统的地基。"},
    {h:"现象学的悬置", p:"为了纯粹地描述显现,胡塞尔提出「悬置」(epoché)的方法:我们不否认外部世界存在,而是「加上括号」,暂时中止对其存在的自然信念,把注意力转向「它是如何被给予我的」。这叫「现象学还原」。一个例子:平时我直接断定「桌上有本书」;悬置之后,我转而细察「书」这一意义是怎样通过一系列侧显、视角、预期而在我意识中被构造出来的。剩下的不是怀疑,而是被纯化的、可供描述的经验流。"},
    {h:"先验自我与未竟的纲领", p:"在还原的尽头,胡塞尔抵达「先验自我」——那个构造一切意义的纯粹意识极。他由此走向一种先验唯心论:世界的意义是由意识构造的。这一步引发了巨大争议,连他最杰出的学生海德格尔也由此分道扬镳。胡塞尔晚年又转向「生活世界」,反思科学如何遗忘了它赖以生根的前科学经验土壤。现象学因此不是一个封闭体系,而是一种不断自我修正的方法与精神,它深刻塑造了二十世纪的哲学走向。"}
  ],
  concepts:[
    {t:"意向性", d:"意识的本质特征:意识总是「关于某物」的意识,行为与对象内在相关。"},
    {t:"悬置", d:"暂时中止对世界存在的自然信念,把它加上括号,以纯粹描述现象如何被给予。"},
    {t:"生活世界", d:"一切科学与理论赖以奠基的、前科学的、被直接经验到的日常世界。"}
  ],
  quote:{q:"我们必须回到事物本身。", who:"胡塞尔·《逻辑研究》", plain:"别急着套用现成理论,先老老实实去看现象本身是怎样呈现给我们的。"}
},
{ id:"11.2", t:"海德格尔:此在、在世存在、沉沦与向死而生", lead:"两千年来哲学一直在追问「存在者是什么」,却遗忘了那个最基本的问题:「存在」本身意味着什么?", city:"freiburg",
  body:[
    {h:"重提存在问题", p:"海德格尔的《存在与时间》开篇即指控西方哲学犯了「存在的遗忘」:它忙于研究各种存在者(桌子、上帝、原子),却从未真正追问「存在」(Sein)本身是什么意思。要重新打开这个问题,得找一个特殊的入口——那个会追问存在、其存在本身就是个问题的存在者,即我们自己。海德格尔故意不用「人」「主体」「意识」这些已被传统污染的词,而称之为「此在」(Dasein),字面意思是「在那里存在」,强调人始终是「在场地、有所领会地存在着」。"},
    {h:"在世存在", p:"海德格尔的关键突破是「在世存在」(In-der-Welt-sein):此在不是先有一个孤立心灵再去认识外部世界,而是从一开始就已经沉浸、操劳、处身于一个意义关联的世界之中。他用「上手」与「现成」之分来说明:平时锤子对我是「上手的」——我用它钉钉子,根本不把它当作一个有属性的对象来观察,它隐没在我的实践目的里;只有当锤子坏了、用不了了,它才作为一个「现成的」对象凸显出来供我打量。理论性的认识是派生的,实践性的「操劳」才是更原初的与世界打交道的方式。"},
    {h:"沉沦与常人", p:"此在在日常中往往不是本真地活着,而是「沉沦」于「常人」(das Man)之中:我们按照「人们都这么做」「大家都这么想」去生活、去说话(闲谈)、去追逐新奇(好奇)、去模糊一切(两可)。「常人」是个谁也不是的匿名主体,它替我们卸下了选择的重负,也悄悄剥夺了我们成为自己的可能。这不是道德谴责,而是对一种普遍生存状态的描述:我们大多数时候,是「被生活」着,而非自己在生活。"},
    {h:"向死而生与本真性", p:"什么能把此在从「常人」中唤回?是「畏」(Angst)与死亡。死亡是此在「最本己的、无所关联的、不可逾越的」可能性——没人能替我去死,它把我从一切社会角色中孤立出来。逃避死亡(「人总有一死,但暂时还轮不到我」)是非本真的;而「向死而生」则是清醒地、先行地把死亡承担为自己存在的界限,由此领会到生命的有限与紧迫,从而本真地、负责地去筹划自己。难点在于:海德格尔后期转向语言与「存在」的更隐秘运思,加之其政治上的污点,使他成为二十世纪最深刻也最有争议的哲学家。"}
  ],
  concepts:[
    {t:"此在(Dasein)", d:"那个其存在本身成为问题、会追问存在意义的存在者,即作为生存活动的人。"},
    {t:"在世存在", d:"此在并非孤立主体,而是始终已经处身、操劳于一个意义关联世界之中的存在方式。"},
    {t:"向死而生", d:"清醒地先行承担死亡这一最本己的可能性,从而本真地领会并筹划有限的生命。"}
  ],
  quote:{q:"此在在它的存在中,对这个存在本身有所作为。", who:"海德格尔·《存在与时间》", plain:"人活着不是被动地存在,而是时时刻刻在为「怎么存在」操心、选择、负责。"}
},
{ id:"11.3", t:"萨特:存在先于本质、绝对自由、自欺与他人", lead:"如果没有上帝预先为人写好剧本,那么人就被判处了自由——这究竟是福音还是重负?", city:"paris",
  body:[
    {h:"存在先于本质", p:"萨特用一个公式概括了无神论存在主义:对人而言,「存在先于本质」。一把裁纸刀是「本质先于存在」——工匠先有了它的概念与用途,才造出它。传统上帝造人也被设想为如此。但若没有上帝,就没有人性的预先蓝图。人首先存在、出现于世,然后才通过自己的选择和行动去定义自己是什么。没有给定的人性,没有借口:你做的选择的总和,就是你。这把责任完全压在了个人肩上。"},
    {h:"被判处自由", p:"由此,「人是被判处自由的」——一旦被抛入世界,人就要为自己所做的一切负责。自由不是一种轻松的特权,而是无可推卸的处境:即使「不选择」也是一种选择。萨特用对意识的分析支撑这一点:意识(自为的存在)本质上是一种「虚无化」的力量,它能从既定情境中后退、否定、设想别样的可能,所以它永远不被过去或本性所决定。一个例子:赌徒昨天下了戒赌的决心,今天面对牌桌时却发现,那个决心拦不住此刻的他——他必须重新地、当下地再选择一次。"},
    {h:"自欺", p:"自由如此沉重,人于是普遍地逃避它,这就是「自欺」(mauvaise foi)。自欺是对自己撒谎:假装自己没有选择的自由,把自己当作一个被角色、本性或处境所固定的「物」。萨特那个著名的咖啡馆侍者,动作过分殷勤、僵硬,仿佛在「扮演一个侍者」,以此把自己等同于这个角色,逃避「我其实可以不这样」的自由。自欺的诱惑无处不在——「我天生就是这样的人」「我没办法」都可能是它的面具。本真则意味着诚实地承担自己的自由。"},
    {h:"他人即地狱", p:"自由还遭遇一个根本限制:他人的目光。当他人注视我,我体验到自己被对方「对象化」——我从一个自由的主体,沦为他眼中一个被定型、被评判的客体(「他者的注视把我凝固」)。在《禁闭》中,三个亡魂被困一室、彼此审视,萨特借此说出「他人即地狱」:不是说他人本身可恶,而是说当我们的自我认知被卷入他人的目光与评判时,人际关系便成了一场争夺主体地位的冲突。这构成了萨特对主体间性既深刻又略显悲观的洞察。"}
  ],
  concepts:[
    {t:"存在先于本质", d:"人没有预先给定的本质,先存在,再通过自由选择定义自己是什么。"},
    {t:"自欺", d:"对自身自由的逃避与自我欺骗,把自己当作被角色或本性固定的物。"},
    {t:"注视(他者的目光)", d:"他人的注视把我对象化、凝固为客体,这是主体间冲突与「他人即地狱」的根源。"}
  ],
  quote:{q:"人是被判处自由的。", who:"萨特·《存在主义是一种人道主义》", plain:"既然没有谁替你安排好人生,你就别无选择地必须自己选,并为选择负全责。"}
},
{ id:"11.4", t:"加缪与梅洛-庞蒂:荒诞与反抗、身体的现象学", lead:"当世界对我们的意义之问报以沉默,我们该自杀、跳入信仰,还是带着清醒继续推石上山?而那个在思考的「我」,首先难道不是一具身体?", city:"paris",
  body:[
    {h:"荒诞:人与世界的断裂", p:"加缪从一个最尖锐的问题出发:既然人生或许无意义,「自杀」是不是唯一严肃的哲学问题?他指出「荒诞」不在世界本身,也不在人本身,而产生于两者的「对峙」——人心渴望意义、统一与永恒,而世界却报以非理性的沉默与冷漠。荒诞正是这一裂缝。加缪拒绝两种逃避:生理的逃避(自杀)和哲学的逃避(像克尔凯郭尔那样跳入信仰,他称之为「哲学性的自杀」)。真正的态度是直面荒诞而不消解它。"},
    {h:"反抗与西西弗斯", p:"那么如何在荒诞中活?加缪的答案是「反抗」:既不否认荒诞,也不向它投降,而是带着清醒持续地活下去、热爱这有限的生命。他重写了西西弗斯的神话——这个被诸神罚以永远推石上山、石头永远滚落的人,本是惩罚的象征。但加缪说,当西西弗斯走下山去重新推石的那一刻,他清醒地看清自己的命运而不抱幻想,这份清醒本身就是对诸神的蔑视和胜利。「我们必须想象西西弗斯是幸福的。」反抗不许诺意义,却赋予生命以尊严。"},
    {h:"梅洛-庞蒂:我们首先是身体", p:"梅洛-庞蒂反对一切把人首先当作「思维的心灵」的传统(从笛卡尔到部分胡塞尔)。他主张:我们与世界打交道的最原初方式,不是意识的反思,而是身体的知觉。我不是「拥有」一具身体,我就「是」我的身体——是「身体—主体」。一个例子:我伸手去够杯子,根本不需要先在脑中计算坐标,我的身体「知道」如何调整、如何把握,这是一种先于反思的「身体图式」与「运动意向性」。知觉不是被动接收感觉数据,而是身体与世界的活生生的对话。"},
    {h:"含混的世界与意义", p:"由身体出发,梅洛-庞蒂得出一种「含混」的存在论:主体与客体、心灵与身体、自我与世界,从来不是两个被截然分开再去拼接的东西,而是彼此交织、相互渗透的——他后期用「肉」(la chair)这个概念来表达这种原初的交织。意义不是先在心灵里再投射到世界,而是在身体与世界的具身相遇中生成的。这一思路纠正了萨特过于强调自由意识、几乎无视身体与处境厚度的倾向,也深刻影响了后来的认知科学、心理学与艺术理论。"}
  ],
  concepts:[
    {t:"荒诞", d:"人对意义的渴求与世界沉默冷漠之间无法弥合的对峙,既非纯属世界亦非纯属人心。"},
    {t:"反抗", d:"清醒地直面荒诞而不逃避、不投降,持续地热爱与活出有限生命的态度。"},
    {t:"身体—主体", d:"人首先不是思维的心灵而是身体,身体是我们知觉并介入世界的原初方式。"}
  ],
  quote:{q:"向着高处挣扎本身,就足以充实一个人的心灵。我们必须想象西西弗斯是幸福的。", who:"加缪·《西西弗斯神话》", plain:"哪怕努力注定看不到终点,这份清醒而执着的挣扎本身,就已经让生命值得。"}
}
];
subs[11]=[
{ id:"12.1", t:"弗雷格与罗素:现代逻辑、涵义/指称与摹状词理论", lead:"如果哲学的许多混乱其实来自语言的误导,那么先把语言和逻辑弄清楚,会不会是哲学的新起点?", city:"cambridge",
  body:[
    {h:"逻辑的革命", p:"弗雷格几乎单枪匹马创立了现代数理逻辑。传统亚里士多德逻辑用「主词—谓词」分析命题,无力处理多重一般性(如「每个人都爱某个人」)。弗雷格引入「函数与变元」「量词」(所有、存在)的框架,使逻辑获得了前所未有的表达力,足以刻画数学推理。他的雄心是「逻辑主义」:证明算术可以完全还原为逻辑——数不是经验抽象,也不是心理产物,而是逻辑对象。这场革命为整个分析哲学奠定了工具与精神底色:追求清晰、形式化与论证的严格。"},
    {h:"涵义与指称", p:"弗雷格提出一个影响深远的区分。考虑「晨星」与「昏星」:两者指的是同一颗金星(指称相同),但「晨星就是昏星」却是一个有信息量的天文发现,而「晨星就是晨星」毫无信息。差别从何而来?弗雷格说:一个表达式既有「指称」(它所指的对象),又有「涵义」(把握该对象的方式、呈现的角度)。两个名称指称相同而涵义不同,所以同一性陈述可以是有内容的认识。这一区分至今仍是语言哲学的核心议题。"},
    {h:"摹状词理论", p:"罗素用他著名的「摹状词理论」解决了一个棘手难题:「当今的法国国王是秃头」这句话,在没有法国国王的今天,是真是假?若说假,似乎就承认「当今法国国王不秃」为真,可同样荒谬;若说它无意义,又不合直觉。罗素的解法是揭示其逻辑形式:这句话其实断言了「存在唯一一个x是当今法国国王,且x是秃头」。既然不存在这样的x,整句话就是假的——而无需假定有一个「不存在的国王」作为指称。语法形式骗了我们,逻辑形式才是真相。"},
    {h:"语言的逻辑分析作为方法", p:"罗素由此提出一个纲领性主张:许多哲学困惑源于被表层语法误导,把不指称任何东西的表达式当成了名称(从而虚构出「金山」「圆的方」这类可疑实体)。哲学的任务,就是通过逻辑分析揭示陈述的真实逻辑形式,从而消解这些虚假问题。摹状词理论被誉为「哲学分析的典范」。它确立了分析哲学的一个核心信念:逻辑是哲学的解剖刀,澄清语言就是澄清思想。"}
  ],
  concepts:[
    {t:"涵义与指称", d:"指称是表达式所指的对象,涵义是把握该对象的方式;两名称可指称同一对象而涵义不同。"},
    {t:"摹状词理论", d:"罗素主张「那个F」并非名称,而应分析为「恰有一个F且它如何如何」的存在断言。"},
    {t:"逻辑主义", d:"弗雷格与罗素的纲领:算术(乃至数学)可以还原为纯逻辑。"}
  ],
  quote:{q:"一个专名(词、记号、记号的结合)表达它的涵义,指称或标示它的指称。", who:"弗雷格·《论涵义与指称》", plain:"一个名字一方面指向某个对象,另一方面也包含我们是「以什么角度」想到这个对象的。"}
},
{ id:"12.2", t:"早期维特根斯坦:图像论与「不可说者应沉默」", lead:"语言为何能描述世界?如果语言的界限就是世界的界限,那么最重要的东西会不会恰恰落在界限之外?", city:"cambridge",
  body:[
    {h:"语言图示世界", p:"《逻辑哲学论》的核心是「图像论」:命题之所以能描述事实,是因为它是事实的一幅「逻辑图像」。正如一张地图与它所表示的地形必须共享某种结构,一个有意义的命题与它所描述的事态必须共享同样的「逻辑形式」——命题中的名称对应世界中的对象,命题的结构投射出事态的结构。世界是事实的总和(而非物的总和),语言是命题的总和,两者凭借共同的逻辑形式相互对应。这是一幅极为精致、近乎晶体般的语言—世界对应图景。"},
    {h:"可说与显示之分", p:"由图像论推出一个惊人结论:能被有意义地说出的,只有描述事实的、原则上可真可假的命题(典型地,即自然科学的命题)。而逻辑形式本身、伦理、美、人生的意义、上帝——这些都不是世界中的事实,因而无法被有意义地「说」,但它们可以「显示」自己。维特根斯坦的关键区分是:有些东西不可说,却能显现。逻辑命题(重言式)不说任何关于世界的事,却显示了语言与世界的逻辑结构。"},
    {h:"哲学是一种活动", p:"这彻底改变了哲学的自我理解。传统哲学命题(关于实体、灵魂、善本身)大多是越界的胡话——它们试图说那不可说的东西,因而无意义(但「无意义」不等于「无价值」,这是常被忽略的微妙处)。于是哲学不再是一套学说,而是一种澄清活动:它的任务是划定有意义语言的界限,把命题分析清楚,让胡话现形。「凡可说的,都能说清楚。」一个例子:许多形而上学争论之所以无解,正因为双方都在界限之外说话却以为在描述事实。"},
    {h:"沉默与神秘", p:"全书以那句著名的话收尾:「对于不可说的东西,我们必须保持沉默。」这绝非冷漠的逻辑禁令。维特根斯坦本人在战壕中写就此书,他真正看重的恰恰是那些不可说的「神秘之物」——伦理与人生的意义。他的意思是:这些最重要的东西无法被语言捕捉,妄图言说只会糟蹋它们,它们要在沉默中、在如何生活中显现。这本薄薄的书一度让他认为哲学问题已被解决,而其深刻的张力,也为他后来的彻底转向埋下伏笔。"}
  ],
  concepts:[
    {t:"图像论", d:"命题是事实的逻辑图像,凭借与事态共享逻辑形式而能够描述世界。"},
    {t:"可说/显示", d:"事实可被有意义地说出,而逻辑形式、伦理与人生意义不可说,只能显示自身。"},
    {t:"重言式", d:"逻辑命题永真却不说任何关于世界的事,它只显示语言的逻辑结构。"}
  ],
  quote:{q:"对于不可说的东西,我们必须保持沉默。", who:"维特根斯坦·《逻辑哲学论》", plain:"凡是语言无法清楚说出的(如人生意义),硬要去说反而糟蹋它,不如以沉默和行动去对待。"}
},
{ id:"12.3", t:"维也纳学派:逻辑实证主义、可证实原则及其衰落", lead:"如果一句话既不能被经验检验、又不是逻辑推演,它还算说了什么吗?——一把想清除全部形而上学的剃刀。", city:"vienna",
  body:[
    {h:"科学世界观与可证实原则", p:"二十世纪二三十年代,一群科学家与哲学家在维也纳定期聚会(维也纳学派),立志以现代逻辑加经验主义来重塑哲学。他们的核心武器是「可证实原则」:一个陈述有认知意义,当且仅当它要么是分析的(逻辑或数学的重言式,凭定义为真),要么原则上能被经验观察所证实。两类之外的句子——关于上帝、绝对、物自体的形而上学断言——既非分析又不可经验检验,因而不真不假,而是「无认知意义」的伪命题,该被清除。"},
    {h:"激进的后果", p:"这把剃刀锋利得惊人。卡尔纳普写下《通过语言的逻辑分析清除形而上学》,断言海德格尔「无之无化」这类句子根本不表达任何可判定的东西。伦理判断(「杀人是错的」)被分析为不描述事实、只表达情感与态度(情感主义)。哲学的全部正当工作,被压缩为对科学语言的逻辑分析与澄清。一个例子:「上帝存在」既无法被任何可能的观察证实或证伪,在逻辑实证主义看来,它和「上帝不存在」一样是没有认知内容的——这激怒了许多人,却也逼出了关于「意义」的深刻讨论。"},
    {h:"原则的自我瓦解", p:"问题恰恰出在这把剃刀自身。「可证实原则」这句话本身,既不是逻辑重言式,又无法被任何经验观察证实——那么按它自己的标准,它岂不是也成了无意义的形而上学?这个自反性难题始终未能化解。此外,普遍科学定律(「所有金属受热膨胀」)涵盖无穷情形,无法被有限观察彻底证实;为此原则一再被弱化(从「可证实」退到「可确证」),却越改越松,失去了原本的清除力。"},
    {h:"衰落与遗产", p:"内外夹击之下,逻辑实证主义作为一个纲领走向衰落。波普尔釜底抽薪,主张科学的标志不是「可证实」而是「可证伪」;蒯因否定了它赖以立足的「分析/综合」二分。然而它的遗产极为丰厚:它把「意义」「证实」「科学与非科学的划界」推到舞台中央,催生了现代科学哲学,也塑造了分析哲学重论证、重清晰、警惕空话的气质。它的失败,本身就是二十世纪哲学最有教益的故事之一。"}
  ],
  concepts:[
    {t:"可证实原则", d:"陈述有认知意义,当且仅当它是分析命题或原则上能被经验证实。"},
    {t:"情感主义", d:"道德判断不描述事实,而是表达说话者的情感与态度,故无真假可言。"},
    {t:"自反性难题", d:"可证实原则本身既非分析命题又不可经验证实,按其自身标准竟成无意义之语。"}
  ],
  quote:{q:"凡是能够说的,都能够说清楚;凡是不能谈论的,就应该对它保持沉默。", who:"维也纳学派引以为纲(语出维特根斯坦)", plain:"学派把这句话理解为:说不清、查不证的话(尤其形而上学)不如干脆不说。"}
},
{ id:"12.4", t:"后期维特根斯坦:语言游戏、意义即用法与私人语言论证", lead:"如果意义不在于图像式的对应,而在于我们用词语「做」了什么——那么哲学的全部困惑会不会都是语言度假时生的病?", city:"cambridge",
  body:[
    {h:"对自己早期思想的反叛", p:"维特根斯坦回到哲学后,推翻了《逻辑哲学论》的根本假设。早期他以为语言只有一种本质功能——图示事实;现在他认为这是一个被理论绑架的幻觉。语言有无数种功能:命令、提问、感谢、诅咒、祈祷、讲笑话、报告……以为它们背后藏着一个统一本质,正是哲学误入歧途的根源。《哲学研究》以一种格言式、对话式的写法,不再建构体系,而是「治疗」我们被语言图景所迷惑的思维。"},
    {h:"语言游戏与意义即用法", p:"他提出两个关键隐喻。其一是「语言游戏」:语言总是嵌在具体的活动与生活形式之中,词的意义由它在这套实践中的角色决定,正如棋子的意义由下棋规则决定。其二,「在大多数情况下,一个词的意义就是它在语言中的用法」——别问「这个词指称什么」,要看「人们用它来做什么」。一个例子:「板!」在建筑工地上意味着「递块板来」,它的意义不在于对应某个心理图像,而在于它在协作中触发的行动。意义被从神秘的内在领域,拉回到公共的、可观察的实践。"},
    {h:"家族相似", p:"那么各种「游戏」(棋牌、球类、独自掷骰)有没有共同本质?维特根斯坦说:没有一个所有游戏共享的定义性特征,有的只是一张交错重叠的相似性之网,就像一个家族的成员——这个有父亲的眼睛,那个有母亲的鼻子,却没有人人共有的那一项。这「家族相似」概念瓦解了从苏格拉底以来「为每个概念寻找一个本质定义」的执念,提示我们许多概念是开放的、边界模糊的,却依然好用。"},
    {h:"私人语言论证", p:"最精妙也最受争议的是「私人语言论证」。设想一种原则上只有我自己懂、用来记录纯私人感觉的语言:我把某种感觉叫「S」,每次它出现就记下「S」。维特根斯坦追问:我凭什么确定今天的「S」和上次是「同一种」感觉?没有任何独立于我的标准来检验我用对了没有——「于是,凡我觉得对的就是对的。而这恰恰意味着,这里根本谈不上对与错。」遵守规则必须是公共的、可被纠正的实践,意义离不开共同体。这一论证有力反对了笛卡尔式的内在私密心灵图景,把语言与意义彻底「公共化」,深远影响了心灵哲学与对私人感受的整个理解。"}
  ],
  concepts:[
    {t:"语言游戏", d:"语言总嵌在具体活动与生活形式中,词义由其在这一实践中的角色决定。"},
    {t:"意义即用法", d:"一个词的意义大多不在于指称某物,而在于它在语言实践中被如何使用。"},
    {t:"家族相似", d:"许多概念无共同本质,其实例只靠交错重叠的相似性相连,如一个家族的成员。"},
    {t:"私人语言论证", d:"原则上只有自己懂的私人感觉语言不可能成立,因缺乏公共的正误标准。"}
  ],
  quote:{q:"哲学问题具有这样的形式:我找不到出路。", who:"维特根斯坦·《哲学研究》", plain:"许多哲学难题不是要解答,而是要解开——像被语言迷了路,需要被领着走出迷宫。"}
}
];
subs[12]=[
{ id:"13.1", t:"福柯:知识型、权力/知识与规训", lead:"我们以为知识是中立的、权力是压制性的——但如果知识与权力本就交织一体,默默地生产着「正常」与「我们自己」呢?", city:"paris",
  body:[
    {h:"知识型:思想的隐秘地基", p:"福柯早期做的是一种「知识考古学」。他发现,每个时代的知识并非自由漂浮的真理,而是受一套深层的、无意识的规则系统支配,他称之为「知识型」(épistémè)——它规定了在那个时代,什么样的陈述才可能被当作「真」来对待、什么算作「科学」。比如「人」这个概念,在福柯看来并非永恒对象,而是相当晚近的知识型的产物,他甚至预言「人将像海边沙滩上的一张脸,被海浪抹去」。这是对「真理超越历史」的根本质疑。"},
    {h:"权力/知识", p:"福柯最具颠覆性的洞见是把「权力」与「知识」连成一个词:权力/知识。他反对把权力只理解为「自上而下的压制」(国王砍头)。现代权力更多是「生产性」的:它生产知识、生产话语、生产关于人的「真理」(谁是疯子、谁是罪犯、谁是正常人),并通过这些知识来规范和塑造人。反过来,知识也总是嵌在权力关系中。没有不带权力的纯粹知识,也没有不生产知识的权力——精神病学、犯罪学、性科学,都既是知识又是权力的运作。"},
    {h:"规训社会与全景敞视监狱", p:"在《规训与惩罚》中,福柯描绘了现代社会的运作方式从「酷刑」转向「规训」。他借用边沁设计的「全景敞视监狱」(Panopticon)作为隐喻:一座环形监狱,中央有一座瞭望塔,囚犯永远不知道自己此刻是否被监视,于是只能时刻假定被看着,最终把监视内化——自己监督自己。福柯说,现代的学校、医院、工厂、军营都遵循同样的逻辑:通过持续的观察、检查、规范化,把人训练成「驯顺而有用的身体」。权力不再主要靠暴力,而靠让人自我规训。"},
    {h:"主体的诞生与解放的难题", p:"福柯由此颠倒了启蒙的自我形象:我们珍视的「自主主体」「内心真相」,在很大程度上是被规训实践和话语生产出来的效果,而非天然的起点。这带来一个尖锐难题:如果连「我」和「我对自由的渴望」都是权力的产物,那么反抗与解放从何谈起?福柯晚年转向「自我的技术」与「生存美学」,试图在被建构的处境中,重新探寻自我塑造与抵抗的可能空间。他留给我们的,是一种永不放松的警惕:对一切自称中立、自然、必然的东西,追问它的历史与权力。"}

{ id:"13.2", t:"德里达:解构、延异与逻各斯中心主义", lead:"如果意义从来不在场、永远在滑动,西方两千年对「在场」「本源」「确定基础」的渴望,是不是一个无法兑现的梦?", city:"paris",
  body:[
    {h:"逻各斯中心主义", p:"德里达诊断出西方形而上学的一个深层倾向,称为「逻各斯中心主义」:它总在追寻一个「在场的」、自足的、确定的意义本源——上帝、理性、真理、自我意识——以此作为一切意义的最终担保。与之相连的是「在场的形而上学」与对「言语优于文字」的偏爱(认为说话时意义直接在场,文字只是其苍白替身)。德里达要做的,不是从外部推翻它,而是从其内部揭示:这个梦想从未真正实现过,它总是自我拆解。"},
    {h:"二元对立及其颠覆", p:"西方思想充满等级化的二元对立:言语/文字、在场/缺席、自然/文化、男/女、灵魂/肉体——前者总被设为本源与优越,后者是派生与次等。解构的策略分两步:先颠倒这一等级(显示所谓「次等项」其实是「优越项」的条件),再越出这个对立框架本身,显示二者相互依存、彼此渗透,根本立不住那条干净的界线。一个例子:德里达论证「文字」所具有的延迟、缺席、可重复等特征,其实也内在于「言语」——所以言语并不比文字更「直接在场」。"},
    {h:"延异:意义的永恒滑动", p:"支撑解构的核心是德里达生造的词「延异」(différance)。它一语双关地融合了「差异」(differ)与「延迟」(defer)。其一,词的意义来自它与其他词的差异(承自索绪尔):「猫」之所以有意义,是因为它不是「狗」「帽」……意义是关系性的,没有哪个词自带饱满的在场意义。其二,这种由差异确定意义的过程永无终点——你查一个词,得到的是更多的词,意义被无限地延迟、推迟,从不抵达一个最终的、完全在场的「所指」。意义因此总是「踪迹」的游戏,永远在途中。"},
    {h:"误解、争议与意义", p:"解构常被误解为「怎么读都行」的虚无主义或文字游戏,德里达本人坚决否认:解构不是摧毁,而是一种极为细致、负责任的阅读,它尊重文本、紧贴文本的逻辑,直到文本自身暴露出无法弥合的张力。它的意义在于:培养对一切「自明的基础」「自然的等级」的警觉,为被压抑的「次等项」(他者、边缘、差异)开辟空间——这对伦理、政治、性别与后殖民思想都有深远影响。难点在于其晦涩与自反性:若无确定意义可言,德里达自己的文本又如何被理解?这恰是解构故意保持的开放与悖论。"}
  ],
  concepts:[
    {t:"逻各斯中心主义", d:"西方形而上学执着于一个在场、自足、确定的意义本源(理性、真理、上帝)的倾向。"},
    {t:"延异", d:"德里达的造词,兼指意义来自差异、又被无限延迟,故意义永不完全在场。"},
    {t:"解构", d:"一种贴近文本的细读策略,颠覆并越出其内部二元等级,揭示其自我拆解的张力。"}
  ],
  quote:{q:"文本之外别无他物。", who:"德里达·《论文字学》", plain:"并非说世界不存在,而是说我们对一切的理解都已被语言与意义之网所中介,无法跳到一个赤裸的「文本之外」。"}

{ id:"13.3", t:"罗尔斯:正义即公平、无知之幕与差别原则", lead:"如果让你来设计社会的基本规则,却事先不知道自己将生为谁——富或穷、强或弱——你会选择什么样的规则?", city:"usa",
  body:[
    {h:"复兴政治哲学", p:"二十世纪中叶,在功利主义独大、规范政治哲学几近沉寂之际,罗尔斯1971年的《正义论》以一部恢弘的体系重振了这一领域。他的根本对手是功利主义:后者主张以「最大多数人的最大幸福」为标准,但这可能为了总量幸福而牺牲少数人(比如以个别人的苦难换取多数人的快乐)。罗尔斯坚持「每个人都拥有一种基于正义的不可侵犯性,即使以社会整体福利之名也不能逾越」。正义,而非效率或总和,是社会制度的首要美德。"},
    {h:"原初状态与无知之幕", p:"如何找到公正的原则?罗尔斯设计了一个思想实验:「原初状态」。设想一群理性的人聚在一起为社会立约,但他们处在「无知之幕」之后——不知道自己的阶级、天赋、种族、性别、宗教,甚至不知道自己的人生观。既然不知道自己将落在哪个位置,出于理性的审慎,他们就不会设计任何可能让自己沦为牺牲品的规则。无知之幕巧妙地把「公平」内置进了选择程序:它剥离了一切可能导致偏私的信息,因此在其后达成的原则,必定是公平的。这就是「正义即公平」。"},
    {h:"两个正义原则", p:"罗尔斯论证,在无知之幕后人们会选出两条原则。第一,每个人都享有一套平等的基本自由(言论、信仰、政治权利等),且这一原则优先,不能为经济利益而牺牲。第二,社会与经济的不平等只有满足两个条件才被允许:(a) 依附于在公平机会平等下向所有人开放的职位;(b) 符合「差别原则」——即这种不平等必须使社会中处境最不利者获得最大利益。换言之,只有当让强者多得也能最大限度地改善最弱者的处境时,不平等才正当。"},
    {h:"差别原则的深意与争论", p:"差别原则的哲学根据极为深刻:一个人的天赋(智力、家世、运气)在道德上是「任意的」——你不配也不该因偶然得来的天赋而独占其全部回报。因此社会应把这些天赋视为某种「共同资产」,让其收益也惠及最不利者。这一思想为现代福利国家与再分配提供了强有力的论证。它也招致两面夹击:诺齐克从自由至上主义批评它侵犯了个人对自身才能与所得的正当权利;社群主义者(如桑德尔)则质疑那个被「无知之幕」剥得一干二净的「自我」是否还真实存在。这场争论,至今仍是政治哲学的中心。"}
  ],
  concepts:[

    {t:"差别原则", d:"社会经济不平等只有在能使处境最不利者获得最大利益时才正当。"},
    {t:"正义即公平", d:"正义原则应是公平的程序(原初状态)下理性各方一致同意的产物。"}

  quote:{q:"正义是社会制度的首要美德,正如真理是思想体系的首要美德。", who:"罗尔斯·《正义论》", plain:"一个社会再有效率、再繁荣,如果不正义,这套制度就是有根本缺陷的。"}

{ id:"13.4", t:"当代群像:心灵哲学的「难问题」与未竟的争论", lead:"科学几乎能解释大脑的一切运作,却似乎始终碰不到一个东西:为什么这些神经活动「感觉起来像某种样子」?", city:"usa",
  body:[
    {h:"心身问题的当代转世", p:"笛卡尔的心身二元论早已被多数哲学家放弃,但它留下的难题换了形式重返。主流的「物理主义」主张:心灵不过是大脑(物理系统)的某种状态或功能。其中「功能主义」影响最大——它说心理状态由其功能角色定义(疼痛就是「由损伤引起、导致呼痛与回避行为」的那个状态),因此原则上,硅基的计算机若实现了同样的功能组织,也能有心灵。这为人工智能时代的心灵问题埋下了伏笔:思维是否只是某种信息处理?"},
    {h:"意识的难问题", p:"哲学家查尔默斯区分了意识的「易问题」与「难问题」。易问题(其实极难,但原则上可由科学解决)是:大脑如何整合信息、控制行为、报告状态。难问题是:为什么所有这些物理过程会伴随着主观体验——为什么看到红色「感觉起来是那个样子」,疼痛「疼起来是那种滋味」?这种第一人称的、质性的体验被称为「感受质」(qualia)。难点在于:即使我们完全掌握了大脑的全部物理事实,似乎仍留下一道无法被物理语言填平的「解释鸿沟」。"},
    {h:"两个著名的思想实验", p:"两个实验把难问题逼到极致。其一是「玛丽的房间」:神经科学家玛丽自幼生活在黑白房间,通过书本掌握了关于颜色视觉的一切物理知识;当她第一次走出房间看见红色,她是否学到了新东西?如果是,那就说明物理知识之外还有「体验本身」这一事实。其二是「哲学僵尸」:设想一个在物理与行为上与你毫无二致、却完全没有内在体验的存在——如果这在逻辑上可设想,意识似乎就不能被还原为纯物理事实。这两个实验至今激烈争论,未有定论。"},
    {h:"未竟的争论与哲学的处境", p:"对难问题的回应五花八门:取消主义者干脆否认「感受质」这类东西真实存在,认为那是过时的民间心理学幻觉;泛心论者反其道而行,猜测意识或许是物质的基本属性,普遍而微弱地存在;还有人主张这是人类认知的永久局限。心灵哲学的未决,折射出哲学的整体处境:在科学昌明的时代,哲学不再独占对世界的解释,但恰恰在科学的边缘与基础处——意识、自由意志、人工智能的道德地位、何为美好生活——那些最古老的追问以新的形态重新逼问我们。哲学的历史远未终结,它只是再一次回到了惊奇本身。"}
  ],
  concepts:[

function go(k){
  if(k==='overview'){ location.hash='overview'; return; }
  if(/^\d+$/.test(k)){ location.hash='ch'+(Number(k)+1); return; }
  const m=k.split('.'); location.hash='ch'+(Number(m[0])+1)+'s'+(Number(m[1])+1);
}
function setActive(kind,i,j){
  navEl.querySelector('.navov').classList.toggle('on',kind==='ov');
  navEl.querySelectorAll('.navgrp').forEach((g,gi)=>{
    const on=(kind!=='ov'&&gi===i);
    g.classList.toggle('on',on&&kind==='ch');
    g.classList.toggle('open',on);
  });
  navEl.querySelectorAll('.subi').forEach(a=>a.classList.toggle('on',kind==='sub'&&a.dataset.k===i+'.'+j));
}

    <div class="ov-hint">也可以直接点地图上的城市、下方年代轴,或左侧目录进入任意章节与子章节。</div>`;
  const marker=document.getElementById('ovmarker'), done=document.getElementById('ovdone'), cap=document.getElementById('ovcap');
  const dots=[...page.querySelectorAll('.ovdot')], ticksEl=[...page.querySelectorAll('.tick')];
  let idx=-1;
  function tween(ax,ay,bx,by){ if(rafId)cancelAnimationFrame(rafId); const t0=performance.now(),dur=850;
    (function f(t){ let k=Math.min(1,(t-t0)/dur); const e=k<.5?2*k*k:1-Math.pow(-2*k+2,2)/2;
      marker.setAttribute('cx',ax+(bx-ax)*e); marker.setAttribute('cy',ay+(by-ay)*e);
      if(k<1) rafId=requestAnimationFrame(f); else rafId=null; })(t0); }
  function show(i,animate){ const prev=idx; idx=i; const c=chapters[i], g=geo[i], n=subtl[i][0];
    done.setAttribute('d',"M "+PRIM.slice(0,i+1).map(p=>p.x+" "+p.y).join(" L "));
    if(animate&&prev>=0) tween(PRIM[prev].x,PRIM[prev].y,PRIM[i].x,PRIM[i].y);
    else { marker.setAttribute('cx',PRIM[i].x); marker.setAttribute('cy',PRIM[i].y); }
    dots.forEach((d,k)=>{ d.classList.toggle('visited',k<i); d.classList.toggle('cur',k===i); });
    ticksEl.forEach((t,k)=>{ t.classList.toggle('visited',k<i); t.classList.toggle('active',k===i); });
    cap.innerHTML=`<div class="oc-top">${c.num} · ${c.period}</div><div class="oc-t"><b>${c.title}</b> &nbsp;<span style="font-size:13px;color:var(--t2)">📍 ${g.where}</span></div><div class="oc-d">${n.t}(${n.y}) · ${c.cq}</div>`;
    document.getElementById('ovgoto').onclick=()=>go(String(i));
  }
  dots.forEach(d=>d.addEventListener('click',()=>go(String(Number(d.dataset.i)))));
  const pbtn=document.getElementById('ovplay');
  ticksEl.forEach(t=>t.addEventListener('click',()=>{ stopPlay(); pbtn.classList.remove('playing'); pbtn.textContent='▶ 播放迁徙'; show(Number(t.dataset.i),true); }));
  pbtn.addEventListener('click',()=>{ if(playTimer){ stopPlay(); pbtn.classList.remove('playing'); pbtn.textContent='▶ 播放迁徙'; return; }
    if(idx>=chapters.length-1) show(0,false); pbtn.classList.add('playing'); pbtn.textContent='⏸ 暂停';
    playTimer=setInterval(()=>{ if(idx>=chapters.length-1){ stopPlay(); pbtn.classList.remove('playing'); pbtn.textContent='▶ 重新播放'; return; } show(idx+1,true); },1700); });
  document.getElementById('ovreset').addEventListener('click',()=>{ stopPlay(); pbtn.classList.remove('playing'); pbtn.textContent='▶ 播放迁徙'; show(0,false); });
  show(0,false);
}

// ============ CHAPTER OVERVIEW ============
function renderChapterOverview(i){
  const c=chapters[i], g=geo[i], nodes=subtl[i];
  const tagHTML=c.threads.map(t=>`<span class="tag ${T[t]}">${TN[t]}</span>`).join('')+`<span class="geotag">${(g.where.split(" · ")[1]||cities[g.primary].n)}</span>`;
  const full="M "+PRIM.map(p=>p.x+" "+p.y).join(" L ");
  const done="M "+PRIM.slice(0,i+1).map(p=>p.x+" "+p.y).join(" L ");
  const step=i>0?`<path class="rstep" marker-end="url(#arr)" d="M ${PRIM[i-1].x} ${PRIM[i-1].y} L ${PRIM[i].x} ${PRIM[i].y}"/>`:``;
  const stopsHTML=nodes.map((n,j)=>`<div class="vstop" data-j="${j}"><div class="vyear">${n.y}</div><div class="vrail"><span class="vdot"></span></div><div class="vbody"><span class="vschool">${n.s}</span><h4>${n.t}<span class="vcity">📍${cities[n.city].n}</span></h4><p>${n.d}</p></div></div>`).join('');
  const cardHTML=(subs[i]||[]).map((s,j)=>`<div class="subcard" data-j="${j}"><div class="sid">${s.id}</div><h4>${s.t}</h4><p>${s.lead||''}</p></div>`).join('');
  const debHTML=(typeof debate!=='undefined'&&debate[i])?`<div class="block"><span class="blabel">争论焦点 · 批评与回应</span>${debate[i].map(s=>`<div class="deep deb"><h4>◦ ${s.h}</h4><p>${s.p}</p></div>`).join('')}</div>`:'';
  const impHTML=(typeof impact!=='undefined'&&impact[i])?`<div class="block"><span class="blabel">影响与回响 · 它如何塑造后世</span>${impact[i].map(s=>`<div class="deep imp"><h4>▸ ${s.h}</h4><p>${s.p}</p></div>`).join('')}</div>`:'';
  const testHTML=c.test.map(t=>`<li>${t}</li>`).join('');
  page.innerHTML=`
   <div class="crumb"><a data-k="overview">总览</a> › ${c.num}</div>
   <div class="chead"><span class="chperiod">${c.period}</span><div class="chnum">${c.num}</div><h2>${c.title}</h2><div class="tags">${tagHTML}</div></div>
   <div class="cq">${c.cq}</div>
   <div class="block"><span class="blabel">时代背景</span><p>${c.bg}</p></div>
   <div class="block"><span class="blabel">地理 · 经济引擎</span><p>${g.econ}</p></div>
   <div class="block"><span class="blabel">时间流 · 思想为何转变</span><div class="flow"><div class="step s1"><h4>① 遗留难题</h4><p>${c.flow.legacy}</p></div><div class="step s2"><h4>② 触发力量</h4><p>${c.flow.trigger}</p></div><div class="step s3"><h4>③ 思想转向</h4><p>${c.flow.shift}</p></div></div></div>
   <div class="block"><span class="blabel">本章时间线 · 思想流派的变迁(点击节点在地图上定位)</span>
     <div class="explore">
       <div class="mapwrap"><svg class="cmap" viewBox="0 0 800 480"><rect width="800" height="480" fill="#d4e3ea"/><use href="#land-geo" class="land" filter="url(#ls)"/><path class="rmini" d="${full}"/><path class="rdone" d="${done}"/>${step}<g id="cmap-cities"></g></svg><div class="maphint">琥珀色实线 = 走到本章为止的迁徙路线</div></div>
       <div class="vtlcol"><div class="vtlhead"><span class="h">⏳ ${nodes[0].y} → ${nodes[nodes.length-1].y}</span><button class="vplay" id="vplay">▶ 沿时间线演示</button></div><div class="vtl" id="vtl">${stopsHTML}</div></div>
     </div>
   </div>
   <div class="block"><span class="blabel">本章子章节 · 点击进入(独立成章)</span><div class="subcards">${cardHTML}</div></div>
   ${debHTML}
   ${impHTML}
   <div class="block"><span class="blabel">脉络承接 · 通向下一章</span><div class="lineage">${c.lineage}</div></div>
   <details class="test"><summary>自测 3 问 · 点击展开</summary><ol>${testHTML}</ol></details>
   <div class="navbtns">
     <button id="bback" ${i===0?'disabled':''}><span class="nbk">← 上一章</span>${i===0?'已是开篇':chapters[i-1].title}</button>
     <button id="bnextch" ${i===chapters.length-1?'disabled':''}><span class="nbk">下一章 →</span>${i===chapters.length-1?'已是终章':chapters[i+1].title}</button>
   </div>`;
  page.querySelector('.crumb a').addEventListener('click',()=>go('overview'));
  page.querySelectorAll('.subcard').forEach(el=>el.addEventListener('click',()=>go(i+'.'+el.dataset.j)));
  initExplore(i);
  const bb=document.getElementById('bback'), bn=document.getElementById('bnextch');
  if(i>0) bb.addEventListener('click',()=>go(String(i-1)));
  if(i<chapters.length-1) bn.addEventListener('click',()=>go(String(i+1)));
}

function initExplore(i){
  const nodes=subtl[i]; const cont=document.getElementById('cmap-cities');
  const order=[]; nodes.forEach(n=>{ if(!order.includes(n.city)) order.push(n.city); });
  let html=""; const cityEl={};
  order.forEach(k=>{ const c=cities[k]; html+=`<circle class="cdot" data-city="${k}" cx="${c.x}" cy="${c.y}" r="7"/>`;
    const a=c.a||'start'; const lx=a==='end'?c.x-11:a==='middle'?c.x:c.x+11;
    html+=`<text class="clab" data-city="${k}" x="${lx}" y="${c.y+(c.dy||4)}" text-anchor="${a}">${c.n}</text>`; });
  cont.innerHTML=html;
  order.forEach(k=>{ cityEl[k]={dot:cont.querySelector(`.cdot[data-city="${k}"]`),lab:cont.querySelector(`.clab[data-city="${k}"]`)}; });
  const stops=[...document.querySelectorAll('#vtl .vstop')]; let cur=-1;
  function select(j){ cur=j; const n=nodes[j]; stops.forEach((s,k)=>s.classList.toggle('active',k===j));
    for(const k in cityEl){ const on=(k===n.city); cityEl[k].dot.classList.toggle('cur',on); cityEl[k].lab.classList.toggle('cur',on); } }
  stops.forEach((s,j)=>{ s.addEventListener('click',()=>{ stopPlay(); vb.classList.remove('playing'); vb.textContent='▶ 沿时间线演示'; select(j); });
    s.addEventListener('mouseenter',()=>{ if(!playTimer) select(j); }); });
  for(const k in cityEl){ cityEl[k].dot.addEventListener('click',()=>{ stopPlay(); const j=nodes.findIndex(n=>n.city===k); if(j>=0) select(j); }); }
  const vb=document.getElementById('vplay');
  vb.addEventListener('click',()=>{ if(playTimer){ stopPlay(); vb.classList.remove('playing'); vb.textContent='▶ 沿时间线演示'; return; }
    vb.classList.add('playing'); vb.textContent='⏸ 停止'; if(cur>=nodes.length-1) select(0);
    playTimer=setInterval(()=>{ if(cur>=nodes.length-1){ stopPlay(); vb.classList.remove('playing'); vb.textContent='▶ 重新演示'; return; } select(cur+1); },1700); });
  select(0);
}

// ============ SUB-CHAPTER PAGE ============
function renderSub(i,j){
  const c=chapters[i], s=subs[i][j];
  const bodyHTML=s.body.map(b=>`<div class="deep"><h4>${b.h}</h4><p>${b.p}</p></div>`).join('');
  const conHTML=(s.concepts&&s.concepts.length)?`<div class="block"><span class="blabel">核心概念</span><div class="concepts">${s.concepts.map(x=>`<div class="concept"><b>${x.t}</b><span>${x.d}</span></div>`).join('')}</div>`:'';
  const quoteHTML=s.quote?`<div class="block"><span class="blabel">原典金句</span><div class="quote"><div class="q">「${s.quote.q}」</div><div class="who">— ${s.quote.who}</div><div class="plain">${s.quote.plain}</div></div></div>`:'';
  // locator map: this chapter's sub cities, highlight current
  const chCities=[]; subs[i].forEach(x=>{ if(x.city&&!chCities.includes(x.city)) chCities.push(x.city); });
  let locDots="";
  chCities.forEach(k=>{ const cc=cities[k]; const on=(k===s.city);
    locDots+=`<circle class="cdot ${on?'cur':''}" cx="${cc.x}" cy="${cc.y}" r="${on?8:6}"/>`;
    if(on){ const a=cc.a||'start'; const lx=a==='end'?cc.x-11:a==='middle'?cc.x:cc.x+11; locDots+=`<text class="clab cur" x="${lx}" y="${cc.y+(cc.dy||4)}" text-anchor="${a}">${cc.n}</text>`; } });
  const loc=s.city?`<svg class="locmap" viewBox="0 0 800 480"><rect width="800" height="480" fill="#d4e3ea"/><use href="#land-geo" class="land"/>${locDots}</svg>`:'';
  // prev/next across all subs
  const fi=FLAT.findIndex(p=>p[0]===i&&p[1]===j);
  const prev=fi>0?FLAT[fi-1]:null, next=fi<FLAT.length-1?FLAT[fi+1]:null;
  const lab=p=>subs[p[0]][p[1]].id+' '+subs[p[0]][p[1]].t;
  page.innerHTML=`
   <div class="crumb"><a data-k="overview">总览</a> › <a data-k="${i}">${c.num} ${c.title}</a> › ${s.id}</div>
   <div class="chead"><span class="chperiod">${c.period}</span><div class="chnum">${c.num} · 子章节 ${s.id}</div><h2>${s.t}</h2></div>
   ${s.lead?`<div class="cq">${s.lead}</div>`:''}
   ${loc}
   ${bodyHTML}
   ${conHTML}
   ${quoteHTML}
   <div style="clear:both"></div>
   <div class="navbtns">
     <button id="sprev" ${prev?'':'disabled'}>${prev?`<span class="nbk">← 上一节</span>${lab(prev)}`:'已是第一节'}</button>
     <button id="snext" ${next?'':'disabled'}>${next?`<span class="nbk">下一节 →</span>${lab(next)}`:'已是最后一节'}</button>
   </div>
   <div style="margin-top:14px"><a class="navov" style="display:inline-block" data-k="${i}">↩ 返回「${c.title}」总览</a></div>`;
  page.querySelectorAll('.crumb [data-k]').forEach(a=>a.addEventListener('click',()=>go(a.dataset.k)));
  page.querySelector('.navov').addEventListener('click',()=>go(String(i)));
  if(prev) document.getElementById('sprev').addEventListener('click',()=>go(prev[0]+'.'+prev[1]));
  if(next) document.getElementById('snext').addEventListener('click',()=>go(next[0]+'.'+next[1]));
}

window.addEventListener('scroll',()=>{ const hsc=document.documentElement.scrollHeight-window.innerHeight; bar.style.width=(hsc>0?(window.scrollY/hsc*100):0)+'%'; },{passive:true});
route();
</script>
